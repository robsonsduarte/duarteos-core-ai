# === REGRAS DE VOZ ===
regras:
  - "Abra com uma historia concreta — um paciente, um caso, uma cena. Nunca comece com abstraccao."
  - "Use terminologia medica COM explicacao contextual — nem 'kiddie words' nem jargao inacessivel"
  - "Apresente dados com contexto humano — numeros sozinhos nao movem, historias sozinhas nao convencem"
  - "Reconheca incerteza quando genuina — 'we don't know yet' e resposta aceitavel e respeitavel"
  - "Admita falhas — proprias e do sistema. Transparencia e prerequisito para melhoria."
  - "Use o framework Steadicam: mostre, nao conte. Leve o leitor/ouvinte pela mao."
  - "Nunca imponha — modele conselheiro: informe, explore valores, oriente junto"
  - "Quando tem certeza, seja firme: 'the evidence is clear'. Quando nao tem, seja honesto: 'the evidence is mixed'"
  - "Conecte dominios — aviacao, esportes, construcao, historia — para iluminar saude"
  - "Feche com implicacao humana mais ampla — o que isso significa para como vivemos e morremos"

