# Failure to Rescue — atul-gawande
# Pipeline: MMOS Engine v3 — Fase 10
# Gerado em: 2026-03-03

framework_identity:
  name: "Failure to Rescue"
  slug: "failure-to-rescue"
  mind: "atul-gawande"
  category: "saude"
  source_path: "livro/complications"

descricao: "'The difference between triumph and defeat isn't about willingness to take risks. It's about mastery of rescue.' Hospitais superiores nao previnem complicacoes melhor — resgatam pacientes mais efetivamente quando complicacoes ocorrem. A metrica correta nao e 'taxa de complicacoes' mas 'taxa de resgate'. Tres armadilhas: plano errado, plano inadequado, nenhum plano."

steps:
  - step: 1
    acao: "Aceite que complicacoes VAO acontecer"
    detalhe: "Nenhum sistema, por melhor que seja, elimina complicacoes completamente. Tentar prevenir 100% e ilusao — e distrai da capacidade de resposta."
  - step: 2
    acao: "Meca taxa de RESGATE, nao taxa de complicacoes"
    detalhe: "A metrica que diferencia hospitais excelentes de mediocres nao e 'quantas complicacoes' mas 'quantas complicacoes foram resgatadas com sucesso'."
  - step: 3
    acao: "Construa sistemas de deteccao precoce"
    detalhe: "Complicacoes nao detectadas cedo sao complicacoes que matam. Alertas, monitoramento, protocolos de escalacao."
  - step: 4
    acao: "Treine resgate deliberadamente"
    detalhe: "Rescue e habilidade, nao sorte. Requer pratica deliberada — simulacoes, drills, revisao de casos."
  - step: 5
    acao: "Classifique a falha: plano errado, inadequado ou ausente?"
    detalhe: "Tres armadilhas: (1) tinha plano, mas era o errado; (2) tinha plano, mas era insuficiente; (3) nao tinha plano nenhum. Cada tipo requer correcao diferente."

quando_usar: "Avaliar qualidade de hospitais, sistemas de seguranca, resposta a crises, analise pos-falha. Aplicavel fora de medicina: engenharia de software (incident response), aviacao (procedimentos de emergencia), gestao de crises."

exemplos_aplicacao:
  - cenario: "Comparar dois hospitais com mesma taxa de complicacoes cirurgicas"
    resultado: "Hospital A resgata 95% das complicacoes; Hospital B resgata 70%. Hospital A e claramente superior."
    fonte: "livro/complications"
  - cenario: "Cirurgiao que 'nunca tem complicacoes'"
    resultado: "Ou opera casos faceis, ou nao detecta complicacoes. Ambos sao piores que ter complicacoes e resgatar."
    fonte: "livro/complications"

anti_patterns:
  - "Medir apenas prevencao e ignorar capacidade de resgate"
  - "Punir complicacoes em vez de recompensar resgate eficaz"
  - "Nao ter plano de resposta porque 'isso nunca acontece aqui'"
  - "Confundir ausencia de complicacoes detectadas com ausencia real de complicacoes"

frameworks_relacionados:
  - name: "Checklist Cirurgico"
    relacao: "complementar — checklist previne; Failure to Rescue avalia resposta quando prevencao falha"
  - name: "Ignorancia vs Ineptidao"
    relacao: "complementar — failure to rescue frequentemente e ineptidao (sabemos resgatar, nao fazemos)"
