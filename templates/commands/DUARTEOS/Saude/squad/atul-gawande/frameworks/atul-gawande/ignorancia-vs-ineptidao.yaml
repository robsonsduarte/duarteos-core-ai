# Ignorancia vs Ineptidao — atul-gawande
# Pipeline: MMOS Engine v3 — Fase 10
# Gerado em: 2026-03-03

framework_identity:
  name: "Ignorancia vs Ineptidao"
  slug: "ignorancia-vs-ineptidao"
  mind: "atul-gawande"
  category: "saude"
  source_path: "livro/checklist-manifesto"

descricao: "Framework de diagnostico para classificar a raiz de uma falha. Dois tipos de erro: ignorancia (nao sabemos o suficiente — pesquisa resolve) vs ineptidao (sabemos mas nao aplicamos consistentemente — sistemas resolvem). A maioria dos problemas modernos em saude sao de ineptidao, nao de ignorancia. Direciona a solucao correta."

steps:
  - step: 1
    acao: "Classifique o problema: o conhecimento necessario existe?"
    detalhe: "Se NAO existe: e ignorancia. Invista em pesquisa, experimentacao, descoberta. Se SIM existe: prossiga para o passo 2."
  - step: 2
    acao: "O conhecimento existente e aplicado consistentemente?"
    detalhe: "Se NAO e aplicado: e ineptidao. Nao treine mais pessoas — construa sistemas. Se SIM e aplicado: o problema esta em outro lugar (talvez o conhecimento esteja errado)."
  - step: 3
    acao: "Para ineptidao: projete sistema que garanta aplicacao consistente"
    detalhe: "Checklists, protocolos, defaults, nudges estruturais. Resultados variam 250% entre instituicoes — quando todos 'sabem', a diferenca e o sistema."
  - step: 4
    acao: "Para ignorancia: invista em pesquisa e aceite incerteza"
    detalhe: "Nao finja que sabe quando nao sabe. Reconhecer ignorancia e o primeiro passo para resolve-la."

quando_usar: "Diagnosticar por que algo esta falhando — em saude, engenharia, gestao, educacao, qualquer dominio. Evita o erro de investir em pesquisa quando o problema e de aplicacao, ou de padronizar quando o problema e de conhecimento."

exemplos_aplicacao:
  - cenario: "Infeccoes hospitalares persistem apesar de todo conhecimento sobre higiene"
    resultado: "E ineptidao — sabemos lavar as maos, nao fazemos consistentemente. Checklist resolve."
    fonte: "livro/checklist-manifesto"
  - cenario: "Doenca rara sem tratamento conhecido"
    resultado: "E ignorancia — nao adianta sistematizar o que nao sabemos. Pesquisa resolve."
    fonte: "livro/checklist-manifesto"
  - cenario: "C-section rates variam 7-70% entre hospitais"
    resultado: "E ineptidao institucional — o conhecimento existe, a aplicacao e inconsistente"
    fonte: "discursos/reith-lectures"

anti_patterns:
  - "Tratar ineptidao como ignorancia — treinar mais quando o problema e o sistema"
  - "Tratar ignorancia como ineptidao — padronizar quando o conhecimento nao existe"
  - "Culpar individuos quando o problema e estrutural"
  - "Investir em tecnologia quando o problema e de processo"

frameworks_relacionados:
  - name: "Checklist Cirurgico"
    relacao: "complementar — checklist e a solucao para ineptidao"
  - name: "Failure to Rescue"
    relacao: "complementar — failure to rescue e uma forma especifica de ineptidao"
