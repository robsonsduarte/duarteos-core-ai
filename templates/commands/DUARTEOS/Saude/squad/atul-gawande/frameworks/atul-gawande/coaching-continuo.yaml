framework_identity:
  name: "Coaching Continuo"
  slug: "coaching-continuo"
  mind: "atul-gawande"
  category: "saude"
  source_path: "artigo/personal-best"

descricao: "'I don't care if you're Roger Federer, you will have blind spots.' O modelo tradicional de formacao (treinamento intensivo → auto-aperfeicoamento independente) esta quebrado. Mesmo os melhores profissionais precisam de observadores externos que revelam o que nao conseguem ver sozinhos. Gawande contratou um coach cirurgico para si mesmo apos 8 anos como attending."

steps:
  - step: 1
    acao: "Reconheca que mesmo experts tem blind spots"
    detalhe: "A expertise cria os blind spots — quanto mais automatizado, mais sutil o que escapa. 'The coaching model says you need someone watching you.'"
  - step: 2
    acao: "Estabeleca observador externo REGULAR (nao pontual)"
    detalhe: "Coach nao e consultor de crise. E observador constante que ve o que o habito esconde."
  - step: 3
    acao: "Receba feedback especifico e acionavel"
    detalhe: "Nao 'voce esta indo bem' — mas 'nesse momento, sua mao esquerda fez X quando deveria fazer Y.'"
  - step: 4
    acao: "Pratique deliberadamente o que o feedback revela"
    detalhe: "Pratica deliberada: focar na fraqueza revelada, nao no que ja sabe fazer."
  - step: 5
    acao: "Repita — coaching nao tem fim"
    detalhe: "Nao e fase de aprendizado — e processo continuo. Roger Federer nunca deixou de ter coach."

quando_usar: "Desenvolvimento profissional em qualquer area onde performance importa. Cirurgia, ensino, esportes, lideranca, escrita, programacao. Especialmente util quando um profissional 'platoo' — parou de melhorar apesar de experiencia crescente."

exemplos_aplicacao:
  - cenario: "Gawande contratou coach cirurgico apos 8 anos como attending"
    resultado: "Coach identificou microhabitos que Gawande nao percebia — melhoria mensuravel em outcomes"
    fonte: "artigo/personal-best"
  - cenario: "Comparacao com ensino: professores com coaching vs sem"
    resultado: "Professores com coaching superaram significativamente os sem — pesquisa documentada"
    fonte: "artigo/personal-best"

anti_patterns:
  - "Achar que experiencia substitui feedback externo — experiencia cria blind spots"
  - "Coaching pontual em vez de continuo — consistencia e o que funciona"
  - "Feedback generico em vez de especifico — 'bom trabalho' nao serve"
  - "Coach sem competencia no dominio — precisa entender o que esta observando"

frameworks_relacionados:
  - name: "Checklist Cirurgico"
    relacao: "complementar — checklist garante o basico; coaching melhora o avancado"
  - name: "Melhoria Continua (Better is Possible)"
    relacao: "causal — coaching e a implementacao pratica de 'better is possible' no nivel individual"
