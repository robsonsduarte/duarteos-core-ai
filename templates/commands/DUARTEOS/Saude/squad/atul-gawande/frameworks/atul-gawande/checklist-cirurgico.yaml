# Checklist Cirurgico (DO-CONFIRM) — atul-gawande
# Pipeline: MMOS Engine v3 — Fase 10
# Gerado em: 2026-03-03

framework_identity:
  name: "Checklist Cirurgico (DO-CONFIRM)"
  slug: "checklist-cirurgico"
  mind: "atul-gawande"
  category: "saude"
  source_path: "livro/checklist-manifesto"

descricao: "Framework de seguranca para processos complexos com risco de falha por omissao. Nao substitui expertise — a complementa. Baseado no modelo de aviacao (B-17), adaptado para cirurgia e aplicavel a qualquer dominio de alta complexidade. 47% reducao em morte em trials globais."

steps:
  - step: 1
    acao: "Identifique os passos criticos que nao podem ser perdidos"
    detalhe: "NAO todos os passos — apenas os que, se omitidos, causam dano. A arte do checklist e saber o que incluir E o que deixar de fora."
  - step: 2
    acao: "Limite a 19 itens ou menos"
    detalhe: "Checklists inchados (81 itens) nao sao usados e matam adesao. O erro mais comum das instituicoes e transformar checklist em manual."
  - step: 3
    acao: "Inclua pausa de equipe (Time Out)"
    detalhe: "Todos dizem nome e papel. Cria cultura de falar — enfermeira que nao falaria com cirurgiao agora tem permissao institucional."
  - step: 4
    acao: "Execute em menos de 90 segundos"
    detalhe: "Um minuto e meio para os passos iniciais gera 'valor enorme'. Se leva mais, esta grande demais."
  - step: 5
    acao: "Revise e simplifique periodicamente"
    detalhe: "Checklists sao organismos vivos — devem ser podados, nao inflados."

quando_usar: "Qualquer processo complexo com risco de falha por omissao: cirurgia, aviacao, construcao, lancamento de produto, onboarding, deploys. Especialmente eficaz em emergencias — 'the group in whom we have the highest reduction in death are those in which the time is the most pressing.'"

exemplos_aplicacao:
  - cenario: "Cirurgia em hospital com 8 especialidades diferentes"
    resultado: "47% reducao em morte, 36% reducao em complicacoes — WHO Safe Surgery Saves Lives"
    fonte: "livro/checklist-manifesto"
  - cenario: "Problema de esponjas retidas em cirurgia ($500M/ano em processos)"
    resultado: "Barcode sponges ($0.01/unidade) eliminaram o problema inteiramente"
    fonte: "discursos/multiple"
  - cenario: "B-17 'too much airplane for one man to fly'"
    resultado: "Piloto de teste morreu. Solucao: checklist. Aviao voou milhoes de milhas sem incidentes."
    fonte: "livro/checklist-manifesto"

anti_patterns:
  - "Expandir de 19 para 81 itens — instituicoes fazem isso e matam adesao"
  - "Usar checklist como substituto de treinamento — e complemento, nao substituto"
  - "Pular o Time Out porque 'ja se conhecem' — a pausa existe para criar cultura de falar"
  - "Tratar checklist como burocracia — e ferramenta de seguranca, nao de compliance"
  - "Nao revisar periodicamente — checklists que nao sao podados se tornam inuteis"

frameworks_relacionados:
  - name: "Ignorancia vs Ineptidao"
    relacao: "complementar — checklist resolve ineptidao, nao ignorancia"
  - name: "Failure to Rescue"
    relacao: "complementar — checklist previne; Failure to Rescue mede capacidade de resposta quando prevencao falha"
  - name: "Coaching Continuo"
    relacao: "complementar — checklist garante o basico; coaching melhora o avancado"
