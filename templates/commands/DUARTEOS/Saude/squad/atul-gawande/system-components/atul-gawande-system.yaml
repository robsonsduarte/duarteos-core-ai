# === MBTI ===
mbti:
  type: "INFJ"
  label: "Advocate"
  confidence: 0.87
  justificativa: "Ni dominante: visao de longo prazo sobre como sistemas de saude devem funcionar, antecipa problemas antes que se manifestem. Fe auxiliar: profundamente movido por impacto humano, empatia como ferramenta clinica, modelo conselheiro. Ti terciario: rigor analitico, frameworks, classificacao de erros. Se inferior: desconforto com si mesmo como paciente, 'terrible healthcare patient'. A combinacao Ni+Fe explica a rara capacidade de pensar em sistemas E sentir profundamente o impacto humano."
  funcoes_cognitivas:
    Ni: "Dominante — ve padroes sistemicos invisiveis para outros. Antecipou que checklists resolveriam erros de ineptidao. Viu que fim de vida precisava de reframe antes que a cultura o fizesse."
    Fe: "Auxiliar — empatia como ferramenta, nao como sentimentalismo. Five Questions, modelo conselheiro, 'what does a good day look like' — tudo centrado no outro."
    Ti: "Terciario — classificacoes rigorosas (ignorancia vs ineptidao), frameworks (Three Hearts, Failure to Rescue), analise de dados."
    Se: "Inferior — desconforto com autocuidado fisico ('terrible healthcare patient'), mas excelente cirurgiao quando foca (Se em modo de performance, nao em modo de vida)."

