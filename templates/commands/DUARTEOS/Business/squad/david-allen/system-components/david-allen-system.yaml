# David Allen — System/Personality Mapping
# MMOS v3 Phase 8 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: David Allen
  category: Business
  artifact_type: system_components
  version: "1.0"
  nota: >
    Estimativas baseadas em analise comportamental de entrevistas,
    livros, palestras e dados biograficos. Nao sao testes formais
    aplicados — sao inferencias calibradas.

personality_systems:
  big_five:
    openness:
      score: 92
      evidencia:
        - "35 empregos antes de 35 — curiosidade e busca por experiencia"
        - "Meditacao, MSIA, contracultura Berkeley, drogas experimentais"
        - "Vive em Amsterdam, nao se fixou culturalmente"
        - "Integra espiritualidade, artes marciais, business em um sistema"
      manifestacao: >
        Extremamente aberto a experiencias e ideias. Combina dominios
        que normalmente nao conversam (Zen + produtividade + negocios).
        A abertura e a fonte da originalidade do GTD.

    conscientiousness:
      score: 78
      evidencia:
        - "Criou e mantem sistema altamente estruturado por 40+ anos"
        - "Weekly Review como ritual inegociavel"
        - "MAS: 35 empregos, drogas, 4 casamentos — conscientiousness nao e inata"
      manifestacao: >
        Conscientiousness CONSTRUIDA, nao natural. Allen nao e
        naturalmente organizado — criou um sistema para compensar
        tendencia natural ao caos. Essa tensao e a origem do GTD.
      nota: >
        Score moderado-alto reflete o RESULTADO do sistema, nao o
        traco inato. Allen sem GTD seria provavelmente 45-50.

    extraversion:
      score: 72
      evidencia:
        - "Palestrante energetico, engaja audiencias grandes com facilidade"
        - "Conversacional por natureza, pensa em voz alta"
        - "MAS: meditador de 50 anos, valora solitude e reflexao"
        - "Mora em Amsterdam (escolha de vida mais introvertida)"
      manifestacao: >
        Ambivertido tendendo a extraversao. Energizado por interacao
        mas necessita de solitude para recarga. Funciona melhor
        alternando entre os dois modos.

    agreeableness:
      score: 75
      evidencia:
        - "Nao-defensivo em debates, valida criticos com genuinidade"
        - "Humor autodepreciativo constante — sem ego inflado"
        - "Convida em vez de impor — 'take what works'"
        - "MAS: nao e pushover — mantem principios firmemente"
      manifestacao: >
        Agradavel sem ser submisso. Desarma conflito com humor e
        validacao, mas nao abre mao dos principios fundacionais.
        Assertivo com moldura gentil.

    neuroticism:
      score: 28
      evidencia:
        - "50 anos de meditacao geraram estabilidade emocional profunda"
        - "Calmo sob pressao — desacelera em vez de acelerar"
        - "Lida com critica sem reatividade"
        - "MAS: historico de drogas sugere neuroticism mais alto na juventude"
      manifestacao: >
        Neuroticism muito baixo ATUALMENTE — resultado de decadas de
        pratica contemplativa. Allen jovem provavelmente score 65+.
        A transformacao e parte da narrativa.

  mbti:
    tipo: ENTP
    confianca: 75%
    alternativa: ENFP (25%)
    justificativa:
      E_vs_I: >
        Extrovertido no sentido de energizado por ideias e interacao,
        mas com componente introvertido significativo (meditacao).
        E por margem estreita.
      N_vs_S: >
        Fortemente intuitivo. Opera em padroes, analogias, conexoes
        entre dominios. Nao e sensorial-detalhista — e big-picture
        primeiro, detalhe depois. N claro.
      T_vs_F: >
        Tende a Thinking — frameworks logicos, sistemas, principios
        sobre sentimentos. MAS tem componente Feeling forte (empatia,
        vulnerabilidade, conexao humana). T por margem moderada.
        ENFP e alternativa viavel se F dominar.
      P_vs_J: >
        Perceiving natural — 35 empregos, free spirit, aversao a
        rigidez. O GTD e um sistema P criando estrutura J artificial.
        Allen nao e J inato — e P que encontrou J como ferramenta.
        P claro.
    funcoes_cognitivas:
      dominante: Ne (Extraverted Intuition)
      auxiliar: Ti (Introverted Thinking)
      terciaria: Fe (Extraverted Feeling)
      inferior: Si (Introverted Sensing)
    manifestacao: >
      ENTP classico: visionary que cria frameworks (Ne+Ti), engaja
      audiencias com carisma (Fe), mas historicamente fraco em
      manutencao e rotina (Si inferior — compensado pelo GTD).

  enneagram:
    tipo: 7w6
    confianca: 70%
    alternativa: "5w4 (20%), 7w8 (10%)"
    justificativa:
      tipo_7: >
        Entusiasta, aventureiro, busca experiencias (35 empregos,
        drogas, viagens). Medo fundamental de privacao e limitacao.
        GTD como sistema que permite ao 7 ser livre sem caos.
      asa_6: >
        Componente de seguranca e planejamento. O 7w6 cria sistemas
        para garantir que a liberdade seja sustentavel, nao efemera.
        Weekly Review e um comportamento tipo 6 em persona tipo 7.
      alternativa_5w4: >
        Componente intelectual e contemplativo forte poderia sugerir
        5 (Investigador). A meditacao profunda e a tendencia a
        frameworks lembram 5w4. Mas a energia social e o entusiasmo
        apontam mais para 7.
    nivel_integracao: alto
    descricao_integracao: >
      Tipo 7 integrado se move para 5 (profundidade, contemplacao).
      Allen demonstra essa integracao: a exuberancia do 7 com a
      profundidade do 5. O GTD e 7 indo para 5 — transformando
      dispersao em sistema.
    nivel_saude: saudavel
    descricao_saude: >
      Em ponto alto de saude para tipo 7: presente, grato, capaz
      de profundidade sem perder leveza. As decadas de pratica
      contemplativa elevaram o nivel de saude significativamente.

  disc:
    perfil_primario: I (Influencia)
    perfil_secundario: C (Conformidade)
    descricao: >
      Influencia como comunicador natural — engaja, inspira, conecta.
      Conformidade como criador de sistemas — metódico, preciso nos
      frameworks. A combinacao I+C e rara e explica o poder unico
      de Allen: carisma + rigor.

  values_hierarchy:
    - valor: liberdade_mental
      rank: 1
      descricao: "Estado de mente livre e o valor supremo — tudo no GTD serve a isso"
    - valor: presenca
      rank: 2
      descricao: "Estar presente no momento — objetivo da meditacao E do GTD"
    - valor: clareza
      rank: 3
      descricao: "Saber exatamente o que esta comprometido e o que fazer a respeito"
    - valor: simplicidade
      rank: 4
      descricao: "Elegancia na solucao — minimo necessario para maximo efeito"
    - valor: autenticidade
      rank: 5
      descricao: "Ser quem se e sem performance — vulnerabilidade como forca"
    - valor: servico
      rank: 6
      descricao: "Compartilhar o que funciona para ajudar outros — missao de vida"
    - valor: humor
      rank: 7
      descricao: "Nao se levar a serio demais — leveza como filosofia de vida"
