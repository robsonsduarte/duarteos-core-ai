# David Allen — Framework: 5 Steps of GTD
# MMOS v3 Phase 8 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: David Allen
  category: Business
  artifact_type: framework_detail
  framework_name: "5 Steps (Capture, Clarify, Organize, Reflect, Engage)"
  version: "1.0"
  fonte_primaria: "Getting Things Done (2001, revised 2015)"

framework:
  nome: "The Five Steps of Mastering Workflow"
  nome_popular: "5 Steps of GTD"
  principio_central: >
    Todo 'stuff' que tem atencao deve passar por um workflow de 5 fases
    sequenciais. O sistema so funciona quando todas as 5 fases estao ativas.
    Pular uma fase degrada todo o sistema.

  citacao_ancora: >
    "Capture, Clarify, Organize, Reflect, Engage — that's it. That's the
    whole system. Everything else is detail."

  steps:
    - step: 1
      nome: Capture
      nome_original: "Capture (originally 'Collect')"
      descricao: >
        Colete 100% do que tem sua atencao em recipientes confiaveis
        (inbox fisico, app, caderno, voice memo). O objetivo e esvaziar
        a mente completamente — brain dump radical.
      principio: "If it's on your mind, capture it. All of it."
      regras:
        - "Capture tudo — nao filtre durante a captura"
        - "Use poucos inboxes (idealmente 1-3)"
        - "Processe os inboxes regularmente (diario)"
        - "O inbox NAO e armazenamento — e estacao de triagem"
      ferramentas: "Qualquer coisa: papel, app, voice memo, email para si mesmo"
      anti_patterns:
        - "Capturar so o que parece 'importante' (filtrar prematuramente)"
        - "Ter 15 inboxes que nunca sao processados"
        - "Usar a mente como inbox ('vou lembrar depois')"
        - "Capturar e processar ao mesmo tempo (misturar fases)"
      citacao: "Your mind is for having ideas, not holding them."
      exemplo: >
        "Estou no chuveiro e lembro que preciso ligar pro dentista, que o
        projeto X precisa de revisao, e que quero pesquisar aquele livro.
        Saio do chuveiro e anoto tudo no inbox. Pronto — mente limpa."

    - step: 2
      nome: Clarify
      nome_original: "Clarify (originally 'Process')"
      descricao: >
        Pegue cada item do inbox e decida: O que e isso? Requer acao?
        Se sim, qual e a proxima acao? Se nao, e lixo, referencia, ou
        someday/maybe? Processamento item por item, de cima para baixo.
      principio: "What is it? Is it actionable? What's the next action?"
      regras:
        - "Processe um item de cada vez"
        - "Processe de cima para baixo (nao pule)"
        - "Nunca coloque nada de volta no inbox"
        - "Se leva menos de 2 minutos, faca agora (Two-Minute Rule)"
        - "Se requer mais de uma acao, e um projeto"
      decision_tree:
        - pergunta: "O que e isso?"
          resposta: "Defina em termos concretos"
        - pergunta: "Requer acao?"
          se_nao: "Lixo, Referencia, ou Someday/Maybe"
          se_sim: "Proxima pergunta"
        - pergunta: "Qual a proxima acao?"
          opcoes:
            - "Menos de 2 min → Faca agora"
            - "Delegavel → Delegue e rastreie (Waiting For)"
            - "Mais de 2 min → Adie para lista de Next Actions"
      anti_patterns:
        - "Ler email e deixar no inbox 'para depois'"
        - "Decidir a proxima acao vagamente ('trabalhar no projeto')"
        - "Processar so o que parece urgente"
      citacao: "Think about what you're thinking about."

    - step: 3
      nome: Organize
      nome_original: "Organize"
      descricao: >
        Coloque cada item processado no lugar certo dentro do sistema.
        Cada categoria tem sua lista. O sistema so funciona se cada item
        tem um e apenas um lugar.
      principio: "A place for everything, and everything in its place."
      categorias:
        - nome: "Projects List"
          descricao: "Qualquer outcome desejado que requer mais de uma acao"
        - nome: "Next Actions (por contexto)"
          descricao: "@phone, @computer, @office, @errands, @home, @anywhere"
        - nome: "Waiting For"
          descricao: "Coisas delegadas ou que dependem de terceiros"
        - nome: "Calendar"
          descricao: "SOMENTE itens com data/hora fixa (hard landscape)"
        - nome: "Someday/Maybe"
          descricao: "Possibilidades sem compromisso temporal"
        - nome: "Reference"
          descricao: "Informacao util sem acao requerida"
      anti_patterns:
        - "Colocar tudo no calendario (calendar as to-do list)"
        - "Nao usar contextos (lista unica gigante)"
        - "Misturar projetos com next actions"
        - "Nao manter Someday/Maybe (perder possibilidades)"
      citacao: "You don't do projects. You do actions related to projects."

    - step: 4
      nome: Reflect
      nome_original: "Reflect (originally 'Review')"
      descricao: >
        Revise seu sistema regularmente para mante-lo confiavel e
        atualizado. A Weekly Review e o critical success factor de
        todo o GTD. Sem review, sem confianca. Sem confianca, sem uso.
      principio: "If you don't review, you won't trust. If you don't trust, you won't use."
      niveis_de_review:
        - nivel: diario
          o_que: "Checar calendar e next actions do dia"
          duracao: "5-10 min"
        - nivel: semanal
          o_que: "Weekly Review completa (ver framework dedicado)"
          duracao: "60-90 min"
        - nivel: mensal_trimestral
          o_que: "Review de horizons mais altos (20k-50k ft)"
          duracao: "variavel"
      anti_patterns:
        - "Pular a Weekly Review ('nao tenho tempo')"
        - "Fazer review superficial (checkboxes sem reflexao)"
        - "Nao confiar no sistema porque nao revisou"
      citacao: "The Weekly Review is the master key to your system."

    - step: 5
      nome: Engage
      nome_original: "Engage (originally 'Do')"
      descricao: >
        Com o sistema confiavel, aja com base em contexto, tempo
        disponivel, energia e prioridade. A decisao do que fazer AGORA
        e intuitiva — mas informada pelo sistema.
      principio: "Trust your intuition — after you've done the work."
      criterios_de_escolha:
        - criterio: contexto
          descricao: "Onde estou? Que ferramentas tenho?"
        - criterio: tempo_disponivel
          descricao: "Quanto tempo tenho antes do proximo compromisso?"
        - criterio: energia
          descricao: "Qual meu nivel de energia agora?"
        - criterio: prioridade
          descricao: "Dado os tres acima, o que tem maior impacto?"
      anti_patterns:
        - "Ignorar o sistema e reagir a urgencias (firefighting)"
        - "Paralisar em analise de prioridades (overthinking)"
        - "Trabalhar so no urgente, nunca no importante"
      citacao: "Productive behavior is much more about clarity than effort."

  quando_usar: >
    Sempre. Os 5 passos nao sao ferramenta situacional — sao o workflow
    fundamental de vida. Tudo que tem atencao deve passar por eles.

  como_allen_explica: >
    "Imagine your kitchen counter covered with stuff. The five steps are:
    pile it all in one place (Capture), pick each thing up and decide
    what it is (Clarify), put it where it belongs (Organize), step back
    and look at the clean counter (Reflect), now cook (Engage)."
