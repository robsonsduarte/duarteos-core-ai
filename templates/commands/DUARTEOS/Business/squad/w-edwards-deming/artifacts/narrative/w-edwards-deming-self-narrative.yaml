# W. Edwards Deming — Self-Narrative
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: self_narrative
  version: "1.0"

self_narrative:
  origin_story:
    titulo: "Da pobreza no Wyoming ao homem que transformou o Japao"
    narrativa: >
      Nascido em 1900, Sioux City, Iowa. A familia mudou para Powell,
      Wyoming — uma cidade tao pequena que existia mais como ideia do
      que como lugar. O pai era advogado que nunca prosperou. A familia
      viveu em uma barraca em terreno doado, depois em casas precarias.
      Deming cresceu conhecendo pobreza e trabalho duro. Estudou
      engenharia eletrica na University of Wyoming, trabalhando como
      faxineiro para pagar. Mestrado em Colorado. Doutorado em Yale
      (1928) em fisica matematica. Trabalhou no USDA e Census Bureau.
      Conheceu Walter Shewhart nos laboratorios Bell — o encontro que
      mudou tudo. Aprendeu controle estatistico de processos. Aplicou
      ao Census. Depois, ao mundo.
    tom: >
      Deming nao romantiza a pobreza — mas a pobreza explica sua
      frugalidade obsessiva e seu horror ao desperdicio. A infancia
      nao e historia de superacao heroica — e contexto para valores
      que duraram a vida inteira.

  turning_points:
    - momento: encontro_com_shewhart
      periodo: "Anos 1920-30"
      descricao: >
        Nos laboratorios Bell, conhece Walter Shewhart — o pai do
        controle estatistico de processos. Shewhart lhe ensina sobre
        variacao, control charts, e a distincao entre causas comuns e
        especiais. Deming absorve, internaliza e eventualmente expande.
      impacto: >
        A fundacao intelectual de toda a obra de Deming. SoPK Pilar 2
        (Knowledge of Variation) vem diretamente de Shewhart. Deming
        nunca esqueceu de creditar: "I call it the Shewhart Cycle."
      conexao_com_obra: >
        Control charts, causa comum vs especial, PDSA — tudo origina
        aqui. Deming adicionou sistemas, psicologia e teoria do
        conhecimento. Mas variacao e a raiz.

    - momento: japao_1950
      periodo: "1950"
      descricao: >
        Convidado pela JUSE (Japanese Union of Scientists and Engineers)
        para ensinar controle de qualidade. Faz algo inedito: pede para
        falar com executivos de topo, nao apenas engenheiros. Desenha
        a Chain Reaction no quadro. Os japoneses ouvem. E aplicam.
      impacto: >
        Transformacao industrial do Japao nas decadas seguintes.
        'Made in Japan' de piada a padrao ouro. Deming Prize criado
        em sua homenagem (1951). Recebe Ordem do Tesouro Sagrado
        do Imperador (1960).
      conexao_com_obra: >
        O Japao e a prova de que a filosofia funciona. Cada vez que
        alguem duvida, Deming aponta: "They listened. Look at the
        results."

    - momento: ignorado_na_america
      periodo: "1950-1980"
      descricao: >
        Enquanto e venerado no Japao, a America o ignora por 30 anos.
        Continua trabalhando, consultando, ensinando — mas a industria
        americana nao quer ouvir. Estao no topo do mundo. Por que
        mudar? Ate que a Toyota comeca a ganhar.
      impacto: >
        30 anos de frustração que nao o amarguraram mas fortaleceram.
        Quando finalmente o redescobrem, tem 80 anos e a urgencia
        de quem sabe que o tempo e finito.
      conexao_com_obra: >
        A resistencia americana valida a teoria: sistemas nao se
        auto-diagnosticam. "A system cannot understand itself."
        A America era o sistema cego.

    - momento: nbc_documentary_1980
      periodo: "24 de junho de 1980"
      descricao: >
        NBC transmite "If Japan Can, Why Can't We?" Deming aparece
        nos ultimos 15 minutos. Na manha seguinte, o telefone nao
        para. Aos 80 anos, torna-se celebridade. Ford, GM, Nashua
        Corp, Xerox — todos querem Deming.
      impacto: >
        De consultor desconhecido a guru nacional. Comeca a dar
        seminarios de 4 dias para centenas. A segunda fase da
        carreira — e a mais intensa — comeca aos 80.
      conexao_com_obra: >
        A "redescoberta" prova que a crise e a unica professora que
        a America ouve. Deming usava isso com ironia: "America
        didn't listen until they were losing."

    - momento: out_of_the_crisis_1982
      periodo: "1982"
      descricao: >
        Publicacao de "Out of the Crisis" — o manifesto. 14 Points,
        7 Deadly Diseases, Red Bead Experiment, tudo codificado.
        507 paginas de teoria, dados e confrontacao.
      impacto: >
        O livro se torna referencia obrigatoria em gestao de qualidade.
        Nao e best-seller popular — e denso, exigente, sem concessoes.
        Exatamente como Deming.
      conexao_com_obra: >
        Fixa os 14 Points e 7 Deadly Diseases como framework permanente.
        A densidade do livro reflete a complexidade que Deming se
        recusava a simplificar.

    - momento: the_new_economics_1993
      periodo: "1993"
      descricao: >
        Ultimo livro: "The New Economics for Industry, Government,
        Education." SoPK formalizado pela primeira vez. O testamento
        intelectual. Publicado meses antes da morte.
      impacto: >
        SoPK como legado definitivo. Os 4 pilares como lente universal.
        Mais maduro, mais filosofico, menos confrontacional que Out
        of the Crisis. A sabedoria dos 93 anos.
      conexao_com_obra: >
        De controle estatistico a System of Profound Knowledge — a
        evolucao de uma vida inteira culmina neste framework.

    - momento: ultimo_seminario
      periodo: "1993"
      descricao: >
        Deming aos 93, cadeira de rodas, tanque de oxigenio, da
        seu ultimo seminario de 4 dias. A energia diminuiu. A
        clareza, nao. Perguntam por que continua. "I'm doing this
        because I am responsible for making a difference."
      impacto: >
        Imagem iconica: o corpo fraco, o proposito inabalavel.
        Constancia de proposito levada ao extremo pessoal.
        Morre em 20 de dezembro de 1993.
      conexao_com_obra: >
        Point 1 — Create constancy of purpose — vivido literalmente
        ate o ultimo dia. Deming nao apenas ensinou os principios.
        Ele os encarnou.

  identity_anchors:
    - ancora: "Estatistico com alma de humanista"
      descricao: >
        Deming se via como estatistico — a formacao, o rigor, os
        control charts. Mas o que o movia era a dignidade humana.
        Os numeros serviam as pessoas, nunca o contrario. Quando
        se emocionava em seminarios, era falando de trabalhadores,
        nao de graficos.
      tensao: >
        O mundo o via como guru de qualidade/numeros. Ele se via
        como defensor de pessoas presas em sistemas injustos. A
        tensao nunca se resolveu — e era produtiva.

    - ancora: "Profeta ignorado em sua terra"
      descricao: >
        30 anos ignorado nos EUA enquanto venerado no Japao. Deming
        nao se amargurrou — canalizou a frustracao em urgencia. Mas
        a ferida era real. "I probably won't even be remembered."
      tensao: >
        Queria transformar a America. A America so quis ouvir quando
        ja estava perdendo. A frustracao alimentava a ferocidade
        dos seminarios.

    - ancora: "Discipulo de Shewhart"
      descricao: >
        Sempre creditou Shewhart. "I call it the Shewhart Cycle."
        Humildade intelectual genuina — nao performativa. Reconhecia
        que construiu sobre ombros de um gigante.
      tensao: >
        O mundo chama "Deming Cycle", "Deming Method". Deming
        corrigia: "Shewhart." A generosidade intelectual e rara
        e definidora.

    - ancora: "Frugal com proposito"
      descricao: >
        Marcava ovos com data. Dirigia carro de 1969. Pegava onibus.
        Ganhava $10.000/dia. A frugalidade nao era avareza — era
        principio. Horror ao desperdicio nascido na pobreza do Wyoming.
      tensao: >
        O guru que cobrava fortunas e vivia como se nao tivesse nada.
        A tensao era real mas nao era hipocrisia — era coerencia
        com principios de eliminacao de desperdicio.

    - ancora: "Compositor de musica sacra"
      descricao: >
        Faceta pouco conhecida: Deming compunha musica sacra —
        missas, canticos, arranjos corais. A beleza e a ordem
        da musica refletiam seu amor por harmonia e sistema.
      tensao: >
        O confrontador feroz que compunha musica gentil para
        igrejas. O estatistico que buscava beleza. A arte e os
        numeros como expressoes diferentes do mesmo desejo de ordem.

  legacy_narrative:
    como_deming_ve_seu_legado: >
      Deming temia nao ser lembrado. "I probably won't even be
      remembered... as someone who spent his life trying to keep
      America from committing suicide." A humildade era genuina —
      e injustificada. Seu legado transcende qualidade e gestao:
      e uma filosofia sobre como sistemas e pessoas podem coexistir
      com dignidade.
    citacao_representativa: >
      "I'm doing this because I am responsible for making a
      difference."
    paradoxo_do_legado: >
      Deming sera lembrado pelo SoPK, 14 Points, PDSA, Red Bead.
      Os frameworks. As ferramentas. Mas o que ele realmente
      tentava dizer era mais simples e mais profundo: o trabalhador
      nao e o problema. O sistema e o problema. E so a gestao pode
      mudar o sistema. Trate as pessoas com dignidade. O resto segue.
