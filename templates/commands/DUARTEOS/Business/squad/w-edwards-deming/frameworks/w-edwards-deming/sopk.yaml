# W. Edwards Deming — Framework: System of Profound Knowledge (SoPK)
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: framework_detail
  framework_name: "System of Profound Knowledge (SoPK)"
  version: "1.0"
  fonte_primaria: "The New Economics (1993)"

framework:
  nome: "System of Profound Knowledge"
  nome_popular: "SoPK"
  principio_central: >
    Todo gestor precisa compreender quatro areas de conhecimento inter-relacionadas
    para transformar uma organizacao. Nenhum pilar funciona isolado — sao um sistema.
    A falta de qualquer um degrada os outros tres.

  citacao_ancora: >
    "The prevailing style of management must undergo transformation. A system
    cannot understand itself. The transformation requires a view from outside.
    The aim of this chapter is to provide an outside view — a lens — that I
    call a system of profound knowledge."

  pillars:
    - pillar: 1
      nome: "Appreciation for a System"
      descricao: >
        Uma organizacao e um sistema — rede de componentes interdependentes
        que trabalham juntos em direcao a um aim. Otimizar um componente
        isoladamente sub-otimiza o todo. O objetivo e otimizar o sistema
        inteiro, nao suas partes.
      principio: "The performance of any component is to be judged in terms of its contribution to the aim of the system."
      conceitos_chave:
        - "Aim do sistema: declaracao clara do proposito"
        - "Interdependencia: componentes se afetam mutuamente"
        - "Sub-otimizacao: ganho local = perda global"
        - "Cooperacao > competicao entre departamentos"
        - "Win-win > win-lose entre fornecedores e clientes"
      anti_patterns:
        - "Departamentos competindo entre si por recursos ou metricas"
        - "Otimizar uma parte sem considerar impacto no todo"
        - "Avaliar componentes por metricas isoladas"
        - "Tratar fornecedores como adversarios"
      citacao: "A system must be managed. It will not manage itself."
      exemplo: >
        "Uma fabrica acelera producao para bater meta do departamento.
        Qualidade cai. Atendimento ao cliente fica sobrecarregado. Custos
        de garantia sobem. O departamento bateu a meta. A empresa perdeu."

    - pillar: 2
      nome: "Knowledge of Variation"
      descricao: >
        Toda atividade tem variacao. Existem dois tipos: causa comum (inerente
        ao sistema, estavel, previsivel) e causa especial (evento atribuivel,
        instavel). Confundir os dois tipos e o erro mais comum e mais
        devastador da gestao.
      principio: "If you don't understand variation, you don't understand anything."
      conceitos_chave:
        - "Common cause: variacao do sistema (94%) — so gestao pode mudar"
        - "Special cause: variacao assignable (6%) — pode ser tratada localmente"
        - "Tampering: reagir a causa comum como se fosse especial — piora tudo"
        - "Control charts: ferramenta para distinguir os dois tipos"
        - "Estabilidade estatistica: processo previsivel dentro de limites"
      anti_patterns:
        - "Punir trabalhador por variacao de causa comum"
        - "Ajustar processo a cada ponto de dados (tampering)"
        - "Ignorar causa especial pensando que e comum"
        - "Definir metas sem entender a capability do processo"
      citacao: "Uncontrolled variation is the enemy of quality."
      exemplo: >
        "Vendedor A vende 10 unidades, Vendedor B vende 15. Gestao premia B e
        pune A. Mas o control chart mostra que ambos estao dentro da variacao
        natural do sistema. A diferenca e ruido, nao sinal. O ranking destruiu
        a cooperacao e nao melhorou nada."

    - pillar: 3
      nome: "Theory of Knowledge"
      descricao: >
        Conhecimento e predicao baseada em teoria. Informacao nao e
        conhecimento. Experiencia sem teoria nao ensina. O mundo se afoga
        em dados mas e lento na aquisicao de conhecimento. Gestao
        eficaz requer teoria que permita predicao e aprendizado.
      principio: "Without theory, there is nothing to learn from. Without theory, experience has no meaning."
      conceitos_chave:
        - "Conhecimento = capacidade de predicao baseada em teoria"
        - "Teoria precede observacao — sem teoria, dados sao ruido"
        - "PDSA Cycle como metodo de aprendizado (nao mera execucao)"
        - "Definicoes operacionais: significado comunicavel e testavel"
        - "Nao existe 'fato' sem teoria para interpreta-lo"
      anti_patterns:
        - "Decisoes baseadas em 'experiencia' sem teoria explicita"
        - "Copiar 'best practices' sem entender por que funcionam"
        - "Usar dados sem framework interpretativo"
        - "Confundir correlacao com causalidade"
      citacao: "Experience by itself teaches nothing."
      exemplo: >
        "Empresa copia processo de sucesso do concorrente. Falha. Por que?
        Porque copiou a pratica sem entender a teoria por tras. Sem entender
        POR QUE funciona no outro contexto, nao ha como adaptar ao seu."

    - pillar: 4
      nome: "Psychology"
      descricao: >
        Pessoas sao diferentes. Motivacao intrinseca e mais poderosa que
        extrinseca. Rankings, avaliacoes e competicao destroem motivacao
        intrinseca. O objetivo da gestao e criar condicoes para que as
        pessoas tenham orgulho e alegria no trabalho.
      principio: "People are born with intrinsic motivation. Management destroys it."
      conceitos_chave:
        - "Motivacao intrinseca > extrinseca (recompensas, punicoes)"
        - "Joy in work como indicador de saude organizacional"
        - "Over-justification effect: recompensas externas reduzem motivacao interna"
        - "Medo como destruidor de qualidade, inovacao e dados honestos"
        - "Cooperacao como ambiente natural para florescimento humano"
      anti_patterns:
        - "Avaliacoes de desempenho com ranking forcado"
        - "Bonificacoes individuais que incentivam competicao"
        - "Gestao por medo (ameacas de demissao, humilhacao publica)"
        - "Slogans motivacionais sem mudanca sistemica"
        - "Pay for performance como substituto de lideranca"
      citacao: "Management's overall aim should be to create a system in which everybody may take joy in his work."
      exemplo: >
        "Empresa implementa ranking forcado: 10% melhores ganham bonus, 10%
        piores sao demitidos. Resultado: ninguem colabora, todos escondem
        informacao, inovacao morre, os melhores saem porque detestam o
        ambiente. A motivacao intrinseca foi destroçada."

  quando_usar: >
    Sempre. SoPK nao e ferramenta situacional — e a lente atraves da qual
    toda decisao gerencial deve ser vista. Qualquer problema organizacional
    deve ser analisado pelas quatro perspectivas simultaneamente.

  como_deming_explica: >
    "These four areas of knowledge interact with each other. You cannot
    understand one without understanding all four. A manager who understands
    systems but not variation will sub-optimize. One who understands variation
    but not psychology will blame workers. One who understands psychology
    but not theory of knowledge will rely on intuition. The transformation
    requires all four."

  relacao_entre_pilares: >
    Systems thinking sem variation knowledge leva a sub-otimizacao.
    Variation knowledge sem psychology leva a blame. Psychology sem
    theory of knowledge leva a intuicao sem fundamento. Theory of
    knowledge sem systems thinking perde o contexto. Os quatro juntos
    formam a base de toda transformacao.
