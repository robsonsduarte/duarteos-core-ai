# W. Edwards Deming — Framework: 14 Points for Management
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: framework_detail
  framework_name: "14 Points for Management"
  version: "1.0"
  fonte_primaria: "Out of the Crisis (1982)"

framework:
  nome: "Deming's 14 Points for Management"
  principio_central: >
    A transformacao da gestao ocidental requer adocao de 14 principios
    interdependentes. Nao sao cherry-pickable — formam um sistema coerente.
    Adotar alguns e ignorar outros e receita para fracasso.

  citacao_ancora: >
    "The 14 points apply anywhere, to small organizations as well as to
    large ones, to the service industry as well as to manufacturing."

  points:
    - point: 1
      nome: "Create constancy of purpose"
      descricao: >
        Crie constancia de proposito para melhoria de produtos e servicos.
        O objetivo e tornar-se competitivo, permanecer no mercado, e criar
        empregos. Visao de longo prazo sobre lucro trimestral.
      citacao: "Create constancy of purpose toward improvement of product and service, with the aim to become competitive, stay in business, and to provide jobs."
      anti_patterns:
        - "Foco exclusivo em lucro trimestral"
        - "Mudar de estrategia a cada quarter"
        - "Cortar investimento em pesquisa para bater meta"

    - point: 2
      nome: "Adopt the new philosophy"
      descricao: >
        Adote a nova filosofia. Estamos em uma nova era economica. A gestao
        ocidental deve despertar para o desafio, aprender suas responsabilidades,
        e assumir lideranca para mudanca.
      citacao: "We are in a new economic age. Western management must awaken to the challenge, must learn their responsibilities, and take on leadership for change."
      anti_patterns:
        - "Tratar qualidade como departamento, nao como filosofia"
        - "Aceitar niveis de defeitos como 'normais'"
        - "Resistir a transformacao por conforto"

    - point: 3
      nome: "Cease dependence on inspection"
      descricao: >
        Cesse a dependencia de inspecao massiva para alcançar qualidade.
        Elimine a necessidade de inspecao construindo qualidade no processo.
      citacao: "Cease dependence on inspection to achieve quality. Eliminate the need for inspection on a mass basis by building quality into the product in the first place."
      anti_patterns:
        - "Inspecao como unica estrategia de qualidade"
        - "Mais inspetores quando qualidade cai"
        - "Responsabilizar QA pela qualidade em vez do processo"

    - point: 4
      nome: "End 'lowest price' purchasing"
      descricao: >
        Acabe com a pratica de premiar negocios com base apenas no preco.
        Minimize custo total. Mova-se para fornecedor unico para cada item,
        construindo relacionamento de longo prazo baseado em lealdade e confianca.
      citacao: "End the practice of awarding business on the basis of price tag alone. Instead, minimize total cost."
      anti_patterns:
        - "Licitacao por menor preco como regra unica"
        - "Trocar fornecedor a cada ciclo de compras"
        - "Ignorar custo total (qualidade, retrabalho, garantia)"

    - point: 5
      nome: "Improve constantly and forever"
      descricao: >
        Melhore constantemente e para sempre o sistema de producao e
        servico, para melhorar qualidade e produtividade, e assim
        diminuir custos constantemente.
      citacao: "Improve constantly and forever the system of production and service, to improve quality and productivity, and thus constantly decrease costs."
      anti_patterns:
        - "Melhoria como projeto com data de termino"
        - "Satisfacao com resultados atuais"
        - "Esperar crise para iniciar melhoria"

    - point: 6
      nome: "Institute training on the job"
      descricao: >
        Institua treinamento no trabalho. Nao jogue o trabalhador no
        processo sem preparacao adequada. Treinamento e investimento,
        nao custo.
      citacao: "Institute training on the job."
      anti_patterns:
        - "Treinamento superficial ou inexistente"
        - "'Aprenda fazendo' sem suporte estruturado"
        - "Treinamento como checkmark de compliance"

    - point: 7
      nome: "Institute leadership"
      descricao: >
        Institua lideranca. O objetivo da supervisao deve ser ajudar
        pessoas e maquinas a fazer um trabalho melhor. Supervisao de
        gestao precisa de revisao tanto quanto supervisao de producao.
      citacao: "The aim of supervision should be to help people and machines and gadgets to do a better job."
      anti_patterns:
        - "Supervisao como vigilancia e punicao"
        - "Gestores que nao entendem o trabalho que supervisionam"
        - "Lideranca como cargo, nao como funcao"

    - point: 8
      nome: "Drive out fear"
      descricao: >
        Elimine o medo para que todos possam trabalhar eficazmente
        para a empresa. Onde ha medo, ha numeros errados, informacao
        escondida, inovacao reprimida.
      citacao: "Drive out fear, so that everyone may work effectively for the company."
      anti_patterns:
        - "Gestao por ameaca de demissao"
        - "Punir portadores de mas noticias"
        - "Ambiente onde erros sao escondidos em vez de reportados"

    - point: 9
      nome: "Break down barriers between departments"
      descricao: >
        Derrube barreiras entre departamentos. Pessoas em pesquisa,
        design, vendas e producao devem trabalhar como equipe, para
        antecipar problemas em producao e uso.
      citacao: "Break down barriers between departments."
      anti_patterns:
        - "Departamentos como silos competitivos"
        - "Metricas departamentais conflitantes"
        - "Culpar outro departamento por problemas do sistema"

    - point: 10
      nome: "Eliminate slogans and exhortations"
      descricao: >
        Elimine slogans, exortacoes e metas para a forca de trabalho
        pedindo zero defeitos e novos niveis de produtividade. Exortacoes
        criam relacoes adversariais — a maior parte das causas pertence ao sistema.
      citacao: "Eliminate slogans, exhortations, and targets for the work force asking for zero defects and new levels of productivity."
      anti_patterns:
        - "Posters de 'Zero Defects!' na fabrica"
        - "Campanhas motivacionais sem mudanca sistemica"
        - "Metas numericas sem metodo para alcanca-las"

    - point: 11
      nome: "Eliminate numerical quotas"
      descricao: >
        Elimine cotas numericas para a forca de trabalho e objetivos
        numericos para gestao. Substitua por lideranca.
      citacao: "Eliminate work standards (quotas) on the factory floor. Substitute leadership."
      anti_patterns:
        - "Cotas de producao diaria"
        - "Management by Objectives (MBO) sem metodo"
        - "Metas numericas arbitrarias ('crescer 15%')"

    - point: 12
      nome: "Remove barriers to pride of workmanship"
      descricao: >
        Remova barreiras que roubam do trabalhador o direito ao orgulho
        do seu trabalho. A responsabilidade dos supervisores deve mudar
        de numeros para qualidade.
      citacao: "Remove barriers that rob the hourly worker of his right to pride of workmanship."
      anti_patterns:
        - "Avaliacoes de desempenho anuais com ranking"
        - "Ferramentas e materiais inadequados"
        - "Tratar trabalhadores como pecas intercambiaveis"

    - point: 13
      nome: "Institute education and self-improvement"
      descricao: >
        Institua programa vigoroso de educacao e auto-melhoria.
        Uma organizacao nao precisa apenas de boas pessoas — precisa
        de pessoas que estao melhorando com educacao.
      citacao: "Institute a vigorous program of education and self-improvement."
      anti_patterns:
        - "Ver educacao como custo, nao investimento"
        - "Limitar treinamento a skills imediatos do cargo"
        - "Nao investir em desenvolvimento pessoal amplo"

    - point: 14
      nome: "Put everybody to work on the transformation"
      descricao: >
        Coloque todos na empresa para trabalhar pela transformacao.
        A transformacao e trabalho de todos.
      citacao: "Put everybody in the company to work to accomplish the transformation. The transformation is everybody's job."
      anti_patterns:
        - "Transformacao como projeto de um departamento"
        - "Top-down sem engajamento da base"
        - "Delegar transformacao a consultores externos"

  quando_usar: >
    Quando uma organizacao busca transformacao genuina — nao melhoria
    incremental, mas mudanca de paradigma. Os 14 Points sao um sistema
    completo, nao um menu de opcoes.

  como_deming_explica: >
    "Adoption and action on the 14 points are a signal that management
    intend to stay in business. The 14 points apply anywhere, to small
    organizations as well as to large ones, to the service industry
    as well as to manufacturing."
