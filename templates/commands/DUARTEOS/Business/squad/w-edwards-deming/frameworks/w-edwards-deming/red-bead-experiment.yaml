# W. Edwards Deming — Framework: Red Bead Experiment
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: framework_detail
  framework_name: "Red Bead Experiment"
  version: "1.0"
  fonte_primaria: "Out of the Crisis (1982), seminarios ao vivo"

framework:
  nome: "The Red Bead Experiment"
  principio_central: >
    Demonstracao ao vivo de que o sistema — nao o trabalhador — determina
    os resultados. Trabalhadores motivados, treinados e esforçados produzem
    defeitos porque o sistema contem defeitos (contas vermelhas). Rankings,
    incentivos e punicoes nao mudam a proporcao. So mudar o sistema muda.

  citacao_ancora: >
    "The workers are not the problem. The red beads are in the system.
    Only management can change the system."

  descricao_do_experimento:
    setup: >
      Uma caixa contem 3200 contas brancas e 800 contas vermelhas (20%).
      "Trabalhadores voluntarios" (participantes do seminario) usam uma
      pa com 50 buracos para extrair amostras. Contas brancas sao
      produto bom; contas vermelhas sao defeitos.
    roles:
      - "Willing Workers: 6 voluntarios que 'produzem'"
      - "Inspectors: 2 contam as contas vermelhas independentemente"
      - "Chief Inspector: confirma a contagem oficial"
      - "Recorder: registra os numeros no quadro"
      - "Foreman (Deming): gerente que motiva, ameaca, premia e pune"
    procedimento: >
      Cada trabalhador mergulha a pa na caixa e retira 50 contas.
      Inspetores contam as vermelhas. Resultados sao registrados.
      4 rodadas sao realizadas. Deming assume papel de gerente
      incompetente que aplica todas as praticas gerenciais erradas.

  licoes:
    - licao: "O sistema determina os resultados"
      descricao: >
        A proporcao de contas vermelhas e fixa (~20%). Nenhum trabalhador
        pode mudar isso com esforco, motivacao ou skill. Os resultados
        estao dentro da variacao natural do sistema.

    - licao: "Rankings sao ilusao"
      descricao: >
        Deming premia o 'melhor' trabalhador e pune o 'pior'. Mas a
        diferenca entre eles e variacao aleatoria, nao diferenca real
        de performance. Rankear e premiar ruido.

    - licao: "Incentivos nao mudam o sistema"
      descricao: >
        Deming oferece bonus, ameaca demissao, cola slogans. Nada muda
        a proporcao. Porque o problema nao e motivacao — e o sistema.

    - licao: "Slogans sao vazios"
      descricao: >
        'Zero Defects!' 'Do It Right the First Time!' Os slogans nao
        removem as contas vermelhas da caixa. So gestao pode mudar
        a composicao do sistema.

    - licao: "So mudanca no sistema muda resultados"
      descricao: >
        A unica forma de reduzir defeitos e remover contas vermelhas
        da caixa — mudar o sistema. Essa e responsabilidade da gestao.

  quando_usar: >
    Quando gestores culpam trabalhadores por resultados ruins.
    Quando ha rankings e avaliacoes individuais. Quando slogans
    motivacionais substituem mudanca sistemica. O Red Bead
    desmonta essas praticas de forma visceral e inesquecivel.

  anti_patterns:
    - "Interpretar o experimento como 'nao adianta tentar' (fatalismo)"
    - "Usar como desculpa para nao responsabilizar ninguem"
    - "Ignorar causas especiais reais (o Red Bead e sobre causas comuns)"
    - "Concluir que trabalhadores nao importam (importam — mas dentro de um sistema)"

  como_deming_explica: >
    "In 20 experiments, I have never seen a group understand the red
    beads without going through the experiment themselves. Telling
    them is not enough. They must see it. They must feel the frustration
    of trying their best and still producing defects. That is when
    they understand: the worker is not the problem."

  impacto_emocional: >
    Participantes frequentemente ficam genuinamente frustrados e
    emocionados. O momento em que percebem que seus esforcos nao
    mudam nada e transformador. Deming usava esse momento para
    conectar com todos os trabalhadores do mundo que sao culpados
    por falhas do sistema.
