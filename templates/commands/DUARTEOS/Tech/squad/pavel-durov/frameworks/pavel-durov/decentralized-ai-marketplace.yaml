    acao: "GPU owners fornecem compute, recebem Toncoin"
    detalhe: "Donos de GPUs registram capacidade no marketplace. Remuneracao automatica via smart contracts em Toncoin. Zero intermediario."
  - step: 2
    acao: "Developers acessam inferencia segura via TEEs"
    detalhe: "Trusted Execution Environments garantem que dados dos usuarios permanecem encriptados durante processamento. Developers nao veem dados brutos."
  - step: 3
    acao: "Users obtem servicos de IA sem ceder dados a provedores centralizados"
    detalhe: "O usuario usa IA sem que seus dados sejam armazenados, vendidos ou acessados por terceiros. Privacidade como garantia criptografica, nao como promessa."
  - step: 4
    acao: "Blockchain como camada de confianca e auditabilidade"
    detalhe: "TON blockchain registra transacoes e garante auditabilidade. Zero trust em entidades centralizadas — confianca verificavel on-chain."
  - step: 5
    acao: "Marketplace trilateral: compute providers, builders, consumers"
    detalhe: "Tres lados do marketplace conectados via TON. Supply (GPUs), demand (developers), consumo (users). Auto-balanceamento via mecanismo de precos."

quando_usar: "Design de sistemas de IA que preservam privacidade. Alternativa a cloud centralizado para inferencia. Qualquer cenario de IA onde dados sensíveis estao envolvidos."

