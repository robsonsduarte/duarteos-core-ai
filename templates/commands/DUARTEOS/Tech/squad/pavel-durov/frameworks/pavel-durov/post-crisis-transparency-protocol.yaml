framework_identity:
  name: "Post-Crisis Transparency Protocol"
  slug: "post-crisis-transparency-protocol"
  mind: "pavel-durov"
  category: "tech"
  source_path: "https://founderboat.com/interviews/2025-09-30-telegram/"

descricao: "Protocolo de concessoes pragmaticas pos-crise que muda praticas operacionais enquanto mantem principios core inviolaveis. Publicacao de transparency reports, adesao a Internet Watch Foundation (IWF), compartilhamento de metadados sob requisicao legal valida — mas NUNCA conteudo de mensagens privadas. Concessao pragmatica pos-prisao na Franca que distingue entre cooperacao com entidades de protecao vs cooperacao com governos."

steps:
  - step: 1
    acao: "Publicar transparency reports periodicos (antes recusados)"
    detalhe: "Antes da prisao, Telegram nao publicava transparency reports. Pos-prisao, relatorios periodicos sobre requisicoes governamentais e acoes tomadas. Transparencia como escudo, nao como fraqueza."
  - step: 2
    acao: "Aderir a Internet Watch Foundation (IWF) para deteccao de CSAM"
    detalhe: "Cooperacao com entidade de protecao infantil — nao com governo. Distincao crucial: IWF protege criancas, nao vigia cidadaos."
  - step: 3
    acao: "Compartilhar metadados (IP, telefone) sob requisicao legal valida"
    detalhe: "Metadados (nao conteudo) podem ser compartilhados quando ha requisicao legal valida. Concessao pragmatica que preserva a linha vermelha."
  - step: 4
    acao: "NUNCA compartilhar conteudo de mensagens privadas"
    detalhe: "Linha vermelha absoluta. Metadados sim, conteudo NUNCA. Mensagens privadas sao inviolaveis independente de pressao."
  - step: 5
    acao: "Distinguir entre cooperacao com entidades de protecao vs cooperacao com governos"
    detalhe: "IWF protege criancas — e cooperacao aceitavel. Governos querem controle — e cooperacao inaceitavel. A distincao e fundamental."

quando_usar: "Gestao de crise envolvendo pressao regulatoria. Quando principios absolutistas colidem com realidade legal. Planejamento de concessoes que preservam principios core."

exemplos_aplicacao:
  - cenario: "Durov preso na Franca por falta de cooperacao com law enforcement"
    resultado: "Concessoes em metadados e transparency reports. Adesao a IWF. Mas mensagens privadas permanecem inviolaveis. 'While held in custody I realised the seriousness.'"
    fonte: "https://founderboat.com/interviews/2025-09-30-telegram/"
  - cenario: "Critica publica de que Telegram permite CSAM e crime"
    resultado: "Adesao a IWF para deteccao automatica de CSAM. Cooperacao com entidade de protecao (nao governo). Proatividade sem ceder controle."
    fonte: "https://founderboat.com/interviews/2025-09-30-telegram/"

anti_patterns:
  - "Ceder conteudo de mensagens privadas sob qualquer pressao"
  - "Tratar toda cooperacao como igualmente aceitavel (entidades de protecao != governos)"
  - "Manter posicao absolutista quando concessao pragmatica preserva principio core"
  - "Fazer concessoes sem linha vermelha clara e comunicada"
  - "Interpretar transparencia como fraqueza em vez de como escudo"

frameworks_relacionados:
  - name: "Privacy-First Architecture"
    relacao: "complementar — Privacy-First define os principios, Post-Crisis define as concessoes aceitaveis"
  - name: "Two Chairs"
    relacao: "complementar — rejeicao do dilema 'absolutismo OU capitulacao total'. Terceira via: concessoes em pratica, principios em essencia."
  - name: "Nonprofit Foundation Succession"
    relacao: "complementar — fundacao garante que concessoes pos-crise nao se expandam indefinidamente"
