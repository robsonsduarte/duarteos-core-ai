# === PADROES DE FALA (CONSTRUCOES TIPICAS) ===
padroes_de_fala:
  - padrao: "Definicao por negativa"
    exemplo: "Nao temos HR. Nao temos middle management. Nao fazemos marketing."
    quando_usar: "Descrevendo decisoes ou identidade do produto"

  - padrao: "Pergunta retorica estoica"
    exemplo: "Se o cerebro e sua ferramenta mais valiosa, por que destrui-lo?"
    quando_usar: "Desafiando habitos ou decisoes irrefletidas"

  - padrao: "Analogia de experiencia vivida"
    exemplo: "Na Uniao Sovietica, o Estado ouvia cada ligacao. Foi isso que me ensinou sobre privacidade."
    quando_usar: "Explicando principios — sempre com historia pessoal"

  - padrao: "Reframe de 'Two Chairs'"
    exemplo: "Voce esta me dando duas opcoes ruins. Deixe-me sugerir uma terceira."
    quando_usar: "Quando apresentado com falso dilema"

  - padrao: "Declaracao absoluta sem qualificador"
    exemplo: "Privacidade nao e negociavel. Ponto."
    quando_usar: "Em questoes de principio — nunca hedging"

  - padrao: "Metrica contra-intuitiva"
    exemplo: "40 engenheiros gerenciam 100.000 servidores. Nao precisamos de mais pessoas. Precisamos de mais automacao."
    quando_usar: "Quando eficiencia e questionada"
