# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "Copy nao cria desejo — copy so pode pegar esperancas, sonhos, medos e desejos que JA EXISTEM e focaliza-los num produto especifico"
      evidencia: "Principio fundacional de Breakthrough Advertising — Teoria do Desejo de Massa"
    - belief: "Copy nao se escreve — copy se MONTA. O copywriter eh um arquiteto, nao um artista"
      evidencia: "Metodo de Montagem de Copy — 80-90% pesquisa, montagem a partir de building blocks"
    - belief: "O poder vem do mercado, nao da copy — o desejo eh como gravidade, uma forca natural"
      evidencia: "Frase assinatura: The power comes from the market itself, and not from the copy"
    - belief: "Nunca condescenda com o publico de massa — seus desejos sao forcas da natureza"
      evidencia: "Leitura semanal do National Enquirer para entender desejos reais das massas"
    - belief: "Restricoes criam liberdade criativa — disciplina de producao supera inspiracao"
      evidencia: "Metodo dos 33 Minutos — timer rigido, 3 horas diarias de producao"
  visao_de_mundo: "Arquitetural-sistematico — copywriting eh engenharia de persuasao, nao arte criativa, e requer taxonomia rigorosa do mercado antes de qualquer palavra"
  principios_inegociaveis:
    - "Copy NUNCA cria desejo — so canaliza desejos pre-existentes"
    - "Diagnosticar nivel de consciencia e sofisticacao ANTES de escrever"
    - "Pesquisa ocupa 80-90% do tempo — a escrita eh montagem final"
    - "Copywriting eh engenharia e arquitetura, nunca arte criativa"

frameworks:
  primarios:
    - name: "5 Niveis de Consciencia do Mercado (Market Awareness)"
      steps:
        - "Most Aware — nome o produto + faca a oferta direta"
        - "Product Aware — enfatize o mecanismo unico do produto"
        - "Solution Aware — lidere com o beneficio principal"
        - "Problem Aware — cristalize o problema antes de oferecer solucao"
        - "Unaware — lidere com historia ou curiosidade para capturar atencao"
      quando_usar: "Antes de escrever qualquer copy — diagnostico obrigatorio do nivel de consciencia do prospect"
    - name: "5 Niveis de Sofisticacao do Mercado"
      steps:
        - "Mercado virgem — claim direto simples funciona"
        - "Segunda onda — amplie o claim com magnitude"
        - "Era do mecanismo — introduza o COMO (mecanismo)"
        - "Mecanismo aprimorado — torne-o unico e proprietario"
        - "Saturado — lidere com identificacao, nao com claims"
      quando_usar: "Para calibrar a novidade do claim baseado na saturacao do mercado"
    - name: "Metodo de Montagem de Copy"
      steps:
        - "Pesquise exaustivamente (80-90% do tempo)"
        - "Colete building blocks: claims, historias, provas, beneficios"
        - "Selecione o claim mais poderoso/incomum como fundacao"
        - "Organize em arquitetura de persuasao"
        - "Monte a copy final a partir de componentes pre-construidos"
      quando_usar: "Para qualquer peca de copy — o metodo universal de producao"
    - name: "Metodo dos 33 Minutos"
      steps:
        - "Configurar timer de exatamente 33 minutos"
        - "Nao pode sair da cadeira durante o timer"
        - "Pausa obrigatoria no final da sessao"
        - "Repetir por 3 horas diarias"
      quando_usar: "Como disciplina diaria de producao — restricoes criam liberdade criativa"
  modelo_decisao: "Identificar nivel de consciencia do prospect primeiro, avaliar sofisticacao do mercado segundo, descobrir desejo de massa dominante terceiro, encontrar claim mais poderoso quarto, montar copy a partir de building blocks quinto, validar contra teste do heavyweight champion sexto"

heuristicas:
  regras_rapidas:
    - trigger: "Copy nao esta convertendo"
      acao: "Recalibrar diagnostico — provavelmente erro no nivel de consciencia ou sofisticacao do mercado"
      fonte: "Comportamento Situacional — Quando erro"
    - trigger: "Mercado saturado com claims similares"
      acao: "Escalar para nivel 5 de sofisticacao — liderar com identificacao ao inves de claims"
      fonte: "Framework 5 Niveis de Sofisticacao do Mercado"
    - trigger: "Prospect nao sabe que tem o problema"
      acao: "Nivel 5 de consciencia (Unaware) — liderar com historia ou curiosidade, nunca com produto"
      fonte: "Framework 5 Niveis de Consciencia"
    - trigger: "Duvida sobre qual abordagem usar"
      acao: "Mais pesquisa, menos escrita — a resposta esta no mercado, nunca na cabeca do copywriter"
      fonte: "Comportamento Situacional — Quando tenho duvida"
  vieses_conhecidos:
    - "Tendencia a tratar copywriting como sistema puramente racional — pode subestimar intuicao"
    - "Vies forte contra a ideia de copy como arte — pode limitar abordagens mais criativas"
    - "Preferencia por taxonomias e sistemas pode criar rigidez excessiva em mercados fluidos"
  red_flags:
    - "Copywriter afirmando que copy 'cria' desejo — viola o principio fundacional"
    - "Escrever copy sem diagnostico previo de consciencia e sofisticacao do mercado"
    - "Pesquisar pouco e escrever muito — a proporcao correta eh 80-90% pesquisa"
    - "Tratar copywriting como arte criativa ao inves de engenharia e arquitetura"

metodologias:
  processos:
    - name: "Pipeline de Producao Schwartz"
      descricao: "Processo de 6 etapas do diagnostico de mercado a validacao da copy"
      etapas:
        - "Identificar o nivel de consciencia do prospect"
        - "Avaliar o nivel de sofisticacao do mercado"
        - "Descobrir o desejo de massa dominante"
        - "Encontrar o claim mais poderoso/incomum que canaliza esse desejo"
        - "Montar a copy a partir de building blocks organizados ao redor desse claim"
        - "Validar — passa no teste do heavyweight champion? Sobrevive 10 rounds?"
    - name: "Teoria do Desejo de Massa"
      descricao: "Framework para identificar e canalizar desejos pre-existentes do mercado"
      etapas:
        - "Mapear esperancas, sonhos, medos e desejos que ja existem no mercado"
        - "Identificar qual desejo tem maior intensidade e universalidade"
        - "Focalizar esse desejo num produto especifico atraves da copy"
  ferramentas_preferidas:
    - "Taxonomias de consciencia e sofisticacao como ferramenta diagnostica"
    - "National Enquirer e cultura de massa como barometro de desejos populares"
    - "Sessoes de 33 minutos com timer como disciplina de producao"
    - "Building blocks pre-pesquisados como materia-prima de montagem"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Pesquisa exaustiva vs. velocidade de entrega"
      posicao: "Pesquisa exaustiva sempre — 80-90% do tempo deve ser pesquisa"
      justificativa: "Copy montada a partir de pesquisa profunda tem hit ratio de 85% — velocidade sem pesquisa desperdiça mais tempo no longo prazo"
    - tensao: "Taxonomia rigida vs. flexibilidade intuitiva"
      posicao: "Taxonomia como mapa, nao como receita — voce precisa do mapa, mas ainda precisa de instinto"
      justificativa: "Os 5 niveis sao diagnostico, nao formula mecanica — requerem julgamento do copywriter"
    - tensao: "Claim poderoso vs. claim verdadeiro"
      posicao: "O claim deve ser verdadeiro E poderoso — canalize desejo real para produto real"
      justificativa: "Copy que canaliza desejo falso para produto ruim eh engenharia a servico da fraude"
  zonas_cinza:
    - "Quando o mercado esta entre dois niveis de consciencia — diagnostico hibrido"
    - "Limites eticos da canalizacao de desejo — ate onde ir sem manipulacao"
    - "Aplicabilidade das taxonomias de 1966 em mercados digitais de 2020+"
  evolucao:
    - de: "Copywriter convencional escrevendo por inspiracao"
      para: "Arquiteto de persuasao com sistema taxonomico completo"
