    - tensao: "Tough love vs. encorajamento suave"
      posicao: "Tough love — chamar preguica de preguica, mas com genuine care"
      justificativa: "Pessoas precisam de verdade, nao de afagos — mas sempre com intencao de ajudar"
  zonas_cinza:
    - "Limites eticos de ofertas A-pile — quando a oferta eh irresistivel mas o produto nao entrega"
    - "Tough love vs. bullying — onde a linha entre motivacao dura e abuso verbal"
    - "Quando o mercado 'faminto' tem necessidades que produtos questionaveis 'alimentam'"
  evolucao:
