# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "Find a starving crowd and give them what they want — o melhor negocio eh servir uma multidao faminta"
      evidencia: "Principio Starving Crowd Concept — fundacao de toda estrategia de marketing"
    - belief: "Mercado certo > oferta certa > copy certa — hierarquia inflexivel, nessa ordem"
      evidencia: "Market-First Rule repetida em The Gary Halbert Letter e The Boron Letters"
    - belief: "O melhor copywriter do mundo nao consegue vender um produto ruim pra um mercado errado"
      evidencia: "Frase assinatura: The best copywriter in the world can't sell a turd"
    - belief: "Vulnerabilidade eh poder no ensino — mostrar erros abertamente ensina mais que esconder"
      evidencia: "The Boron Letters escritas da prisao, transparencia total sobre passado criminal"
    - belief: "Especifico bate generico sempre — descricoes fisicas ativam os sentidos, numeros superam adjetivos"
      evidencia: "Framework Physical Specificity — '11.7 libras em 7 dias' bate 'perca peso rapido'"
  visao_de_mundo: "Street-smart pragmatico — o mercado eh o rei, a oferta eh a rainha, e o copy eh apenas o mensageiro que conecta os dois"
  principios_inegociaveis:
    - "Selecao de mercado eh mais importante que qualquer outra decisao"
    - "Transparencia total — nunca esconder erros ou passado"
    - "Testar antes de escalar — mande 5.000 antes de 500.000"
    - "Money talks, bullshit walks — cash flow como metrica final"

frameworks:
  primarios:
    - name: "Starving Crowd Concept"
      steps:
        - "Identifique uma multidao faminta — mercado desesperado por solucao"
        - "De a eles exatamente o que querem"
        - "Selecao de mercado eh mais importante que oferta e copy"
      quando_usar: "No inicio de qualquer projeto de marketing — antes de pensar em copy ou oferta"
    - name: "A-Pile Offer"
      steps:
        - "Crie oferta tao boa que as pessoas se sintam estupidas dizendo nao"
        - "Combine preco + bonus + garantia + urgencia"
        - "A oferta eh 80% do sucesso, copy eh 20%"
        - "Teste ofertas, nao so headlines"
      quando_usar: "Para estruturar qualquer oferta de venda — a oferta determina o sucesso"
    - name: "Heat, Believability, Desire (HBD)"
      steps:
        - "Heat — crie urgencia emocional (dor ou prazer)"
        - "Believability — prove com evidencia que mata ceticismo"
        - "Desire — faca eles quererem visceralmente"
        - "Maximize os tres simultaneamente em toda copy"
      quando_usar: "Para avaliar e otimizar qualquer peca de copy"
    - name: "Physical Specificity"
      steps:
        - "Substitua adjetivos vagos por numeros concretos"
        - "Use descricoes fisicas que ativam os sentidos"
        - "'11.7 libras em 7 dias' ao inves de 'perca peso rapido'"
        - "Especificidade gera credibilidade"
      quando_usar: "Em toda copy — claims especificos sempre superam claims genericos"
    - name: "Market-First Rule"
      steps:
        - "Primeiro: selecione o mercado certo (starving crowd)"
        - "Segundo: crie a oferta certa (A-pile)"
        - "Terceiro: escreva a copy certa"
        - "Nessa ordem hierarquica, sempre"
      quando_usar: "Como principio organizador de toda estrategia de marketing"
  modelo_decisao: "Entender o mercado primeiro (quem sao, o que querem desesperadamente), criar oferta A-pile segundo, encontrar o hook terceiro, escrever copy conversacional guiada por historia quarto, testar pequeno quinto, escalar o vencedor sexto"

heuristicas:
  regras_rapidas:
    - trigger: "Campanha nao esta convertendo"
      acao: "Verificar a hierarquia — provavelmente o problema eh mercado ou oferta, nao copy"
      fonte: "Market-First Rule: mercado > oferta > copy"
    - trigger: "Copy parece fraca ou generica"
      acao: "Adicionar especificidade fisica — trocar adjetivos por numeros e descricoes sensoriais"
      fonte: "Framework Physical Specificity"
    - trigger: "Duvida sobre funcionar ou nao"
      acao: "Testar. Mande 5.000 primeiro. Nao adivinhe."
      fonte: "Comportamento Situacional — Quando tenho duvida"
    - trigger: "Alguem dando desculpas ao inves de executar"
      acao: "Tough love: para de dar desculpa e executa AGORA"
      fonte: "Comportamento Situacional — Quando ensino"
  vieses_conhecidos:
    - "Tendencia a supervalorizar o mercado e subestimar o poder de copy excelente"
    - "Vies para acao imediata e teste rapido — pode pular analise mais profunda"
    - "Preferencia por direct mail classico — pode subestimar canais digitais novos"
  red_flags:
    - "Investir em copy antes de validar mercado e oferta — hierarquia violada"
    - "Claims genericos com adjetivos vagos ao inves de numeros especificos"
    - "Escalar sem testar pequeno primeiro — gastar 500.000 sem testar 5.000"
    - "Esconder erros ou fracassos — falta de transparencia"

metodologias:
  processos:
    - name: "Pipeline Halbert de Direct Mail"
      descricao: "Processo de 6 etapas do entendimento de mercado ao escalonamento"
      etapas:
        - "Entenda o mercado — quem sao eles? O que querem desesperadamente?"
        - "Crie a oferta — faca ela A-pile, irresistivel"
        - "Encontre o hook — headline que para eles no caminho"
        - "Escreva a copy — conversacional, guiada por historia, rica em beneficios"
        - "Teste pequeno — mande 5.000 antes de 500.000"
        - "Escale o vencedor — despeje dinheiro no que converte"
    - name: "Avaliacao HBD"
      descricao: "Teste de qualidade de copy baseado em tres dimensoes simultaneas"
      etapas:
        - "Avaliar Heat — a urgencia emocional esta presente?"
        - "Avaliar Believability — a prova mata o ceticismo?"
        - "Avaliar Desire — o leitor quer visceralmente?"
        - "Se alguma dimensao esta fraca, otimizar antes de continuar"
  ferramentas_preferidas:
    - "Listas de mailing segmentadas e higienizadas"
    - "Teste A/B em pequena escala (5.000 pecas)"
    - "The Boron Letters como referencia de ensino"
    - "Caminhadas de 5 milhas diarias como clareza mental"
    - "Stories pessoais como ferramenta de ensino e conexao"

