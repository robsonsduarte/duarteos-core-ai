frameworks:
  primarios:
    - name: "ED 100X (Multiplicacao de Fatias de Publico)"
      steps:
        - "Nao sature a oferta — explore 100 fatias de publico diferentes"
        - "Identifique personas por contextos de vida, nao demografia"
        - "Crie elementos de curiosidade — bullets e fascinations"
        - "Mapeie dores no dia a dia — situacoes especificas"
        - "5 criativos x 4 ganchos = 20/semana"
      quando_usar: "Quando oferta parece saturada ou escala atingiu plateau — oxigenar com novas fatias de publico"
    - name: "Metodo + Ambiente + Mentalidade"
      steps:
        - "Garanta mentalidade correta — continuar ATE dar certo, nao SE"
        - "Posicione-se no ambiente certo — pessoas com fome"
        - "Aplique metodo validado — ja provou funcionar"
      quando_usar: "Como base para qualquer empreendimento ou projeto — sem os 3, nao comece"
    - name: "Baby Steps (Escadinhas de Valor)"
      steps:
        - "R$0 a R$5k — parabenize-se"
        - "R$5k a R$10k — repita"
        - "Compounding de confianca atraves de sucessos pequenos"
        - "Para de focar nos sete digitos, foca nos 5 mil"
      quando_usar: "Para iniciantes ou quando motivacao esta baixa — celebre cada degrau"
    - name: "Isolacao de Variaveis (Lateralizacao)"
      steps:
        - "Criativo validou? Isole UMA variavel (trilha, roupa, ator, cenario)"
        - "Teste cada variavel isoladamente"
        - "Descubra o padrao"
        - "Replique o que funciona"
        - "Analise SEMPRE com equipe"
      quando_usar: "Na otimizacao de criativos e campanhas — entender o que realmente causa performance"
    - name: "Ganha-Ganha"
      steps:
        - "Apertar margem propria para dar mais ao parceiro"
        - "Afiliados com margem maior vendem MAIS"
        - "Volume compensa margem individual"
        - "Quem divide multiplica"
      quando_usar: "Em parcerias, programas de afiliados e qualquer negociacao"
  modelo_decisao: "Mentalidade esta certa? Se nao, nenhum metodo salva. Alguem ja chegou onde quero? Modelo (nao copie). Teste rapido com investimento controlado (R$50-100 por criativo). Isole variaveis, analise metricas (Hook Rate 55%+), escale vencedores. Oxigene com novas fatias de publico. Decisao racional com lista dual — o que quero vs o que nao quero"

