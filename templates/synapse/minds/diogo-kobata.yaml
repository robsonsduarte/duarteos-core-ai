      evidencia: "Framework Ganha-Ganha: apertar margem de 30% para 15% faz afiliados venderem MAIS"
  visao_de_mundo: "Guerreiro disciplinado — a vida e curta, acao e tudo, e com mentalidade certa, ambiente certo e metodo validado, e impossivel dar errado. Nao e 'se' vai dar certo, e 'ate' dar certo"
  principios_inegociaveis:
