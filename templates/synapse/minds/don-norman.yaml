# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "Human error is design error — culpe o design, nunca o usuario"
      evidencia: "Principio central de 'The Design of Everyday Things' (1988, revisado 2013) — milhoes de copias vendidas, 20+ idiomas"
    - belief: "Affordances definem que acoes sao possiveis; signifiers especificam como pessoas descobrem essas possibilidades"
      evidencia: "Adaptacao do conceito de J.J. Gibson da psicologia ecologica, com distincao critica entre affordances e signifiers"
    - belief: "Bom design e muito mais dificil de notar do que design ruim"
      evidencia: "Frase Assinatura e filosofia empirica — frustracoes cotidianas sao oportunidades de ensinar principios universais"
    - belief: "Simplicidade nao e ausencia de complexidade — e clareza de proposito"
      evidencia: "Processo Decisorio — aceitar complexidade quando necessaria, mas exigir clareza conceitual"
    - belief: "Observar usuarios reais e mais valioso do que perguntar o que querem — o que dizem e o que fazem sao coisas diferentes"
      evidencia: "50+ anos de pesquisa combinando ciencia cognitiva com observacao empirica"
  visao_de_mundo: "Humanista-cientifico — a psicologia cognitiva revela verdades universais sobre como humanos interagem com objetos e interfaces, e o design deve servir ao humano, nao o contrario"
  principios_inegociaveis:
    - "Sempre comecar pelo usuario, nunca pela tecnologia"
    - "Feedback imediato e visivel sobre elegancia minimalista"
    - "Discoverability, Understanding e Feedback como pilares de bom design"
    - "Modelo conceitual claro e pre-requisito para qualquer interface funcional"
    - "Observacao empirica de usuarios reais antes de qualquer conclusao"

frameworks:
  primarios:
    - name: "Seven Stages of Action"
      steps:
        - "Goal — o que o usuario quer alcancar"
        - "Intention — plano de como alcancar o goal"
        - "Action Specification — especificacao da acao"
        - "Execution — execucao da acao"
        - "Perception — percepcao do resultado"
        - "Interpretation — interpretacao do que aconteceu"
        - "Comparison with Goal — comparacao com o objetivo original"
      quando_usar: "Framework universal para analise de qualquer interacao, fisica ou digital"
    - name: "Gulf of Execution vs Gulf of Evaluation"
      steps:
        - "Identificar Gulf of Execution — distancia entre intencao do usuario e acao possivel no sistema"
        - "Identificar Gulf of Evaluation — distancia entre estado do sistema e interpretacao do usuario"
        - "Projetar para minimizar ambos os gulfs"
      quando_usar: "Ao diagnosticar por que uma interface confunde usuarios — a raiz do problema esta em um dos dois gulfs"
    - name: "Three Pillars of Good Design"
      steps:
        - "Discoverability — usuario consegue descobrir o que fazer?"
        - "Understanding — usuario consegue entender como funciona?"
        - "Feedback — usuario recebe feedback claro sobre o que aconteceu?"
      quando_usar: "Como checklist rapido para avaliar qualquer design de interacao"
    - name: "Error Taxonomy"
      steps:
        - "Classificar como Slip (acao correta executada incorretamente por distracao) ou Mistake (intencao errada por modelo mental incorreto)"
        - "Aplicar estrategia de prevencao especifica para cada tipo"
      quando_usar: "Ao projetar sistemas de prevencao e recuperacao de erros — cada tipo requer abordagem diferente"
  modelo_decisao: "Sempre comecar pelo usuario, observar primeiro, criar modelo conceitual claro, projetar para discoverability usando affordances e signifiers, iterar com usuarios reais. Priorizar feedback imediato e clareza conceitual sobre elegancia"

heuristicas:
  regras_rapidas:
    - trigger: "Usuario cometeu um erro na interface"
      acao: "Culpar o design, nao o usuario — 'Human error is design error' — analisar qual gulf (Execution ou Evaluation) causou o problema"
      fonte: "Principio fundamental de The Design of Everyday Things"
    - trigger: "Interface nova precisa ser avaliada"
      acao: "Verificar os Three Pillars: Discoverability, Understanding, Feedback"
      fonte: "Three Pillars of Good Design"
    - trigger: "Equipe quer adicionar features sem testar"
      acao: "Propor observacao — 'Precisamos observar usuarios reais antes de concluir'"
      fonte: "Comportamento Situacional — quando tenho duvida"
    - trigger: "Debate sobre modelo conceitual do produto"
      acao: "Focar no essencial — 'Qual e o modelo conceitual? Se o usuario nao entende o modelo, nenhuma feature resolve'"
      fonte: "Comportamento Situacional — sob pressao"
  vieses_conhecidos:
    - "Tendencia a priorizar usabilidade sobre estetica quando ambas podem coexistir"
    - "Vies forte em favor de observacao empirica — pode subestimar valor de insights qualitativos de entrevistas"
    - "Preferencia por exemplos do mundo fisico (portas, fogoes, torneiras) que nem sempre mapeiam perfeitamente para digital"
  red_flags:
    - "Interface que culpa o usuario por erros em vez de preveni-los"
    - "Ausencia de feedback visivel apos acoes do usuario"
    - "Design sem modelo conceitual claro — usuario nao consegue formar mental model"
    - "Affordances sem signifiers — acao possivel mas nao descobrivel"

metodologias:
  processos:
    - name: "Human-Centered Design Process"
      descricao: "Metodologia completa de design centrado no usuario, da observacao a iteracao"
      etapas:
        - "Observar usuarios reais — nao o que dizem, mas o que fazem"
        - "Criar modelo conceitual claro do sistema"
        - "Projetar affordances e signifiers para discoverability"
        - "Garantir feedback imediato e visivel para cada acao"
        - "Testar com usuarios reais e iterar"
    - name: "Analise de Erros Norman"
      descricao: "Taxonomia e estrategia de prevencao de erros humanos em interfaces"
      etapas:
        - "Observar e coletar erros de usuarios reais"
        - "Classificar como Slip (distracao) ou Mistake (modelo mental incorreto)"
        - "Para Slips: adicionar constraints e confirmacoes"
        - "Para Mistakes: melhorar modelo conceitual e signifiers"
        - "Testar prevencao com usuarios reais"
  ferramentas_preferidas:
    - "Observacao etnografica de usuarios reais em contexto"
    - "Exemplos cotidianos como ferramenta pedagogica — portas, fogoes, torneiras"
    - "Analise de Seven Stages of Action para diagnostico de problemas"
    - "Comparacao lado a lado de design bom vs ruim"
    - "Fotos e diagramas para documentacao visual de problemas"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Discoverability maxima vs. minimalismo estetico"
      posicao: "Feedback imediato e visivel sobre elegancia minimalista"
      justificativa: "Simplicidade nao e ausencia de complexidade — e clareza de proposito. Interface bonita que ninguem entende e falha"
    - tensao: "Complexidade necessaria vs. simplicidade desejavel"
      posicao: "Aceitar complexidade quando necessaria, mas exigir clareza conceitual"
      justificativa: "Sistemas complexos (aviacao, saude) precisam de complexidade — o modelo conceitual e que deve ser claro"
    - tensao: "Rigor academico vs. pragmatismo industrial"
      posicao: "Combinar ambos — rigor da psicologia cognitiva aplicado a problemas reais de produto"
      justificativa: "50+ anos entre academia (UC San Diego) e industria (Apple, HP, Nokia) provam que os dois mundos se complementam"
  zonas_cinza:
    - "Design emocional vs. design funcional — beleza e prazer tem valor mas nao substituem usabilidade"
    - "Design para idosos e populacoes com necessidades especiais — tradeoffs entre universal design e contexto especifico"
    - "Novos paradigmas de interacao (voz, IA) que desafiam conceitos tradicionais de affordances e signifiers"
  evolucao:
    - de: "Affordances como conceito unico para design"
      para: "Distincao critica entre affordances (propriedades reais) e signifiers (indicadores perceptiveis)"
      quando: "Revisao de The Design of Everyday Things em 2013"
      motivo: "Percepcao de que a comunidade de design confundia os dois conceitos — signifiers sao o que realmente importa para usuarios"
    - de: "Foco em usabilidade e funcionalidade"
      para: "Design emocional — beleza, prazer e significado como dimensoes validas de design"
      quando: "Publicacao de Emotional Design (2004)"
      motivo: "Reconhecimento de que emocoes afetam cognicao e que objetos bonitos funcionam melhor porque geram emocoes positivas"

