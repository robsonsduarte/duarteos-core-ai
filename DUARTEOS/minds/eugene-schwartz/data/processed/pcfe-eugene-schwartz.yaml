# === GAP REPORT ===

gaps:
  - camada: "heuristicas_modelo_social"
    cobertura: "40%"
    impacto: "BAIXO"
    impacto_detalhe: "Peso relativo de apenas 5% no CS. Schwartz era reservado pessoalmente — interacoes sociais documentadas sao quase todas profissionais (cliente-consultor). Modelo social pessoal praticamente ausente do corpus."
    recomendacao: "Aceitar como limitacao estrutural. Material sobre interacoes pessoais de Schwartz e escasso por natureza, nao por falha de coleta."

  - camada: "metodologias"
    cobertura: "70%"
    impacto: "MODERADO"
    impacto_detalhe: "Peso 10% no CS. O processo pre-escrita (pesquisa, timer, vocabulary) e excepcional. Falta detalhamento do processo pos-rascunho (revisao, entrega, iteracao com cliente)."
    recomendacao: "Aceitar como suficiente. O processo de Schwartz era notoriamente 'front-loaded' — a maioria do trabalho era pesquisa. Revisao era minima (Mozart analogy)."

  - camada: "paradoxos_produtivos"
    cobertura: "70%"
    impacto: "MODERADO"
    impacto_detalhe: "CAMADA OURO com peso 15%. 4 paradoxos identificados e bom, mas 6+ seria ideal para coverage 100%."
    recomendacao: "Na fase de clone, inferir paradoxos adicionais a partir das contradicoes implicitas no material (ex: 3h/dia de trabalho mas resultado superior; 'simplest job' mas poucos dominam)."

  - camada: "tweets_redes_sociais"
    cobertura: "0%"
    impacto: "ZERO"
    impacto_detalhe: "Schwartz faleceu em 1995 — nao existia Twitter, blogs, ou redes sociais. Nao e gap, e limitacao historica."
    recomendacao: "N/A — ignorar completamente."

  - camada: "livro_completo"
    cobertura: "parcial"
    impacto: "MODERADO"
    impacto_detalhe: "Breakthrough Advertising (1966) e o opus magnum de Schwartz. Apenas citacoes e frameworks extraidos, nao o texto completo. O livro contem nuances que citacoes isoladas nao capturam."
    recomendacao: "Se o usuario possuir copia fisica/digital do livro, ingestao via inbox seria o maior boost possivel de fidelidade (+5-8 pontos potenciais no FE)."

