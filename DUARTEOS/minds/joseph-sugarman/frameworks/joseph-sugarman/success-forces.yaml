# Framework: Success Forces / Seven Forces of Success
# Mind: Joseph Sugarman | Framework de Vida e Negocios
framework:
  name: "Success Forces (Seven Forces of Success)"
  descricao: "Sistema de 6-7 forcas que direcionam para sucesso ou fracasso. Para cada acao, uma forca eh criada — entender essas forcas permite navegar em direcao ao sucesso 'frequentemente apesar de si mesmo.'"
  quando_usar: "Para decisoes de vida e negocios, quando enfrenta problemas ou precisa de framework de sucesso"
  forces:
    - force: "Always Be Honest"
      descricao: "A forca mais poderosa. Quanto mais dolorosa a verdade, mais poderosa a success force criada."
      anti_pattern: "A menor mentira destroi credibilidade permanentemente"
    - force: "Cherish Your Failures"
      descricao: "Fracasso eh success force. Quanto mais falha, mais aprende, mais perto fica do sucesso. Nao tomar acao eh maior disgraca que falhar."
      anti_pattern: "Parar de agir por medo de falhar"
    - force: "Relish Your Problems"
      descricao: "Cada problema contem oportunidade que eclipsa o problema. A oportunidade pode nao ser visivel imediatamente."
      anti_pattern: "Ver problema como puro negativo"
    - force: "Concentrate Your Powers"
      descricao: "Foco solido em uma area. Ir em tangente cria curva de aprendizado inteira nova com erros novos."
      anti_pattern: "Dispersao de energia em multiplas direcoes"
    - force: "Do It Differently"
      descricao: "Copiar = failure force. Inovar = success force. O mais dificil de copiar eh timing."
      anti_pattern: "Copiar sucesso de outros sem inovar"
    - force: "Clear Your Desk"
      descricao: "Limpar mesa todo dia cria disciplina, organizacao e perspectiva. Manifestacao fisica de eficiencia mental."
      anti_pattern: "Desorganizacao cronica"
    - force: "Focus on Helping Others"
      descricao: "Direcionamento altruista como forca de sucesso adicional (7 Forces edition)."
      anti_pattern: "Foco exclusivo em ganho pessoal"
  fonte: "Success Forces (1980) / The Seven Forces of Success (2014)"
