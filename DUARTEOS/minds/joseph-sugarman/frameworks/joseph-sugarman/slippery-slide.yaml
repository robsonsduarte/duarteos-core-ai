# Framework: Slippery Slide Concept
# Mind: Joseph Sugarman | Framework Primario
framework:
  name: "Slippery Slide Concept"
  descricao: "Principio universal de fluxo de copy onde cada elemento puxa para o proximo ate que o leitor nao consiga parar de ler, como deslizando por um escorregador lubrificado."
  quando_usar: "Em toda peca de copy — o principio universal de fluxo"
  steps:
    - "Headline captura atencao e faz ler a primeira frase"
    - "Primeira frase eh CURTA — facil de ler, cria momentum"
    - "Cada frase puxa para a proxima com curiosidade ou logica"
    - "Buying environment criado nos primeiros paragrafos"
    - "Seeds of curiosity ao longo do texto"
    - "Harmony: leitor concorda mentalmente (sim, sim, sim)"
    - "Compromisso emocional aumenta progressivamente"
    - "Logica como suporte APOS emocao estabelecida"
    - "CTA natural — leitor ja esta vendido antes de chegar"
  evidencias:
    - "Axiom 2: todos elementos existem para fazer ler a primeira frase"
    - "Axiom 3: unico proposito da primeira frase eh fazer ler a segunda"
    - "Axiom 6: leitores deslizam sem parar como num escorregador"
    - "Mulher escreveu: 'you wasted my time, I read the whole thing and I don't even want a thermostat'"
  fonte: "17 Axioms — Advertising Secrets of the Written Word"
