# Framework: 30 Psychological Triggers
# Mind: Joseph Sugarman | Framework Primario
framework:
  name: "30 Psychological Triggers"
  descricao: "Sistema taxonomizado de 30 gatilhos psicologicos que motivam decisao de compra. Cada trigger eh uma ferramenta etica de persuasao com base em psicologia do consumidor."
  quando_usar: "Para selecionar e sequenciar triggers apropriados para cada peca de copy"
  top_triggers:
    - trigger: "Satisfaction Conviction"
      descricao: "Garantia longa (1 ano vs 30 dias) demonstra confianca extrema no produto"
      poder: "Mudar UMA frase de garantia pode explodir vendas"
    - trigger: "Curiosity"
      descricao: "Seeds plantadas ao longo da copy que tornam impossivel parar de ler"
      poder: "Combustivel primario do Slippery Slide"
    - trigger: "Storytelling"
      descricao: "Historias bypass mente racional e criam bonding emocional"
      poder: "Maioria dos ads de sucesso de Sugarman abriram com historia"
    - trigger: "Honesty"
      descricao: "Admitir defeitos do produto gera mais confianca que exagerar qualidades"
      poder: "MagicStat: atacar o produto = sucesso espetacular"
    - trigger: "Involvement/Ownership"
      descricao: "Fazer leitor sentir que ja possui o produto, ativar imaginacao"
      poder: "Prospect se vee usando antes de comprar"
    - trigger: "Authority"
      descricao: "Posicao de expert aumenta confianca e credibilidade"
      poder: "NASA, astronautas, BluBlocker"
    - trigger: "Consistency"
      descricao: "Pessoas agem consistente com comprometimentos anteriores"
      poder: "Harmony/yes momentum ao longo da copy"
    - trigger: "Greed"
      descricao: "Oferta irresistivel supera objecoes"
      poder: "Bears computer 50% off"
    - trigger: "Urgency"
      descricao: "Disponibilidade limitada aumenta desejo de agir"
      poder: "Call to action imediato"
    - trigger: "Social Proof"
      descricao: "Acoes de outros validam decisao"
      poder: "Candid Camera BluBlocker reactions"
  fonte: "Triggers (1999) + The Adweek Copywriting Handbook (2006)"
