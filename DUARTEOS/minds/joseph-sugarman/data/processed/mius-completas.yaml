mius:

  # === FILOSOFIA / CRENCAS CORE ===

  - id: "JS-MIU-001"
    conteudo: "Copywriting is a mental process the successful execution of which reflects the sum total of all your experiences, your specific knowledge and your ability to mentally process that information and transfer it onto a sheet of paper for the purpose of selling a product or service."
    tipo: "definicao"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-014"
    relevancia: 98
    contexto: "Axiom 1 do livro Advertising Secrets of the Written Word"

  - id: "JS-MIU-002"
    conteudo: "People buy on emotion, justify with logic."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-001"
    relevancia: 99
    contexto: "Frase assinatura repetida em multiplas entrevistas e livros"

  - id: "JS-MIU-003"
    conteudo: "The more honest you are in your business, the more successful you will be. Honesty is the strongest and most powerful success force."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-015"
    relevancia: 95
    contexto: "Success Force #1 do livro Success Forces"

  - id: "JS-MIU-004"
    conteudo: "For every problem, there lies an opportunity so great that it dwarfs the problem."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-003"
    relevancia: 97
    contexto: "Filosofia central repetida em todas as entrevistas"

  - id: "JS-MIU-005"
    conteudo: "I am probably the biggest failure you'll ever interview. I used to fail nine out of ten times. But it was that one success that would just explode my sales."
    tipo: "crenca"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-001"
    relevancia: 96
    contexto: "Entrevista Mixergy — sobre fracasso como forca de sucesso"

  - id: "JS-MIU-006"
    conteudo: "The key to success is to duplicate yourself. And you do that by simply writing copy that you can disseminate to millions of people."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "visao_de_mundo"
    source_path: "JS-SRC-003"
    relevancia: 94
    contexto: "Entrevista InspiredInsider — sobre o poder do copywriting"

  - id: "JS-MIU-007"
    conteudo: "I just really believed I would be a success. It was this constant belief that got me through a lot of failures."
    tipo: "crenca"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    source_path: "JS-SRC-003"
    relevancia: 92
    contexto: "Entrevista InspiredInsider — sobre mindset de sucesso"

  - id: "JS-MIU-008"
    conteudo: "You only deal with really good people. If you suspect somebody as being not right, don't deal with them."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "principios_inegociaveis"
    source_path: "JS-SRC-001"
    relevancia: 88
    contexto: "Mixergy — licao do felon que o enganou"

  - id: "JS-MIU-009"
    conteudo: "Every time you copy, it's a failure force. Every time you innovate and do something different, you create a very powerful Success Force."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-015"
    relevancia: 93
    contexto: "Success Force #5 — Do It Differently"

  - id: "JS-MIU-010"
    conteudo: "The more difficult and painful it is for you to tell the truth, the greater the success force you will create for yourself."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-015"
    relevancia: 91
    contexto: "Success Forces — honestidade dolorosa como forca"

  - id: "JS-MIU-011"
    conteudo: "I look at every problem as an opportunity. Whenever I have a problem, I think well, how could I solve this? What are some of the different ways I could solve this?"
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "visao_de_mundo"
    source_path: "JS-SRC-003"
    relevancia: 94
    contexto: "InspiredInsider — problema como oportunidade"

  - id: "JS-MIU-012"
    conteudo: "By concentrating solidly in one area, you eventually learn from your mistakes, and as you learn, your productivity increases."
    tipo: "principio"
    camada_dna: "filosofia"
    subcamada: "crencas_core"
    source_path: "JS-SRC-015"
    relevancia: 88
    contexto: "Success Force #4 — Concentrate Your Powers"

  - id: "JS-MIU-013"
    conteudo: "We're all given a bucket of oysters. In one of those oysters is a pearl. You keep opening them — it scratches you, it hurts you — but if you keep going, that pearl might be in the last oyster."
    tipo: "metafora"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    source_path: "JS-SRC-003"
    relevancia: 90
    contexto: "InspiredInsider — sobre perseveranca"

  # === FRAMEWORKS / AXIOMS ===

  - id: "JS-MIU-014"
    conteudo: "All the elements in an advertisement are primarily designed to do one thing and one thing only: get you to read the first sentence of the copy."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 99
    contexto: "Axiom 2 — fundamento do Slippery Slide"

  - id: "JS-MIU-015"
    conteudo: "The sole purpose of the first sentence in an advertisement is to get you to read the second sentence."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 99
    contexto: "Axiom 3 — nucleo do Slippery Slide concept"

  - id: "JS-MIU-016"
    conteudo: "Your ad layout and the first few paragraphs of your ad must create the buying environment most conducive to the sale of your product or service."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 95
    contexto: "Axiom 4 — Buying Environment concept"

  - id: "JS-MIU-017"
    conteudo: "Get the reader to say yes and harmonize with your accurate and truthful statements while reading the copy."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 94
    contexto: "Axiom 5 — Harmony / Yes momentum"

  - id: "JS-MIU-018"
    conteudo: "Your readers should be so compelled to read your copy that they cannot stop reading until they read all of it as if sliding down a slippery slope."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 99
    contexto: "Axiom 6 — The Slippery Slide definicao formal"

  - id: "JS-MIU-019"
    conteudo: "When trying to solve problems, don't assume constraints that aren't really there."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 90
    contexto: "Axiom 7 — nao assumir restricoes que nao existem"

  - id: "JS-MIU-020"
    conteudo: "Keep the copy interesting and the reader interested through the power of curiosity."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 94
    contexto: "Axiom 8 — Seeds of Curiosity"

  - id: "JS-MIU-021"
    conteudo: "Never sell a product or service, sell a concept."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 96
    contexto: "Axiom 9 — Concept selling"

  - id: "JS-MIU-022"
    conteudo: "The incubation process is the power of your subconscious mind to use all your knowledge and experience to solve a specific problem, and its efficiency is dictated by time, creative orientation, environment and ego."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 92
    contexto: "Axiom 10 — Incubation process"

  - id: "JS-MIU-023"
    conteudo: "Copy should be long enough to cause the reader to take the action that you request."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 90
    contexto: "Axiom 11 — Long copy vs short copy"

  - id: "JS-MIU-024"
    conteudo: "Every communication should be a personal one, from the writer to the recipient, regardless of the medium used."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 91
    contexto: "Axiom 12 — Personal communication"

  - id: "JS-MIU-025"
    conteudo: "The ideas presented in your copy should flow in a logical fashion, anticipating your prospect's questions and answering them as if the questions were asked face-to-face."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 93
    contexto: "Axiom 13 — Logical flow"

  - id: "JS-MIU-026"
    conteudo: "In the editing process, you refine your copy to express what you want to express with the fewest words."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 88
    contexto: "Axiom 14 — Editing como reducao"

  - id: "JS-MIU-027"
    conteudo: "The more the mind must work to reach the conclusion successfully, the more positive, enjoyable or stimulating the experience."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 86
    contexto: "Axiom 15 — Engagement mental"

  - id: "JS-MIU-028"
    conteudo: "Selling a cure is a lot easier than selling a preventative, unless the preventative is perceived as a cure."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 95
    contexto: "Axiom 16 — Sell the cure"

  - id: "JS-MIU-029"
    conteudo: "Telling a story can effectively sell your product, create the environment or get the reader well into your copy as you create an emotional bonding with your prospect."
    tipo: "axiom"
    camada_dna: "frameworks"
    subcamada: "primarios"
    source_path: "JS-SRC-014"
    relevancia: 97
    contexto: "Axiom 17 — Storytelling"

  # === FRAMEWORKS / TRIGGERS PSICOLOGICOS ===

  - id: "JS-MIU-030"
    conteudo: "Satisfaction conviction: if you offer somebody a year-long trial instead of 30 days, sales explode. I've changed one sentence at the end of a 1000-word ad and sales just exploded."
    tipo: "trigger"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-003"
    relevancia: 96
    contexto: "InspiredInsider — trigger favorito de Sugarman"

  - id: "JS-MIU-031"
    conteudo: "Curiosity: you want to build curiosity so when they start reading your ad, they don't stop until they finish and go to the end."
    tipo: "trigger"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-001"
    relevancia: 97
    contexto: "Mixergy — curiosity como trigger"

  - id: "JS-MIU-032"
    conteudo: "Storytelling: people love stories. Most of my ads that were fabulous successes started with stories."
    tipo: "trigger"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-001"
    relevancia: 97
    contexto: "Mixergy — storytelling como trigger poderoso"

  - id: "JS-MIU-033"
    conteudo: "Honesty: the more honest you are, the more happy people will be to deal with you. Trust is another trigger."
    tipo: "trigger"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-001"
    relevancia: 93
    contexto: "Mixergy — honesty e trust como triggers"

  - id: "JS-MIU-034"
    conteudo: "Feeling of involvement or ownership: make readers feel that they already own the product, letting them use their imagination."
    tipo: "trigger"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-017"
    relevancia: 90
    contexto: "Trigger do Adweek Handbook"

  - id: "JS-MIU-035"
    conteudo: "Greed plays a big role. If somebody you dislike offers something that's too irresistible, it's hard to say no."
    tipo: "trigger"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-001"
    relevancia: 85
    contexto: "Mixergy — greed como trigger complementar"

  - id: "JS-MIU-036"
    conteudo: "Consistency — people act consistent with prior commitments. Authority — expert position increases trust. Social Proof — others' actions validate decisions. Scarcity — limited availability increases urgency. Reciprocity — giving value generates attention."
    tipo: "trigger-set"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-009"
    relevancia: 92
    contexto: "Triggers do livro Adweek Handbook — set complementar"

  - id: "JS-MIU-037"
    conteudo: "You can give a sense of urgency. You can bring in greed. You can bring up the fear factor. These are all triggers."
    tipo: "trigger"
    camada_dna: "frameworks"
    subcamada: "triggers"
    source_path: "JS-SRC-001"
    relevancia: 88
    contexto: "Mixergy — sobre burglar alarm e urgencia"

  # === HEURISTICAS ===

  - id: "JS-MIU-038"
    conteudo: "I knew people were intimidated by installation because I had run other products that required installation and they bombed."
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "regras_rapidas"
    source_path: "JS-SRC-001"
    relevancia: 88
    contexto: "Mixergy — pattern recognition de barreiras de compra"

  - id: "JS-MIU-039"
    conteudo: "Direct marketing is very counterintuitive. You never really know what works and what doesn't until you test it."
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "regras_rapidas"
    source_path: "JS-SRC-001"
    relevancia: 94
    contexto: "Mixergy — teste como unica verdade"

  - id: "JS-MIU-040"
    conteudo: "Every word you use matters. They all tell a story and have an emotion behind them. Changing a single word can often increase the conversion and response rate."
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "regras_rapidas"
    source_path: "JS-SRC-016"
    relevancia: 92
    contexto: "Carmine Mastropierro — cada palavra importa"

  - id: "JS-MIU-041"
    conteudo: "If you go off on a tangent, you enter a whole new learning curve and make an entirely new set of mistakes."
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "regras_rapidas"
    source_path: "JS-SRC-015"
    relevancia: 86
    contexto: "Success Forces — foco evita erros novos"

  - id: "JS-MIU-042"
    conteudo: "Most every product I thought was going to be a huge success turned out to be average at best — and the ones I thought were going to be average, turned out to be my winners."
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "vieses_conhecidos"
    source_path: "JS-SRC-015"
    relevancia: 90
    contexto: "Success Forces — intuicao vs realidade"

  - id: "JS-MIU-043"
    conteudo: "The most difficult element to copy is timing. Trying to copy somebody's success does not force you to look at those unique circumstances that may demand an entirely different approach."
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "regras_rapidas"
    source_path: "JS-SRC-015"
    relevancia: 89
    contexto: "Success Forces — por que copiar falha"

  - id: "JS-MIU-044"
    conteudo: "Never be overconfident. You never ever know. Always look at both sides. What's the worst case scenario? What's the best case scenario?"
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "regras_rapidas"
    source_path: "JS-SRC-003"
    relevancia: 87
    contexto: "InspiredInsider — licao da briga na escola"

  - id: "JS-MIU-045"
    conteudo: "People would tear out the ad and months later order the product. They bought when somebody in the neighborhood was robbed. Timing of purchase is not timing of interest."
    tipo: "heuristica"
    camada_dna: "heuristicas"
    subcamada: "regras_rapidas"
    source_path: "JS-SRC-001"
    relevancia: 91
    contexto: "Mixergy — insight sobre burglar alarm e timing"

  # === METODOLOGIAS / PROCESSO ===

  - id: "JS-MIU-046"
    conteudo: "First, become an expert on the product. The more detail you get, the more ideas will pop out."
    tipo: "processo"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-003"
    relevancia: 96
    contexto: "InspiredInsider — processo de escrita, passo 1"

  - id: "JS-MIU-047"
    conteudo: "I just write. I don't care about grammar or punctuation. Then it's in the editing process where you go back and simplify things."
    tipo: "processo"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-003"
    relevancia: 94
    contexto: "InspiredInsider — processo de first draft"

  - id: "JS-MIU-048"
    conteudo: "Put it aside if you're having a rough time. Your brain is working 24/7. You're taking a shower and all of a sudden boom, the idea pops up."
    tipo: "processo"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-003"
    relevancia: 92
    contexto: "InspiredInsider — incubation process na pratica"

  - id: "JS-MIU-049"
    conteudo: "I would place a small ad in the southwest edition of the Wall Street Journal, which is the smallest edition. The results I got I used to decide to run the ad."
    tipo: "processo"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-001"
    relevancia: 90
    contexto: "Mixergy — processo de teste A/B em print ads"

  - id: "JS-MIU-050"
    conteudo: "Television is an entertainment media. If you can entertain your customers, they'll keep watching."
    tipo: "principio"
    camada_dna: "metodologias"
    subcamada: "ferramentas_preferidas"
    source_path: "JS-SRC-001"
    relevancia: 92
    contexto: "Mixergy — filosofia dos infomercials BluBlocker"

  - id: "JS-MIU-051"
    conteudo: "Clean your desk at the end of every day. It forces you to organize your work, organize your workload, and put things into proper perspective."
    tipo: "habito"
    camada_dna: "metodologias"
    subcamada: "ferramentas_preferidas"
    source_path: "JS-SRC-015"
    relevancia: 82
    contexto: "Success Force #6 — Clear Your Desk"

  - id: "JS-MIU-052"
    conteudo: "The more you write, the more successful you become. The more you do, the greater the insight that you can get and more creative you can become."
    tipo: "principio"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-001"
    relevancia: 93
    contexto: "Mixergy — praticar como caminho"

  - id: "JS-MIU-053"
    conteudo: "Read every book you could read on copywriting, marketing. Become an expert in that particular area. When you become that expert, ideas flow to you."
    tipo: "processo"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-001"
    relevancia: 91
    contexto: "Mixergy — como gerar criatividade"

  - id: "JS-MIU-054"
    conteudo: "Explore life in its fullest. If you have an opportunity to do something unusual, go ahead and do it."
    tipo: "principio"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-001"
    relevancia: 88
    contexto: "Mixergy — experiencia de vida como fonte criativa"

  - id: "JS-MIU-055"
    conteudo: "I learned more from the seminars than the students did. I really learned a lot just by teaching what I knew."
    tipo: "insight"
    camada_dna: "metodologias"
    subcamada: "processos"
    source_path: "JS-SRC-001"
    relevancia: 90
    contexto: "Mixergy — ensinar como forma de aprender"

  # === NARRATIVA / STORIES ===

  - id: "JS-MIU-056"
    conteudo: "I was driving down the 405 in LA, a friend hands me sunglasses. I stopped squinting. I said 'This would make a great mail order item.' The company was going out of business. That became BluBlocker."
    tipo: "origin-story"
    camada_dna: "narrativa"
    subcamada: "self_narrative"
    source_path: "JS-SRC-001"
    relevancia: 98
    contexto: "Mixergy — BluBlocker origin story"

  - id: "JS-MIU-057"
    conteudo: "We never let anybody look through the lens on the TV show. You had to buy the pair in order to know. When QVC did that once, our sales were terrible."
    tipo: "insight-estrategico"
    camada_dna: "narrativa"
    subcamada: "storytelling_patterns"
    source_path: "JS-SRC-001"
    relevancia: 95
    contexto: "Mixergy — manter curiosidade no infomercial"

  - id: "JS-MIU-058"
    conteudo: "Then I get a call from the manufacturer: 'Honeywell has bought our company for millions. Thank you.' I said, 'Next time I'm going to create my own brand name.' That led to BluBlocker."
    tipo: "origin-story"
    camada_dna: "narrativa"
    subcamada: "self_narrative"
    source_path: "JS-SRC-001"
    relevancia: 94
    contexto: "Mixergy — MagicStat levou a marca propria"

  - id: "JS-MIU-059"
    conteudo: "In 1966, Batman was a fad, credit cards were a fad. I said I'm going to sell a Batman credit card. The president said 'I made $60 million off Batman. I don't like your idea. Get out.' I was flat broke."
    tipo: "failure-story"
    camada_dna: "narrativa"
    subcamada: "self_narrative"
    source_path: "JS-SRC-003"
    relevancia: 93
    contexto: "InspiredInsider — Batman credit card 46 anos de perseveranca"

  - id: "JS-MIU-060"
    conteudo: "I made a military sounding sign: 'Anybody touching the switch will be subject to court martial.' For three weeks I took the longest showers. The general found out, laughed, and gave me a juicy assignment in Germany."
    tipo: "origin-story"
    camada_dna: "narrativa"
    subcamada: "self_narrative"
    source_path: "JS-SRC-003"
    relevancia: 90
    contexto: "InspiredInsider — copywriting na vida real"

  - id: "JS-MIU-061"
    conteudo: "Google hired me. A guy bought my book, rewrote his ad using my techniques, and it doubled response. They had me teach all their marketing people for three days."
    tipo: "validation-story"
    camada_dna: "narrativa"
    subcamada: "self_narrative"
    source_path: "JS-SRC-001"
    relevancia: 92
    contexto: "Mixergy — Google como validacao"

  - id: "JS-MIU-062"
    conteudo: "You're going along in the direction you think you should be going and then all of a sudden something comes up and directs you 90 degrees in a different direction and that's where you're going to make your success."
    tipo: "pattern"
    camada_dna: "narrativa"
