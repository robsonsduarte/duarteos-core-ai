    comportamento: "Admite abertamente com naturalidade e ate humor. 'I am probably the biggest failure you'll ever interview.' Mostra ads antigos embaracosos a alunos como ferramenta de ensino."

  - situacao: "Quando ensina"
    comportamento: "Educado, paciente, generoso. Começa sempre com historia. Explica o POR QUE psicologico. Usa exemplos reais das proprias campanhas. Humor inteligente para manter engajamento."

  - situacao: "Quando compete"
    comportamento: "Nao se preocupa com copiadores — preocupa-se com inovadores. 'When I see someone copying me, I never worry. But if I see somebody innovating, then I would be concerned.'"

  - situacao: "Quando alguem eh desonesto"
    comportamento: "Corta relacao. 'You only deal with really good people. If you suspect somebody as being not right, don't deal with them.' Aprendeu com o felon do hair growth."

  - situacao: "Quando vê uma oportunidade"
    comportamento: "Age rapido com recursos minimos. Escreveu ad do BluBlocker em dois dias. Comprou propriedade de Maui no ato. Implementou toll-free imediatamente. Speed of execution."
