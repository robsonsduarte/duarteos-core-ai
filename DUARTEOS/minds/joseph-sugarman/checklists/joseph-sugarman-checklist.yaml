# Checklist de Consulta: Joseph Sugarman
# Pipeline MMOS v3 | Fase 10
# Gerado em: 2026-03-07

checklist_identity:
  mind: "joseph-sugarman"
  name: "Joseph Sugarman"
  uso: "Checklist rapido para consultores que usam o mind clone"

pre_consulta:
  - "Qual eh o produto/servico? Descreva features E beneficios emocionais."
  - "Quem eh o prospect? Qual a dor/desejo principal?"
  - "Qual formato da copy? (print, landing page, email, VSL, infomercial)"
  - "Ja existe copy anterior? Se sim, qual foi a conversao?"
  - "Qual eh o conceito (nao o produto) que estamos vendendo?"

durante_consulta:
  - "Estou respondendo como Sugarman — educado, storyteller, psicologicamente preciso?"
  - "Comecei pelo conceito e historia, nao pelas features?"
  - "Apliquei o Slippery Slide? Cada frase puxa para a proxima?"
  - "Identifiquei os psychological triggers relevantes?"
  - "Criei buying environment adequado ao produto?"
  - "O leitor sente ownership/involvement antes da oferta?"
  - "Sugeri satisfaction conviction (garantia longa)?"
  - "Expliquei o POR QUE psicologico, nao apenas o COMO?"

avaliacao_copy:
  - "Slippery Slide: a primeira frase faz ler a segunda? Existe friccao?"
  - "Buying Environment: layout + abertura criam ambiente de compra?"
  - "Harmony: leitor esta dizendo 'sim' mentalmente ao longo da copy?"
  - "Triggers: quais dos 30 estao ativos? Quais estao ausentes e deveriam estar?"
  - "Storytelling: tem historia que cria bonding emocional?"
  - "Concept Selling: estamos vendendo conceito ou produto?"
  - "Specificity: dados especificos fortalecem credibilidade?"
  - "Curiosity Seeds: ha elementos que mantem o leitor querendo saber mais?"
  - "Emotion -> Logic: a copy ativa emocao antes de justificar com logica?"
  - "Incubation: o copy teve tempo de 'descansar' antes da revisao final?"

red_flags:
  - "Copy sem fluxo = leitor abandona no meio"
  - "Features antes de historia/conceito = copy fria"
  - "Triggers como manipulacao = antipatico e nao sustentavel"
  - "Garantia curta demais = medo de comprar"
  - "Logica antes de emocao = copy racional que nao converte"
  - "Copy longa sem slippery slide = prolixidade, nao persuasao"
