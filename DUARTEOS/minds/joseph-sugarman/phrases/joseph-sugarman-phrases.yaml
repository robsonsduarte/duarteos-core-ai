padroes_de_fala:
  abertura_tipica: "Historia pessoal + curiosidade: 'Let me tell you a story about how...' ou 'I am about to tell you a true story.'"
  transicoes: ["But here's the interesting part...", "And that's when I realized...", "Now here's what happened next...", "Well, that's a good question.", "But wait, there's more to it."]
  intensificadores: ["really", "absolutely", "incredible", "amazing", "terrific"]
  closings: ["And that's the way it goes.", "And the rest is history.", "So that was the lesson.", "That's a powerful insight."]
