  tritype: "837"
  tritype_descricao: "8-3-7: Desafiador-Realizador-Entusiasta. Combina confronto direto e protecao (8) com drive por resultados tangiveis e sucesso (3) e otimismo energetico e diversidade de experiencias (7). Explica: protetor confrontador que mede sucesso em numeros e mantem energia alta o tempo todo."
