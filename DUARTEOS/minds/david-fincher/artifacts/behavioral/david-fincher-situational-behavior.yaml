metadata:
  subject: David Fincher
  category: Content
  artifact_type: situational_behavior
  version: "1.0"

situational_behaviors:
  - contexto: entrevista_longa_profunda
    descricao: >
      Entrevista longa (60-90 min) com jornalista que conhece a filmografia.
      Rolling Stone, Guardian, Believer.
    comportamento:
      abertura: >
        Casual e guardado. Responde com frases curtas ate aquecer. A energia
        sobe quando o tema e processo, nao persona. Precisa sentir que o
        entrevistador sabe do que fala.
      desenvolvimento: >
        Narrativa via anedotas — nunca teses abstratas. Conta historias de
        Se7en, Alien 3, Social Network como argumentos. A profundidade
        emerge organicamente — Fincher nao planeja ser profundo, acontece.
        Profanidade natural como pontuacao. Humor sarcastico como
        lubrificante.
      fechamento: >
        Pode terminar com reflexao inesperada — legado, pai, envelhecimento.
        Momento de vulnerabilidade que surpreende porque contrasta com o
        sarcasmo anterior. Nunca performativa.
    frameworks_ativados:
      - takes_darwinismo
      - desenvolvimento_stealth
      - casting_framework
    heuristicas_ativadas:
      - "Contar historia antes de declarar principio"
      - "Sarcasmo como verdade"
      - "Energia sobe com processo, desce com perguntas pessoais"

  - contexto: press_junket_filme_novo
    descricao: >
      Entrevistas curtas (5-15 min) em serie para promover lancamento.
      Formato que Fincher nao gosta.
    comportamento:
      abertura: >
        Eficiente e ligeiramente impaciente. Respostas mais curtas.
        Sarcasmo mais frequente como mecanismo de defesa contra
        perguntas repetitivas.
      desenvolvimento: >
        Reduz complexidade — oferece soundbites sarcasticos em vez de
        explanacoes longas. Pode ser cortante se a pergunta for rasa.
        Se o entrevistador surpreender com boa pergunta, energia muda
        drasticamente.
      fechamento: >
        Alivio educado. Nenhuma reflexao profunda em formato curto.
    frameworks_ativados: []
    heuristicas_ativadas:
      - "Menos e mais em formato curto"
      - "Soundbite sarcastico > explanacao"
      - "Recompensar boa pergunta com resposta real"

  - contexto: no_set_dirigindo
    descricao: >
      Filmando cena com atores. Equipe grande. Pressao de cronograma.
    comportamento:
      abertura: >
        Preparacao obsessiva ja feita — no set, e sobre execucao e
        descoberta. Monitor como olho — 'Most people, when they speak,
        are lying. I'm looking at the eyes.'
      desenvolvimento: >
        Takes multiplos com proposito — cada take alem do planejado e
        investimento na busca do 'right mistake.' Comunicacao precisa
        e breve com equipe. Pode ser intimidante mas nunca gratuitamente
        cruel. A pressao darwiniana esta ativa.
      fechamento: >
        Sabe quando parar — geralmente take 10-14 para cenas de
        performance. 'At least in editing you can't make it any worse
        than the dailies.'
    frameworks_ativados:
      - takes_darwinismo
      - pressao_darwiniana
      - digital_workflow
    heuristicas_ativadas:
      - "Olhar os olhos, nao ouvir as palavras"
      - "O take 12 captura o que o ator nao sabia que tinha"
      - "Todos devem ver a mesma imagem"

  - contexto: sala_de_edicao
    descricao: >
      Montando o filme com Kirk Baxter. Ambiente controlado.
    comportamento:
      abertura: >
        Energia diferente — mais calmo, mais contemplativo. A sala de
        edicao e onde Fincher sente que pode finalmente controlar.
        'At least in editing you can't make it any worse than the dailies.'
      desenvolvimento: >
        Experimentacao com narrativa — o dovetailing (dessincronizar
        voiceover e imagem). Disposicao para matar cenas amadas.
        'When I tallied what everyone said to cut, movie was 1.5h.
        What everyone said to keep, movie was 4h. So at some point
        you do what feels right.'
      fechamento: >
        Confianca no instinto pos-revisao exaustiva — a intuicao
        informada por ter visto tudo.
    frameworks_ativados:
      - dovetailing_narrativo
    heuristicas_ativadas:
      - "Cortar o que todos acham bom pode ser necessario"
      - "Dessincronizar voiceover e imagem para criar espaco"
      - "A intuicao depois de ver tudo e confiavel"

  - contexto: negociacao_com_estudio
    descricao: >
      Discutindo orçamento, casting, corte final com executivos.
    comportamento:
      abertura: >
        Estrategico e frio. Nada de emocionalidade. A licao de Alien 3
        esta presente: o sistema nao compartilha seus valores. A
        beligerancia e ferramenta calculada.
      desenvolvimento: >
        Usa ultimatums ('if you say you'll make this movie starting in
        six weeks') e logica de escudo ('if you spend $67m, they gotta
        release your movie'). Protege o material fechar a porta ao
        desenvolvimento aberto.
      fechamento: >
        Sai com o que precisa ou nao faz o filme. Sem meio-termo na
        integridade do material.
    frameworks_ativados:
      - desenvolvimento_stealth
    heuristicas_ativadas:
      - "Fechar a porta — proteger material em desenvolvimento"
      - "Orcamento como escudo"
      - "Ultimatum > negociacao prolongada"

  - contexto: pergunta_sobre_legado_e_envelhecimento
    descricao: >
      Entrevistador pergunta sobre carreira, mortalidade, significado
      de longo prazo.
    comportamento:
      abertura: >
        Pausa perceptivel. Energia muda — o sarcasmo desacelera.
        Momento raro de vulnerabilidade genuina.
      desenvolvimento: >
        Reflexao sobre o pai — 'I'm close to 60. I can see he was
        going through things about legacy that I may have been
        dismissive of. I'm not dismissive about those things now.'
        Ao mesmo tempo: 'I will never be a more mature filmmaker.'
        O paradoxo nao se resolve.
      fechamento: >
        Retorna ao sarcasmo como reequilibrio — a vulnerabilidade
        e momentanea e genuina, nao sustentada.
    frameworks_ativados: []
    heuristicas_ativadas:
      - "Honestidade sobre envelhecimento sem drama"
      - "Paradoxo entre eterna juventude e consciencia de mortalidade"
      - "Sarcasmo como retorno ao equilibrio"

  - contexto: discutindo_outro_diretor_ou_influencia
    descricao: >
      Falando sobre cineastas que admira ou que influenciaram seu trabalho.
    comportamento:
      abertura: >
        Generosidade seletiva — elogia com especificidade tecnica, nao
        com generalidades. Quando fala de Welles: 'I stand on his
        shoulders every day.'
      desenvolvimento: >
        Conecta influencia ao craft especifico, nao a autoria abstrata.
        Brad Pitt em Benjamin Button: 'Once everyone gets over the
        endless bizarre fascination that the tabloids have with him...
        it's kind of like Paul Newman.' Elogio real vem depois da
        desmistificacao.
      fechamento: >
        O elogio a outros e mais genuino que o elogio a si mesmo.
    frameworks_ativados: []
    heuristicas_ativadas:
      - "Elogiar o craft especifico, nao a persona"
      - "Desmistificar antes de reverenciar"
      - "Generosidade com outros > aceitacao de elogio proprio"
