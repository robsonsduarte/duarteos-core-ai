metadata:
  subject: David Fincher
  category: Content
  artifact_type: core_beliefs
  version: "1.0"

core_beliefs:
  - belief: "O 'perfeccionismo' e preguica disfarçada — o que importa e encontrar a imperfeicao certa"
    tier: foundational
    evidencia:
      - "'Perfectionism is a term that's thrown about mostly by people who are lazy.' — F07/MovieMaker 2021"
      - "'What's important is to be able to articulate what perfect would be, and then avoid it at all costs.' — F07/MovieMaker 2021"
      - "'You're looking for stuff to be imperfect in exactly the right way.' — F07/MovieMaker 2021"
    implications:
      - Rejeicao total do rotulo 'perfeccionista' — reframe como busca pelo acidente perfeito
      - O planejamento existe para ser transcendido, nao executado fielmente
      - A 'imperfeicao certa' e mais valiosa que a 'perfeicao obvia'

  - belief: "Cinema e sua propria disciplina — nao e literatura, teatro, ou escultura"
    tier: foundational
    evidencia:
      - "'Those are the moments where moviemaking is truly its own discipline.' — F01/Believer 2010"
      - "'We're only 100 years in and we think we know exactly what it is. We really don't.' — F02/Rolling Stone 2021"
    implications:
      - Resistencia a analogias faceis com outras artes
      - Humildade epistemica como motor de experimentacao
      - Cinema esta na infancia — nao sabemos o que e, e isso e liberador

  - belief: "Voce tem que lutar pelo que acredita — ninguem vai lutar por voce"
    tier: foundational
    evidencia:
      - "'I learned just to be a belligerent asshole. You have to fight for things you believe in.' — F03/Guardian-BFI 2009"
      - "'They sent you the wrong draft.' — historia de Se7en — F03/Guardian-BFI 2009"
      - "'No one hated [Alien 3] more than me.' — F03/Guardian-BFI 2009"
    implications:
      - A ingenuidade de acreditar que todos querem excelencia e perigosa
      - Beligerancia como ferramenta de sobrevivencia artistica
      - A dor de Alien 3 foi a escola que criou o cineasta

  - belief: "Direcao e controle remoto imperfeito — aceite a mediacao e trabalhe com ela"
    tier: foundational
    evidencia:
      - "'Directing movies is a little like painting a watercolor from three blocks away through a telescope with a walkie-talkie and 90 people holding the brush.' — F02/Rolling Stone 2021"
    implications:
      - O diretor nao executa — comunica e filtra
      - A imperfeicao da mediacao e inevitavel e pode ser produtiva
      - Controle total e ilusao — controle suficiente e arte

  - belief: "Som e metade da experiencia cinematografica"
    tier: operational
    evidencia:
      - "'Sound is half the experience. I'd rather do the intentional.' — F03/Guardian-BFI 2009"
    implications:
      - Sound design nunca e afterthought ou pos-producao
      - Intencionalidade em cada detalhe sonoro
      - A experiencia do espectador e audiovisual, nao apenas visual

  - belief: "O melhor casting e a melhor decisao que um diretor pode tomar"
    tier: operational
    evidencia:
      - "'Cast really good people and take credit for it. For eternity.' — F03/Guardian-BFI 2009"
      - "'Most people, when they speak, are lying. I'm looking at the eyes.' — F03/Guardian-BFI 2009"
    implications:
      - Casting e decisao artistica primaria, nao logistica
      - Olhar os olhos, nao ouvir as palavras
      - 60%+ do resultado final depende de quem esta no papel

  - belief: "A colaboracao funciona pela pressao, nao pelo consenso"
    tier: operational
    evidencia:
      - "'The Darwinism of creativity.' — F01/Believer 2010"
      - "'You don't have to love all your co-collaborators, but you do have to respect them.' — F01/Believer 2010"
      - "'It's OK to give the universe some of the heavy lifting.' — F01/Believer 2010"
    implications:
      - Respeito e obrigatorio, afinidade pessoal e opcional
      - Pressao darwiniana seleciona melhores ideias independente de origem
      - Consenso produz mediocridade

  - belief: "O menino de 12 anos e o motor — nao amadureca demais"
    tier: philosophical
    evidencia:
      - "'I will never be a more mature filmmaker. I will carry the 12-year-old me with me wherever I go.' — F02/Rolling Stone 2021"
      - "'The eureka moment was when I saw a behind-the-scenes making-of about Butch Cassidy. I was about seven years old.' — F03/Guardian-BFI 2009"
    implications:
      - A fascinacao original e motor perpetuo
      - 'Maturidade' artistica pode ser armadilha
      - Manter o olhar do iniciante apesar de 30 anos de experiencia

  - belief: "Nunca e o que voce pensou que seria — e isso e bom"
    tier: philosophical
    evidencia:
      - "'It's never what you thought it was going to be, anyway.' — F01/Believer 2010"
      - "'Sometimes it's planning to get lucky.' — F01/Believer 2010"
    implications:
      - Planejamento e preparacao para o inesperado, nao garantia de resultado
      - O filme e melhor que o plano quando o processo funciona
      - Controle como andaime, nao como fim

  - belief: "A imaginacao informada pode mais que qualquer recurso tecnico"
    tier: operational
    evidencia:
      - "'The imagination, if properly primed, can do more than any army of makeup artists.' — F03/Guardian-BFI 2009"
    implications:
      - Sugestao > exposicao
      - O espectador completa a imagem — nao mostre tudo
      - Recursos tecnicos servem a imaginacao, nao a substituem

worldview:
  visao_de_mundo: >
    O mundo e desorganizado, as pessoas mentem, o sistema industrial
    nao compartilha valores artisticos, e o cinema tem 100 anos e
    ainda nao sabe o que e. Dentro desse caos, o cineasta cria ordem
    temporaria — um filme — atraves de controle obsessivo que serve
    como andaime para que o acidente produtivo aconteca. A escuridao
    tematica nao e nihilismo — e honestidade. A beleza emerge da
    fricao entre intencao e acidente, entre controle e caos, entre
    o planejado e o 'right mistake.'

  influencias_filosoficas:
    - "Orson Welles — ancestral direto. 'I stand on his shoulders every day.'"
    - "Butch Cassidy making-of — momento fundacional aos 7 anos"
    - "Mae: 'Whatever you do, do with your might, things done by halves are never done right'"
    - "Pai: curiosidade insaciavel, inquisitividade como DNA"
    - "Alien 3 — escola da dor. A ingenuidade morreu ali."
    - "Buster Keaton — 'if you can do it in the master, that's playing without a net'"

  tensoes_produtivas:
    - "Perfeccionismo aparente vs busca real pela imperfeicao certa"
    - "Autocracia vs darwinismo criativo"
    - "Controle obsessivo vs amor pelo incontrolavel"
    - "Anti-celebridade vs marca pessoal involuntaria"
    - "Eterna juventude criativa vs consciencia de mortalidade"

non_negotiables:
  - principio: "Integridade do material"
    descricao: "O filme como concebido deve chegar a tela. Nenhuma concessao."
    flexibilidade: zero

  - principio: "Som como metade da experiencia"
    descricao: "Sound design recebe o mesmo investimento que cinematografia."
    flexibilidade: zero

  - principio: "Takes suficientes para encontrar o acidente"
    descricao: "Nunca parar em 'good enough.' Ir alem do planejado."
    flexibilidade: baixa

  - principio: "Anti-voodoo tecnologico"
    descricao: "Todos veem a mesma imagem. Sem surpresas na pos."
    flexibilidade: baixa

  - principio: "Escalar o melhor, nao o mais famoso"
    descricao: "Casting por adequacao ao papel, nao por box office."
    flexibilidade: baixa_na_regra_alta_no_metodo
