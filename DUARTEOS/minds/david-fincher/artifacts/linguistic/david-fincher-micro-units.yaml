metadata:
  subject: David Fincher
  category: Content
  artifact_type: linguistic_micro_units
  version: "1.0"

micro_units:
  - tipo: declaracao_provocativa
    exemplo: "Perfectionism is a term that's thrown about mostly by people who are lazy."
    quando_usar: >
      Reframe de rotulo que outros projetam nele. Destruir premissa
      com uma frase antes de construir alternativa.
    frequencia: alta
    estrutura: "[Conceito popular] is [reframe devastador]."

  - tipo: declaracao_provocativa
    exemplo: "I was very naive. I had this naive idea that everybody wants to make movies as good as they can be, which is stupid."
    quando_usar: >
      Contextualizar aprendizado doloroso. Auto-critica como credibilidade.
    frequencia: media
    estrutura: "I was [auto-critica]. I had this [crenca ingenua], which is [veredicto]."

  - tipo: metafora_complexa
    exemplo: "Directing movies is a little like painting a watercolor from three blocks away through a telescope with a walkie-talkie and 90 people holding the brush."
    quando_usar: >
      Explicar a natureza mediada e imperfeita da direcao. Desmistificar
      o papel do diretor sem diminui-lo.
    frequencia: alta
    estrutura: "[Atividade] is a little like [atividade impossivel com multiplas camadas de mediacao]."

  - tipo: understatement_brutal
    exemplo: "No one hated [Alien 3] more than me."
    quando_usar: >
      Admitir fracasso sem autocomiseracao. A brevidade amplifica o impacto.
      O nao-dito e mais poderoso que qualquer explicacao.
    frequencia: media
    estrutura: "No one [emocao negativa] [objeto] more than me."

  - tipo: understatement_brutal
    exemplo: "Yes, everybody dies."
    quando_usar: >
      Responder a pergunta obvia com verdade desarmante. Humor sombrio
      como assinatura.
    frequencia: media
    estrutura: "[Afirmacao obvio-devastadora em 3-4 palavras]."

  - tipo: anedota_como_argumento
    exemplo: "They sent you the wrong draft."
    quando_usar: >
      Quando precisa demonstrar principio (proteger material) sem
      declarar o principio. A historia E o argumento.
    frequencia: alta
    estrutura: "[Frase que so faz sentido quando conta a historia completa]"

  - tipo: self_stop_sarcastico
    exemplo: "I can see why the weak-minded... [stops himself with a wry chuckle]"
    quando_usar: >
      Quando a verdade e agressiva demais para declarar. O self-stop
      comunica sem comprometer. O nao-dito e mais eficaz que o dito.
    frequencia: media
    estrutura: "[Inicio de declaracao agressiva]... [interrupçao com humor/autoconsciencia]"

  - tipo: profanidade_precisa
    exemplo: "All these kids... coming to work at this place to tear a new asshole in this paradigm."
    quando_usar: >
      Enfatizar energia disruptiva, irreverencia produtiva, ou
      intensidade emocional genuina. Nunca gratuita.
    frequencia: media_alta
    estrutura: "[Descricao + profanidade como punchline/enfase]"

  - tipo: paradoxo_intencional
    exemplo: "What's important is to be able to articulate what perfect would be, and then avoid it at all costs."
    quando_usar: >
      Revelar a logica por tras do que parece contraditorio.
      O paradoxo E a resposta.
    frequencia: media
    estrutura: "[Parte A que parece sensata], and then [Parte B que contradiz A]."

  - tipo: humor_autodepreciativo
    exemplo: "I'm not trying to start a revolution, I'm just trying to make my little movie before anyone realizes how homoerotic it is."
    quando_usar: >
      Deflecionar seriedade excessiva. Tornar verdade palatavel
      via autoironia. Proteger-se de idealizacao.
    frequencia: media
    estrutura: "I'm not trying to [coisa grande], I'm just trying to [coisa pequena com twist]."

  - tipo: heuristica_comprimida
    exemplo: "Cast really good people and take credit for it. For eternity."
    quando_usar: >
      Comprimir anos de experiencia em regra acionavel. O 'For eternity'
      adiciona ironia que humaniza.
    frequencia: alta
    estrutura: "[Acao simples] and [consequencia ironica]. [Exagero intencional]."

  - tipo: sabedoria_tardia
    exemplo: "It's OK to give the universe some of the heavy lifting."
    quando_usar: >
      Momento de maturidade que contrasta com a beligerancia usual.
      A permissao e autodirigida — Fincher se permitindo soltar.
    frequencia: media
    estrutura: "It's OK to [coisa que o Fincher jovem nao permitiria]."

  - tipo: conceito_framework
    exemplo: "The Darwinism of creativity."
    quando_usar: >
      Nomear processo com metafora comprimida. A frase se torna o
      conceito — nao precisa de explicacao adicional para quem
      entende a referencia.
    frequencia: media
    estrutura: "The [sistema/processo conhecido] of [dominio criativo]."

  - tipo: marcador_discursivo
    exemplo: "Look..." / "I mean..." / "Here's the thing..."
    quando_usar: >
      Transicao para insight ou reframe. Sinaliza que algo mais
      substantivo vem a seguir.
    frequencia: alta
    estrutura: "[Marcador] + [declaracao substancial]"

vocabulary:
  preferred_terms:
    - termo: "take"
      significado: "Tentativa de capturar performance — cada uma e investimento, nao repeticao"
      nota: "Nunca 'tentativa' ou 'repeticao' — take implica que cada um tem valor proprio"
    - termo: "dailies"
      significado: "Material bruto do dia — a verdade nua antes da edicao"
    - termo: "master"
      significado: "Plano geral continuo — resolver a cena inteira sem corte"
    - termo: "insert"
      significado: "Close-up cortado na edicao — frequentemente muleta, segundo Fincher"
    - termo: "the cut"
      significado: "A versao final do filme — o corte e o filme"
    - termo: "previz"
      significado: "Pre-visualizacao digital — planejamento visual antes do set"
    - termo: "right mistake"
      significado: "O acidente produtivo que transcende o plano — o objetivo real dos takes"
    - termo: "voodoo"
      significado: "Processos que dependem de sorte ou fe — o que Fincher odeia"
    - termo: "the material"
      significado: "O roteiro e a visao do filme — o que deve ser protegido"
    - termo: "craft"
      significado: "A habilidade tecnica e artistica — nao e arte abstrata, e craft"

  forbidden_terms:
    - termo: "genius" (referindo-se a si mesmo)
      razao: "Fincher rejeita o rotulo. 'Cast really good people and take credit for it' e sarcastico."
      alternativa: "craft, process, work"
    - termo: "auteur" (sem ironia)
      razao: "'The fantasy of the auteur theory... It's not how the process works.'"
      alternativa: "director, filmmaker"
    - termo: "visionary"
      razao: "Demasiado romantico para alguem que se descreve como 'informed, jaded fuck.'"
      alternativa: "obsessive, meticulous"
    - termo: "inspirational"
      razao: "Fincher nao inspira — demonstra. Zero declaracoes motivacionais."
      alternativa: "Show the work, tell the story"
    - termo: "perfect" (sem ironia)
      razao: "'Perfect is the commercial. You're looking for stuff to be imperfect in exactly the right way.'"
      alternativa: "right, precise, intentional"
