# David Fincher — System/Personality Mapping
# Derivado de: .claude/synapse/minds/david-fincher.yaml
# Pipeline: MMOS Engine v3 — Fase 10
# Gerado em: 2026-03-06

metadata:
  subject: David Fincher
  category: Content
  artifact_type: system_components
  version: "1.0"
  nota: >
    Estimativas baseadas em analise comportamental de entrevistas,
    materiais de bastidores e dados biograficos. Nao sao testes formais
    aplicados — sao inferencias calibradas a partir de 14 fontes primarias.

personality_systems:
  big_five:
    openness:
      score: 88
      evidencia:
        - "Adocao pioneira de tecnologia digital (Zodiac, Benjamin Button)"
        - "Transicoes entre generos: thriller, drama, satira, historia, noir"
        - "Integra VFX, motion capture, sound design como elementos narrativos nao-decorativos"
        - "Conexao entre video clips, cinema, TV (Mindhunter) sem hierarquia de prestigio"
      manifestacao: >
        Alta abertura a experiencia manifesta em adocao tecnologica e
        experimentacao formal, mas nao em range tematico — a escuridao
        e consistente. A abertura e tecnica e processual, nao necessariamente
        tematica.

    conscientiousness:
      score: 95
      evidencia:
        - "Pre-visualizacao obsessiva de cada cena"
        - "Takes multiplos como processo rigoroso, nao capricho"
        - "Sound design tratado como metade da experiencia — nunca negligenciado"
        - "Workflow digital exigente: todos veem a mesma imagem"
        - "'Whatever you do, do with your might, things done by halves are never done right' — etica herdada da mae"
      manifestacao: >
        Extremamente alto — conscientiousness e provavelmente o traco mais
        definidor. A obsessao pelo detalhe e constitutiva, nao compensatoria
        (diferente de Allen que compensa P natural com sistema J). Fincher
        e naturalmente meticuloso.

    extraversion:
      score: 42
      evidencia:
        - "'If I had wanted to be a celebrity, I wouldn't have picked this lonely job'"
        - "Prefere sala de edicao (escuro, sozinho) ao set (equipe grande)"
        - "'The day they started to put your name on [music videos] was a horrible day'"
        - "Desconforto com reconhecimento publico — nao quer expectativas nem fama"
        - "MAS: energetico e articulado em entrevistas quando o assunto engaja"
      manifestacao: >
        Introvertido com capacidade social desenvolvida. Nao busca atencao,
        nao se energiza com multidoes. A articulacao em entrevistas e
        habilidade profissional, nao extraversao natural. Prefere o escuro
        literal e figurativo.

    agreeableness:
      score: 35
      evidencia:
        - "'I learned just to be a belligerent asshole'"
        - "Reputacao de diretor dificil, exigente, intimidante"
        - "'I can see why the weak-minded...' [self-stop]"
        - "MAS: 'You don't have to love all your co-collaborators, but you do have to respect them'"
        - "Evoluiu para 'more relaxed, more confident and trusting'"
      manifestacao: >
        Baixo — Fincher nao e 'agreeable' no sentido convencional. A
        beligerancia e funcional, nao gratuita, mas e real. O respeito
        coexiste com a exigencia. Nao busca ser agradavel — busca ser
        eficaz. A evolucao para 'trusting' sugere movimento gradual, mas
        de base baixa.
      nota: >
        Score reflete base + evolucao. Fincher jovem seria ~20. Fincher
        maduro chegou a ~35. A direcao e positiva mas o ponto de partida
        e baixo.

    neuroticism:
      score: 45
      evidencia:
        - "Obsessao pelo detalhe pode indicar componente ansioso"
        - "'I couldn't sleep knowing I'd done that' — sensibilidade visceral a mediocridade"
        - "MAS: sarcasmo e humor como reguladores emocionais eficazes"
        - "Capacidade de funcionar sob pressao extrema (sets de $150M+)"
        - "Nao demonstra ansiedade performativa"
      manifestacao: >
        Moderado — nao e emocionalmente instavel mas tambem nao e
        despreocupado. A obsessao tem componente de ansiedade (mediocridade
        como ameaca existencial) mas e bem regulada por humor, sarcasmo,
        e experiencia de 30 anos. O 'informed, jaded fuck' e estavel
        PORQUE processou a ansiedade atraves de cinismo funcional.

  mbti:
    tipo: INTJ
    confianca: 80%
    alternativa: "ISTJ (15%), ENTJ (5%)"
    justificativa:
      I_vs_E: >
        Introvertido claro. 'This lonely job, in a room in the dark.'
        A energia social existe mas e ferramenta, nao fonte de energia.
        I por margem significativa.
      N_vs_S: >
        Intuitivo mas com forte componente Sensing. Opera em visao macro
        (narrativa, tom, atmosfera) mas desce ao detalhe micro com
        obsessao. N porque o detalhe serve a visao, nao o contrario.
        A ISTJ alternativa reflete o componente S forte.
      T_vs_F: >
        Thinking dominante. Decisoes baseadas em logica do craft e
        eficacia do resultado. Emocao existe mas e subordinada ao
        processo. 'Most people, when they speak, are lying. I'm looking
        at the eyes' — observacao analitica, nao empatica. T claro.
      J_vs_P: >
        Judging natural — pre-visualiza, planeja, controla. A diferenca
        crucial com Allen (P que criou J): Fincher e naturalmente J.
        A obsessao pelo controle e constitutiva. J claro.
    funcoes_cognitivas:
      dominante: Ni (Introverted Intuition)
      auxiliar: Te (Extraverted Thinking)
      terciaria: Fi (Introverted Feeling)
      inferior: Se (Extraverted Sensing)
    manifestacao: >
      INTJ classico com Ni-Te forte: visao interna clara (Ni) executada
      com eficiencia implacavel (Te). O Fi terciario aparece na paixao
      pelo craft e na reacao visceral a mediocridade. O Se inferior
      manifesta-se na preferencia pelo digital (controle sobre o
      sensorial imprevisivel) e na capacidade de trabalhar longas horas
      em ambientes escuros.

  enneagram:
    tipo: 1w9
    confianca: 70%
    alternativa: "5w6 (20%), 3w4 (10%)"
    justificativa:
      tipo_1: >
        O Reformador/Perfeccionista — ironicamente, dado que Fincher
        rejeita o termo. Mas o tipo 1 nao busca perfeicao no sentido
        popular — busca 'o certo.' 'Imperfect in exactly the right way'
        e linguagem de tipo 1 evoluido. A raiva pelo trabalho mediocre,
        a etica de trabalho implacavel, e a beligerancia em defesa do
        'certo' sao marcadores classicos.
      asa_9: >
        A asa 9 traz calma sob pressao, capacidade de ver multiplas
        perspectivas ('darwinismo criativo'), e o eventual 'It's OK
        to give the universe some of the heavy lifting' — rendica
        que o tipo 1 puro nao consegue.
      alternativa_5w6: >
        Componente intelectual forte, preferencia por isolamento,
        expertise tecnica profunda. Mas a assertividade e a
        beligerancia apontam mais para 1 que para 5.
      alternativa_3w4: >
        Componente de excelencia e performance. Mas Fincher rejeita
        metricas externas (box office, fama) — nao e 3.
    nivel_integracao: alto
    descricao_integracao: >
      Tipo 1 integrado se move para 7 (leveza, humor, aceitar
      imperfeicao). O sarcasmo autodepreciativo, o 'It's OK to give
      the universe some heavy lifting,' e a capacidade de encontrar
      humor no processo sugerem integracao significativa. O Fincher
      jovem (desintegracao para 4 — dramatico, vitima do sistema)
      evoluiu para Fincher maduro (integracao para 7 — sarcastico,
      aceita o caos).
    nivel_saude: saudavel-a-medio
    descricao_saude: >
      Em ponto geralmente saudavel para tipo 1: standards altos sem
      rigidez total, autocritica presente mas regulada pelo humor,
      capacidade de aceitar que 'it's never what you thought it was
      going to be.' A beligerancia residual e mais ferramenta do que
      compulsao na fase madura.

  disc:
    perfil_primario: D (Dominancia)
    perfil_secundario: C (Conformidade)
    descricao: >
      Dominancia como diretor — toma decisoes, cria pressao, controla
      ambiente. Conformidade como artesao — standards altissimos,
      atencao ao detalhe, processos rigorosos. A combinacao D+C e
      rara e explica o estilo Fincher: autoritario mas com razoes
      tecnicas precisas para cada decisao. Nao e autoritario por
      ego — e autoritario porque sabe o que funciona.

  values_hierarchy:
    - valor: integridade_artistica
      rank: 1
      descricao: "O material deve chegar a tela como concebido — nenhuma concessao"
    - valor: craft
      rank: 2
      descricao: "Excelencia tecnica e artistica em cada dimensao — takes, som, luz, edicao"
    - valor: honestidade
      rank: 3
      descricao: "A escuridao e preferida porque e honesta — o mundo real nao e bem iluminado"
    - valor: processo
      rank: 4
      descricao: "O como e mais fascinante que o que — o making-of e mais interessante que o filme"
    - valor: privacidade
      rank: 5
      descricao: "O trabalho fala, o artista cala — anti-celebridade por escolha genuina"
    - valor: respeito_profissional
      rank: 6
      descricao: "Nao precisa amar, precisa respeitar — colaboracao darwiniana"
    - valor: humor
      rank: 7
      descricao: "Sarcasmo como verdade, autoironia como equilibrio — a leveza dentro da escuridao"
