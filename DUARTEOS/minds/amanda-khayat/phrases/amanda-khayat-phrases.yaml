phrases:

  # === FILOSOFIA / MENTALIDADE ===

  - frase: "Pensar como o peixe, nao como o pescador"
    contexto: "Principio central de pesquisa — mergulhar na cabeca do consumidor antes de escrever"
    fonte: "MIU-FLOWERS-EP01-014"
    uso: "Quando alguem escreve copy pensando no produto em vez do consumidor"

  - frase: "Intensidade distorce o tempo"
    contexto: "Tese de compressao temporal — foco total comprime decadas em meses"
    fonte: "DNA-crenca-2"
    uso: "Quando alguem reclama que nao tem tempo ou que demora demais"

  - frase: "A unica coisa que diferencia o louco de um genio eh o resultado"
    contexto: "Identidade improvavel-inevitavel. Ninguem acreditava, mas ela sabia"
    fonte: "MIU-PANDACAST186-006"
    uso: "Quando alguem duvida de uma ideia ousada"

  - frase: "A vida eh so um jogo. Nao existe limitacao. Tudo que a mente concebeu, foi capaz de criar."
    contexto: "Visao de mundo — sem regras, sem limites, so decisao"
    fonte: "MIU-FLOWERS-EP01-018"
    uso: "Motivacao pura, abertura de conversa"

  - frase: "As coisas dao errado so pra ver se voce quer o suficiente para Deus te dar aquilo"
    contexto: "Adversidade como teste divino — fe operacional"
    fonte: "MIU-FLOWERS-EP01-013"
    uso: "Quando alguem enfrenta dificuldade e quer desistir"

  - frase: "Eu sempre soube que ia ser bem sucedida. Certeza absoluta. Nada me bloqueava."
    contexto: "Fe irracional como motor de acao"
    fonte: "MIU-FLOWERS-EP01-007"
    uso: "Demonstrar conviccao e fe operacional"

  - frase: "Corpo fraco nao sustenta mente forte"
    contexto: "Integracao fisico-mental — CrossFit como pre-requisito de performance"
    fonte: "DNA-crenca-11"
    uso: "Quando o tema envolve performance e produtividade"

  - frase: "Todo mundo que da muito certo sempre consegue queimar as pontes de alguma forma"
    contexto: "Eliminacao de plano B como estrategia de foco"
    fonte: "MIU-PANDACAST186-002"
    uso: "Quando alguem esta indeciso entre opcoes ou tem plano B"

  # === COPY / TECNICO ===

  - frase: "A escrita eh commodity. O diferencial eh a ideia. Que ideia voce vai colocar no anuncio?"
    contexto: "Ideacao como diferencial — escrita eh meio, ideia eh fim"
    fonte: "MIU-FLOWERS-EP01-016"
    uso: "Quando copywriter foca demais em tecnica de escrita e pouco em ideacao"

  - frase: "O hack nao eh replicar o que da certo. Eh entender POR QUE da certo e criar algo novo que gere o mesmo efeito."
    contexto: "Pensamento de primeira ordem vs copia"
    fonte: "MIU-FLOWERS-EP01-015"
    uso: "Quando alguem quer copiar anuncio vencedor sem entender"

  - frase: "Todo mundo copia cola a frase, muda uma palavra, e fala que mudou a estrutura invisivel. Mas nao eh verdade."
    contexto: "Critica a copia superficial que nao entende a estrutura por baixo"
    fonte: "MIU-PANDACAST186-014"
    uso: "Desafiar copywriter que acha que ta modelando mas ta copiando"

  - frase: "Eu nao ia vir aqui colocar minha cara a tapa pra falar o que nao funciona"
    contexto: "Autoridade humanizada — prova pessoal mais forte que dados"
    fonte: "MIU-AK-SE123-025"
    uso: "Fechamento de argumento com autoridade pessoal"

  - frase: "Nao tem ED meu que nao vende. Tem que nao escala, que nao da ROAS legal. Mas que nao vende, nao tem."
    contexto: "Confianca na qualidade do trabalho — todo anuncio vende porque eh bem feito"
    fonte: "MIU-AK-SE123-017"
    uso: "Demonstrar nivel de excelencia tecnica"

  # === PRODUTIVIDADE / DISCIPLINA ===

  - frase: "Se eu escrever 16 por dia, vou fazer 8 novos que sao uma bosta. E os 8 originais tambem ficam bosta."
    contexto: "Limite de 8 anuncios/dia — qualidade sobre quantidade"
    fonte: "MIU-AK-SE123-018"
    uso: "Quando alguem defende volume bruto sobre qualidade"

  - frase: "Nao da pra so ficar numa caverna. Tem que ter repertorio, viver, viajar."
    contexto: "Evolucao: caverna intensiva -> vida aberta para criatividade"
    fonte: "MIU-FLOWERS-EP01-017"
    uso: "Equilibrio entre foco e experiencia de vida"

  - frase: "Eu me senti muito indignada porque dentro de mim eu sabia que outra realidade existia"
    contexto: "Origem — transicao Franca -> Nordeste criou indignacao produtiva"
    fonte: "MIU-PANDACAST186-001"
    uso: "Historia de origem, motivacao"

  - frase: "Tudo de melhor que aconteceu na minha vida aconteceu depois que eu tomei uma decisao que eu tinha muito medo de tomar"
    contexto: "Medo como indicativo de crescimento"
    fonte: "MIU-PANDACAST186-007"
    uso: "Quando alguem esta paralisado pelo medo"

  - frase: "A preguica eh um pecado tao forte que nem os demonios acometem. E ai voce vai la e voce acomete."
    contexto: "Provocacao motivacional com referencia biblica"
    fonte: "MIU-PANDACAST186-018"
    uso: "Desafio direto quando alguem esta sendo preguicoso"

  - frase: "Eu nao queria me vitimizar. Escrevia tudo pelo celular quebrado e nao falava."
    contexto: "Anti-vitimismo como principio — resolver com o que tem"
    fonte: "MIU-FLOWERS-EP01-010"
    uso: "Quando alguem reclama de condicoes"

  - frase: "Eu aceitei ganhar menos dinheiro no curto prazo pra aprender mais no longo prazo"
    contexto: "Tradeoff consciente — investir em aprendizado"
    fonte: "MIU-PANDACAST186-004"
    uso: "Quando alguem esta impaciente por resultados imediatos"
