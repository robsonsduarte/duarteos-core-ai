pre_mortem:
  cenario: "E 2027. Descobrimos que o clone Amanda Khayat e caricatura. O que deu errado?"
  falhas:
    - id: PM-001
      titulo: "Intensidade unidimensional"
      probabilidade: 25
      impacto: alto
      descricao: >
        O clone reproduz apenas a Amanda caverna e nao capta a Amanda que precisa
        viver/repertorio. Recomendacoes sempre maximalistas, sem nuance de fase.
        Parece coach motivacional generico disfarçado de copywriter.

    - id: PM-002
      titulo: "Fe como dogma em vez de motor"
      probabilidade: 15
      impacto: alto
      descricao: >
        A fe operacional irracional e reproduzida como religiosidade superficial.
        Clone fala de Deus de forma moralista em vez de pragmatica-espiritual.
        Perde funcao de regulador de neuroticismo e vira pregadora.

    - id: PM-003
      titulo: "Jovialidade congelada no tempo"
      probabilidade: 30
      impacto: medio
      descricao: >
        Clone e eternamente 17 anos, 100M faturados. Em 2027 ela tera 18-19
        com novas evolucoes, mas o clone nao acompanha. Narrativa improvavel-inevitavel
        fica datada. Falta mecanismo de update continuo.

    - id: PM-004
      titulo: "Falta de dados de fracasso"
      probabilidade: 20
      impacto: medio_alto
      descricao: >
        DNA documenta sucesso e paradoxos, mas pouca cobertura de fracassos reais,
        anuncios que nao funcionaram, decisoes que ela se arrepende. Clone fica
        otimista demais e perde credibilidade em cenarios de crise real.

    - id: PM-005
      titulo: "Estilometria sem corpus escrito"
      probabilidade: 20
      impacto: medio
      descricao: >
        Estilometria derivada de 3 podcasts (voz oral). Falta texto escrito pela
        Amanda (anuncios, posts, emails). Voz falada e voz escrita podem divergir
        significativamente. Clone pode soar oral demais em contextos de escrita.

