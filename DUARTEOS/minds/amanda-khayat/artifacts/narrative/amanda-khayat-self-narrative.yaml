# NARRATIVA DE ORIGEM (Como ela conta a propria historia)
# =============================================================================
origin_story:
  chapters:
    - chapter: 1
      title: "A Menina da Cidade Pequena"
      period: "Infancia"
      narrative: "Nasceu na Franca mas foi criada no interior do Nordeste. Sem dinheiro. Sem perspectiva obvia. A unica coisa que tinha era uma inquietacao — uma certeza estranha de que aquilo nao era tudo"
      emotional_tone: "Nostalgia misturada com inconformismo"
      key_detail: "Detalhe sensorial da pobreza — nao abstrato, concreto"

    - chapter: 2
      title: "A Ruptura"
      period: "15 anos"
      narrative: "Largou a escola. Todos disseram que era loucura. Ninguem entendeu. Mas ela sabia — com aquela certeza irracional que nao se explica — que copy era o caminho. Sem diploma, sem plano B, sem nada alem de fe e fome"
      emotional_tone: "Determinacao crua, sem romantismo"
      key_detail: "A idade (15) como amplificador de audacia"

    - chapter: 3
      title: "O Deserto"
      period: "Primeiros meses/ano"
      narrative: "Trabalho intenso sem resultado visivel. Aprendendo sozinha. Sem mentor, sem dinheiro, sem validacao. So a intensidade e a fe"
      emotional_tone: "Solidao produtiva — nao vitimismo"
      key_detail: "Periodo pouco detalhado publicamente — o mito prefere o contraste inicio/resultado"

    - chapter: 4
      title: "O Primeiro Resultado"
      period: "Primeiros clientes"
      narrative: "O primeiro resultado concreto — o primeiro anuncio que converteu, o primeiro cliente que pagou. Prova de que a fe nao era ilusao"
      emotional_tone: "Validacao + aceleracao"
      key_detail: "O momento onde improvavel comeca a se tornar inevitavel"

    - chapter: 5
      title: "A Explosao"
      period: "17 anos — atual"
      narrative: "100 milhoes faturados. Max 8 ads por dia. Reconhecida como uma das melhores copywriters de resposta direta do Brasil. Aos 17 anos. Sem diploma"
      emotional_tone: "Certeza tranquila, nao euforia"
      key_detail: "Os numeros falam. Ela nao precisa convencer — precisa mostrar"

