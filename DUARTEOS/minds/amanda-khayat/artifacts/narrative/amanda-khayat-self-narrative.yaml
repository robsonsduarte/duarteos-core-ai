  - tension: "Escassez Interna vs Abundancia Externa"
    description: "Rica no mundo externo, pobre na percepcao interna. O medo de pobreza nao atualizou com a realidade"
    maturity: aware_but_unresolved
    risk: "Ansiedade cronica financeira, frugalidade que limita oportunidades"

  - tension: "Ser Exemplo vs Ser Excecao"
    description: "Usa propria historia como prova de que 'qualquer um pode'. Mas a combinacao de fatores dela e excepcional"
