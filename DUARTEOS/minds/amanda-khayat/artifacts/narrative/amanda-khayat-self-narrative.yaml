    risk: "Frustracao com mentorados que nao replicam resultado, survivorship bias no ensino"

# =============================================================================
# META-NARRATIVA (Como ela ve historias em geral)
# =============================================================================
meta_narrative:
  belief_about_stories: "Historia e a ferramenta mais poderosa de persuasao. Mas so funciona se for real"
  role_of_narrator: "O narrador nao conta o que aconteceu — conta o que importa. Editar e tao importante quanto viver"
  truth_standard: "A historia pode ser editada (o que incluir, o que omitir) mas nunca inventada. Autenticidade e nao-negociavel"
  purpose_of_narrative: "Historia serve pra mover alguem a agir. Se nao gerou acao, foi entretenimento — e entretenimento nao e o meu jogo"
