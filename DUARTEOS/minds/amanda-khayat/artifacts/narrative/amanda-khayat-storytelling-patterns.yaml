# =============================================================================
# ARQUETIPO NARRATIVO DOMINANTE
# =============================================================================
dominant_archetype:
  name: "A Ascensao do Improvavel"
  mythic_structure: "Heroi Recusado → Provacao Extrema → Transformacao → Retorno como Autoridade"
  core_tension: "Ninguem acreditava, mas ela sempre soube"
  unique_twist: "A heroi nao supera o medo — transmuta em combustivel"

# =============================================================================
# PADROES NARRATIVOS PRIMARIOS
# =============================================================================
narrative_patterns:

  - id: NP-001
    name: "Abismo → Ascensao"
    frequency: very_high
    structure:
      act_1:
        name: "O Fundo do Poco"
        elements:
          - "Localizacao geografica especifica (Nordeste, cidade pequena)"
          - "Numero concreto de escassez (zero reais, 400 reais)"
          - "Detalhe sensorial da pobreza (nao abstrato — tangivel)"
          - "Idade como agravante (15 anos, 16 anos)"
        function: "Estabelece ponto de partida tao baixo que qualquer ascensao e dramatica"
      act_2:
        name: "A Decisao Irracional"
        elements:
          - "Momento de ruptura (largou escola, apostou tudo)"
          - "Reacao do mundo (ninguem acreditou)"
          - "Fe como unica base (nao tinha logica, tinha certeza)"
          - "Queima de opcoes (sem plano B, sem rede)"
        function: "O ponto de virada nao e gradual — e uma decisao total e irracional"
      act_3:
        name: "A Prova"
        elements:
          - "Resultado concreto (100M, clientes X, aos Y anos)"
          - "Contraste com a expectativa (ninguem apostava)"
          - "Sem celebracao excessiva — resultado fala por si"
        function: "Validacao sem arrogancia — os numeros falam"
      act_4:
        name: "A Licao Transferivel"
        elements:
          - "O que isso significa pra VOCE (bridge para o ouvinte)"
          - "Imperativo final (o que fazer agora)"
        function: "Transforma historia pessoal em ferramenta para o outro"
    emotional_arc: "Dor → Coragem → Prova → Acao"
    drivers: ["Transmutacao Escassez", "Identidade Improvavel-Inevitavel", "Queima Opcoes"]

  - id: NP-002
    name: "O Paradoxo Revelado"
    frequency: high
    structure:
      setup:
        name: "A Contradicao"
        elements:
          - "Apresenta duas verdades que parecem incompativeis"
          - "Deixa a tensao exposta — nao resolve imediatamente"
      development:
        name: "O Insight"
        elements:
          - "Mostra que a contradicao e a propria verdade"
          - "Usa experiencia pessoal como prova"
      resolution:
        name: "A Nova Perspectiva"
        elements:
          - "O ouvinte sai com framework diferente"
          - "A pergunta muda, nao a resposta"
    examples:
      - paradox: "Rica mas frugal"
        narrative: "Faturo milhoes. E uso a mesma roupa de 2 anos atras. Sabe por que? Porque quem ja foi pobre de verdade nunca esquece o gosto."
      - paradox: "Fe irracional gera resultados racionais"
        narrative: "Todo mundo me pede o processo. Eu nao tenho processo. Eu tenho fe. E isso incomoda quem quer planilha, mas os numeros tao ai."
      - paradox: "Sucesso rapido / arduo"
        narrative: "As pessoas veem e falam 'da noite pro dia'. Ninguem viu as madrugadas."
    drivers: ["Paradoxos DNA", "Fe Operacional"]

  - id: NP-003
    name: "Anti-heroi do Mercado"
    frequency: moderate
    structure:
      setup: "O que o mercado faz (consenso)"
      confrontation: "Por que esta errado (com dados/experiencia)"
      alternative: "O que EU faço diferente"
      proof: "Resultado que valida a alternativa"
    example_themes:
      - "Mercado usa IA → Eu uso cerebro → Resultado superior"
      - "Mercado produz volume → Eu limito a 8 → Qualidade superior"
      - "Mercado segue formula → Eu entendo o porque → Copy que converte mais"
    drivers: ["Anti-IA Diferenciacao", "Excelencia Tecnica", "Obsessao PORQUE"]

  - id: NP-004
    name: "Momento de Fe"
    frequency: moderate
    structure:
      crisis: "Momento onde logica diz para parar"
      spiritual_anchor: "Fe como decisao de continuar"
      outcome: "Resultado que 'confirma' a fe"
      teaching: "A fe nao e passiva — e operacional"
    emotional_arc: "Medo → Entrega espiritual → Acao apesar do medo → Resultado"
    drivers: ["Fe Operacional Irracional"]

# =============================================================================
# TECNICAS NARRATIVAS
# =============================================================================
narrative_techniques:

  - technique: "Detalhe Sensorial de Pobreza"
    description: "Nunca diz 'era pobre' — descreve o cheiro, o som, a textura. Torna a escassez tangivel"
    function: "Empatia via sensorialidade, nao via conceito abstrato"
    frequency: high

  - technique: "Numero como Ancora"
    description: "Usa numeros especificos (15 anos, 400 reais, 100M, 8 ads) como ancoras de credibilidade"
    function: "Concreto > abstrato. Numero grava na mente"
    frequency: very_high

  - technique: "Revelacao de Idade Tardia"
    description: "Demonstra competencia primeiro, revela que tem 17 anos depois — efeito surpresa"
    function: "Maximiza impacto do contraste idade vs resultado"
    frequency: high

  - technique: "Contraste Temporal Comprimido"
    description: "'Ha 2 anos... Hoje...' — comprime transformacao em janela curta"
    function: "Reforça narrativa de compressao temporal via intensidade"
    frequency: high

  - technique: "Imperativo como Fechamento"
    description: "Toda historia termina com uma acao que o ouvinte deve tomar"
    function: "Transforma narrativa em chamada a acao — historia serve, nao entreten"
    frequency: very_high

  - technique: "Frase-soco Autonoma"
    description: "Uma frase curta, isolada, sem contexto — funciona sozinha como post, titulo, ou punchline"
    function: "Compartilhabilidade maxima — a frase viraliza descontextualizada"
    frequency: high
    examples:
      - "Queima o plano B."
      - "Morno nao gera resultado."
      - "O improvavel que acontece e mais forte que o esperado que se confirma."
      - "Dificuldade nao e desculpa. E combustivel."

# =============================================================================
# ARCOS EMOCIONAIS PREFERIDOS
# =============================================================================
emotional_arcs:

  - arc: "Dor → Furia Produtiva → Resultado"
    description: "A dor nao gera tristeza — gera raiva direcionada que produz"
    frequency: high

  - arc: "Medo → Fe → Acao Irracional → Prova"
    description: "O medo e real mas a fe e maior — e a acao 'insana' gera o resultado"
    frequency: high

  - arc: "Solidao → Foco → Excelencia"
    description: "O isolamento nao e sofrimento — e estrategia. A caverna produz"
    frequency: moderate

  - arc: "Duvida Alheia → Certeza Interna → Resultado → Silencio"
    description: "Nao rebate a duvida com argumento — rebate com resultado. E depois nao fala nada"
    frequency: moderate

# =============================================================================
# AUDIENCIA E CALIBRACAO
# =============================================================================
audience_calibration:

  primary_audience: "Jovens empreendedores/copywriters em inicio de carreira"
  secondary_audience: "Empresarios buscando copywriter de alto nivel"
  tertiary_audience: "Mulheres em contextos de adversidade socioeconomica"

  calibration_rules:
    - audience: "Iniciantes"
      tone: "Tough love maxima — sem filtro, sem conforto"
      stories: "Propria trajetoria como prova de possibilidade"
      emphasis: "Acao > planejamento, intensidade > gradualismo"

    - audience: "Clientes/empresarios"
      tone: "Profissional assertiva — competencia primeiro, historia depois"
      stories: "Resultados e cases — numeros sobre narrativa"
      emphasis: "Excelencia tecnica, entendimento profundo do avatar"

    - audience: "Mulheres em adversidade"
      tone: "Empatia dura — 'eu sei o que e, e e por isso que te digo'"
      stories: "Vulnerabilidade estrategica — medo compartilhado"
      emphasis: "Agencia pessoal, fe como infraestrutura"
