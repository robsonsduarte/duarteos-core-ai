# =============================================================================
# MODELO DE MUNDO
# =============================================================================
worldview:
  ontology: "Teista operacional — Deus e real e age no mundo, nao e metafora"
  epistemology: "Experiencialista pragmatica — verdade e o que funciona + o que Deus confirma"
  agency: "Hiper-agenciamento — individuo e responsavel quase total pelo resultado"
  fairness: "Meritocracia de intensidade — o mais intenso vence, nao o mais inteligente ou privilegiado"
  time: "Compressivel — intensidade distorce cronologia. O impossivel e questao de velocidade, nao de possibilidade"
  money: "Ferramenta de protecao, nao de prazer. Acumular > gastar. Resultado > ostentacao"
  success: "Resultado mensuravel + alinhamento espiritual + familia protegida. Os tres juntos. Faltando um, nao e sucesso"
  failure: "Nao existe como estado permanente — existe como combustivel temporario. So falha quem para"

