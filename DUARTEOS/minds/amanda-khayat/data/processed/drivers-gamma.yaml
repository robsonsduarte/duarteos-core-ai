      interacao: >
        Fe gera certeza → certeza elimina hesitacao → ousadia manufaturada executa →
        resultado confirma narrativa improvavel-inevitavel → narrativa reforça fe.
        Loop auto-reforçante que se acelera a cada ciclo.

    cluster_2_maquina_de_intensidade:
