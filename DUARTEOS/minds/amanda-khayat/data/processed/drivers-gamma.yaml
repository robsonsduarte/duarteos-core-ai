  perfil_motivacional_gamma: >
    ANALISE GAMMA — Amanda Khayat e movida por um SISTEMA DE PARADOXOS
    PRODUTIVOS que a maioria das pessoas nao consegue sustentar:
    (1) Fe que reconhece como possivel ilusao MAS usa como combustivel.
    (2) Pobreza vivida que NAO gera vitimismo MAS gera combustivel.
    (3) Queima de opcoes que PARECE impulsividade MAS e calculo frio.
    (4) Intensidade que PARECE hustle MAS e tese sobre compressao temporal.
    (5) Excelencia que PARECE perfeccionismo MAS e identidade.
    A capacidade de SUSTENTAR paradoxos sem resolve-los e o meta-driver
    que diferencia Amanda de outros empreendedores jovens.

  diferenciadores_kahneman: >
    Drivers REMOVIDOS por base rate alto (>80% na populacao-alvo):
    - "Querer ficar rica" — prevalencia universal em empreendedores
    - "Gostar de reconhecimento" — prevalencia universal em criadores
    - "Querer ajudar pessoas" — prevalencia universal em auto-relatos
    - "Ter disciplina" — prevalencia alta em top performers
    - "Ser resiliente" — prevalencia alta em empreendedores (todos dizem isso)
    Drivers MANTIDOS por serem ANOMALOS na populacao:
    - Fe operacional (nao passiva) como MOTOR de decisao empresarial
    - Transmutacao (nao mera resiliencia) de escassez em combustivel
    - Queima SISTEMATICA de opcoes (maioria ACUMULA opcoes)
    - Compressao temporal como TESE (nao mero workaholic)
    - Excelencia como IDENTIDADE (nao mera meta profissional)
    - Ousadia como PRODUTO MANUFATURADO (nao traco inato)

  cluster_analysis_gamma:
    cluster_1_motor_espiritual_identitario:
      nome: "Sistema de Certezas Irracionais"
