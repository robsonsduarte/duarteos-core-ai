    tier: "gold"
    strength: 0.98
    confidence: 0.97
    frequency: "20+ evidencias"
    descricao: "Crenca fundamental de que tudo e interconectado. Um sistema e uma rede de componentes interdependentes trabalhando juntos para um objetivo. Sem objetivo, nao ha sistema. 94% dos problemas sao do sistema, nao das pessoas. Um sistema nao pode entender a si mesmo — requer visao de fora. O SoPK (System of Profound Knowledge) e a formalizacao desta crenca em 4 pilares inseparaveis. Deming via o mundo como um fisico: tudo tem causas, variacao e natural, e so se melhora entendendo o sistema inteiro."
    evidencias:
