    confidence: 0.98
    frequency: "15+ evidencias"
    descricao: "Motor primario mais antigo — nascido na pobreza rural de Powell, Wyoming, Deming internalizou um odio visceral ao desperdicio que permeou toda a sua filosofia. Nao era apenas sobre eficiencia economica — era um imperativo moral. Desperdicio de materiais, de tempo, de conhecimento, de potencial humano. Marcava ovos com data, dirigia carro de 1969, tomava onibus. A frugalidade pessoal era reflexo de uma filosofia universal: nenhum recurso deve ser desperdicado, especialmente o conhecimento humano."
    evidencias:
