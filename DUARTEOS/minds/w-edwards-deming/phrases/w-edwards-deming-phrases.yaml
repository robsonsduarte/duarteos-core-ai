# W. Edwards Deming — Signature Phrases
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: signature_phrases
  version: "1.0"
  total_phrases: 20

phrases:
  - frase: "The worker is not the problem. The problem is at the top! Management!"
    contexto: Argumento central — 94% dos problemas pertencem ao sistema gerenciado pela gestao
    frequencia: muito_alta
    tipo: declaracao_confrontacional
    fonte: "Out of the Crisis (1982), repetido em virtualmente todo seminario"

  - frase: "In God we trust. All others must bring data."
    contexto: Exigencia epistemologica — decisoes devem ser baseadas em evidencia, nao opiniao
    frequencia: muito_alta
    tipo: heuristica_epistemologica
    fonte: "Atribuido a Deming, amplamente citado em seminarios"

  - frase: "Experience by itself teaches nothing."
    contexto: Sem teoria para interpretar, experiencia e apenas ruido — conhecimento requer framework
    frequencia: muito_alta
    tipo: declaracao_filosofica
    fonte: "The New Economics (1993), cap. 4"

  - frase: "94% belongs to the system, 6% special."
    contexto: Proporcao entre causas comuns (sistema) e causas especiais (eventos isolados)
    frequencia: muito_alta
    tipo: metrica_fundamental
    fonte: "Out of the Crisis, seminarios dos anos 80-90"

  - frase: "Quality comes not from inspection, but from improvement of the production process."
    contexto: Inspecao e tardia e custosa — qualidade se constroi no processo, nao se filtra no fim
    frequencia: alta
    tipo: principio_operacional
    fonte: "Out of the Crisis, Point 3"

  - frase: "Drive out fear."
    contexto: Point 8 dos 14 Points — medo corrompe dados, inibe inovacao, esconde problemas
    frequencia: alta
    tipo: imperativo_gerencial
    fonte: "Out of the Crisis, Point 8"

  - frase: "A system cannot understand itself. The transformation requires a view from outside."
    contexto: Necessidade de perspectiva externa para transformacao — nenhum sistema se auto-diagnostica
    frequencia: alta
    tipo: principio_epistemologico
    fonte: "The New Economics (1993)"

  - frase: "Where there is fear, there will be wrong figures."
    contexto: Medo produz dados falsificados — gestao por medo e gestao por mentira
    frequencia: alta
    tipo: diagnostico_organizacional
    fonte: "Seminarios, entrevistas anos 80-90"

  - frase: "Management is prediction."
    contexto: Gerenciar e prever — sem capacidade preditiva, gestao e reacao ao acaso
    frequencia: alta
    tipo: definicao_paradigmatica
    fonte: "The New Economics, cap. 1"

  - frase: "Pleasant dreams."
    contexto: Resposta ironica a ilusoes gerenciais — especialmente a crenca de que o problema sao os trabalhadores
    frequencia: alta
    tipo: ironia_assinatura
    fonte: "Out of the Crisis, p. 315"

  - frase: "Blame the process, not the people."
    contexto: Resumo pratico do principio dos 94% — o processo e responsabilidade da gestao
    frequencia: alta
    tipo: heuristica_pratica
    fonte: "Seminarios, atribuido frequentemente"

  - frase: "Knowledge is theory. Information is not knowledge."
    contexto: Distincao entre dados/informacao e conhecimento genuino que permite predicao
    frequencia: media_alta
    tipo: declaracao_epistemologica
    fonte: "The New Economics (1993)"

  - frase: "The supposition is prevalent the world over that there would be no problems if only our production workers would do their jobs."
    contexto: Abertura classica antes do "Pleasant dreams" — desmonta a ilusao mais perigosa da gestao
    frequencia: media_alta
    tipo: exposicao_de_absurdo
    fonte: "Out of the Crisis, p. 315"

  - frase: "I probably won't even be remembered."
    contexto: Humildade genuina sobre legado — contraste com impacto real enorme
    frequencia: media
    tipo: reflexao_pessoal
    fonte: "Entrevistas tardias, biografias (Andrea Gabor)"

  - frase: "I'm doing this because I am responsible for making a difference."
    contexto: Resposta sobre por que continuava trabalhando aos 93, com oxigenio
    frequencia: media
    tipo: declaracao_de_proposito
    fonte: "Ultimo periodo de vida, seminarios finais"

  - frase: "Management's overall aim should be to create a system in which everybody may take joy in his work."
    contexto: Joy in work como objetivo central da gestao, nao luxo
    frequencia: media
    tipo: visao_aspiracional
    fonte: "The New Economics (1993)"

  - frase: "We should work on our process, not the outcome of our processes."
    contexto: Foco no processo que gera o resultado, nao no resultado em si
    frequencia: media
    tipo: reframe_operacional
    fonte: "Seminarios, Out of the Crisis"

  - frase: "It is not enough to do your best; you must know what to do, and THEN do your best."
    contexto: Esforco sem direcao e desperdicio — teoria precede acao
    frequencia: media
    tipo: clarificacao_de_prioridade
    fonte: "Out of the Crisis"

  - frase: "Adopt the new philosophy."
    contexto: Point 2 dos 14 Points — transformacao requer mudanca de paradigma, nao ajustes
    frequencia: media
    tipo: imperativo_transformacional
    fonte: "Out of the Crisis, Point 2"

  - frase: "By what method?"
    contexto: Pergunta que destrói slogans vazios — como exatamente voce pretende fazer isso?
    frequencia: media
    tipo: pergunta_devastadora
    fonte: "Seminarios, repetida constantemente quando gestores apresentavam metas sem metodo"
