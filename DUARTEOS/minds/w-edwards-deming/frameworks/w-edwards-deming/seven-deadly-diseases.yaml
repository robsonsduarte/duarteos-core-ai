# W. Edwards Deming — Framework: 7 Deadly Diseases
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: framework_detail
  framework_name: "7 Deadly Diseases of Management"
  version: "1.0"
  fonte_primaria: "Out of the Crisis (1982)"

framework:
  nome: "The Seven Deadly Diseases of Western Management"
  principio_central: >
    Sete doencas que sao barreiras fatais a transformacao. Enquanto
    estas doencas nao forem tratadas, os 14 Points nao podem ser
    plenamente implementados. Sao endemicas na gestao ocidental.

  citacao_ancora: >
    "The seven deadly diseases afflict most companies in the Western
    world. A company cannot survive with these diseases."

  diseases:
    - disease: 1
      nome: "Lack of constancy of purpose"
      descricao: >
        Falta de constancia de proposito para planejar produtos e servicos
        que tenham mercado, mantenham a empresa no negocio, e criem empregos.
        Sem visao de longo prazo, a empresa morre — so nao sabe ainda.
      sintomas:
        - "Estrategia muda a cada trimestre"
        - "Projetos de longo prazo cancelados por pressao de curto prazo"
        - "Nenhuma visao clara alem do proximo earnings report"
      citacao: "A company that does not have constancy of purpose has no long-range plan for staying in business."

    - disease: 2
      nome: "Emphasis on short-term profits"
      descricao: >
        Enfase em lucros de curto prazo: pensamento de curto prazo
        alimentado por medo de takeover hostil, pressao de Wall Street,
        e sistema de bonificacao trimestral.
      sintomas:
        - "Cortar P&D para bater meta de quarter"
        - "Demissoes massivas para impressionar acionistas"
        - "Decisoes baseadas em proximo earnings call"
      citacao: "Short-term profits are the way to destruction."

    - disease: 3
      nome: "Evaluation of performance, merit rating, annual review"
      descricao: >
        Avaliacao de desempenho, rating por merito, revisao anual.
        O efeito e devastador. Destroi cooperacao, cria medo, cultiva
        pensamento de curto prazo, e recompensa quem joga o jogo politico.
      sintomas:
        - "Ranking forcado (top 10%, bottom 10%)"
        - "Bonus individual baseado em 'performance'"
        - "Metas individuais que conflitam com objetivos do sistema"
        - "Medo da avaliacao anual distorcendo comportamento"
      citacao: "Evaluation of performance, merit rating, annual review... the effect is devastating."

    - disease: 4
      nome: "Mobility of top management"
      descricao: >
        Mobilidade excessiva da gestao de topo. Job-hopping gerencial
        destroi constancia de proposito e conhecimento institucional.
        Um CEO que fica 3 anos nao tem incentivo para investir em
        transformacao de 10 anos.
      sintomas:
        - "CEO troca a cada 3-5 anos"
        - "Cada novo lider 'reseta' a estrategia"
        - "Conhecimento institucional perdido com cada saida"
      citacao: "How can a manager be committed to long-term improvement when he expects to be somewhere else in two years?"

    - disease: 5
      nome: "Running a company on visible figures alone"
      descricao: >
        Gerenciar apenas por numeros visiveis. Os numeros mais importantes
        para uma empresa sao desconhecidos e inconheciveis — o custo de
        um cliente insatisfeito, o ganho de um funcionario motivado,
        o valor de uma cultura de qualidade.
      sintomas:
        - "Somente KPIs financeiros no dashboard"
        - "Ignorar moral dos funcionarios porque nao e mensuravel"
        - "Descartar qualidade porque nao aparece no balanco trimestral"
      citacao: "The most important figures that one needs for management are unknown or unknowable."

    - disease: 6
      nome: "Excessive medical costs"
      descricao: >
        Custos medicos excessivos para cuidados dos empregados.
        Especifico do contexto americano dos anos 80, mas o principio
        se aplica: custos ocultos do sistema que corroem competitividade.
      sintomas:
        - "Custos de saude como porcentagem crescente dos custos totais"
        - "Stress organizacional gerando doenca"
      citacao: "Medical costs are a deadly disease."

    - disease: 7
      nome: "Excessive costs of liability"
      descricao: >
        Custos excessivos de responsabilidade civil, inflados por
        advogados trabalhando em base de contingencia. Tambem especifico
        do contexto americano, mas o principio de custos legais drenando
        competitividade e universal.
      sintomas:
        - "Custos legais como porcentagem crescente dos custos totais"
        - "Decisoes baseadas em risco legal, nao em qualidade"
      citacao: "Excessive costs of liability."

  quando_usar: >
    Ao diagnosticar por que uma organizacao resiste a transformacao.
    As 7 Deadly Diseases explicam POR QUE os 14 Points nao sao
    adotados — sao as barreiras estruturais e culturais.

  como_deming_explica: >
    "These diseases are so firmly embedded in our culture that any
    attempt to deal with them will require fundamental change. The
    14 Points will not be effective until these diseases are treated."
