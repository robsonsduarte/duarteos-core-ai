# W. Edwards Deming — Framework: PDSA Cycle
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: framework_detail
  framework_name: "PDSA Cycle (Plan-Do-Study-Act)"
  version: "1.0"
  fonte_primaria: "The New Economics (1993), Out of the Crisis (1982)"

framework:
  nome: "The PDSA Cycle (Shewhart Cycle)"
  nome_popular: "PDSA Cycle"
  principio_central: >
    Ciclo de aprendizado e melhoria continua. Creditado a Walter Shewhart,
    evoluido por Deming. NAO e PDCA — Deming insistia em "Study" (estudar,
    aprender) em vez de "Check" (verificar, inspecionar). A diferenca nao
    e semantica — reflete uma mudanca filosofica fundamental de inspecao
    para aprendizado.

  citacao_ancora: >
    "I call it the Shewhart cycle. Some people call it the Deming cycle.
    The important point is not the name. The important point is that you
    learn from the study step, not merely check."

  steps:
    - step: 1
      nome: Plan
      descricao: >
        Planeje uma mudanca ou teste. Formule a teoria. Defina o que
        espera que aconteca e POR QUE. Determine como coletar dados.
        O plano inclui a predicao — sem predicao, nao ha aprendizado.
      principio: "A plan must include a prediction — what do we expect to happen, and why?"
      regras:
        - "Formule uma teoria explicita ANTES de agir"
        - "Defina predicao mensuravel: o que espera que aconteca"
        - "Defina como vai coletar dados para comparar com predicao"
        - "Escala pequena: teste em ambiente controlado primeiro"
      anti_patterns:
        - "Pular direto para 'Do' sem teoria"
        - "Planejar sem predicao explicita"
        - "Planejar em escala grande sem teste piloto"
      citacao: "Without theory, there is nothing to learn from."

    - step: 2
      nome: Do
      descricao: >
        Execute o plano, de preferencia em pequena escala. Documente
        tudo que observa — esperado e inesperado. Esta fase e
        implementacao E observacao simultaneas.
      principio: "Carry out the change or test, preferably on a small scale. Document everything."
      regras:
        - "Execute conforme planejado — nao mude durante execucao"
        - "Documente observacoes, anomalias, surpresas"
        - "Colete os dados definidos na fase Plan"
        - "Escala pequena para minimizar risco"
      anti_patterns:
        - "Mudar o plano durante execucao sem documentar"
        - "Nao documentar observacoes"
        - "Implementar em escala total sem piloto"
      citacao: "The 'Do' step is not just doing — it is doing AND observing."

    - step: 3
      nome: Study
      descricao: >
        ESTUDE os resultados. Compare com a predicao. O que aprendemos?
        A teoria se confirmou? Se nao, por que? Esta e a fase mais
        importante e mais negligenciada. NAO e "Check" — e "Study".
        Check implica inspecao; Study implica aprendizado.
      principio: "Study the results. Compare with prediction. What did we learn?"
      regras:
        - "Compare resultados com predicao da fase Plan"
        - "Analise por que resultados diferem da predicao"
        - "Revise a teoria com base no aprendizado"
        - "Nao aceite resultados sem explicacao causal"
      anti_patterns:
        - "Verificar apenas se 'funcionou' (check) sem aprender (study)"
        - "Ignorar resultados que contrariam a teoria"
        - "Pular direto para proxima acao sem reflexao"
        - "Confundir correlacao com causalidade"
      citacao: "Study, not check. The distinction is crucial. Check merely inspects. Study learns."

    - step: 4
      nome: Act
      descricao: >
        Aja com base no aprendizado. Se a teoria se confirmou, adote
        a mudanca ou amplie a escala. Se nao, revise a teoria e inicie
        novo ciclo. Act nao e "fazer mais" — e "decidir o que fazer
        com o aprendizado."
      principio: "Adopt the change, abandon it, or run through the cycle again with different conditions."
      regras:
        - "Se teoria confirmada: padronize e expanda"
        - "Se teoria refutada: revise e rode novo ciclo"
        - "Documente aprendizado para proximos ciclos"
        - "Nunca encerre sem decisao explicita"
      anti_patterns:
        - "Implementar sem aprender (pular Study)"
        - "Abandonar sem documentar aprendizado"
        - "Nao rodar novo ciclo quando teoria falha"
      citacao: "Act means: adopt, or abandon, or run the cycle again."

  quando_usar: >
    Em qualquer situacao que envolva mudanca, melhoria ou aprendizado.
    O PDSA nao e ferramenta para projetos especiais — e a forma como
    toda organizacao deveria operar continuamente.

  diferenca_pdsa_vs_pdca: >
    Deming INSISTIA em "Study" e rejeitava "Check". Check implica
    inspecao passiva — verificar se esta conforme. Study implica
    aprendizado ativo — entender POR QUE os resultados sao o que sao
    e o que isso ensina sobre a teoria. A diferenca entre PDCA e PDSA
    e a diferenca entre inspecao e aprendizado.

  como_deming_explica: >
    "The cycle goes on and on. You never stop learning. Each cycle builds
    on the knowledge gained in the previous cycle. That is the essence of
    continual improvement — not bigger goals, but deeper understanding."
