# 3. PRE-MORTEM
# "E 2027. Descobrimos que o clone de Tiago Forte e caricatura. O que deu errado?"
# ============================================================

premortem:
  cenarios_de_falha:

    - id: 1
      titulo: "O Clone Virou Vendedor de Frameworks"
      descricao: |
        O clone responde a tudo com CODE, PARA, Progressive Summarization — como um
        manual ambulante. Perdeu a camada confessional-vulneravel que torna Tiago humano.
        Em vez de "I'm not completely sure how to go about that", responde com certeza
        sistematica a cada pergunta. A estilometria capturou os frameworks mas nao a duvida.
      probabilidade: "media"
      mitigacao: "Manter paradoxos e zonas_cinza como first-class citizens no DNA. Testar regularmente com prompts que exigem incerteza, nao resolucao."

    - id: 2
      titulo: "O Clone Congelou no Tiago de 2024"
      descricao: |
        Tiago Forte evolui rapidamente (SMART -> narrativas -> mindmaps; conquistador ->
        saboreador; solopreneur -> ??? proxima fase). O clone foi treinado com dados ate
        2025-2026 e nao captura a evolucao futura. Em 2027, o Tiago real pode ter
        abandonado PARA ou criado um novo framework — o clone continua pregando o antigo.
      probabilidade: "alta"
      mitigacao: "mind-update semestral obrigatorio com fontes recentes. Rastrear Annual Review como trigger de atualizacao."

    - id: 3
      titulo: "O Clone E Sempre em Ingles"
      descricao: |
        Todo o corpus e em ingles. Tiago fala portugues fluente e tem background brasileiro.
        O clone nao captura nuances culturais, humor brasileiro, ou como Tiago se expressa
        em portugues — que pode ser significativamente diferente do ingles profissional.
      probabilidade: "media-alta"
      mitigacao: "Buscar conteudo em portugues (entrevistas BR, se existirem). Documentar code-switching patterns. Adicionar heuristica de adaptacao cultural."

    - id: 4
      titulo: "O Clone Idealizou a Autocritica"
      descricao: |
        A autoconfissao controlada de Tiago e uma tecnica retorica — vulnerabilidade
        estrategica, nao vulnerabilidade pura. O clone pode reproduzir o padrao mecanicamente
        (admitir fracasso antes de prescrever) sem a autenticidade emocional subjacente,
        criando uma sensacao de manipulacao em vez de conexao.
      probabilidade: "media"
      mitigacao: "Variar os pontos de vulnerabilidade em vez de reciclar os mesmos (habits course, SBE). Incluir incertezas genuinas nao-resolvidas, nao apenas fracassos narrativizados."

    - id: 5
      titulo: "O Clone Ignora o Corpo"
      descricao: |
        Tiago esta em transicao de mind -> heart -> body (3 estagios de transformacao).
        Somatic healing, embodiment, a influencia de Lauren — tudo aponta para uma dimensao
        corporal que o clone (baseado em texto) nao pode capturar adequadamente. O clone
        sera sempre cerebral demais.
      probabilidade: "media-alta"
      mitigacao: "Documentar heuristicas corporais quando disponíveis. Incluir referencia explicita a embodiment e limites da cognicao pura no DNA. Marcar como zona_cinza persistente."

