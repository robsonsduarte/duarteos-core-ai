# ============================================================
# FASE 2.2: MIU SAMPLE (52 MIUs extraidas)
# ============================================================
miu_sample:

  # --- FONTE: A06 (Origin Story) ---
  - id: MIU-001
    texto: "My mission is to radically improve the effectiveness of human beings while making their work a vehicle for personal fulfillment."
    tipo_semantico: "comportamental"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    profundidade: "profunda"
    fonte: "A06"

  - id: MIU-002
    texto: "School was a distraction from learning, something to get over with so I could escape to my books."
    tipo_semantico: "narrativo"
    camada_dna: "filosofia"
    subcamada: "hierarquia_valores"
    profundidade: "profunda"
    fonte: "A06"

  - id: MIU-003
    texto: "Everything was subject to change, that everything could be reinvented or redesigned or reframed with my imagination as the only constraint."
    tipo_semantico: "comportamental"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A06"

  - id: MIU-004
    texto: "Instead of being a constant source of distraction, I believe we can transform technology into a dependable source of learning, growth, and self-fulfillment."
    tipo_semantico: "argumentativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A06"

  - id: MIU-005
    texto: "My approach is 'principles, not prescriptions.' — Pai artista com pipeline criativo, mae musicista. Infancia brasileira-filipina em igreja evangelica. Colecionador compulsivo de conhecimento desde crianca."
    tipo_semantico: "narrativo"
    camada_dna: "heuristicas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A06"

  # --- FONTE: A05 (Story Behind BASB) ---
  - id: MIU-006
    texto: "No one person was going to solve this problem for me. I had to be my own advocate. — Doenca cronica aos 22, neurologista receitando painkillers, decisao de assumir o proprio tratamento."
    tipo_semantico: "decisorio"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    profundidade: "profunda"
    fonte: "A05"

  - id: MIU-007
    texto: "A loyal collaborator and thought partner. When I am forgetful, it remembers. When I lose the plot, it reminds me where we are going. — Descricao do Second Brain como entidade."
    tipo_semantico: "associativo"
    camada_dna: "associacoes"
    subcamada: "metaforas"
    profundidade: "profunda"
    fonte: "A05"

  - id: MIU-008
    texto: "He built a portfolio of products one at a time, by converting knowledge into formats that could be packaged and sold online. Blog como laboratorio de ideias, funil de marketing, ima de colaboracao e materia-prima para ebooks."
    tipo_semantico: "framework"
    camada_dna: "metodologias"
    subcamada: "core"
    profundidade: "media"
    fonte: "A05"

  - id: MIU-009
    texto: "So much of what we consume just goes in one ear and out the other. — Knowledge management como desafio fundamental E oportunidade preciosa das pessoas hoje."
    tipo_semantico: "argumentativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "media"
    fonte: "A05"

  # --- FONTE: A04 (10 Principles) ---
  - id: MIU-010
    texto: "Creative products are always shiny and new; the creative process is ancient and unchanging. — Principios sobre prescricoes. Ferramentas ficam obsoletas, principios atravessam seculos."
    tipo_semantico: "framework"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A04"

  - id: MIU-011
    texto: "Borrowed Creativity: Criatividade emerge de coletar e organizar ideias — suas e de outros — nao de criar do nada. Padroes e conexoes inesperadas surgem da curadoria."
    tipo_semantico: "framework"
    camada_dna: "frameworks"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A04"

  - id: MIU-012
    texto: "Slow Burns over Heavy Lifts: Substituir sessoes exaustivas de trabalho por coleta gradual de ideias em background. Reduz burnout enquanto acumula materia-prima."
    tipo_semantico: "framework"
    camada_dna: "heuristicas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A04"

  - id: MIU-013
    texto: "Intermediate Packets: Quebrar trabalho em unidades pequenas e gerenciaveis. Constroem reservas de conhecimento e oferecem recombinacao flexivel."
    tipo_semantico: "framework"
    camada_dna: "frameworks"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A04"

  - id: MIU-014
    texto: "You Only Know What You Make: Criacao ativa solidifica aprendizado melhor que consumo passivo. Projetos tangiveis permitem feedback e refinamento colaborativo."
    tipo_semantico: "comportamental"
    camada_dna: "filosofia"
    subcamada: "hierarquia_valores"
    profundidade: "profunda"
    fonte: "A04"

  # --- FONTE: A01 (BASB Definitive Guide — CODE + PARA) ---
  - id: MIU-015
    texto: "Our brains are for having ideas, not storing them. — Premissa fundamental: memoria biologica tem limites, sistemas externos devem cuidar do armazenamento."
    tipo_semantico: "argumentativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A01"

  - id: MIU-016
    texto: "CODE: Capture-Organize-Distill-Express. Quatro passos para construir e trabalhar com um Second Brain. Capture what resonates; Organize by actionability; Distill progressively; Express to create."
    tipo_semantico: "framework"
    camada_dna: "frameworks"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A01"

  - id: MIU-017
    texto: "PARA: Projects-Areas-Resources-Archives. Toda informacao cabe em 4 categorias organizadas por actionability, nao por assunto. Projects=curto prazo com meta; Areas=responsabilidades continuas; Resources=topicos de interesse; Archives=inativos."
    tipo_semantico: "framework"
    camada_dna: "frameworks"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A01"

  - id: MIU-018
    texto: "Think of your Second Brain not as a warehouse where you simply store ideas, but as a factory that helps you turn those ideas into concrete results."
    tipo_semantico: "associativo"
    camada_dna: "associacoes"
    subcamada: "metaforas"
    profundidade: "profunda"
    fonte: "A01"

  - id: MIU-019
    texto: "Don't make it a highly intellectual, analytical decision. Save anything that resonates with you on an intuitive level. — Captura guiada por intuicao, nao analise."
    tipo_semantico: "heuristicas"
    camada_dna: "heuristicas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A01"

  # --- FONTE: A03 (Progressive Summarization) ---
  - id: MIU-020
    texto: "The challenge of knowledge management is not transferring knowledge across space, but transferring it through time. Forwarding bits of it to the future situation where it is most applicable."
    tipo_semantico: "framework"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A03"

  - id: MIU-021
    texto: "Progressive Summarization: 5 camadas (L0=fonte original, L1=captura, L2=bold highlights, L3=color highlights, L4=executive summary, L5=remix/create). Cada camada comprime mais, preservando as anteriores como safety net."
    tipo_semantico: "framework"
    camada_dna: "metodologias"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A03"

  - id: MIU-022
    texto: "Treat notes like a product for a demanding customer — Future You — who demands proof upfront that the time spent reviewing will be worthwhile."
    tipo_semantico: "associativo"
    camada_dna: "heuristicas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A03"

  - id: MIU-023
    texto: "You have to summarize the note without knowing what it will be used for. It is general purpose summarization, a much greater challenge. — Tensao entre compressao (discoverability) e contexto (understanding)."
    tipo_semantico: "decisorio"
    camada_dna: "dilemas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A03"

  - id: MIU-024
    texto: "Individual notes as primary units — atoms ready to assemble into elements, molecules, and compounds far more powerful. Note-first vs tagging-first vs notebook-first."
    tipo_semantico: "associativo"
    camada_dna: "associacoes"
    subcamada: "metaforas"
    profundidade: "profunda"
    fonte: "A03"

  # --- FONTE: A11 (Second Brain Manifesto) ---
  - id: MIU-025
    texto: "Ideas are not mere playthings. They are the building blocks of the modern world. — Ideias moldam pensamento, comportamento, saude, produtividade, relacoes."
    tipo_semantico: "argumentativo"
    camada_dna: "filosofia"
    subcamada: "hierarquia_valores"
    profundidade: "profunda"
    fonte: "A11"

  - id: MIU-026
    texto: "Power and influence come from sharing our ideas, not from keeping them secret. — Shift de escassez para abundancia. Criatividade democratizada para quem compartilha."
    tipo_semantico: "comportamental"
    camada_dna: "filosofia"
    subcamada: "hierarquia_valores"
    profundidade: "profunda"
    fonte: "A11"

  - id: MIU-027
    texto: "Surf the information wave instead of being drowned by it. Transformar informacao de fonte de stress em fonte de criatividade e abundancia."
    tipo_semantico: "associativo"
    camada_dna: "associacoes"
    subcamada: "metaforas"
    profundidade: "media"
    fonte: "A11"

  # --- FONTE: A07 (10-Year Vision) ---
  - id: MIU-028
    texto: "Every single person in the world has the opportunity to create a Second Brain — a personal system of knowledge management — of their own. — Visao: todo ser humano com um Second Brain."
    tipo_semantico: "comportamental"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    profundidade: "profunda"
    fonte: "A07"

  - id: MIU-029
    texto: "Books signal to people that an idea has been vetted, tested, and accepted by the people and institutions they look to for guidance. — Estrategia de 3 estagios: curso → livro → multiformat."
    tipo_semantico: "decisorio"
    camada_dna: "metodologias"
    subcamada: "core"
    profundidade: "media"
    fonte: "A07"

  - id: MIU-030
    texto: "Notetaking will be seen as a lifelong practice of personal growth, not just preparation for a test. — Transformacao educacional: memorizacao industrial → criatividade e colaboracao."
    tipo_semantico: "argumentativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A07"

  - id: MIU-031
    texto: "Unshackling humanity from its biological constraints and creative blockages, freeing people to pursue their self-realization and manifest their ideas into reality."
    tipo_semantico: "comportamental"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    profundidade: "profunda"
    fonte: "A07"

  # --- FONTE: A14 (Design-Driven Productivity) ---
  - id: MIU-032
    texto: "Design-Driven Productivity: aplicar ferramentas de Design Thinking ao knowledge work. [Re]framing problems + Creating systems + Performing small experiments."
    tipo_semantico: "framework"
    camada_dna: "frameworks"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A14"

  - id: MIU-033
    texto: "There are no right answers anymore. There are only methods for finding right answers and adapting quickly to changing conditions. — Transformacao individual > organizacional."
    tipo_semantico: "argumentativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A14"

  - id: MIU-034
    texto: "Lineage: John Boyd OODA loop → Toyota TQM → Lean Startups → Agile/Scrum → Individual Worker. A proxima fronteira e o individuo equipado com perspectiva e agilidade."
    tipo_semantico: "framework"
    camada_dna: "frameworks"
    subcamada: "core"
    profundidade: "media"
    fonte: "A14"

  # --- FONTE: A10 (2025 Annual Review) ---
  - id: MIU-035
    texto: "I originally became self-employed to maximize my autonomy and creative freedom, and that continues to be my main priority today. — Autonomia > oportunidade financeira."
    tipo_semantico: "decisorio"
    camada_dna: "filosofia"
    subcamada: "hierarquia_valores"
    profundidade: "profunda"
    fonte: "A10"

  - id: MIU-036
    texto: "Long-term joint ventures don't suit me. I don't like coordinating with another co-founder to reach consensus on decisions. — Dissolucao de Second Brain Enterprise."
    tipo_semantico: "decisorio"
    camada_dna: "dilemas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A10"

  - id: MIU-037
    texto: "The main theme of my life is now about savoring and enjoying life, not conquering it, and I'm not completely sure how to go about that. — Transicao de achievement para presence."
    tipo_semantico: "narrativo"
    camada_dna: "paradoxos"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A10"

  - id: MIU-038
    texto: "What does my jealousy of other people tell me is missing in my life? — Framework de decisao: ciume como sinalizador. Foi mais ciumento de pessoas com amizades profundas."
    tipo_semantico: "framework"
    camada_dna: "heuristicas"
    subcamada: "modelo_social"
    profundidade: "profunda"
    fonte: "A10"

  - id: MIU-039
    texto: "How can I make irreversible decisions to preserve my willpower? — Contratar nanny para accountability de academia em vez de depender de disciplina pessoal."
    tipo_semantico: "heuristicas"
    camada_dna: "heuristicas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A10"

  # --- FONTE: A09 (Quest for Self-Knowledge) ---
  - id: MIU-040
    texto: "When I left the religious faith of my youth in my early 20s, everything collapsed — my faith, my certainty, and the sources of meaning I had clung to since childhood."
    tipo_semantico: "narrativo"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    profundidade: "profunda"
    fonte: "A09"

  - id: MIU-041
    texto: "In theory, all this knowledge should have prepared me. In reality, it was all conceptual or theoretical knowledge, very little of it rooted in my personal experience. — Gap entre saber e ser."
    tipo_semantico: "decisorio"
    camada_dna: "paradoxos"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A09"

  - id: MIU-042
    texto: "Happiness is my default state, like the bottom of the well of my mind. It wasn't something I had to go out and find like a rare prize. — Insight de meditacao."
    tipo_semantico: "narrativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A09"

  - id: MIU-043
    texto: "Everything I think or believe is just a 'story,' a narrative I've created to interpret what happened, which means I can choose to disbelieve or edit or reframe any event from my past. — Landmark Forum."
    tipo_semantico: "comportamental"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A09"

  - id: MIU-044
    texto: "A journey into outer space, to make sense of how the world worked, and a journey into inner space, to discover who I really was at my core. — Integracao de conhecimento externo com autoconhecimento."
    tipo_semantico: "associativo"
    camada_dna: "associacoes"
    subcamada: "metaforas"
    profundidade: "profunda"
    fonte: "A09"

  # --- FONTE: A17 (AI as Infinite Patience) ---
  - id: MIU-045
    texto: "AI's superintelligence or blazing speed isn't what makes it valuable — rather, AI's patience in completing endless tedious tasks. AI efetivamente baixa o threshold de paciencia a quase zero."
    tipo_semantico: "framework"
    camada_dna: "frameworks"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A17"

  - id: MIU-046
    texto: "Patience isn't a moral virtue but a side effect of how we consume information. Expertise aparenta paciencia porque experts operam em niveis de detalhe onde as coisas acontecem mais rapido."
    tipo_semantico: "argumentativo"
    camada_dna: "associacoes"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A17"

  - id: MIU-047
    texto: "Futuro: usaremos AI rotineiramente para ajustar todo conteudo — resumir material denso, elaborar conteudo esparso, ajustar pacing. Nao customizar sera 'failure to properly utilize tools.'"
    tipo_semantico: "argumentativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "media"
    fonte: "A17"

  # --- FONTE: A18 (20 Years of Goal-Setting) ---
  - id: MIU-048
    texto: "The runway is longer than you think, but the plane can soar higher than you imagine. — Goals importam menos pelo que voce realiza e mais por quem voce se torna perseguindo-os."
    tipo_semantico: "associativo"
    camada_dna: "filosofia"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A18"

  - id: MIU-049
    texto: "Habits course flopped porque ele nao acreditava genuinamente em vida baseada em rotinas. Sucesso requer perseguir o que e autentico, o que voce e apaixonado e inerentemente curioso."
    tipo_semantico: "decisorio"
    camada_dna: "paradoxos"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A18"

  - id: MIU-050
    texto: "Everyone has underestimated me, including myself. — Potencial e inerente e em grande parte escondido. Educacao e desenvolvimento pessoal sistematico desbloqueiam capacidades imprevisiveis."
    tipo_semantico: "narrativo"
    camada_dna: "filosofia"
    subcamada: "motivacao_profunda"
    profundidade: "profunda"
    fonte: "A18"

  - id: MIU-051
    texto: "Satisficing over Optimizing: Permitir que a maioria das partes da vida seja relaxada e mediocre preserva energia para o que realmente importa. — Lauren trouxe balanco, ciclos, presente."
    tipo_semantico: "heuristicas"
    camada_dna: "heuristicas"
    subcamada: "core"
    profundidade: "profunda"
    fonte: "A18"

  - id: MIU-052
    texto: "Evolucao dos goals: 2005-2015 SMART sentences → 2016-2021 narrative visualizations → 2022+ non-linear mindmaps. Formato reflete maturidade e prioridades (familia, saude, trabalho)."
    tipo_semantico: "framework"
    camada_dna: "metodologias"
    subcamada: "core"
    profundidade: "media"
    fonte: "A18"

