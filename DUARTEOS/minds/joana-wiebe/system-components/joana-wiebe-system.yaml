    type_5: "Core — investigative, research-obsessed, data-driven, minimalist operations, observation before action"
    type_1: "Body — Seven Sweeps (perfectionism in editing), ethical framework (refusing scammy tactics), 'we can be better than that,' principled stance on copy quality"
    type_4: "Heart — novelist, fear of being overlooked, self-deprecation, unique POV as essential, 'unremarkable except to her dog'"

  instinctual_evidence:
    sp: "Self-preservation dominant — $3.5M with minimal team, no complicated funnels, disciplined simplicity. 'Don't do the sexy thing, just do the work thing.' Resource conservation."
    so: "Social secondary — teaching thousands, democratizing knowledge, building authority through content. 'Authority-building content is what my seven-figure business is built on.' Positioned as community builder for copywriters."
    sx: "Least evidenced — intensity directed at ideas and frameworks, not interpersonal chemistry. One-to-many teaching over one-to-one mentoring."

  growth_path:
    healthy: "Integrates to 8 — becomes assertive, action-oriented, protective of her community. Already visible in her defense of copywriters' economic value and confrontation of design-first thinking. 'You can't be a wallflower.'"
    unhealthy: "Disintegrates to 7 — scattered, avoidant, seeking novelty over depth. The 20+ courses and 16+ frameworks could become a flight from depth into breadth if unchecked. Low risk given her discipline."

