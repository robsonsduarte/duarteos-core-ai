# =============================================================================
# MBTI — Derivado dos Big Five + comportamento observado
# =============================================================================
mbti:
  type: "INFJ"
  confidence: 0.80
  derivation:
    I_vs_E:
      result: "I (marginal)"
      score_differential: 6
      reasoning: "Extraversion 62 is above midpoint but gregariousness is low (45) and preferred work tools are solitary (Apple Notepad, messy middle alone). Teaching and speaking are performative extraversion — core energy is introverted. 'As soon as I step out of the frame, things get way better' = preference for disappearing, not performing."
    N_vs_S:
      result: "N (forte)"
      score_differential: 28
      reasoning: "Openness 82 with imagination 90 and intellect 85. Imagination as Sales Engine is a profoundly intuitive framework. Pattern recognition across 16+ frameworks. Novel-writing requires deep intuitive processing. Focuses on big ideas (Rule of One) over sensory details."
    F_vs_T:
      result: "F (marginal)"
      score_differential: 8
      reasoning: "Agreeableness 68 with morality 85 and altruism 78. Despite empirical rigor (suggesting T), her core driver is EMPATHY — 'the customer is the product you're really selling.' The humility principle is fundamentally an F orientation: subordinating self to serve others. Ethical framework is values-based, not efficiency-based."
    J_vs_P:
      result: "J (forte)"
      score_differential: 38
      reasoning: "Conscientiousness 88 with orderliness 85 and achievement_striving 92. Seven Sweeps, Message Map, 10/90 Rule — extreme closure-seeking through systematic frameworks. Research-first discipline = structured approach to uncertainty."
  dominant_function: "Ni (Introverted Intuition) — deep pattern recognition across customer language, frameworks, and conversion psychology. The ability to see 'what was going on in your life that brought you here' requires Ni-level insight into hidden motivations."
  auxiliary_function: "Fe (Extraverted Feeling) — radical humility before the prospect, empathy as conversion mechanism. 'The customer is the product you're really selling — the new version of themselves.' Teaching thousands of copywriters = Fe-driven knowledge sharing."
  tertiary_function: "Ti (Introverted Thinking) — 16+ systematic frameworks, empirical testing rigor, Message Map organization. The analytical substrate beneath the empathetic surface."
  inferior_function: "Se (Extraverted Sensing) — occasional blind spot for sensory/design elements ('copy leads design, not the reverse'). The 'messy middle' notes process and Apple Notepad preference show Se as undervalued."
  shadow_type: "ESTP"
  shadow_evidence: "The 'one post per year' content marketer who builds a $3.5M business through quality over quantity — the opposite of the ESTP's action-oriented, quantity-driven approach. Shadow appears in rare moments of impulsive career pivots (dropping out of law school on day one)."
  evidence:
    - "Ni dominant: 'A sale always happens in the imagination first' — seeing what is not yet visible"
    - "Ni dominant: 'What was going on in your life that brought you to...' — the ultimate Ni question about hidden patterns"
    - "Fe auxiliary: 'Your page becomes a mirror where your prospect really sees themselves' — empathetic mirroring as technique"
    - "Fe auxiliary: Built teaching business ($3.5M) over client work — serving the collective over individual gain"
    - "Ti tertiary: 16+ named frameworks with systematic steps — analytical scaffolding for intuitive insights"
    - "Se inferior: 'Copy leads design' — tendency to undervalue sensory/visual elements in favor of words/meaning"

