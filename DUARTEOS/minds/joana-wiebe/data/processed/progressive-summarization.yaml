  # ===========================================================================
  # CROSS-SOURCE L3: ESSENCE OF JOANNA WIEBE
  # ===========================================================================
  cross_source_essence: |
    Joanna Wiebe is the self-titled "Original Conversion Copywriter" who
    transformed copywriting from a creative discipline into a research-and-
    testing discipline for the digital age. Her core methodology is deceptively
    simple: listen to customers (2/3 of the work), organize their words into
    proven frameworks (PAS, AIDA, Seven Questions), then lightly edit with
    Seven Sweeps (clarity always first).

    Her philosophy rests on five pillars:
    1. CUSTOMER WORDS > COPYWRITER WORDS — "Good copywriters don't write,
       they listen." VOC data is the raw material; the copywriter is a curator.
    2. SPECIFICITY > VAGUENESS — Generic copy fails. Specific, lived-experience
       language ("sweat soaker undershirt") converts.
    3. MESSAGING HIERARCHY > GOOD WRITING — What goes where matters more than
       how well it's written. Clear over clever, always.
    4. TESTING > OPINION — Data decides. Every claim backed by A/B test results.
       The "creative" approach loses to the systematic approach in nearly every test.
    5. ETHICAL PERSUASION — "Without scammy cheapness." No fake RE: lines,
       no manipulation. Genuine connection through genuine understanding.

    Her personal story is inseparable from her teaching: being the overlooked
    fourth child who became an authority, the daughter of a truck driver who
    became a teacher, the law school dropout who became one of the world's
    most-cited copywriters. The through-line is persistence: "Just keep showing up."

    Business model proof: $3.5M/year with 3 full-time people, $60K minimum
    project fee, trained teams at Amazon/Shopify/Intuit/AWS. Authority built
    through content, not credentials — "authority-building content is what my
    seven-figure business is built on."
