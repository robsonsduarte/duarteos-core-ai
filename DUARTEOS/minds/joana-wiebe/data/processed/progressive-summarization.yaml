      cycle and can eliminate sales calls entirely. One strategic blog post per year
      beats weekly commodity content.

  # ===========================================================================
  # SOURCE 10: How to Organize Copywriting Research
  # ===========================================================================
  - source_id: "S10"
    url: "https://copyhackers.com/how-to-organize-your-copywriting-research/"
    type: "Tutorial (framework)"
    layer_2_key_mius:
      - "JW-065"  # the "messy middle" — 90% of the work
      - "JW-032"  # Message Map (Product + Persona sections)
      - "JW-027"  # PCPO framework
      - "JW-073"  # note-taking process
    layer_3_essence: |
      Copywriting's dirty secret: the real work is thinking, not writing. The
      "messy middle" between analyzing data and finishing your outline is the 90%
      of work clients actually pay for. Organization through the Message Map
      (Product + Persona sections) and Solution Design (PCPO: Problem, Cure, Proof,
      Offer) converts raw research into actionable messaging. Embrace imperfection
      in notes — the system exists to make the second half cleaner, not to
      eliminate messiness.

