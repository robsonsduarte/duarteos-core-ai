# =============================================================================
# MODELO DE MUNDO
# =============================================================================
worldview:
  ontological: "The market is an empirical phenomenon — testable, measurable, but ultimately driven by human psychology (imagination, fear of loss, desire for identity transformation). Data reveals truth; opinion obscures it."
  epistemological: "Knowledge comes from listening to customers, not from creative inspiration or industry best practices. The best copy already exists in customer reviews — the copywriter's job is to find it, not invent it."
  axiological: "Ethical persuasion is not a constraint but a competitive advantage. Conversion and ethics are aligned, not in tension. The copywriter serves the prospect, not the client's desire to manipulate."
  teleological: "The purpose of conversion copywriting is to create a mirror where the prospect sees the best version of themselves — the version that has their problem solved. Sales is service when done right."
  source_path: "inbox/joanna-wiebe-primary-sources.md"

# =============================================================================
# CONFLITOS DE CRENCA INTERNOS
# =============================================================================
belief_tensions:

  - tension: "Creativity vs. Data Discipline"
    belief_a: "Writing is a creative act (novelist identity)"
    belief_b: "Copy should come from customer data, not creative inspiration"
    resolution: "Copy is for the customer; creativity goes into framework design and teaching methodology. The artist creates systems, not individual pieces."
    health: "Well-resolved — both identities coexist productively"
    source_path: "inbox/joanna-wiebe/interviews/copywriter-club-podcast-14-transcript.txt"

  - tension: "Simplicity Gospel vs. Deep Complexity"
    belief_a: "'Don't do the sexy thing, just do the work thing' — simplicity"
    belief_b: "16+ frameworks, 20+ courses, Message Maps, Seven Sweeps — deep complexity"
    resolution: "Simple execution process (listen, write, edit) wrapping deep strategic complexity. The messy middle is embraced, not simplified away."
    health: "Productive tension — simplicity is the container, complexity is the content"
    source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"

  - tension: "Sales Aversion vs. Sales Mastery"
    belief_a: "'There's ugliness around the idea of sales' — acknowledges the stigma"
    belief_b: "World's foremost conversion copywriter — masters what she acknowledges is stigmatized"
    resolution: "Reframes sales as service — when copy truly serves the prospect's needs, conversion is ethical, not manipulative"
    health: "Well-resolved — the ethical framework transforms the relationship with selling"
    source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"

  - tension: "Being Overlooked vs. Building Authority"
    belief_a: "4th of 5 children, 'easily overlooked,' 'unremarkable except to her dog'"
    belief_b: "'You can't be a wallflower' — authority requires visibility"
    resolution: "Lets work output create visibility rather than self-promotion. Data and results force recognition without demanding it. Humility IS the authority strategy."
    health: "Mostly resolved but the wound persists — self-deprecation is both genuine and defensive"
    source_path: "inbox/joanna-wiebe/interviews/copywriter-club-podcast-14-transcript.txt"
