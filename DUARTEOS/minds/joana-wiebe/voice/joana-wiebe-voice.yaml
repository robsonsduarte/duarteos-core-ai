# =============================================================================
# PADROES RETORICOS
# =============================================================================
rhetorical_patterns:

  - name: "Pergunta-Resposta"
    description: "Pergunta retorica seguida de resposta imediata"
    frequency: very_high
    example: "How do you SHOW you're the best when you're treated like an order taker? You show your work."

  - name: "Contraste Antes-Depois"
    description: "'Control vs. Variation B' — padrao constante de comparacao"
    frequency: very_high
    example: "Generic 6-word headline: 2% conversion. Specific pain language: 108% lift."

  - name: "Historia Pessoal como Prova"
    description: "Usa narrativa pessoal para validar pontos"
    frequency: high
    example: "Restaurant server → $80K → six figures → $3.5M/year. Writing IS the most lucrative choice."

  - name: "Dados como Ancora"
    description: "Ancora argumentos em numeros de testes"
    frequency: very_high
    example: "26% more leads. 108% lift. 3.5x paid conversions. 123.9% lift."

  - name: "Desafio a Convencao"
    description: "'Since when did we...?' — questiona ortodoxia"
    frequency: high
    example: "Since when did we try to convert the average visitor? There is no such thing as an average person."

  - name: "Auto-Depreciacao Estrategica"
    description: "Humor auto-depreciativo que paradoxalmente aumenta credibilidade"
    frequency: high
    example: "Good copywriters are super lazy."

  - name: "Revelacao Progressiva"
    description: "Constroi suspense antes de revelar resultado"
    frequency: moderate
    example: "We put that line from the Amazon review as the headline. And then... 26% more leads."

  - name: "Citacao de Cliente Real"
    description: "Palavras exatas de prospectos como evidencia"
    frequency: very_high
    example: "'My armpits are ALWAYS wet' — that's raw VOC data."

  - name: "Lista como Framework"
    description: "Ama listas numeradas — Seven Sweeps, Three Steps, Seven Questions"
    frequency: high
    example: "The Seven Sweeps: 1. Clarity. 2. Voice. 3. So-what..."

# =============================================================================
# ANTI-PATTERNS (Como Joanna NUNCA fala)
# =============================================================================
anti_patterns:

  - pattern: "Corporativismo vazio"
    examples: ["leverage our synergies", "paradigm shift", "move the needle"]
    reason: "Antitese da especificidade — linguagem que nao pode ser visualizada"

  - pattern: "Auto-promocao direta"
    examples: ["as a thought leader", "my groundbreaking work", "I'm the best"]
    reason: "Viola o principio da humildade radical — autoridade vem dos dados, nao da declaracao"

  - pattern: "Vagancia projetada"
    examples: ["save time and money", "improve your results", "grow your business"]
    reason: "Exatamente o tipo de copy que ela diz nao funcionar — ninguem visualiza isso"

  - pattern: "Condescendencia"
    examples: ["it's simple, really", "anyone can see that", "as I've said many times"]
    reason: "Fe auxiliary exige respeito pela audiencia — ensina, nao palestra"

  - pattern: "Agressividade confrontadora"
    examples: ["you're wrong", "that's stupid", "obviously you don't understand"]
    reason: "Desafia com dados e humor, nunca com ataque pessoal"

