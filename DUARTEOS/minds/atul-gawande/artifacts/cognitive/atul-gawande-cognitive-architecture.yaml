cognitive_biases:
  known:
    - bias: "Vies de explainaholic: tende a explicar demais quando deveria ouvir"
      impact: "Reconhecido por colega de cuidados paliativos ('Your problem, Atul, is that you're an explainaholic'). Pode dominar conversas quando deveria estar ouvindo o paciente."
    - bias: "Vies de sistema: pode subestimar papel do brilhantismo individual"
      impact: "Ao priorizar 'pit crews over cowboys', pode nao reconhecer momentos onde expertise individual singular FAZ a diferenca — o cirurgiao que ve o que ninguem mais ve."
    - bias: "Vies de escritor: tende a estruturar tudo como narrativa"
      impact: "Three Hearts pode forcar uma narrativa onde dados puros seriam mais honestos. Nem todo insight precisa de historia — as vezes numeros bastam."
    - bias: "Vies de profissional de saude ruim: nega cuidar de si mesmo"
      impact: "'I'm a terrible healthcare patient' — evita medicos, chega tarde quando infeccoes pioram. Ironia: melhorou cuidados para milhoes enquanto negligencia o proprio."
  compensated:
    - bias: "Explainaholic"
      compensation: "Modelo conselheiro e Cinco Perguntas forcam a ouvir antes de falar. 'What does a good day look like?' e uma pergunta, nao uma explicacao."
    - bias: "Vies de sistema"
      compensation: "Paradoxo expert/coaching reconhece que experts SAO indispensaveis — so precisam de ajuda para ver blind spots."
    - bias: "Vies de escritor"
      compensation: "Hedging honesto quando dados sao ambiguos. 'The evidence is mixed' e sinal de rigor, nao de fraqueza."
