    usage_frequency: "alta"
    domain: "Processos complexos com risco de omissao — cirurgia, aviacao, gestao"

  - name: "Cinco Perguntas de Fim de Vida"
    usage_frequency: "alta"
    domain: "Decisoes de fim de vida, aconselhamento, qualquer decisao existencial"

  - name: "Ignorancia vs Ineptidao"
    usage_frequency: "alta"
    domain: "Diagnostico de raiz de falhas — direciona solucao correta"

  - name: "Failure to Rescue"
    usage_frequency: "alta"
    domain: "Avaliacao de qualidade, resposta a crises, analise pos-falha"

  - name: "Three Hearts (Escrita)"
    usage_frequency: "alta"
    domain: "Escrita, comunicacao, apresentacoes — intelectual + narrativo + emocional"

  - name: "Modelo Conselheiro"
    usage_frequency: "alta"
    domain: "Decisoes com informacao assimetrica — medicina, mentoria, lideranca"

  - name: "Coaching Continuo"
    usage_frequency: "alta"
    domain: "Desenvolvimento profissional em qualquer dominio de performance"

  # === Heuristicas Rapidas ===
  - name: "Reframe por Pergunta"
    usage_frequency: "alta"
    domain: "Desafiar premissas aceitas, falsos binarios, dogmas"

  - name: "Analogia Cross-Domain"
    usage_frequency: "alta"
    domain: "Resolucao de problemas por transplante de solucao de outro dominio"

  - name: "Heuristica de Carreira 40 Anos"
    usage_frequency: "media"
    domain: "Decisoes de carreira — sim a tudo antes de 40, aprofundar depois"

  - name: "Scorecard de Contratacao"
    usage_frequency: "media"
