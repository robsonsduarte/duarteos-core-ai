# David Allen — Framework: Two-Minute Rule
# MMOS v3 Phase 8 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: David Allen
  category: Business
  artifact_type: framework_detail
  framework_name: "Two-Minute Rule"
  version: "1.0"
  fonte_primaria: "Getting Things Done (2001), cap. 6"

framework:
  nome: "Two-Minute Rule"
  principio_central: >
    Se a proxima acao leva menos de 2 minutos para ser completada,
    faca AGORA. O custo de rastrear, organizar e revisar uma acao de
    2 minutos e MAIOR que o custo de simplesmente executa-la.

  citacao_ancora: >
    "If it takes less than two minutes, do it now. The time it would
    take to organize and review it would exceed the time to finish it."

  regras:
    - regra: "Threshold e 2 minutos, nao 5, nao 10"
      nota: >
        Allen e especifico: 2 minutos. Nao e numero arbitrario — e o
        ponto de breakeven entre custo de execucao e custo de rastreamento.
        Relaxar para 5+ minutos transforma processing em execution session.

    - regra: "Aplica-se DURANTE o processamento de inbox"
      nota: >
        A Two-Minute Rule e parte do Step 2 (Clarify). Nao e regra geral
        de vida — e regra de processamento. Quando esta processando inbox
        e identifica uma acao de 2 min, execute ali mesmo.

    - regra: "Execute, nao delegue"
      nota: >
        Se voce pode fazer em 2 minutos, nao faz sentido delegar.
        O overhead de delegacao excede o tempo de execucao.

    - regra: "A acao deve estar DEFINIDA"
      nota: >
        "Resolver o problema do cliente" nao e acao de 2 minutos.
        "Enviar email ao Joao confirmando reuniao" e. Clareza primeiro.

  contextos_de_aplicacao:
    - contexto: processamento_email
      descricao: >
        Ao processar inbox de email: se responder leva <2 min, responda
        agora e archive. Nao marque como 'nao lida' para 'depois'.
      exemplo: "Email pedindo confirmacao de horario → Responde 'Sim, confirmado' → Archive"

    - contexto: processamento_inbox_fisico
      descricao: >
        Papel, nota, recibo: se a acao leva <2 min (arquivar, jogar
        fora, encaminhar), faca agora.
      exemplo: "Recibo de compra → Fotografar para registro → Jogar fora o papel"

    - contexto: reunioes_e_conversas
      descricao: >
        Apos reuniao, ao processar notas: itens de <2 min executados
        imediatamente antes de organizar o resto.
      exemplo: "Nota: 'enviar link do doc ao time' → Envia agora → Risca da lista"

    - contexto: brain_dump
      descricao: >
        Durante processamento de brain dump: itens rapidos executados
        no ato, reduzindo volume do sistema.
      exemplo: "Item capturado: 'cancelar assinatura do app X' → 2 cliques → Feito"

  nuances:
    - nuance: "2 minutos e heuristica, nao lei da fisica"
      descricao: >
        Allen reconhece que o threshold pode variar com contexto.
        Em sessao de processamento longa com muito volume, pode
        relaxar para 5 min. Mas o default e 2.

    - nuance: "Nao transforme processamento em sessao de execucao"
      descricao: >
        Se 80% dos itens sao de 2 minutos, voce nao esta processando
        — esta fazendo. A Two-Minute Rule e excecao dentro do
        processamento, nao a regra.

    - nuance: "Acoes de 2 minutos encadeadas podem virar 30 minutos"
      descricao: >
        Cuidado com a cascata: "so vou fazer esse rapido" x 15 vezes.
        Mantenha awareness do tempo total gasto em 2-min actions.

    - nuance: "Aplica-se a acoes, nao a decisoes"
      descricao: >
        Se a DECISAO leva 2 minutos mas a ACAO leva 30, nao se aplica.
        O threshold e sobre tempo de execucao, nao de deliberacao.

  anti_patterns:
    - "Expandir para 'Five-Minute Rule' (perde o breakeven)"
    - "Aplicar fora do processamento (interromper trabalho deep para 2-min tasks)"
    - "Usar como desculpa para nao organizar ('eu faco tudo na hora')"
    - "Nao definir a acao antes de estimar o tempo ('acho que e rapido')"
    - "Confundir 'pensar sobre' com 'executar' (pensar nao conta)"

  por_que_funciona:
    psicologia: >
      Acoes de 2 minutos completadas geram micro-doses de dopamina
      (completion bias). Isso energiza o processamento do resto do inbox.
      Alem disso, reduz o volume do sistema — menos itens para rastrear.
    eficiencia: >
      O custo de gerenciamento (capturar + organizar + revisar + lembrar
      + contextualizar + executar) excede 2 minutos para qualquer item.
      Executar imediatamente elimina TODO esse overhead.
    momentum: >
      Cada acao completada gera momentum. Processamento com Two-Minute
      Rule ativo cria ritmo — alternar entre processar e executar mantem
      a energia alta.
