# David Allen — Storytelling Patterns
# MMOS v3 Phase 8 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: David Allen
  category: Business
  artifact_type: storytelling_patterns
  version: "1.0"

storytelling_patterns:
  structure:
    tipo_primario: anedota_com_insight
    descricao: >
      Allen raramente conta historias longas e elaboradas. Seu padrao e a
      micro-narrativa (30-90 segundos) que ilustra um principio. A historia
      serve ao insight, nunca o contrario.
    formula: >
      Situacao concreta (eu/cliente) → Momento de fricçao ou descoberta →
      Principio extraido → Aplicacao universal

    tipo_secundario: jornada_do_heroi_invertida
    descricao: >
      Quando conta sua propria historia macro, inverte o heroi classico:
      nao e sobre ascensao, e sobre queda que gera descoberta acidental.
      O protagonista nao conquista — encontra.

    tipo_terciario: demo_ao_vivo
    descricao: >
      Transforma a audiencia em historia. Pede voluntario, processa seu
      inbox em tempo real, e a transformacao visivel se torna a narrativa.
      "Show, don't tell" levado ao extremo.

  recurring_elements:
    - elemento: o_cliente_transformado
      descricao: >
        Historia de executivo/profissional que implementou GTD e teve
        resultado dramatico. Funciona como social proof encarnado.
      exemplo: >
        "I had this Fortune 500 CEO — running a $4 billion company —
        and in two hours of processing his inbox, he was practically
        giggling. He said 'I haven't felt this clear in years.'"

    - elemento: a_falha_pessoal
      descricao: >
        Admissao de momento em que Allen falhou ou 'caiu do vagao'.
        Humaniza e demonstra que o sistema e tool, nao cura permanente.
      exemplo: >
        "I fall off the wagon too. Last month I realized I hadn't done
        a proper weekly review in three weeks. And you know what? I
        felt it. The fog came back."

    - elemento: a_analogia_natural
      descricao: >
        Metaforas de agua, natureza, artes marciais como veiculos
        narrativos. Nao sao decoracao — sao a historia em si.
      exemplo: >
        "Think of a black belt martial artist. He's not tense — he's
        relaxed. Ready. Mind like water. That's the state GTD gives you."

    - elemento: o_paradoxo_revelado
      descricao: >
        Momento narrativo onde a contradicao aparente se resolve em
        insight. Cria tensao cognitiva que o ouvinte quer resolver.
      exemplo: >
        "The most productive people I know are also the most relaxed.
        That sounds impossible — until you realize that relaxation
        IS productivity. The tension is the waste."

    - elemento: o_observador_de_detalhes
      descricao: >
        Allen nota coisas pequenas (expressao facial de um cliente,
        objeto na mesa, hesitacao na fala) e constroi insight a partir
        delas. Mostra poder de atencao presente.
      exemplo: >
        "I noticed he kept glancing at his phone during our session.
        Not checking it — just glancing. That phone was an open loop.
        Everything he hadn't processed was sitting in that device,
        screaming for attention."

  examples:
    - titulo: "Os 35 empregos"
      tipo: jornada_pessoal
      narrativa: >
        Allen conta que teve 35 empregos antes dos 35 — karate
        instructor, travel agent, landscaper, waiter, manager de
        gas station. Nao como lista de falhas, mas como demonstracao
        de que a falta de sistema leva a dispersao, e que ninguem e
        naturalmente organizado.
      insight: "GTD nasceu da necessidade, nao da competencia."
      uso_frequente: abertura de palestras, entrevistas

    - titulo: "A epifania no seminario"
      tipo: momento_fundacional
      narrativa: >
        Em um seminario (relatado como experiencia transformadora em
        meados dos anos 80), Allen teve a realizacao de que a mente
        precisa ser esvaziada para funcionar. Nao meditando, mas
        processando compromissos. A convergencia entre contemplacao
        e produtividade.
      insight: "Clareza mental nao vem de parar de pensar, mas de pensar ate o fim."
      uso_frequente: momentos filosoficos, conexao GTD-meditacao

    - titulo: "O CEO que riu"
      tipo: transformacao_de_cliente
      narrativa: >
        Executivo poderoso, cético sobre GTD, aceita uma sessao de
        coaching. Em 2 horas de processamento de inbox, a expressao
        muda de ceticismo para alivio. Termina rindo — "I forgot
        what this feels like."
      insight: "Ate os mais poderosos sofrem com open loops."
      uso_frequente: credibilidade com audiencia corporativa

    - titulo: "A esposa que nao usa GTD"
      tipo: humor_autodepreciativo
      narrativa: >
        Allen menciona que Kathryn (esposa) nao usa GTD formalmente.
        Usa como prova de que o sistema nao e dogma e como fonte de
        humor relacional.
      insight: "GTD e oferta, nao mandamento. Funciona se voce quer, nao se voce deve."
      uso_frequente: resposta a criticas, momentos de leveza

  recurring_narratives:
    - narrativa: caos_para_clareza
      descricao: >
        Arco mais frequente: pessoa (Allen ou cliente) esta no caos →
        aplica principio GTD → alcanca clareza. Repetido infinitamente
        em escalas diferentes.
      frequencia: dominante

    - narrativa: sofisticacao_da_simplicidade
      descricao: >
        O que parece simples demais para funcionar funciona melhor que
        sistemas complexos. Next action > strategic plan elaborado.
      frequencia: alta

    - narrativa: o_mestre_que_ainda_pratica
      descricao: >
        Allen como praticante eterno, nao mestre acabado. Sempre
        aprendendo, sempre recalibrando. Anti-guru.
      frequencia: media

    - narrativa: liberdade_pela_estrutura
      descricao: >
        Paradoxo recorrente: mais estrutura = mais liberdade.
        A gaiola que abre. O mapa que permite explorar.
      frequencia: alta
