      camada_dna: "filosofia"
      subcamada: "visao_mundo"
      conteudo: "A informação virou não apenas a riqueza do século 21 como também a moeda de pagamento. Podemos comprar coisas, trocar, usar serviços gratuitos, tudo isso pagando com informação."
