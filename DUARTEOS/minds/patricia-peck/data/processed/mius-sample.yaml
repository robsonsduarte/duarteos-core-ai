      url: "https://itforum.com.br/noticias/tecnologia-sem-privacidade-nao-opcao-peck/"
      tipo_semantico: "modelo_mental"
      confianca: 0.96
      recorrencia: 2

    - id: "MIU-009"
      camada_dna: "filosofia"
      subcamada: "missao"
      conteudo: "Ética e transparência são princípios indispensáveis para que seja possível construir um ambiente digital saudável e sustentável aos usuários."
      source_path: "F02"
      url: "https://www.cartacapital.com.br/artigo/fim-do-vale-tudo/"
