    # === PARADOXOS (3) ===
    - id: "MIU-036"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "Ganhará o mercado quem liderar a proteção da privacidade sustentável. Qualquer formato extremo — seja 'libera geral' ou 'protege a pessoa dela mesma' — está fadado ao fracasso."
      source_path: "F03"
      url: "https://www.gazetadopovo.com.br/opiniao/artigos/propriedade-e-privacidade-2kr37xdl54zoqe8li7eh41aha/"
      tipo_semantico: "paradoxo"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-037"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "A internet valoriza quem causa polêmica e humilha, trazendo fama e dinheiro, em detrimento de quem respeita as leis. A audiência procura e é procurada pelo algoritmo."
      source_path: "F02"
      url: "https://www.cartacapital.com.br/artigo/fim-do-vale-tudo/"
      tipo_semantico: "paradoxo"
      confianca: 0.96
      recorrencia: 2

    - id: "MIU-038"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "Assim como não podemos fabricar alimentos sem atender às normas de segurança, não deveríamos desenvolver tecnologia sem respeitar a privacidade. A indústria do tabaco pagou caro por ignorar a saúde — o mesmo pode acontecer com a tecnologia."
      source_path: "F09"
      url: "https://itforum.com.br/noticias/tecnologia-sem-privacidade-nao-opcao-peck/"
      tipo_semantico: "analogia_paradoxal"
      confianca: 0.97
      recorrencia: 1

