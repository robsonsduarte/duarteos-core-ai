      url: "https://itforum.com.br/noticias/tecnologia-sem-privacidade-nao-opcao-peck/"
      tipo_semantico: "dilema"
      confianca: 0.97
      recorrencia: 2

    - id: "MIU-032"
      camada_dna: "dilemas"
      subcamada: "tensao"
