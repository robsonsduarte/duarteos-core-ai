      url: "https://posdigital.pucpr.br/blog/objetivo-lgpd"
      tipo_semantico: "principio"
      confianca: 0.98
      recorrencia: 5

    - id: "MIU-008"
      camada_dna: "filosofia"
      subcamada: "visao_mundo"
      conteudo: "Estamos caminhando para uma sociedade inteligente, com IA embarcada em todas as áreas, mas isso não significa que abrimos mão da privacidade."
