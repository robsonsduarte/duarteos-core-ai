      url: "https://institutocaldeira.org.br/blog/patricia-peck-a-lgpd-vai-aumentar-grau-de-transparencia-e-fomentar-a-livre-economia-digital/"
      tipo_semantico: "principio"
      confianca: 0.98
      recorrencia: 6

    - id: "MIU-024"
      camada_dna: "heuristicas"
      subcamada: "regra_pratica"
      conteudo: "Medidas simples podem evitar danos gigantescos à marca e reputação da instituição."
      source_path: "F10"
      url: "https://institutocaldeira.org.br/blog/patricia-peck-a-lgpd-vai-aumentar-grau-de-transparencia-e-fomentar-a-livre-economia-digital/"
      tipo_semantico: "heuristica"
      confianca: 0.95
      recorrencia: 2

    # === METODOLOGIAS (6) ===
    - id: "MIU-025"
      camada_dna: "metodologias"
      subcamada: "processo"
      conteudo: "Inventário de dados pessoais: mapear todo o fluxo do ciclo de vida do dado pessoal e o percurso que ele realiza desde a entrada até a saída."
