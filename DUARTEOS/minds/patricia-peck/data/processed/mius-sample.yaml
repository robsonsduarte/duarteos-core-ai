    # === DILEMAS (5) ===
    - id: "MIU-031"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "A grande questão é: a privacidade está se tornando uma moeda tão cara que pode inviabilizar certas tecnologias?"
