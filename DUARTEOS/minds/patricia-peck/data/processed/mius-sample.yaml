      source_path: "F02"
      url: "https://www.cartacapital.com.br/artigo/fim-do-vale-tudo/"
      tipo_semantico: "dilema"
      confianca: 0.96
      recorrencia: 2

    - id: "MIU-033"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "Temos um grande gargalo: a IA ganhou protagonismo maior frente à cibersegurança. Precisamos dar um salto de maturidade na camada de proteção."
      source_path: "F11"
      url: "https://itforum.com.br/noticias/brasil-protecao-dados-peck/"
      tipo_semantico: "dilema"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-034"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "A LGPD foi aprovada sem um esquema de implementação e divulgação que levasse as informações para médias e pequenas empresas ou para o usuário final."
      source_path: "F12"
      url: "https://securityleaders.com.br/cultura-de-privacidade-nao-pode-ser-baseada-em-um-projeto-pontual/"
      tipo_semantico: "diagnostico"
      confianca: 0.96
      recorrencia: 3

    - id: "MIU-035"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "A fiscalização é insuficiente no momento da sanção. Já que há demora nos processos de punição, os responsáveis tendem a não dar a atenção devida."
