    # === FRAMEWORKS (8) ===
    - id: "MIU-010"
      camada_dna: "frameworks"
      subcamada: "modelo_operacional"
      conteudo: "Privacy by Design: a privacidade deve ser integrada desde a concepção de produtos e soluções tecnológicas."
      source_path: "F09"
      url: "https://itforum.com.br/noticias/tecnologia-sem-privacidade-nao-opcao-peck/"
      tipo_semantico: "framework"
      confianca: 0.99
      recorrencia: 7

    - id: "MIU-011"
      camada_dna: "frameworks"
      subcamada: "modelo_operacional"
      conteudo: "Ethics by Design: não poderia uma IA mentir ou descumprir uma lei, fingindo ser uma pessoa. Requisitos éticos devem ser observados de fábrica."
      source_path: "F02"
      url: "https://www.cartacapital.com.br/artigo/fim-do-vale-tudo/"
      tipo_semantico: "framework"
      confianca: 0.97
      recorrencia: 4

    - id: "MIU-012"
      camada_dna: "frameworks"
      subcamada: "modelo_operacional"
      conteudo: "Compliance de Privacidade em 3 pilares: soluções tecnológicas de cibersegurança, revisão de contratos/procedimentos jurídicos, e capacitação/mudança de cultura."
      source_path: "F13"
      url: "https://www.legiscompliance.com.br/artigos-e-noticias/1173-entrevista-com-patricia-peck-lgpd-e-evidencias-das-mensagens-eletronicas"
      tipo_semantico: "framework"
      confianca: 0.98
      recorrencia: 5

    - id: "MIU-013"
      camada_dna: "frameworks"
      subcamada: "modelo_operacional"
      conteudo: "Ciclo de vida do dado pessoal: desde a captura até o descarte, incluindo inventário, mapeamento de fluxo e governança de logs."
      source_path: "F10"
      url: "https://institutocaldeira.org.br/blog/patricia-peck-a-lgpd-vai-aumentar-grau-de-transparencia-e-fomentar-a-livre-economia-digital/"
      tipo_semantico: "framework"
      confianca: 0.97
      recorrencia: 4

    - id: "MIU-014"
      camada_dna: "frameworks"
      subcamada: "modelo_operacional"
      conteudo: "Atuação multidisciplinar e multidepartamental: jurídico, TI, RH, marketing, negócios, inovação, atendimento ao cliente — todos devem se unir na jornada LGPD."
      source_path: "F10"
      url: "https://institutocaldeira.org.br/blog/patricia-peck-a-lgpd-vai-aumentar-grau-de-transparencia-e-fomentar-a-livre-economia-digital/"
      tipo_semantico: "principio"
      confianca: 0.96
      recorrencia: 3

    - id: "MIU-015"
      camada_dna: "frameworks"
      subcamada: "modelo_decisao"
      conteudo: "Governança de dados proativa vs reativa: as empresas deverão migrar de uma postura reativa para uma governança onde a segurança por design e a transparência algorítmica serão os novos divisores de águas."
      source_path: "F11"
      url: "https://itforum.com.br/noticias/brasil-protecao-dados-peck/"
      tipo_semantico: "framework"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-016"
      camada_dna: "frameworks"
      subcamada: "modelo_operacional"
      conteudo: "Jornada de conformidade LGPD: 1) Assessment/diagnóstico, 2) Análise de GAP e mapa de risco, 3) Plano de ação em 3 grupos (técnico, jurídico, educacional), 4) Ciclo PDCA de aprendizado."
      source_path: "F13"
      url: "https://www.legiscompliance.com.br/artigos-e-noticias/1173-entrevista-com-patricia-peck-lgpd-e-evidencias-das-mensagens-eletronicas"
      tipo_semantico: "metodologia"
      confianca: 0.97
      recorrencia: 3

    - id: "MIU-017"
      camada_dna: "frameworks"
      subcamada: "modelo_decisao"
      conteudo: "A ética digital é o sistema de valores e princípios adotados por uma organização ao realizar interações digitais entre empresas, pessoas e coisas."
      source_path: "F16"
      url: "https://posdigital.pucpr.br/blog/objetivo-lgpd"
      tipo_semantico: "definicao"
      confianca: 0.98
      recorrencia: 3

