      recorrencia: 2

    - id: "MIU-072"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "Se o resultado alcancado tiver um valor superior ao da punicao aplicada, pode valer a pena infringir a lei. E esta logica distorcida foi amplificada com as midias sociais."
      source_path: "F02"
      tipo_semantico: "dilema"
      confianca: 0.96
      recorrencia: 2

    - id: "MIU-073"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "Temos um grande gargalo: a IA ganhou protagonismo maior frente a ciberseguranca. Precisamos dar um salto de maturidade na camada de protecao."
      source_path: "F11"
      tipo_semantico: "dilema"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-074"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "A LGPD foi aprovada sem um esquema de implementacao e divulgacao que levasse as informacoes para medias e pequenas empresas ou para o usuario final."
      source_path: "F12"
      tipo_semantico: "diagnostico"
      confianca: 0.96
      recorrencia: 3

    - id: "MIU-075"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "A fiscalizacao e insuficiente no momento da sancao. Ja que ha demora nos processos de punicao, os responsaveis tendem a nao dar a atencao devida."
      source_path: "F12"
      tipo_semantico: "diagnostico"
      confianca: 0.96
      recorrencia: 3

    - id: "MIU-076"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "Inovacao vs Protecao: regulacao excessiva mata inovacao, ausencia mata confianca. O Direito Digital nao existe para frear a inovacao — existe para garantir que ela ocorra com responsabilidade."
      source_path: "F26"
      tipo_semantico: "dilema"
      confianca: 0.98
      recorrencia: 4

    - id: "MIU-077"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "Parecer juridico perfeito vs Solucao implementavel: de nada adianta um parecer perfeito que ninguem consegue executar. A solucao juridica precisa caber na operacao."
      source_path: "F26"
      tipo_semantico: "dilema"
      confianca: 0.97
      recorrencia: 4

    - id: "MIU-078"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "Exigencia uniforme vs Proporcionalidade: a lei e igual, mas a implementacao deve ser gradual e realista — multinacional e startup estao em estagios diferentes."
      source_path: "F26"
      tipo_semantico: "dilema"
      confianca: 0.96
      recorrencia: 3

    - id: "MIU-079"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "Lei vigente vs Projeto de lei vs Boa pratica: o interlocutor precisa saber o que e inegociavel e o que e escolha."
      source_path: "F26"
      tipo_semantico: "dilema"
      confianca: 0.97
      recorrencia: 3

    - id: "MIU-080"
      camada_dna: "dilemas"
      subcamada: "tensao"
      conteudo: "A baixa capacidade institucional da ANPD nos primeiros anos limitou acoes fiscalizatorias mais amplas. Setor publico precisa atingir conformidade minima para exigir do privado."
      source_path: "F11"
      tipo_semantico: "diagnostico"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-081"
      camada_dna: "dilemas"
      subcamada: "tensao"
