    # === PARADOXOS (12 MIUs) ===
    - id: "MIU-086"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "Ganhara o mercado quem liderar a protecao da privacidade sustentavel. Qualquer formato extremo — seja 'libera geral' ou 'protege a pessoa dela mesma' — esta fadado ao fracasso."
      source_path: "F03"
      tipo_semantico: "paradoxo"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-087"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "A internet valoriza quem causa polemica e humilha, trazendo fama e dinheiro, em detrimento de quem respeita as leis. A audiencia procura e e procurada pelo algoritmo."
      source_path: "F02"
      tipo_semantico: "paradoxo"
      confianca: 0.96
      recorrencia: 2

    - id: "MIU-088"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "Assim como nao podemos fabricar alimentos sem atender as normas de seguranca, nao deveriamos desenvolver tecnologia sem respeitar a privacidade. A industria do tabaco pagou caro por ignorar a saude — o mesmo pode acontecer com a tecnologia."
      source_path: "F09"
      tipo_semantico: "analogia_paradoxal"
      confianca: 0.97
      recorrencia: 1

    - id: "MIU-089"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "A LGPD nao veio para impedir o uso de dados, mas para garantir transparencia. Paradoxo: proteger dados e liberar seu uso — nao sao opostos, sao complementares."
      source_path: "F10"
      tipo_semantico: "paradoxo"
      confianca: 0.98
      recorrencia: 5

    - id: "MIU-090"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "Quanto mais madura a empresa em privacidade, mais dados ela pode usar legitimamente. Protecao gera confianca que gera mais dados que gera mais valor."
      source_path: "F09"
      tipo_semantico: "paradoxo"
      confianca: 0.96
      recorrencia: 3

    - id: "MIU-091"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "O compliance mais eficaz e o que simplifica a operacao, nao o que a complica. Paradoxo: mais regras podem significar menos burocracia quando bem implementadas."
      source_path: "F13"
      tipo_semantico: "paradoxo"
      confianca: 0.95
      recorrencia: 3

    - id: "MIU-092"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "A educacao digital e simultaneamente prevencao juridica e investimento economico. Gastar com educacao reduz gastos com litigios."
      source_path: "F10"
      tipo_semantico: "paradoxo"
      confianca: 0.96
      recorrencia: 4

    - id: "MIU-093"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "O jurista mais eficaz no digital e aquele que simplifica a lei ate caber na operacao. Paradoxo: a sofisticacao juridica maxima e a simplicidade da solucao."
      source_path: "F26"
      tipo_semantico: "paradoxo"
      confianca: 0.97
      recorrencia: 3

    - id: "MIU-094"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "Empresas que investem mais em dados pessoais sao as que mais se beneficiam da LGPD, porque ja tinham governanca. A lei pune quem menos investe e premia quem mais investe."
      source_path: "F01"
      tipo_semantico: "paradoxo"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-095"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "A advogada mais institucional do Direito Digital e tambem a mais pragmatica — atua no CNPD/CNCiber mas insiste que 'a lei precisa caber na operacao'. Teoria e pratica sao inseparaveis."
      source_path: "F26"
      tipo_semantico: "paradoxo_identitario"
      confianca: 0.96
      recorrencia: 4

    - id: "MIU-096"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "A informacao e simultaneamente riqueza e vulnerabilidade. Quanto mais dados uma empresa tem, mais rica e — e mais exposta esta."
      source_path: "F03"
      tipo_semantico: "paradoxo"
      confianca: 0.95
      recorrencia: 2

    - id: "MIU-097"
      camada_dna: "paradoxos"
      subcamada: "contradicao_aparente"
      conteudo: "Criancas sao nativos digitais mas vulneraveis digitais. Sabem usar tecnologia mas nao sabem se proteger nela. A competencia tecnica nao implica maturidade etica."
      source_path: "F08"
      tipo_semantico: "paradoxo"
      confianca: 0.96
      recorrencia: 3

