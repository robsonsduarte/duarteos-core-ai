  # === PREMORTEM e OTIMISMO ===

  - id: MIU-DK-035
    quote: "The premortem is the perfect antidote [to optimism bias]. At the outset of any project, imagine it has failed and write down why"
    fonte: "fs.blog"
    tipo_semantico: framework
    camada_dna: metodologias
    profundidade: profunda
    tags: [premortem, optimism-bias, gary-klein, planning]

  - id: MIU-DK-036
    quote: "Optimism is the engine of capitalism. I would not want to kill optimism, I want to tame it"
    fonte: "Tyler Cowen Conversation"
    tipo_semantico: decisorio
    camada_dna: dilemas
    profundidade: profunda
    tags: [optimism, capitalism, balance, taming]

  - id: MIU-DK-037
