mius:

  # === SISTEMA 1 vs SISTEMA 2 ===

  - id: MIU-DK-001
    quote: "System 1 operates automatically and quickly. System 2 allocates attention to effortful mental activities"
    fonte: "Alliance for Decision Education"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: media
    tags: [system1, system2, dual-process]

  - id: MIU-DK-002
    quote: "System 1 suppresses ambiguity. Doubt is a function of System 2"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    tags: [system1, system2, ambiguity, doubt]

  - id: MIU-DK-003
    quote: "When you hold a seven digit number in your head, you become less politically correct and more selfish"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: comportamental
    camada_dna: heuristicas
    profundidade: profunda
    tags: [cognitive-load, self-control, system2-depletion]

  - id: MIU-DK-004
    quote: "Heuristic substitution: we answer an easier question than the one we were asked"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    tags: [heuristic-substitution, system1, cognitive-shortcuts]

  - id: MIU-DK-005
    quote: "We are enormously suggestible"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: comportamental
    camada_dna: filosofia
    profundidade: media
    tags: [suggestibility, human-nature]

  # === NOISE vs BIAS ===

  - id: MIU-DK-006
    quote: "I think noise is a bigger problem than bias in most organizations"
    fonte: "Tyler Cowen Conversation"
    tipo_semantico: decisorio
    camada_dna: filosofia
    profundidade: profunda
    tags: [noise, bias, organizations]

  - id: MIU-DK-007
    quote: "Error = Bias-squared + Noise-squared. Most organizations focus on bias and ignore noise entirely"
    fonte: "Issues.org"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    tags: [noise, bias, error-decomposition, MSE]

  - id: MIU-DK-008
    quote: "Noise is variability in judgments that should be identical. Organizations are shocked when they discover how much noise there is"
    fonte: "Tyler Cowen Conversation"
    tipo_semantico: decisorio
    camada_dna: frameworks
    profundidade: profunda
    tags: [noise, judgment-variability, organizations]

  - id: MIU-DK-009
    quote: "Noise is like a random lottery in which some people gain and some lose without any reason"
    fonte: "Behavioral Scientist"
    tipo_semantico: narrativo
    camada_dna: comunicacao
    profundidade: media
    tags: [noise, metaphor, injustice]

  - id: MIU-DK-010
    quote: "The surprising thing is not that noise exists — it's how much of it there is"
    fonte: "Behavioral Scientist"
    tipo_semantico: argumentativo
    camada_dna: filosofia
    profundidade: media
    tags: [noise, surprise, magnitude]

  - id: MIU-DK-011
    quote: "Bias is the average error. Noise is the variability around that average. Both are bad"
    fonte: "Behavioral Scientist"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: media
    tags: [bias, noise, definitions]

  - id: MIU-DK-012
    quote: "Noise audits are deeply disturbing to organizations... they discover that what they thought was expertise is actually noise"
    fonte: "Issues.org"
    tipo_semantico: decisorio
    camada_dna: metodologias
    profundidade: profunda
    tags: [noise-audit, expertise-illusion, organizations]

  - id: MIU-DK-013
    quote: "The justice system is a noise factory. Two judges looking at the same case can give wildly different sentences"
    fonte: "Issues.org"
    tipo_semantico: narrativo
    camada_dna: dilemas
    profundidade: profunda
    tags: [justice, noise, sentencing-disparity]

  # === DECISION HYGIENE ===

  - id: MIU-DK-014
    quote: "Decision Hygiene: 1. Make judgments independently before discussion 2. Delay holistic assessment 3. Aggregate multiple independent judgments 4. Use structured protocols 5. Use relative rather than absolute judgment 6. Use algorithms when possible"
    fonte: "Issues.org"
    tipo_semantico: framework
    camada_dna: metodologias
    profundidade: profunda
    tags: [decision-hygiene, six-components, structured-judgment]

  - id: MIU-DK-015
    quote: "Decision hygiene is not about finding the right answer. It's about reducing the variability of wrong answers"
    fonte: "Behavioral Scientist"
    tipo_semantico: framework
    camada_dna: filosofia
    profundidade: profunda
    tags: [decision-hygiene, error-reduction, philosophy]

  - id: MIU-DK-016
    quote: "Wisdom of crowds works because individual errors cancel out — but only when judgments are independent"
    fonte: "Issues.org"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    tags: [wisdom-of-crowds, independence, aggregation]

  # === ALGORITHMS vs HUMANS ===

  - id: MIU-DK-017
    quote: "An algorithm that is constructed on the back of an envelope by a person is probably better than the judgment of an expert"
    fonte: "Issues.org"
    tipo_semantico: argumentativo
    camada_dna: filosofia
    profundidade: profunda
    tags: [algorithms, expertise, simple-models]

  - id: MIU-DK-018
    quote: "Paul Meehl showed that in all 14 studies, simple linear equations beat experts hands down"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: argumentativo
    camada_dna: frameworks
    profundidade: profunda
    tags: [meehl, clinical-vs-actuarial, algorithms]

  - id: MIU-DK-019
    quote: "A statistical model OF the judge does better than the judge himself"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: argumentativo
    camada_dna: paradoxos
    profundidade: profunda
    tags: [algorithms, self-model, judge-inconsistency]

  - id: MIU-DK-020
    quote: "People are unreliable. Present the same case twice, they give different judgments. No formula does that"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: argumentativo
    camada_dna: filosofia
    profundidade: profunda
    tags: [human-unreliability, consistency, algorithms]

  - id: MIU-DK-021
    quote: "I've been very impressed by algorithms for a very long time... I think the replacement of humans by algorithms is going to proceed"
    fonte: "Tyler Cowen Conversation"
    tipo_semantico: decisorio
    camada_dna: filosofia
    profundidade: media
    tags: [AI, algorithms, future, replacement]

  - id: MIU-DK-022
    quote: "AI will do a lot of good. But people will resist because they don't trust algorithms"
    fonte: "Psychology Podcast"
    tipo_semantico: decisorio
    camada_dna: dilemas
    profundidade: media
    tags: [AI, algorithm-aversion, trust]

  # === INTUICAO ===

  - id: MIU-DK-023
    quote: "Intuition is nothing more and nothing less than recognition"
    fonte: "Knowledge Project Ep #68"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    tags: [intuition, recognition, definition]

  - id: MIU-DK-024
    quote: "There are legitimate intuitions... The conditions are: high validity environment, lots of practice, immediate feedback"
    fonte: "Tyler Cowen Conversation"
    tipo_semantico: framework
    camada_dna: heuristicas
    profundidade: profunda
    tags: [intuition, validity, expertise-conditions]

  - id: MIU-DK-025
    quote: "I'm not anti-intuition. I'm for knowing when you can trust your intuition and when you can't"
    fonte: "Issues.org"
    tipo_semantico: argumentativo
    camada_dna: filosofia
    profundidade: profunda
    tags: [intuition, calibration, nuance]

  - id: MIU-DK-026
    quote: "Stock pickers and CIA analysts don't have opportunity to develop real skills — no immediate feedback"
    fonte: "UCTV Hitchcock Lecture"
    tipo_semantico: argumentativo
    camada_dna: heuristicas
    profundidade: profunda
    tags: [expertise, feedback, low-validity-environments]

  - id: MIU-DK-027
