    tipo_semantico: framework
    camada_dna: heuristicas
    profundidade: media
    tags: [deliberate-practice, feedback, expertise]

  - id: MIU-DK-028
    quote: "Confidence is not a reliable indicator of accuracy"
    fonte: "Knowledge Project Ep #68"
    tipo_semantico: comportamental
    camada_dna: heuristicas
    profundidade: media
    tags: [overconfidence, accuracy, calibration]

  # === EXPERIENCING SELF vs REMEMBERING SELF ===

  - id: MIU-DK-029
    quote: "The distinction between the experiencing self and the remembering self is fundamental"
    fonte: "Tyler Cowen Conversation"
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    tags: [experiencing-self, remembering-self, happiness]

  - id: MIU-DK-030
    quote: "We don't choose between experiences; we choose between memories of experiences"
    fonte: "TED Talk"
    tipo_semantico: framework
    camada_dna: filosofia
    profundidade: profunda
    tags: [memory, choice, experiencing-vs-remembering]

  - id: MIU-DK-031
    quote: "The word 'happiness' is not useful anymore because we apply it to too many different things"
