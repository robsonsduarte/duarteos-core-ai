    recomendacao_calibracao: >
      Considerar fator de correcao para mentes com: (1) fontes primarias > 10,
      (2) concordancia inter-agente > 0.90, (3) paradoxos bem documentados.
      Sugestao: multiplicador 1.05-1.10 no CS quando todas 3 condicoes presentes.
