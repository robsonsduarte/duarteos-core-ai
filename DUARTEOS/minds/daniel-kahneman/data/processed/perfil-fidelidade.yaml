      coerencia interna dos drivers e extraordinariamente alta (concordancia 0.91);
      (3) os paradoxos produtivos sao particularmente bem documentados e resolviveis.
      PCFE conservadora e preferivel a PCFE otimista, mas delta 11.45 sugere que o
