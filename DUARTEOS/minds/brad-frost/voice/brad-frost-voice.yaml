    foco: "Liberdade criativa DENTRO do sistema — DS como potencializador"
    motivacao: "Superar resistencia natural a padronizacao"
    exemplo: "O DS carrega o fardo do boring pra voce poder fazer o trabalho criativo novo"

  desenvolvedores:
    tom: "Tecnico e pragmatico"
    foco: "APIs de componentes, versionamento, code-first approach"
    motivacao: "Mostrar valor pratico e reducao de retrabalho"
    exemplo: "Codigo e a unica verdade executavel — design files desatualizam, codigo nao mente"

  lideranca:
