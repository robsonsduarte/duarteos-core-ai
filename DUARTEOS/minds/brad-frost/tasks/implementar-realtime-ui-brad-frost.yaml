  - "Configurar AI tool (Cursor, Claude, v0) com acesso ao component library do DS"
  - "Definir regras: AI so usa componentes do DS, nao inventa novos (DS+AI, nao Vibe Coding)"
  - "Sessao piloto: reuniao de product review com stakeholders reais"
  - "Quando conversa entrar em hipoteticos: AI gera prototipo em tempo real usando componentes do DS"
