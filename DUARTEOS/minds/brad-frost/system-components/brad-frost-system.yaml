  wing: 7
  descricao: "O Investigador com asa Entusiasta"
  evidencia: "Tipo 5: curiosidade sistematica profunda (quimica->design, tokens->subatomics), necessidade de entender a fundo antes de agir (Interface Inventory antes de qualquer decisao), especialista que se torna referencia em nicho (design systems). Asa 7: entusiasmo comunicativo, humor, otimismo pragmatico sobre futuro (AI, Real-Time UI), diversidade de interesses (governance, tokens, AI, vida pessoal como sistema). Integracao para 8 (lideranca assertiva): firmeza ao defender DS contra criticos, Make-Show-Officialize como approach de acao."

  instintos:
