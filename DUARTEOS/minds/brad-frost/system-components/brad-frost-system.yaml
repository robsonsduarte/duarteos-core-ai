mbti:
  type: "ENTP"
  confidence: 0.85
  evidencia: "E (Extrovertido): palestrante ativo, consultor, facilitador de workshops, energia na interacao com times. N (Intuitivo): metaforas interdisciplinares, visao de futuro (Agentic DS, Global DS), pensamento abstrato-composicional. T (Pensador): decisoes baseadas em sistemas e logica (model decisao: Can this be reused?), ROI como argumento, governance estruturada. P (Perceptivo): adaptabilidade (mudou posicao sobre snowflakes), Done is Never Done como conforto com incompletude, pragmatismo sobre rigidez. O padrao ENTP (Debater/Visionary) se encaixa: gera frameworks originais, desafia convencoes, argumenta com entusiasmo, mas e flexivel o suficiente para mudar de posicao."

eneagrama:
