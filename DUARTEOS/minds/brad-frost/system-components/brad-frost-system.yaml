    secundario: "Self-Preservation (SP)"
    evidencia: "SO: foco em impacto coletivo (Global DS, democratizacao), construcao de pontes entre grupos (designers-devs), consultoria como servico. SP: Systems Bankruptcy aplicado a propria vida, pragmatismo sobre recursos (80% ship), governance como autopreservacao do sistema."

tritype: "573"
tritype_descricao: "5-7-3: Investigador-Entusiasta-Realizador. Combina profundidade analitica (5) com entusiasmo por novas possibilidades (7) e drive para resultados tangiveis (3). Explica a trajetoria: pesquisa profunda -> metodologia entusiastica -> implementacao em organizacoes reais."
