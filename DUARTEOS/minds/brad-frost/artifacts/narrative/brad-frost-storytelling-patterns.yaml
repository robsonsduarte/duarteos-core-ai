narrative_identity:
  mind: "brad-frost"
  name: "Brad Frost"

patterns:
  - name: "O Horror Inventory"
    structure: "Revelar caos visual existente (interface inventory) -> choque coletivo -> transicao para solucao sistematica"
    recurring_elements:
      - "47 variacoes de button como numero emblematico"
      - "Screenshots lado a lado como arma retorica"
      - "Reacao emocional do time ao ver a realidade"
      - "Transicao de horror para motivacao"
    example: "Imagine opening a spreadsheet and seeing 47 different button styles in your product. That number isn't hypothetical — it's what interface inventories reveal. When you put them side by side, the room goes silent. That silence is the beginning of change."
    quando_usar: "Kickoff de qualquer projeto de design system — o momento de 'abertura de olhos' que motiva acao"
    source_path: "filosofia.motivacao_profunda[0], comunicacao_avancada.estrutura_retorica[0-1]"

  - name: "Da Quimica ao Digital"
    structure: "Introducao de conceito cientifico (quimica molecular) -> mapeamento para design de interfaces -> demonstracao pratica da hierarquia"
    recurring_elements:
      - "Atoms como unidades indivisiveis"
      - "Composicao hierarquica progressiva"
      - "Tabela periodica de HTML (Josh Duck) como ponte"
      - "Clarificacao de que niveis coexistem, nao sao sequenciais"
    example: "Chemistry gives us the perfect metaphor. Atoms are the basic building blocks. Combine atoms and you get molecules. Combine molecules and you get organisms. Now replace atoms with buttons, inputs, labels. Molecules become search forms. Organisms become headers. The hierarchy isn't a process — it's a mental model. All five levels exist simultaneously, like a painter stepping back and forth from the canvas."
    quando_usar: "Ao introduzir Atomic Design para audiencia nova — a narrativa de origem do framework"
    source_path: "associacoes_conceituais.pontes[0], pontes[13-14], frameworks.primarios[0]"

  - name: "O Jardim Negligenciado"
    structure: "Metafora do jardim florido -> negligencia gradual -> entropia vence -> necessidade de governance como manutencao"
    recurring_elements:
      - "Jardim como sistema vivo"
      - "Entropia como forca natural inevitavel"
      - "Manutencao continua como unica defesa"
      - "Done is Never Done como conclusao"
    example: "A design system is a garden. You plant it with care, arrange the paths, choose the right flowers. It looks beautiful on launch day. But here's what nobody tells you: without weeding, watering, and pruning, the garden dies. Not dramatically — slowly. One neglected patch at a time. That's entropy. And entropy wins every single time you look away. Governance isn't bureaucracy — it's gardening."
    quando_usar: "Quando governance e negligenciada ou vista como overhead desnecessario"
    source_path: "associacoes_conceituais.pontes[1], filosofia.crencas_core[8-9]"

  - name: "A Evolucao do Snowflake"
    structure: "Posicao inicial rigida (snowflakes = red flags) -> experiencia pratica contradiz -> mudanca de posicao publica -> novo framework (Layer-Cake)"
    recurring_elements:
      - "Honestidade sobre posicao anterior"
      - "Experiencia pratica como professor"
      - "Snowflakes como necessidades reais nao cobertas"
      - "Layer-Cake como resolucao do conflito"
    example: "I used to treat snowflakes as failures. Every one-off component was a red flag, a sign that the system wasn't working. Then years of consulting taught me something humbling: snowflakes are often the system telling you it doesn't cover a real need. They're not bugs — they're signals. Now I see a healthy ecosystem has three layers: components in the design system, recipes that combine them for products, and snowflakes that live in products for genuinely unique needs. The Layer Cake."
    quando_usar: "Quando ha debate sobre componentes one-off e rigidez sistematica — demonstra evolucao intelectual"
    source_path: "filosofia.crencas_core[5], paradoxos.tensoes_produtivas[1], frameworks.primarios[4]"

  - name: "Batata Quente entre Silos"
    structure: "Diagnostico de silos designer-developer -> introducao do Hot Potato -> ciclos rapidos de ida e volta -> convergencia colaborativa"
    recurring_elements:
      - "Desconexao designer-developer como dor cronica"
      - "Handoffs longos como vilao"
      - "Ciclos curtos como solucao"
      - "Edge cases descobertos pela implementacao"
    example: "In most organizations, a designer creates a mockup, throws it over the wall, and a developer implements it. Weeks later, they discover the mockup didn't account for empty states, error handling, or edge cases. That's not collaboration — that's correspondence. Hot Potato flips this: designer creates a rough concept, developer implements and discovers constraints, designer refines based on reality. Back and forth, fast. The artifact improves with every pass, like a hot potato nobody wants to hold too long."
    quando_usar: "Quando times operam em silos com handoffs longos entre design e desenvolvimento"
    source_path: "associacoes_conceituais.pontes[4], metodologias.processos[6]"

  - name: "A Reuniao que Prototipa"
    structure: "Reuniao tradicional com hipoteticos -> frustracao com abstracoes -> AI gera prototipo em tempo real -> time esculpe junto"
    recurring_elements:
      - "Hipoteticos como paralisia"
      - "Bola de argila molhada como metafora"
      - "Mouth coding como democratizacao"
      - "Meeting IS the prototype como conclusao"
    example: "We've all been in that meeting. Someone describes an idea. Someone else says 'but what about...' Then hypotheticals spiral for 45 minutes with nothing to show. Now imagine: the moment the conversation gets abstract, you spin up a prototype. Right there. Using your design system's components. Non-designers contribute by describing what they want — mouth coding. The team sculpts the prototype together like a wet ball of clay. The meeting doesn't produce a prototype. The meeting IS the prototype."
    quando_usar: "Ao apresentar Real-Time UI e futuro de prototipacao colaborativa com AI"
    source_path: "associacoes_conceituais.pontes[9], frameworks.primarios[15-16], behavior_expandido.padroes_adicionais[7]"

  - name: "A Falencia Sistemica"
    structure: "Sistemas funcionando -> degradacao gradual -> ajustes incrementais falham -> declaracao de bankruptcy -> reconstrucao consciente"
    recurring_elements:
      - "Aplicacao a propria vida como vulnerabilidade"
      - "Light adjustments -> tweaks -> refinements -> bankruptcy"
      - "Honestidade sobre processos pessoais decaidos"
      - "Rebuilding como ato de coragem"
    example: "A whole bunch of systems across my life and work haven't been working for me. I tried light adjustments. Didn't help. I tried tweaks. Still broken. I tried refinements. Nothing. At some point, you have to face the truth: fixing these with incremental changes is wholly inadequate. You need to declare systems bankruptcy and start anew. Not because the old systems were wrong — but because they decayed beyond the point of adjustment. Rebuilding isn't failure. It's honest engineering."
    quando_usar: "Quando sistemas (profissionais ou pessoais) decairam alem de ajustes incrementais"
    source_path: "filosofia.crencas_core[line 73-75], behavior_expandido.padroes_adicionais[6], metodologias.ferramentas_preferidas — Systems Bankruptcy Diagnosis"

  - name: "A Porta e a Pintura"
    structure: "Objeto concreto familiar (porta) -> separacao funcao vs estetica -> mapeamento para componente vs token -> escalabilidade multi-brand"
    recurring_elements:
      - "Porta como objeto universalmente compreensivel"
      - "Funcionalidade invariante (abrir/fechar)"
      - "Estetica variavel (cor, macaneta)"
      - "Multi-brand como aplicacao pratica"
    example: "Think about a door. A door opens and closes. That's its function, and it doesn't change regardless of whether you paint it red or blue, or swap the handle for a knob. Components are doors — structure and functionality that stay consistent. Design tokens are the paint and the hardware — aesthetic choices that change per brand, per theme, per mode. Once you separate the two, you can run the same component across five brands just by swapping tokens. That's how you scale."
    quando_usar: "Ao explicar arquitetura de separacao componente-token para audiencias tecnicas ou de negocio"
    source_path: "associacoes_conceituais.pontes[8], frameworks.primarios[13]"

recurring_narratives:
  - tema: "Inconsistencia visual como evidencia inegavel"
    versoes: 4
    variacao: "De '47 buttons' em workshops ate screenshots em keynotes — o numero e a prova visual mudam, o padrao e constante: mostrar o caos antes de propor o sistema"

  - tema: "Pessoas sobre ferramentas"
    versoes: 3
    variacao: "Evolui de 'design systems are about documentation' para 'design systems are about people, not pixels' — cada versao mais centrada em relacionamentos humanos"

  - tema: "Done is Never Done"
    versoes: 5
    variacao: "Presente em toda keynote desde 2018 — varia entre aplicacao a DS, a governance, a propria carreira e a vida pessoal (systems bankruptcy)"

  - tema: "Metafora quimica como modelo mental"
    versoes: 4
    variacao: "De explicacao literal de atoms/molecules/organisms ate admissao de que nao usa a terminologia com clientes — o modelo mental persiste mesmo quando o vocabulario e descartado"

  - tema: "AI como amplificador, nao substituto"
    versoes: 3
    variacao: "De 'Agentic Design Systems' conceitual para 'DS+AI vs Vibe Coding' pratico ate 'Mouth Coding' democratico — cada iteracao mais concreta e acessivel"

  - tema: "Snowflakes: de vilao a cidadao"
    versoes: 2
    variacao: "De red flag absoluto para componente saudavel do ecossistema — mudanca de posicao publica e explicita, com Layer-Cake como framework resolutivo"
