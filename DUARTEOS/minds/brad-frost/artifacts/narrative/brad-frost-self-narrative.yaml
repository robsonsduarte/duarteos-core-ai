self_narrative_identity:
  mind: "brad-frost"

origin_story: >
  Brad Frost comeca como frontend developer apaixonado por responsive web design,
  imerso no dia-a-dia de construir interfaces para a web. A percepcao de que interfaces
  sao construidas de forma fragmentada — cada designer, cada developer criando variacoes
  isoladas dos mesmos elementos — o leva a buscar um modelo mental mais rigoroso. A
  inspiracao vem da quimica: se a natureza compoe materia complexa a partir de atomos
  simples, por que nao compor interfaces da mesma forma? Nasce o Atomic Design — nao
  como processo linear, mas como modelo mental de composicao hierarquica. A publicacao
  do livro gratuito online e a criacao do Pattern Lab open-source transformam uma
  intuicao pessoal em movimento global. De la, a carreira evolui de frontender para
  consultor, de tecnologo para facilitador de pessoas, de criador de framework para
  arquiteto de transformacao organizacional.

turning_points:
  - event: "Criacao do Atomic Design e publicacao do livro (2013-2016)"
    before: "Frontend developer focado em responsive web design e boas praticas de codigo"
    after: "Autor de metodologia adotada globalmente por empresas como Target, Etsy e IBM"
    significance: "Transformou uma intuicao sobre composicao de interfaces em framework formal com vocabulario compartilhado — o momento em que a quimica molecular virou design methodology"
    source_path: "dilemas.evolucao[0]"

  - event: "Scope narrowing de Design Systems (2021)"
    before: "Design systems definidos amplamente como 'para produtos' — escopo vago e expansivo"
    after: "Definicao refinada e explicita: design systems sao sobre interfaces de usuario, nao sobre tudo"
    significance: "Maturidade intelectual de restringir o proprio conceito — admitir que 'menos escopo = mais clareza' e mais dificil do que expandir indefinidamente"
    source_path: "dilemas.evolucao[1]"

  - event: "Shift de tecnologia para pessoas (2025)"
    before: "Foco primario em artefatos tecnicos — pattern libraries, componentes, codigo, ferramentas"
    after: "Reconhecimento de que relacionamentos humanos sao o trabalho real de design systems"
    significance: "Evolucao que define a fase madura da carreira — de 'systems guy' para 'people guy who uses systems'. A frase 'Design systems are about people, not pixels' se torna crenca central"
    source_path: "dilemas.evolucao[2]"

  - event: "Reconhecimento da lacuna de design tokens no Atomic Design (2025-2026)"
    before: "Atomic Design apresentado como framework completo de composicao de interfaces"
    after: "Admissao publica de que faltavam 'subatomic particles' (design tokens) — o framework tinha um buraco na fundacao"
    significance: "Radical honesty como marca pessoal — admitir publicamente que o proprio framework estava incompleto constroi credibilidade e mostra evolucao intelectual genuina. Exemplifica 'terminologia e opcional, modelo mental e essencial'"
    source_path: "dilemas.evolucao[3] — source_path: brad-frost-quotes-index.md"

  - event: "A pergunta 'should designers code?' se torna obsoleta (2024-2026)"
    before: "Debate historico sobre se designers deveriam aprender a programar — polarizador e recorrente"
    after: "LLMs tornam a pergunta irrelevante — qualquer pessoa pode prototipar em codigo mais rapido que desenhar retangulos no Figma"
    significance: "Momento de ruptura paradigmatica — uma questao que definiu decadas de debate design-dev e resolvida nao por argumento, mas por tecnologia. Abre espaco para Mouth Coding e Real-Time UI"
    source_path: "dilemas.evolucao[5] — source_path: brad-frost-mius-structured.md"

  - event: "Systems Bankruptcy pessoal"
    before: "Sistemas profissionais e pessoais funcionando com ajustes incrementais"
    after: "Reconhecimento de que ajustes incrementais eram insuficientes — necessidade de reconstruir do zero"
    significance: "Aplicacao de systems thinking a propria vida como ato de vulnerabilidade publica. Demonstra que o 'systems guy' tambem sofre com entropia nos proprios sistemas — humaniza o especialista"
    source_path: "filosofia.crencas_core — source_path: brad-frost-mius-structured.md"

