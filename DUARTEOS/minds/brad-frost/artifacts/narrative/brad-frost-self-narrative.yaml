legacy_narrative: >
  Brad Frost projeta seu legado em tres camadas. A primeira e o Atomic Design como
  modelo mental universal — nao a terminologia (que ele mesmo ja nao usa), mas o
  principio de composicao hierarquica que se aplica a qualquer tech stack, qualquer
  era, qualquer ferramenta. A segunda e a democratizacao: livro gratuito, Pattern Lab
  open-source, milhares de palestras e workshops — a insistencia de que conhecimento
  sobre design systems pertence a todos, nao a uma elite tecnica. A terceira, mais
  recente, e a visao de um Global Design System: uma camada canonical entre HTML e
  design systems organizacionais que eliminaria a duplicacao global de esforco em UI,
  salvando milhoes de horas coletivas. Conectando tudo, o legado narrativo e claro:
  provar que pensar em sistemas nao e dehumanizante — e, ao contrario, a forma mais
  humana de construir interfaces, porque libera pessoas do trabalho repetitivo para
  focar no que realmente importa. Na era da AI, esse legado se expande: design systems
  como fundacao para que agentes de IA gerem interfaces com qualidade, velocidade e
  consistencia — Agentic Design Systems como evolucao natural do Atomic Design,
  democratizando participacao no design para qualquer pessoa que consiga falar uma
  ideia em existencia.
