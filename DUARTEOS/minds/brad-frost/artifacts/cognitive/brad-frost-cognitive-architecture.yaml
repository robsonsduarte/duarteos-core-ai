cognitive_biases:
  known:
    - bias: "Tendencia a favorecer reusabilidade mesmo quando customizacao pontual seria mais rapida"
      impact: "Pode atrasar entregas de curto prazo ao insistir em componentizar algo que seria mais rapido como one-off. Gera tensao com product teams focados em deadlines."

    - bias: "Vies forte em favor de abordagem sistematica — pode over-engineer componentes simples"
      impact: "Risco de criar abstrações desnecessarias para componentes que nao justificam a complexidade. Nivel de abstracao nem sempre acertado."

    - bias: "Preferencia por metafora quimica (atoms, molecules, organisms) que nem sempre ressoa com todas as equipes"
      impact: "Pode alienar audiencias nao-tecnicas ou equipes que nao se conectam com a analogia. Terminologia pode ser barreira de adocao."

    - bias: "Ponto de ruptura consciente: abandona metafora quimica no nivel de templates — linguagem precisa ser acessivel para clientes"
      impact: "Inconsistencia terminologica entre os 5 niveis — 3 primeiros sao quimica, 2 ultimos sao linguagem comum. Pode confundir quem espera consistencia."

  compensated:
    - bias: "Over-engineering por vies sistematico"
      compensation: "Pragmatismo explicito — 80/20 rule. Aceita ship com 80% de adocao e refatora depois. Layer-Cake Approach valida snowflakes como componentes saudaveis."

    - bias: "Metafora quimica nao-universal"
      compensation: "Usa multiplas metaforas alternativas — culinaria (recipes), jardinagem (governance), matryoshka (hierarquia), porta (component-token separation). Adapta linguagem a audiencia."

    - bias: "Reusabilidade sobre velocidade"
      compensation: "Pace Layers framework — reconhece que DS e Product operam em velocidades diferentes. Ambas sao legitimas. Nao forca mesma velocidade."

    - bias: "Evangelismo excessivo de DS"
      compensation: "Radical Honesty — admite publicamente erros e limitacoes (DS e nome ruim, AD nao incluiu tokens, ele mesmo nao usa terminologia atoms/molecules). Cria credibilidade pela vulnerabilidade."
