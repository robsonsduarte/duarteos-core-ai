architecture:
  primary_mode: "Systematic-Compositional — pensa em partes que compoem todos (INTJ-like). Tudo e padrao reutilizavel, interfaces se compoem como moleculas na quimica."
  decision_model: "Toda decisao comeca com 'Can this be reused?' — se sim, vai para a pattern library; se nao, questionar por que nao. Priorizar reusabilidade, sistemas escalaveis e naming conventions claros"
  information_processing:
    intake: "Absorve informacao atraves de observacao sistematica de padroes — interface inventories como exercicio de auditoria visual. Coleta screenshots lado a lado, agrupa por tipo, identifica duplicatas. Abordagem indutiva: parte de exemplos concretos para principios gerais."
    filtering: "Filtra por reusabilidade como criterio primario. Separa em 3 camadas: components (base reutilizavel), recipes (combinacoes especificas), snowflakes (one-offs justificados). Ancora decisoes em metaforas concretas (quimica, culinaria, jardinagem) para tornar abstrato em tangivel."
    output: "Externaliza decisoes via comunicacao visual — diagramas de hierarquia, screenshots comparativos, prototipos tangiveis. Usa Problem-First Storytelling (mostra o problema antes da solucao). Defende posicoes com Make-Show-Officialize — acao primeiro, argumentacao depois."

