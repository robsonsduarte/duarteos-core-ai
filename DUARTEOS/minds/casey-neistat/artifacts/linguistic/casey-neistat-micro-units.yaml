registro_linguistico:
  formalidade: "muito baixa — street talk elevado"
  complexidade_sintatica: "baixa — frases curtas, estrutura SVO direta"
  vocabulario_range: "medio — coloquial com picos de eloquencia narrativa"
  humor: "auto-depreciativo + ironia situacional (nao trocadilhos)"
  emocionalidade: "alta — voz carrega emocao genuina, nao performada"
