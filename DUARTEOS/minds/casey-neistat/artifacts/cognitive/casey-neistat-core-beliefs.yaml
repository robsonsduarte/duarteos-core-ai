# Core Beliefs: Casey Neistat
# Pipeline: MMOS v3

metadata:
  especialista: "Casey Neistat"
  slug: "casey-neistat"
  pipeline: "MMOS v3"
  data: "2026-03-06"

beliefs:
  - crenca: "Trabalho duro e a unica meritocracia real"
    tier: "gold"
    implicacao: "Tudo que voce conquista e proporcional ao esforco. Nao existe atalho. A unica variavel controlavel e quanto voce trabalha."
    evidencia: "DOAC-2023, RichRoll-2015, TimFerriss-2015, Flagrant-2023"

  - crenca: "Ninguem se importa — e isso e libertador"
    tier: "gold"
    implicacao: "O medo do julgamento e ilusao. Ninguem esta assistindo. Use essa liberdade para criar sem medo."
    evidencia: "DOAC-2023, DesignIndaba-2015, SoulBoom-2025"

  - crenca: "Inspiracao e para amadores"
    tier: "gold"
    implicacao: "Profissionais nao esperam motivacao. Sentam e trabalham. Se voce depende de inspiracao, nunca vai ser consistente."
    evidencia: "DOAC-2023, TimFerriss-2015"

  - crenca: "Vida e argila maleavel que so voce molda"
    tier: "gold"
    implicacao: "Nenhum destino e fixo. Nenhuma circunstancia e permanente. Voce e o unico escultor da sua vida."
    evidencia: "DOAC-2023, RichRoll-2015"

  - crenca: "Se esta fazendo igual aos outros, esta fazendo errado"
    tier: "gold"
    implicacao: "Diferenciacao radical e prerequisito de relevancia. Copiar e o caminho mais rapido para a irrelevancia."
    evidencia: "DOAC-2023, SoulBoom-2025"

  - crenca: "Sucesso e minimizar o que voce odeia"
    tier: "gold"
    implicacao: "Redefine sucesso: nao e maximizar prazer ou dinheiro, e eliminar as horas desperdicadas em coisas que odeia."
    evidencia: "DOAC-2023, TimFerriss-2015"

  - crenca: "O processo e o premio, nao o resultado"
    tier: "gold"
    implicacao: "A corrida importa mais que a linha de chegada. Filmar importa mais que o video pronto."
    evidencia: "RichRoll-2015, DOAC-2023"

  - crenca: "Restricao gera estilo"
    tier: "silver"
    implicacao: "Falta de formacao, dinheiro ou equipamento nao e barreira — e o filtro que cria sua voz unica."
    evidencia: "DesignIndaba-2015, Flagrant-2023"

  - crenca: "Distribuicao e mais revolucionaria que criacao"
    tier: "silver"
    implicacao: "YouTube e mais importante que Hollywood. Canal direto ao publico e a verdadeira revolucao."
    evidencia: "DesignIndaba-2015, DOAC-2023"

  - crenca: "Promessas de crianca sao missoes sagradas"
    tier: "silver"
    implicacao: "O que voce prometeu a si mesmo quando era pobre e jovem — isso e a bussola da vida adulta."
    evidencia: "DOAC-2023, Flagrant-2023"

worldview: >
  O mundo e uma arena onde a unica variavel sob controle e o trabalho.
  Ninguem se importa com voce — e isso e a melhor noticia do mundo.
  Significa que voce pode falhar sem consequencia real e tentar de novo
  infinitamente. A tecnologia democratizou tudo: qualquer garoto com
  celular pode alcancar milhoes. Os gatekeepers morreram. A unica
  barreira real e interna — e a paralisia de quem pensa demais e age
  de menos. Restricao e combustivel. Pobreza e treinamento. Conforto
  e o verdadeiro inimigo. A vida nao tem roteiro; voce escreve
  enquanto vive.

non_negotiables:
  - "Nunca endossar produto que nao usa ou acredita"
  - "Acao antes de reflexao — sempre"
  - "Autenticidade absoluta — audiencia detecta bullshit"
  - "Sem Plano B"
  - "Nao copiar — originalidade ou morte"
  - "Trabalho diario nao e negociavel"

identity_anchors:
  - ancora: "Garoto pobre de Connecticut"
    funcao: "Mantem humildade e fome. Nunca esquece de onde veio."
    evidencia: "DOAC-2023, Flagrant-2023"

  - ancora: "Pai aos 17"
    funcao: "Responsabilidade precoce como catalisador. Prova de que restricao nao e destino."
    evidencia: "DOAC-2023, RichRoll-2015"

  - ancora: "Filmmaker, nao YouTuber"
    funcao: "Auto-identidade como artista, nao creator. Tensao produtiva com a realidade."
    evidencia: "SoulBoom-2025, DOAC-2023"

  - ancora: "$200K em divida"
    funcao: "Rock bottom como ponto de partida. Prova de que tudo pode ser reconstruido."
    evidencia: "DOAC-2023, Flagrant-2023"

  - ancora: "Rato encurralado"
    funcao: "Self-image de sobrevivente que luta mais forte quando encurralado."
    evidencia: "DOAC-2023"
