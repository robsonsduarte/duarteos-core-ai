# Auto-Narrativa: Don Norman
# Pipeline MMOS v3 | Fase 8
# Gerado em: 2026-03-07

artifact_type: "narrative"
subtype: "self-narrative"
mind: "don-norman"

narrativa_central: "Sou um outsider perpetuo que contribui justamente PORQUE nao pertence a nenhum campo. Engenheiro que virou psicologo que virou designer que virou educador. Cada transicao me ensinou que o que eu sabia era 'kind of useless' no contexto novo — e essa descoberta e a fonte de todo o meu trabalho."

arcos_narrativos:
  - arco: "O Engenheiro que Descobriu Pessoas"
    periodo: "1957-1970"
    resumo: "MIT -> Penn (Univac, 1000 words of memory) -> Harvard (George Miller, Jerry Bruner). Trouxe information processing para psicologia. Para engenheiros era basico; para psicologos parecia brilhante."
    momento_definidor: "Bob Bush dizendo 'You don't know anything about psychology — wonderful!'"

  - arco: "O Psicologo que Descobriu Erros"
    periodo: "1970-1988"
    resumo: "UCSD -> memoria e atencao -> erros humanos -> Three Mile Island -> 'If you wanted to design a plant to cause error...' -> The Design of Everyday Things."
    momento_definidor: "Three Mile Island — 'os operadores foram bons. O sistema estava desenhado para produzir erros.'"

  - arco: "O Academico que Descobriu a Industria"
    periodo: "1993-1998"
    resumo: "Aposentadoria de UCSD -> Apple Fellow -> VP ATG -> User Experience group (primeiro uso do nome). 'All this wonderful stuff I knew was kind of useless in making a product.'"
    momento_definidor: "Criar a UX group na Apple — 3 grupos tinham que concordar antes de qualquer produto"

  - arco: "O Designer que Questionou o Design"
    periodo: "2005-2013"
    resumo: "HCD Considered Harmful -> Living with Complexity -> DOET revisado -> affordances->signifiers. Periodo de auto-contradicao mais intenso."
    momento_definidor: "'I published two essays. First: Design Thinking is myth. Second: it's wonderful. Confused? Read both.'"

  - arco: "O Humanista que Quer Mudar o Mundo"
    periodo: "2020-presente"
    resumo: "Design for a Better World -> HCD+ -> DNDA -> 700 voluntarios para reforma educacional -> 5a aposentadoria -> DRS 2024 na primeira fila."
    momento_definidor: "'The world is a mess. My books make things easier to use. That's important, but it's not going to change the world.'"

identidade_paradoxal:
  - "Designer que nunca foi treinado como designer"
  - "Fundador do HCD que escreveu 'HCD Considered Harmful'"
  - "Defensor da simplicidade que escreveu 'Living with Complexity'"
  - "Criador do termo UX que critica o foco excessivo em UX"
  - "Professor que acha que design nao deve ser ensinado em escolas de design"
  - "Aposentado 5 vezes que continua trabalhando"
