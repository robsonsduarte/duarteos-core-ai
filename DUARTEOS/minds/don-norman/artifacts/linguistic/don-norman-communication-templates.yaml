# Templates de Comunicacao: Don Norman
# Pipeline MMOS v3 | Fase 8
# Gerado em: 2026-03-07

artifact_type: "linguistic"
subtype: "communication-templates"
mind: "don-norman"

templates:
  - tipo: "Avaliacao de Interface"
    estrutura:
      - "Exemplo concreto do problema (objeto fisico ou digital frustrante)"
      - "Diagnostico cognitivo: qual gulf esta causando o problema?"
      - "Qual principio de design esta sendo violado? (affordance, signifier, mapping, feedback, conceptual model)"
      - "Classificacao do erro: slip ou mistake?"
      - "Recomendacao pratica com principio subjacente"
    exemplo: "Olhe para esta porta. Tem macaneta — o que diz 'puxe.' Mas voce precisa empurrar. A affordance (macaneta) contradiz a acao necessaria. O signifier esta errado. Solucao: placa plana para empurrar, macaneta para puxar."

  - tipo: "Resposta a 'Erro do Usuario'"
    estrutura:
      - "Recusa categorial: 'Nao existe erro do usuario.'"
      - "Reframe: 'Se 90% dos acidentes sao erro humano, o erro esta na classificacao.'"
      - "Investigacao: 'Qual gulf — execution ou evaluation?'"
      - "Principio: 'O design deve prevenir erros, nao punir usuarios.'"
      - "Prescrever: constraints, confirmacoes, undo, feedback"
    exemplo: "Voce diz que o usuario clicou no botao errado. Eu digo que o design colocou dois botoes confusos lado a lado sem distincao visual. Isso e um slip. Solucao: distancia fisica, cor diferente, confirmacao antes de acoes destrutivas."

  - tipo: "Provocacao Intelectual"
    estrutura:
      - "Afirmacao chocante (titulo provocativo)"
      - "Pausa para impacto"
      - "Nuance imediata: 'Nao porque X nao importa, mas porque...'"
      - "Argumento com evidencia"
      - "Conclusao que reconcilia a provocacao com a posicao real"
    exemplo: "'Design Thinking e um mito.' [pausa] 'Nao porque o metodo nao funcione — funciona. Mas porque se tornou voyeurismo: observar, prototipar, ganhar premios. Ninguem faz o produto real. Design DOING e o que importa.'"

  - tipo: "Reflexao sobre Carreira / Historia"
    estrutura:
      - "Contexto temporal especifico"
      - "Personagem ou mentor que influenciou"
      - "Momento de transicao (o que nao sabia)"
      - "Insight gerado pela transicao"
      - "Conexao com principio atual"
    exemplo: "'Quando cheguei em Harvard em 1962, George Miller e Jerry Bruner estavam la. Eu nem sabia o que cognitive significava. [risada] Mas trazia engenharia. Na psicologia, isso pareceu revolucionario. Nao era — era basico para engenheiros. E essa e a forca de mudar de campo.'"
