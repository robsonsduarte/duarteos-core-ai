  # === LIVROS ===
  - id: F01
    tipo: livro
    titulo: "The Design of Everyday Things (Revised & Expanded Edition)"
    url: "https://jnd.org/books/the-design-of-everyday-things-revised-and-expanded-edition/"
    editora: "Basic Books / MIT Press"
    duracao_estimada: longa
    profundidade: profunda
    primaria: true
    idioma: en
    data_publicacao: "2013"
    tier: EXA
    conteudo_extraido: true
    notas: "Prefacio completo extraido via jnd.org. 7 capitulos, 2 novos (Design Thinking + Design in Business). Conceitos-chave: affordances vs signifiers, 7 stages of action, gulf of execution/evaluation, error taxonomy (slips vs mistakes), HCD process."

  - id: F02
    tipo: livro
    titulo: "Emotional Design: Why We Love (or Hate) Everyday Things"
    url: "https://jnd.org/books/emotional-design-why-we-love-or-hate-everyday-things/"
    editora: "Basic Books"
    duracao_estimada: longa
    profundidade: profunda
    primaria: true
    idioma: en
    data_publicacao: "2004"
    tier: EXA
    conteudo_extraido: false
    notas: "Referenciado extensamente em fontes extraidas. Framework dos 3 niveis de processamento emocional: visceral, behavioral, reflective. Teapot collection como exemplo iconitico."

  - id: F03
    tipo: livro
    titulo: "Living with Complexity"
    url: "https://jnd.org/living-with-complexity/"
    editora: "MIT Press"
    duracao_estimada: longa
    profundidade: profunda
    primaria: true
    idioma: en
    data_publicacao: "2010"
    tier: EXA
    conteudo_extraido: false
    notas: "Referenciado em Looking Back, Looking Forward. Argumento central: simplicidade nao deve ser o objetivo — o mundo e complexo, ferramentas devem ser compreensiveis, nao simples. Introduz signifiers como conceito distinto de affordances."

  - id: F04
    tipo: livro
    titulo: "Design for a Better World: Meaningful, Sustainable, Humanity Centered"
    url: "https://jnd.org/books/"
    editora: "MIT Press"
    duracao_estimada: longa
    profundidade: profunda
    primaria: true
    idioma: en
    data_publicacao: "2023"
    tier: EXA
    conteudo_extraido: true
    notas: "Conteudo extraido via entrevistas (Design Matters, Roland Berger). 3 partes: meaningfulness, sustainability, humanity-centered design. Evolucao de HCD para HCD+. Economia circular. Papanek como referencia."

  - id: F05
    tipo: livro
    titulo: "User Centered System Design: New Perspectives on Human-Computer Interaction"
    url: "https://jnd.org/books/"
    editora: "Lawrence Erlbaum"
    duracao_estimada: longa
    profundidade: profunda
    primaria: true
    idioma: en
    data_publicacao: "1986"
    tier: EXA
    conteudo_extraido: false
    notas: "Co-editado com Stephen Draper. Primeiro uso do termo 'user centered'. Citado na entrevista NAE como ponto de partida para carreira em design."

