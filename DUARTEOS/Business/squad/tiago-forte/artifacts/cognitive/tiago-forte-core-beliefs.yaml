worldview: >
  O mundo e um sistema de fluxos de informacao onde a maioria das pessoas esta
  afogada. A tecnologia e o novo sistema nervoso externo — quando bem desenhada,
  liberta; quando mal usada, escraviza. Cada individuo tem potencial ilimitado,
  mas precisa de ferramentas e metodos para canalizar esse potencial. A proxima
  fronteira da produtividade nao e organizacional, e individual. O conhecimento
  nao e para acumular, mas para transformar em acao criativa. Tudo pode ser
  redesenhado, reinventado, reframed — a imaginacao e o unico limite.

non_negotiables:
  - principio: "Principios acima de prescricoes — nunca dogmatizar metodos"
  - principio: "Autenticidade sobre receita — jamais vender algo que nao acredita"
  - principio: "Externalizacao como pratica diaria — nenhuma ideia fica apenas na mente"
  - principio: "Autonomia criativa e inegociavel — nenhuma parceria vale a perda de direcao"
  - principio: "Criacao ativa sobre consumo passivo — o output valida o input"

