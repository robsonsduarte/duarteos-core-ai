# DuarteOS System Config — Layer 0 (Defaults do Sistema)
#
# Este arquivo contem os defaults do DuarteOS.
# NAO EDITE — sera sobrescrito no update.
# Para customizar, edite project.yaml (Layer 1) ou user.yaml (Layer 2).
# Veja .claude/protocols/CONFIG-PROTOCOL.md para detalhes.

version: "5.0.0"

agents:
  default_model: "opus"
  greeting_style: "minimal"     # minimal | named | archetypal
  memory_enabled: true
  synapse_enabled: true

# Model Routing — Roteamento Inteligente de Modelos
# Define qual modelo usar para cada tipo de operacao.
# Regra inviolavel: todo agente DEVE respeitar este roteamento.
model_routing:
  # Tier 1: Coleta — pesquisas web, scraping, buscas externas
  collect:
    model: "haiku"
    description: "Pesquisas web, WebSearch, WebFetch, MCPs de busca (exa, apify, fetch, web-scraper)"
    tools:
      - WebSearch
      - WebFetch
      - mcp__exa__*
      - mcp__apify__*
      - mcp__fetch__*
      - mcp__web-scraper__*
      - mcp__youtube-transcript__*

  # Tier 2: Processar — interpretar, analisar, sintetizar dados coletados
  process:
    model: "sonnet"
    description: "Interpretar dados coletados, sintetizar, analisar, classificar, extrair insights"

  # Tier 3: Criar — escrever codigo, dados complexos, decisoes arquiteturais
  create:
    model: "opus"
    description: "Escrever codigo, implementar features, decisoes complexas, dados estruturados"

quality:
  pre_commit_checks: true
  auto_lint: true
  security_gate: true
  min_test_coverage: 0          # 0 = desabilitado
  bundle_size_alert_kb: 0       # 0 = desabilitado

features:
  task_templates: true
  squad_factory: true
  mind_clone: true
  constitution_enforced: true

naming:
  commit_style: "conventional"  # conventional | freeform

ide_sync:
  cursor: false
  windsurf: false
  copilot: false
