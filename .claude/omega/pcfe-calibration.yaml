  # Expected schema for each entry:
  #
  # - slug: "{clone-slug}"
  #   category: "{categoria}"
  #   FE: 0                    # Fidelidade Estimada (from PCFE, Phase 3)
  #   FE_breakdown:
  #     VS: 0                  # Volume Score at estimation time
  #     DS: 0                  # Diversity Score at estimation time
  #     CS: 0                  # Coverage Score at estimation time
  #     PS: 0                  # Profundidade Score at estimation time
  #     QS: 0                  # Quality Score at estimation time
  #   F_real: 0                # Fidelidade Real (from Phase 9 validation)
  #   F_real_breakdown:
  #     L: 0                   # Linguistic Accuracy
  #     B: 0                   # Behavioral Fidelity
  #     C: 0                   # Contradiction Handling
  #     K: 0                   # Knowledge/Framework
  #     V: 0                   # Voice Authenticity
  #   delta: 0                 # F_real - FE (positive = underestimation, negative = overestimation)
  #   accuracy: 0              # 100 - abs(delta)
  #   anomaly: false           # true if accuracy < 70%
  #   enrichment_loops: 0      # how many times user chose ENRIQUECER (0-3)
  #   timestamp: "ISO8601"     # when Phase 9 completed

# === AGGREGATE STATS ===
# Recalculated after each new calibration entry

stats:
  total_clones: 3
  avg_delta: 3.00              # average(4.75, 2.20, 2.05)
  avg_accuracy: 97.00          # average(95.25, 97.80, 97.95)
  overestimation_count: 0      # how many times FE > F_real
  underestimation_count: 3     # how many times FE < F_real
  anomaly_count: 0             # how many clones had accuracy < 70%
  avg_delta_by_category:       # {categoria: avg_delta} — reveals category-specific bias
    saude: 4.75
