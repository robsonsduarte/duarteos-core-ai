metodologias:
  - nome: "Daily Vlog Method"
    descricao: "Filmar um video todo dia. Volume como disciplina, nao como sacrificio de qualidade."
    steps:
      - "Filmar tudo — sempre com camera"
      - "Editar rapido — sem perfeccionismo"
      - "Upload diario — deadline inegociavel"
      - "Iterar pelo feedback do publico"
    evidencia: "800+ vlogs consecutivos"
    source_path: "DOAC-2023, SoulBoom-2025"

  - nome: "Frustration-to-Film Pipeline"
    descricao: "Canal direto da raiva para a criacao. Frustacao como materia-prima."
    steps:
      - "Sentir frustacao genuina"
      - "Filmar reacao imediata"
      - "Editar com energia (nao racionalizar)"
      - "Publicar enquanto a raiva e fresca"
    evidencia: "Bike Lanes, 'Make It Count' Nike"
    source_path: "DOAC-2023, TimFerriss-2015"

  - nome: "Zero-Budget Filmmaking"
    descricao: "Restricao como estilo. Equipamento minimo, criatividade maxima."
    steps:
      - "Usar equipamento disponivel (qualquer camera)"
      - "Editar com ferramentas basicas (iMovie, celular)"
      - "Compensar budget com energia e originalidade"
      - "Nunca esperar o equipamento 'certo'"
    evidencia: "$150 camera + iMovie = milhoes de views"
    source_path: "DesignIndaba-2015, Flagrant-2023"

dilemas:
