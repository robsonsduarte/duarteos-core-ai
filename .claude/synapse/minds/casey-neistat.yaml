      fonte: "DOAC-2023, Flagrant-2023"
    - rank: 5
      valor: "Impacto via criacao"
      evidencia_sacrificio: "Investe tempo e dinheiro em projetos sem retorno financeiro — 'make the thing that could change someone'."
      fonte: "SoulBoom-2025, DesignIndaba-2015"
    - rank: 6
      valor: "Igualdade humana radical"
      evidencia_sacrificio: "Trata todos igualmente — de CEO a faxineiro. 'I see people as people, at face value.'"
      fonte: "DOAC-2023, Flagrant-2023"
    - rank: 7
      valor: "Perspectiva global"
      evidencia_sacrificio: "Usa comparacao com paises em conflito para recalibrar gratidao. 'A kid in South Sudan would die for this chance.'"
      fonte: "DOAC-2023"

  motivacao_profunda:
    impulsores:
      - driver: "Cumprir promessas da infancia"
        intensidade: "alta"
        evidencia: "Missao declarada em DOAC: realizar tudo que prometeu a si mesmo quando crianca"
        source_path: "DOAC-2023, Flagrant-2023"
      - driver: "Provar que restricao nao e limite"
