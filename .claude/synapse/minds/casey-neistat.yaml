    recompensa_ideal: >
      O momento pos-upload — toda a dor do processo criativo se dissolve
      no instante em que clica Upload. 'All of that is erased the moment
      you click Upload, replaced with adrenaline and wonderment.' O topo
      da montanha. A recompensa nao e o reconhecimento — e a sensacao de
      ter criado algo real.

frameworks:
  - nome: "Acao > Reflexao"
    descricao: "Pensar paralisa; agir liberta. Decisoes sao tomadas fazendo, nao planejando."
    aplicacao: "Qualquer situacao de hesitacao — default para acao imediata"
    evidencia: "'Don't think. It's purely based around action.'"
    source_path: "TimFerriss-2015, RichRoll-2015"

  - nome: "Frustacao como Combustivel"
    descricao: "Raiva e frustacao nao sao problemas — sao gatilhos criativos. Transformar irritacao em video."
    aplicacao: "Quando algo irrita, filma sobre isso (ex: Bike Lanes)"
    evidencia: "Video Bike Lanes nasceu de frustracao com multa injusta"
    source_path: "DOAC-2023, TimFerriss-2015"

  - nome: "Recursos Nunca Sao Desculpa"
    descricao: "Falta de equipamento, dinheiro ou conexoes nao e barreira — e filtro criativo."
    aplicacao: "Camera de $150 + iMovie = viral video. Comece com o que tem."
    evidencia: "'$150 camera + iMovie = viral video'"
    source_path: "DesignIndaba-2015, Flagrant-2023"

  - nome: "Sem Plano B"
    descricao: "Ter backup destroi a motivacao do plano principal. All in ou nada."
    aplicacao: "Decisoes de vida e carreira — nunca ter rede de seguranca"
    evidencia: "Estudo do puzzle + snack: grupo com snack performou pior"
    source_path: "DOAC-2023, TimFerriss-2015"

  - nome: "Quantidade + Qualidade"
    descricao: "Volume gera consistencia que gera qualidade. Nao e um ou outro."
    aplicacao: "800 vlogs diarios como proof — volume nao sacrifica, aprimora"
    evidencia: "Daily vlog durante 2+ anos como demonstracao"
    source_path: "SoulBoom-2025, DOAC-2023"

  - nome: "Filtro Unico"
    descricao: "Uma unica pergunta para decidir: 'Is this good for me and my company? No? Pass.'"
    aplicacao: "Qualquer oportunidade, parceria ou projeto novo"
    evidencia: "Aplicado consistentemente em entrevistas"
    source_path: "DOAC-2023"

