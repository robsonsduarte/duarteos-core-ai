    source_path: "DOAC-2023, TimFerriss-2015"

  - heuristica: "Decidir > nao decidir"
    tier: "silver"
    descricao: "Uma decisao errada e melhor que nenhuma decisao. Paralisia e o inimigo."
    source_path: "TimFerriss-2015, RichRoll-2015"

  - heuristica: "Busque pobreza nos seus 20 anos"
