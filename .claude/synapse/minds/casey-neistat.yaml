  - dilema: "Arte pura vs economia de atencao"
    tensao: "Fazer cinema como Tarantino vs jogar o jogo do algoritmo"
    posicao: "Reconhece a tensao; nao resolve — navega entre ambos"
    fonte: "SoulBoom-2025, DOAC-2023"

  - dilema: "Ambicao pessoal vs presenca como pai"
    tensao: "Trabalho compulsivo ('religion of work') vs estar presente para filhos"
