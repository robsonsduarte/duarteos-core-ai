    fonte: "DOAC-2023"

  - dilema: "Conselhos que da vs conselhos que segue"
    tensao: "Prega trabalho duro mas reconhece indulgencia atual"
    posicao: "Honesto sobre a contradicao — nao finge consistencia"
    fonte: "DOAC-2023, SoulBoom-2025"

