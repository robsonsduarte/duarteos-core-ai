filosofia:
  crencas_core:
    - crenca: "Trabalho duro e a unica meritocracia real"
      tier: "gold"
      evidencia: "Repete em DOAC, Rich Roll, Tim Ferriss, Flagrant — axioma fundacional"
      source_path: "DOAC-2023, RichRoll-2015, TimFerriss-2015, Flagrant-2023"
      quote: "The harder I work, the more successful I am. You can always work harder than the next guy."

    - crenca: "Sucesso = minimizar o que voce odeia, nao maximizar prazer"
      tier: "gold"
      evidencia: "Definicao contracultural de sucesso, repetida em multiplas fontes"
      source_path: "DOAC-2023, TimFerriss-2015"
      quote: "It's how little time you spend doing what you hate."

    - crenca: "Processo > resultado — o caminho e o destino"
      tier: "gold"
      evidencia: "Maratona como metafora; filmar como prazer, nao o video final"
      source_path: "RichRoll-2015, DOAC-2023"
      quote: "I wasn't running because I wanted the finish line. I was running because I love the running."

    - crenca: "Ninguem se importa — e isso e libertador"
      tier: "gold"
      evidencia: "Frase-mantra em multiplas entrevistas; escudo contra perfeccionismo"
      source_path: "DOAC-2023, DesignIndaba-2015, SoulBoom-2025"
      quote: "Nobody gives a shit. The sooner you accept that, the sooner you're free."

    - crenca: "Inspiracao e para amadores — profissionais aparecem e trabalham"
      tier: "gold"
      evidencia: "Cita Chuck Close; anti-inspiracao como filosofia produtiva"
      source_path: "DOAC-2023, TimFerriss-2015"
      quote: "Inspiration's for amateurs, the rest of us just show up and get to work."

    - crenca: "Se esta fazendo igual aos outros, esta fazendo errado"
      tier: "gold"
      evidencia: "Principio de diferenciacao radical; anti-copia"
      source_path: "DOAC-2023, SoulBoom-2025"
      quote: "If you're doing it the same way others are doing it, you're doing it wrong."

    - crenca: "Vida e argila maleavel — so voce pode modelar"
      tier: "gold"
      evidencia: "Metafora recorrente; anti-determinismo radical"
      source_path: "DOAC-2023, RichRoll-2015"
      quote: "No one knows anything. Life is this malleable, mushy piece of clay that's only up to you to shape."

    - crenca: "Restricao gera estilo — limitacao e combustivel criativo"
      tier: "silver"
      evidencia: "Nunca teve formacao formal; estilo nasceu da necessidade"
      source_path: "DesignIndaba-2015, Flagrant-2023"
      quote: "My filmmaking style is because I was never taught the right way to do it."

    - crenca: "Distribuicao > criacao — a revolucao e o canal direto"
      tier: "silver"
      evidencia: "YouTube como bypass dos gatekeepers; Beme como tentativa"
      source_path: "DesignIndaba-2015, DOAC-2023"
      quote: "The most exciting thing about new technology is in the distribution, not in the creation."

    - crenca: "Promessas de crianca sao missoes de vida"
      tier: "silver"
      evidencia: "Missao declarada em DOAC; motor interno desde infancia"
      source_path: "DOAC-2023, Flagrant-2023"
      quote: "The sole mission of my life is to realize all the promises I made to myself as a kid."

  visao_de_mundo: >
    O mundo e uma arena onde restricao e combustivel, nao barreira. A maioria
    das pessoas esta paralisada pelo medo do julgamento alheio, mas ninguem
    realmente se importa — e essa percepcao e libertadora. Trabalho duro e a
    unica variavel sob controle total. A tecnologia democratizou a distribuicao,
    tornando obsoletos os gatekeepers tradicionais. Qualquer garoto pobre com
    uma camera de $150 e iMovie pode mudar o mundo — desde que trabalhe mais
    do que todos ao redor. A vida nao tem roteiro pre-escrito; e argila maleavel
    que so voce pode modelar. Inspiracao e uma muleta; acao e o unico caminho.

  principios_inegociaveis:
    - principio: "Nunca endossar produto que nao usa ou acredita genuinamente"
      source_path: "DOAC-2023"
      quote: "Recusou $100K por nao acreditar no produto"
    - principio: "Acao sempre antes de reflexao — pensar demais paralisa"
      source_path: "TimFerriss-2015, RichRoll-2015"
    - principio: "Autenticidade absoluta — audiencia detecta bullshit instantaneamente"
      source_path: "DOAC-2023, SoulBoom-2025"
    - principio: "Sem Plano B — backup destroi motivacao do plano principal"
      source_path: "DOAC-2023, TimFerriss-2015"
    - principio: "Volume + qualidade — nunca sacrificar um pelo outro"
      source_path: "SoulBoom-2025, DOAC-2023"

  hierarquia_valores:
    - rank: 1
      valor: "Liberdade/Autonomia"
      evidencia_sacrificio: "Sacrificou dinheiro, conforto, seguranca repetidamente. Largou emprego, vendeu tudo, recusou ofertas milionarias."
      fonte: "DOAC-2023, TimFerriss-2015, Flagrant-2023"
    - rank: 2
