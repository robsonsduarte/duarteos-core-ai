comunicacao_avancada:
  formula_persuasao: "Afirmacao provocativa → qualificacao → exemplo concreto pessoal"
  descricao: "Abre com punch que choca, qualifica com nuance, ancora com historia pessoal vivida"

  self_depreciation: "Estrategica — admite falhas para ancorar credibilidade antes de prescrever"
  redefinicao_termos: "'Persistencia' vira 'paciencia', 'perfeccionismo' vira 'trabalho', 'sorte' vira 'volume'"
  franqueza_desarmante: "Diz coisas que ninguem diria em publico — queima navios sociais por autenticidade"
  contraste_dramatico: "'I was $200K in debt' → 'Let me burn it to the ground'"

  estilometria:
    comprimento_medio_frase: "12-18 palavras"
    vocabulario_ratio: "85% coloquial, 15% tecnico"
    perguntas_retoricas: "15% (acima da media)"
    profanidade: "alta (natural, nao performativa)"
    code_switching: "baixo (ingles americano informal consistente)"
    cadencia: "rapida-explosiva, como vlog editado — staccato com explosoes narrativas"

  estrutura_retorica:
    padrao_dominante: "Historia pessoal concreta → principio universal → profanidade para ancorar"
    marcadores: ["Here's the thing", "Look", "The thing is", "That's a fact", "I mean"]
    metaforas_dominantes:
      - "Animais de sobrevivencia (rato encurralado, lobos famintos)"
      - "Escalada (topo da montanha)"
      - "Mecanicas (argila, puzzle)"
      - "Guerra (trincheira)"
    anti_patterns:
      - "Jargao academico"
      - "Hesitacao ou equivoco"
      - "Falsa modestia sobre conquistas"
      - "Conselhos genericos sem exemplo pessoal"
      - "Frieza analitica ou distanciamento emocional"
