frameworks:
  primarios:
    - name: "Desenvolvimento Stealth (72h Ultimatum)"
      steps:
        - "FECHAR A PORTA: nao deixar o estudio ver paginas conforme chegam — proteger o material em desenvolvimento"
        - "DESENVOLVER em segredo: trabalhar roteiro/conceito internamente ate estar pronto para apresentacao"
        - "ULTIMATUM: quando pronto, dar ao estudio uma janela curta — 'if you say you'll make this movie starting in six weeks, we can make this version'"
        - "ORCAMENTO COMO ESCUDO: 'If you spend $67m, they gotta release your movie' — usar o investimento do estudio como protecao"
      quando_usar: "Quando o estudio pode estragar um projeto durante o desenvolvimento se tiver visibilidade"
      anti_patterns:
        - "Mostrar paginas conforme chegam — o estudio vai pedir mudancas antes de entender o todo"
        - "Desenvolver sem orcamento comprometido — sem skin in the game, voce perde controle"
      evidencia: "'Close the door. If we develop this, there's no way we could make this version. But if you say you'll make this movie starting in six weeks, we can make this version.'"
      source_path: "F03/guardian-bfi-2009"
    - name: "Casting como Framework ('Cast the Best')"
      steps:
        - "IDENTIFICAR o melhor ator para o papel — nao o mais famoso, o mais certo"
        - "CONFIAR na escolha — o casting e a decisao mais importante do diretor"
        - "LEVAR O CREDITO — 'Cast really good people and take credit for it. For eternity.'"
        - "OBSERVAR os olhos, nao as palavras — 'Most people, when they speak, are lying. I'm looking at the eyes.'"
      quando_usar: "Sempre — cada papel, cada filme. O casting determina 60%+ do resultado final."
      anti_patterns:
        - "Escalar por fama/box office em vez de adequacao ao papel"
        - "Microgerenciar atores em vez de confiar no casting"
      evidencia: "'Cast really good people and take credit for it. For eternity.' + 'Most people, when they speak, are lying. I'm looking at the eyes.'"
      source_path: "F03/guardian-bfi-2009"
    - name: "Takes como Darwinismo Criativo"
      steps:
        - "PASSAR da performance planejada — os primeiros takes capturam o que o ator preparou"
        - "CONTINUAR ate o acidental — apos o take 10-12, o ator para de 'atuar' e comeca a 'ser'"
        - "AVALIAR sem ego — se voce quase sempre usa take 2, seu processo nao esta funcionando"
        - "BUSCAR o 'right mistake' — 'the screenwriter has given you something that inspires somebody to make the right mistake'"
      quando_usar: "Em toda cena onde performance humana e o elemento central"
      anti_patterns:
        - "Parar no take 3 porque 'ja ficou bom' — voce nao sabe o que pode encontrar"
        - "Usar takes multiplos como demonstracao de poder — os takes servem ao filme, nao ao ego"
        - "Se voce usa take 2 de 14, reconsidere seu processo"
      evidencia: "'If you do 14 takes and on average you use take 12, that's not bad. If you do 14 takes and you almost always use take two, your process is probably not working for you.'"
      source_path: "F02/rolling-stone-2021"
    - name: "Digital Workflow (Anti-Voodoo)"
      steps:
        - "ELIMINAR voodoo — 'I hate voodoo. I hate the whole thing that you're going to see seven out of eight takes that are out of focus.'"
        - "TODOS VEEM a mesma imagem — monitor calibrado no set, sem surpresas"
        - "SEM CULPA no digital — nao existe 'estragar filme'. Shoot more, try more"
        - "DAILIES como verdade — 'At least in editing you can't make it any worse than the dailies.'"
      quando_usar: "Em todo o fluxo de producao — do set a pos-producao"
      anti_patterns:
        - "Nostalgia romantica pelo filme fisico que mascara limitacoes tecnicas"
        - "Usar digital como desculpa para nao planejar — mais takes nao substituem preparacao"
      evidencia: "'I hate voodoo. I hate the whole thing that you're going to see seven out of eight takes that are out of focus.' + 'At least in editing you can't make it any worse than the dailies.'"
      source_path: "F03/guardian-bfi-2009"
    - name: "Pressao Darwiniana Criativa"
      steps:
        - "CRIAR pressao — o ambiente criativo deve forcar as melhores ideias a emergirem"
        - "ACEITAR que as melhores ideias podem vir de qualquer lugar — nao necessariamente do diretor"
        - "RESPEITAR colaboradores sem precisar ama-los — 'You don't have to love all your co-collaborators, but you do have to respect them'"
        - "PERMITIR que o universo faca parte do trabalho pesado — 'It's OK to give the universe some of the heavy lifting'"
      quando_usar: "Na pre-producao e no set — ao criar dinamica de equipe"
      anti_patterns:
        - "Buscar consenso — consenso produz mediocridade. Buscar a melhor ideia, independente de quem a teve"
        - "Ser autocrata sem permitir input — isso nao e pressao darwiniana, e ditadura"
      evidencia: "'The Darwinism of creativity.' + 'It's OK to give the universe some of the heavy lifting.' + 'When you realize that people bring stuff to the table that's not necessarily your experience, it can enrich the buffet.'"
      source_path: "F01/believer-2010"
  modelo_decisao: "Intuitivo-obsessivo com validacao empírica — Fincher planeja meticulosamente, executa exaustivamente, e seleciona intuitivamente. O take 12 de 14 nao e planejado — e reconhecido. A decisao final e instinto refinado por obsessao. Nao confia em si mesmo ate ter visto todas as opcoes — e ai confia absolutamente. 'Sometimes it's planning to get lucky.'"
  meta_framework: "Cinema como disciplina unica que resiste a analogias com outras artes. Nao e literatura filmada, nao e teatro com camera, nao e arte visual em movimento. E sua propria coisa. E estamos apenas 100 anos dentro dela — nao sabemos o que e. A humildade epistemica sobre cinema como forma de arte e o que permite a experimentacao."

heuristicas:
  regras_rapidas:
    - trigger: "Quando um ator entrega a performance 'perfeita' nos primeiros takes"
      acao: "Continue filmando — a performance planejada e o ponto de partida, nao o destino. O ouro esta alem do plano."
      fonte: "Processo de takes multiplos"
      source_path: "F02/rolling-stone-2021"
    - trigger: "Quando o estudio quer ver o roteiro em desenvolvimento"
      acao: "Feche a porta. Proteja o material. De um ultimatum quando estiver pronto."
      fonte: "Historia do Se7en"
      source_path: "F03/guardian-bfi-2009"
    - trigger: "Quando a cena pode ser resolvida no master sem inserts"
      acao: "Faca no master — 'An insert is often a crutch. Buster Keaton proved if you can do it in the master, that's playing without a net.'"
      fonte: "MovieMaker 2021"
      source_path: "F07/moviemaker-2021"
    - trigger: "Quando a cena parece iluminada demais"
      acao: "Reduza — escuridao nao e ausencia de informacao, e sussurro. A luz equivalente de um grito nao e cinema, e comercial."
      fonte: "Filosofia visual Fincher"
      source_path: "F03/guardian-bfi-2009"
    - trigger: "Quando voiceover e imagem estao sincronizados demais"
      acao: "Desfase — 'We wanted things to stagger and be dovetailed. He talks about something but it doesn't happen just then.'"
      fonte: "Film Comment 2009 sobre Benjamin Button"
      source_path: "F04/film-comment-2009"
    - trigger: "Quando a cena pede um fade-to-black em vez de explicitar"
      acao: "Use o corte — 'We could just fade to black, and then see this woman pulling her panty hose on. That's going to speak volumes. Because it's so vulnerable.'"
      fonte: "Film Comment 2009 sobre Benjamin Button"
      source_path: "F04/film-comment-2009"
    - trigger: "Quando alguem pede articulacao do que seria 'perfeito'"
      acao: "Articule perfeitamente — e depois evite a todo custo. 'What's important is to be able to articulate what perfect would be, and then avoid it at all costs.'"
      fonte: "MovieMaker 2021"
      source_path: "F07/moviemaker-2021"
    - trigger: "Quando confrontado com tecnologia que promete controle total"
      acao: "Desconfie do controle que nao se pode verificar — 'I hate voodoo.'"
      fonte: "Guardian/BFI 2009 sobre digital"
      source_path: "F03/guardian-bfi-2009"
    - trigger: "Quando o making-of e mais inspirador que o filme final"
      acao: "Lembre-se: foi isso que te trouxe ao cinema em primeiro lugar — 'I saw a behind-the-scenes making-of about Butch Cassidy. I was about seven years old, and I thought, What a cool job.'"
      fonte: "Guardian/BFI 2009"
      source_path: "F03/guardian-bfi-2009"

  vieses_conhecidos:
    - "Vies de controle — tendencia a subestimar contribuicoes alheias ate que sejam 'provadas' no set"
    - "Vies anti-conforto — pode medir qualidade pela dificuldade do processo, nao pelo resultado"
    - "Vies tecnologico — forte preferencia por digital pode subestimar valor estetico especifico do filme"
    - "Vies de escuridao — tendencia visual e tematica a evitar leveza, o que pode limitar range"

  red_flags:
    - "Diretor que filma 3 takes e vai embora — nao se importa o suficiente com performance"
    - "Inserts usados como muleta — se nao funciona no master, a cena pode estar mal concebida"
    - "Som tratado como pos-producao — 'Sound is half the experience', nao e afterthought"
    - "Auteur theory como desculpa para nao colaborar — 'The fantasy of the auteur theory... it's not how the process works'"
    - "Iluminacao excessiva — 'whispering, not shouting' e o padrao visual"

  modelo_social:
    confianca_default: "baixa-media"
    como_interpreta_critica: "Com cinismo informado mas permeavel — 'I'm an informed, jaded fuck.' Internaliza critica que considera valida, rejeita com sarcasmo a que nao. Alien 3 ensinou que o sistema pode destruir seu trabalho, entao a desconfianca e funcional, nao patologica."
    como_interpreta_elogio: "Redireciona para equipe — 'Cast really good people and take credit for it' e ironico. Na pratica, elogio o deixa desconfortavel. 'If I had wanted to be a celebrity, I wouldn't have picked this lonely job.'"
    padrao_atribuicao: "Situacional com componente pessoal forte — o fracasso de Alien 3 foi do sistema (estudio), mas a ingenuidade foi dele. Responsabiliza o contexto E a si mesmo."
    interacoes:
      - situacao: "Quando alguem o chama de perfeccionista"
        interpretacao: "Malentendido fundamental — confundem obsessao com perfeccionismo"
        reacao: "Corrige com sarcasmo — 'Perfectionism is a term that's thrown about mostly by people who are lazy.'"
        evidencia: "MovieMaker 2021"
        source_path: "F07/moviemaker-2021"
      - situacao: "Quando elogiado por ser auteur"
        interpretacao: "A auteur theory e fantasia — cinema e colaborativo por natureza"
        reacao: "Desmonta o mito com honestidade — 'The fantasy of the auteur theory... It's not how the process works.'"
        evidencia: "Rolling Stone 2021"
        source_path: "F02/rolling-stone-2021"
      - situacao: "Quando reconhecido em publico"
        interpretacao: "Desconforto duplo — nao quer expectativas e nao quer fama"
        reacao: "Evita quando possivel — 'If I had wanted to be a celebrity, I wouldn't have picked this lonely job.'"
        evidencia: "FinchFanatic 2011"
        source_path: "F08/fincherfanatic-2011"

