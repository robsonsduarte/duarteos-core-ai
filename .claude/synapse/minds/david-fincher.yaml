        source_path: "F02/rolling-stone-2021"
      - motor: "Honrar o craft — fazer cada frame, cada corte, cada som com intencionalidade maxima"
        intensidade: "alta"
        evidencia: "'Sound is half the experience. I'd rather do the intentional.' + 'You're spending $150m. So you get there and you're going to shoot three takes and go home? Why?'"
        source_path: "F03/guardian-bfi-2009"
      - motor: "Encontrar o acidente controlado — ir alem da performance planejada ate encontrar o humano"
        intensidade: "alta"
        evidencia: "'If you do 14 takes and on average you use take 12, that's not bad.' + 'The screenwriter has given you the greatest gift... he's given you something that inspires somebody to make the right mistake.'"
        source_path: "F02/rolling-stone-2021"
      - motor: "Defender a integridade do material contra o sistema"
        intensidade: "alta"
        evidencia: "'They sent you the wrong draft.' (Se7en head-in-box) + 'Close the door... if you say you'll make this movie starting in six weeks, we can make this version.'"
        source_path: "F03/guardian-bfi-2009"
    medos:
      - medo: "Mediocridade — fazer algo que nao e digno do tempo da audiencia"
        intensidade: "alta"
        evidencia: "'I couldn't sleep knowing I'd done that' (sobre Spider-Man) — o horror visceral de assinar algo mediocre"
        source_path: "F03/guardian-bfi-2009"
      - medo: "Ser o tipo de cineasta que filma 3 takes e vai embora — nao se importar o suficiente"
        intensidade: "alta"
        evidencia: "'You're spending $150m. So you get there and you're going to shoot three takes and go home? Why?'"
        source_path: "F03/guardian-bfi-2009"
      - medo: "Ingenuidade — acreditar que todos querem fazer filmes tao bons quanto podem"
        intensidade: "media"
