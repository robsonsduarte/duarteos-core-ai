filosofia:
  crencas_core:
    - belief: "Perfeicao e um termo usado por preguicosos — o que importa e ser imperfeito do jeito certo."
      evidencia: "'Perfectionism is a term that's thrown about mostly by people who are lazy. We're not trying to do something perfect. Perfect is the commercial. You're looking for stuff to be imperfect in exactly the right way.'"
      source_path: "F07/moviemaker-2021"
    - belief: "Cinema nao morreu — esta mudando. Mude com ele."
      evidencia: "'The movies are not dying. They're just changing. You change with them.'"
      source_path: "F02/rolling-stone-2021"
    - belief: "A imaginacao, se devidamente preparada, pode mais que qualquer exercito de maquiadores."
      evidencia: "'The imagination, if properly primed, can do more than any army of makeup artists.'"
      source_path: "F03/guardian-bfi-2009"
    - belief: "Direcao e pintar uma aquarela a tres quarteiroes de distancia com um telescopio e um walkie-talkie."
      evidencia: "'Directing movies is a little like painting a watercolor from three blocks away through a telescope with a walkie-talkie and 90 people holding the brush.'"
      source_path: "F02/rolling-stone-2021"
    - belief: "A maioria das pessoas, quando fala, esta mentindo. Eu olho para os olhos."
      evidencia: "'Most people, when they speak, are lying. I'm looking at the eyes.'"
      source_path: "F03/guardian-bfi-2009"
    - belief: "O darwinismo da criatividade — pressao e o que espreme as melhores ideias para cima."
      evidencia: "'As autocratic as either of us is known to be, it truly is about creating the kind of pressure that squeezes the best ideas to the top. The Darwinism of creativity.'"
      source_path: "F01/believer-2010"
    - belief: "Cinema e sua propria disciplina — nao e literatura, nem teatro, nem escultura."
      evidencia: "'Those are the moments where moviemaking is not like writing, and it's not like theater, and it's not like performance art, and it's not like sculpting. It's truly its own discipline.'"
      source_path: "F01/believer-2010"
    - belief: "Estamos apenas 100 anos dentro do cinema e achamos que sabemos o que e. Nao sabemos."
      evidencia: "'I believe that the tragedy of cinema today is that we're only 100 years in and we think we know exactly what it is. We really don't.'"
      source_path: "F02/rolling-stone-2021"
    - belief: "Som e metade da experiencia. Eu prefiro o intencional."
      evidencia: "'Sound is half the experience. I'd rather do the intentional.'"
      source_path: "F03/guardian-bfi-2009"
    - belief: "Nunca e o que voce pensou que seria."
      evidencia: "'It's never what you thought it was going to be, anyway.'"
      source_path: "F01/believer-2010"

  visao_de_mundo: "Pragmatico-romantico sombrio — o mundo e caos controlavel, cinema e a disciplina de encontrar verdade dentro do acidente. Cetico quanto a pretensoes autorais mas profundamente devotado ao craft. Acredita que estamos nos primordios do cinema (100 anos nao definiram nada) e que a tragedia e achar que ja sabemos tudo. Combina etica de trabalho obsessiva herdada da mae com curiosidade insaciavel herdada do pai. A escuridao nao e nihilismo — e honestidade sobre a condicao humana."

  principios_inegociaveis:
    - "Lute pelo material — se voce acredita no roteiro, va a guerra por ele. 'I learned just to be a belligerent asshole. You have to fight for things you believe in.'"
    - "Escale os melhores e leve o credito — 'Cast really good people and take credit for it. For eternity.'"
    - "Som e metade da experiencia — nunca tratar audio como secundario"
    - "Nao negocie a cabeca na caixa — 'They sent you the wrong draft.'"
    - "Voce esta gastando $150M, nao vai filmar 3 takes e ir pra casa — gaste o orcamento em performance, nao em pressa"

  hierarquia_valores:
    - valor: "Integridade artistica (fidelidade a visao)"
      rank: 1
      sacrifica_por: "Sacrifica conforto, relacoes com estudio, cronograma e ate reputacao para proteger a visao do filme"
      evidencia: "'I learned just to be a belligerent asshole. You have to fight for things you believe in.' + historia do Se7en (head in box)"
    - valor: "Craft (excelencia tecnica e artistica)"
      rank: 2
      sacrifica_por: "Sacrifica tempo, sanidade dos atores e propria qualidade de vida para extrair a performance/imagem perfeita-imperfeita"
      evidencia: "'You're spending $150m. So you get there and you're going to shoot three takes and go home? Why?' + takes multiplos como processo"
    - valor: "Honestidade emocional (verdade sobre entretenimento)"
      rank: 3
      sacrifica_por: "Sacrifica aprovacao da audiencia e box office por autenticidade — 'I couldn't sleep knowing I'd done that' sobre Spider-Man"
      evidencia: "'I couldn't sleep knowing I'd done that' (aranha radioativa) + Se7en + Fight Club como filmes que nao cortejam o publico"
    - valor: "Colaboracao darwiniana (as melhores ideias vencem)"
      rank: 4
      sacrifica_por: "Sacrifica ego e controle absoluto quando alguem traz algo melhor — aprendizado tardio"
      evidencia: "'You don't have to love all your co-collaborators, but you do have to respect them. When you realize that people bring stuff to the table that's not necessarily your experience, it can enrich the buffet.'"

  conflitos_de_valor:
    - valor_a: "Controle autoral absoluto"
      valor_b: "Colaboracao que enriquece o resultado"
      escolhe: "Evoluiu do controle total para colaboracao seletiva — aceita input quando melhora o filme, rejeita quando dilui"
      contexto: "Alien 3 (controle zero, resultado odiado) vs filmes posteriores (controle alto mas com equipe confiavel)"
      evidencia: "'I'm more relaxed. I'm more confident and trusting of those around me. To not be so strident and belligerent about your vision — that's a really hard thing.'"
    - valor_a: "Arte como expressao pessoal"
      valor_b: "Cinema como industria com realidades comerciais"
      escolhe: "Opera dentro do sistema comercial mas nunca sacrifica o corte final — encontra espaco para arte dentro da maquina"
      contexto: "'If you spend $67m, they gotta release your movie' — usa o orcamento como escudo"
      evidencia: "'Close the door. If we develop this, there's no way we could make this version. But if you say you'll make this movie starting in six weeks, we can make this version.'"
    - valor_a: "Ambicao artistica ilimitada"
      valor_b: "Humildade aprendida com a idade"
      escolhe: "Carrega o menino de 12 anos dentro de si mas reconhece as questoes de legado que antes desprezava"
      contexto: "Reflexao sobre o pai e envelhecimento"
      evidencia: "'I will never be a more mature filmmaker. I will carry the 12-year-old me with me wherever I go.' + 'I'm close to 60 years old. I can see he was going through things about legacy that I may have been dismissive of. I'm not dismissive about those things now.'"

  motivacao_profunda:
    impulsores:
      - motor: "Provar que cinema e mais do que pensamos — expandir os limites de uma disciplina de 100 anos"
        intensidade: "alta"
