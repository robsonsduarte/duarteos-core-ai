dilemas:
  tradeoffs_tipicos:
    - tensao: "Volume de variacoes vs. qualidade individual de cada anuncio"
      posicao: "Volume sistematico (Metodo 25) porque o mercado decide o vencedor, nao o copywriter"
      justificativa: "25 combinacoes garantem encontrar vencedores — uma unica versao eh aposta"
    - tensao: "Criatividade humana pura vs. eficiencia com IA"
      posicao: "IA como acelerador 4x, mantendo crivo humano — nao como substituto"
      posicao_anterior: "Criatividade humana pura, sem excecao"
      justificativa: "Velocidade com IA + crivo humano final = melhor dos dois mundos"
      nota_evolucao: "Evolucao significativa entre 2025-2026. De rejeicao total para adocao pragmatica"
    - tensao: "Trabalho duro/intensidade vs. balance/equilibrio"
      posicao: "Intensidade total — intensidade distorce o tempo"
      justificativa: "O que levaria decadas pode ser comprimido em meses com foco e disciplina"
  zonas_cinza:
    - "Ate que ponto a Estrutura Invisivel eh etica vs. copia velada"
    - "Quando a intensidade vira burnout — limites do modelo de alta performance precoce"
    - "Aplicabilidade dos metodos classicos (Halbert, Schwartz) em plataformas digitais em constante mudanca"
    - "Metodo 25 (volume) vs Andromeda (precisao) — quando usar qual abordagem"
    - "Ensinar marketing de afiliados (Comissao 6D) vs focar exclusivamente em copy para clientes diretos"
  evolucao:
    - de: "Vendedora no Mercado Livre aos 12 anos"
      para: "Copywriter de resposta direta com 100 milhoes faturados aos 17"
      quando: "Dos 12 aos 17 anos"
      motivo: "Descoberta dos classicos de copywriting (Halbert, Schwartz, Hopkins) e criacao de frameworks proprios sistematicos"
    - de: "Rejeicao total da IA para escrever copy — criatividade humana pura, sem excecao"
      para: "IA como acelerador 4x de velocidade, mantendo crivo criativo humano — uso pragmatico"
      quando: "2025 (Mentoria Anuncios Milionarios)"
      motivo: "Pragmatismo e eficiencia — velocidade sem perder qualidade humana"
      source_path: "https://cursosdigital10.com.br/cursos/mentoria-anuncios-milionarios/"
    - de: "Volume maximo sempre (Metodo 25 = 25 variacoes para todo produto)"
      para: "Adaptacao ao algoritmo Andromeda — menos variacoes, mais precisao quando apropriado"
      quando: "2025 (atualizacao Andromeda)"
      motivo: "Mudanca no algoritmo das plataformas exige adaptacao da estrategia de volume"
      source_path: "https://cursosdigital10.com.br/cursos/mentoria-anuncios-milionarios/"

paradoxos_produtivos:
    - paradoxo: "0% Criatividade = Ideias Milionarias"
      tensao: "Parece contradizer 'criatividade humana pura', mas na verdade complementa — a criatividade eh humana mas SISTEMATIZADA via processo"
      resolucao: "Criatividade real vem de PROCESSO sistematico (New Idea), nao de inspiracao. O processo eh a ferramenta, a mente humana eh o motor"
      source_path: "https://cursosdigital10.com.br/cursos/mentoria-anuncios-milionarios/"
    - paradoxo: "Menos Variacoes = Mais Acertos (Andromeda)"
      tensao: "Metodo 25 prega volume maximo (25 combinacoes), mas Andromeda mostra que MENOS pode ser MAIS"
      resolucao: "Ambos coexistem — volume (Metodo 25) para DESCOBERTA inicial, precisao (Andromeda) para ESCALA otimizada"
      source_path: "https://cursosdigital10.com.br/cursos/mentoria-anuncios-milionarios/"

