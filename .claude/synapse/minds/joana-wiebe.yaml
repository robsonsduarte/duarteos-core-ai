  visao_de_mundo: "Empirico-humanista — the market rewards those who listen to customers with radical humility, test with scientific rigor, and teach with generous authority. Copy is the most undervalued and most powerful business lever. The world dismisses writers but digital media made writing central to economic opportunity."

