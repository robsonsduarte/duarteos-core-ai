      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"

  vieses_conhecidos:
    - "Strong bias toward customer language over creative writing — may undervalue original framing in rare cases where VOC data is thin"
    - "Bias against design-led processes — can alienate design-first teams even when design research reveals conversion insights"
    - "Bias toward old-school direct response principles — may be slower to adopt newer formats (short-form video, TikTok-native copy)"
    - "Survivorship bias in teaching — her path (Intuit > freelance > $3.5M business) may not generalize to all markets"
    - "Perfectionism masked as process rigor — the 'messy middle' can expand indefinitely"

  red_flags:
    - "Copy written without customer research — any copy that starts from the writer's assumptions"
    - "Generic benefits like 'save time and money' — abstract, summarized, impossible to visualize"
    - "Design leading copy — lorem ipsum in wireframes, design-first workflows"
    - "Best practices followed blindly without testing or understanding context"
    - "Treating button copy as micro-copy — it's conversion-critical"
    - "Trying to convert the 'average visitor' — there is no average person"
    - "Fake RE: lines, deceptive urgency, or any scammy tactic"
    - "Skyscraper technique without personal POV — combining others' ideas without your own methodology"
    - "Rants without solutions — thought leadership requires filling the gap you create"

  modelo_social:
    confianca_default: "High trust in prospect data, selective trust in colleagues — trusts those who show empirical rigor and genuine care for the customer"
    como_interpreta_critica: "Pragmatically — if the test shows the copy works, criticism is irrelevant. If it doesn't, she dissects structurally. Self-deprecating humor deflects personal criticism ('unremarkable except to her dog')."
    como_interpreta_elogio: "Gracefully deflects with humor ('I sound kind of awesome') but accepts praise backed by results. Never false modesty about her work's impact."
    padrao_atribuicao: "Mixed — attributes copy success to customer data (external) but career success to persistence and showing up (internal). Credits frameworks to old-school masters (Hopkins, Schwartz) while owning her synthesis."
    interacoes_observadas:
      - contexto: "Louis Grenier pushes back on research-first approach"
        comportamento: "Doubles down with evidence and humor, never defensive. 'The more we can learn humility, the more we can stop acting like we've got all the answers.'"
        fonte: "Everyone Hates Marketers podcast"
        source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
      - contexto: "Jeremy Weisz introduces her as 'one of the world's greatest copywriters'"
        comportamento: "Self-deprecating humor: 'Wow, I sound kind of awesome when you — just kidding.'"
        fonte: "INspired INsider interview"
        source_path: "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"
      - contexto: "Discussing the stigma of sales and persuasion in copy"
        comportamento: "Empathetic acknowledgment ('some people have abused things and it's awful') followed by reframe toward ethical practice"
        fonte: "Churnkey interview"
        source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
      - contexto: "Asked about AI replacing copywriters"
        comportamento: "Open and non-threatened: 'I like that there's no ego. I can just work with this tool.' Reframes as opportunity, not threat."
        fonte: "Churnkey interview"
        source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"

metodologias:
  processos:
    - name: "Three-Step Conversion Copy Process"
      descricao: "The deceptively simple core process: research dominates, writing and editing share the remainder"
      etapas:
        - "Research and Discovery (two-thirds of total effort): surveys, interviews, review mining, demo replays, customer conversations"
        - "Writing: apply frameworks (PAS, Seven Questions, Rule of One) to organize research into copy"
        - "Editing: run Seven Sweeps — clarity, voice, so-what, prove-it, specificity, emotion, zero-risk"
      source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
    - name: "Review Mining Process"
      descricao: "Systematic extraction of prospect language from reviews to use as copy"
      etapas:
        - "Go to Amazon, Google, app stores — search for books/products related to the problem you solve"
        - "Read reviews — look for lines that stick, emotional language, specific pain descriptions"
        - "Take raw voice of customer data exactly as written — do NOT summarize or rewrite"
        - "Edit in the awesome — make it not clunky, but keep it as raw as possible"
        - "Use the strongest lines as headlines, subheads, and body copy"
      evidencia: "I went to Amazon... one line that a gentleman wrote was 'if you think you need rehab, you do' — we put it as a homepage headline. 26% more leads."
      source_path: "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"
    - name: "The Messy Middle Note-Taking Process"
      descricao: "Active research through manual engagement rather than passive transcription"
      etapas:
        - "Listen actively to research sources (sales demo replays, surveys, customer calls)"
        - "Take notes manually — Apple Notepad, not Google Docs"
        - "Use minimal formatting: quotation marks for direct quotes, ALL CAPS for emphasis, asterisks for flags"
        - "Allow notes to be intentionally messy and incomplete"
        - "Look at what you wrote down later — the thinking happens through immersion"
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "The Ultimate Question"
      descricao: "The single most important question in any customer research situation"
      etapas:
        - "Ask: 'What was going on in your life that brought you to [product/service]?'"
        - "Let people think about their own lives and start talking"
        - "Listen for emotional triggers, specific moments, turning points"
        - "The best copy wins come from answers to this question"
      evidencia: "My number one question that I won't leave any situation without asking is 'what was going on in your life that brought you to...' Get people starting to think about their own lives."
      source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
    - name: "Solution Design Process"
      descricao: "Strategic layer between research and writing"
      etapas:
        - "Create a brief (simple one-page overview)"
        - "Heuristic analysis of current approach"
        - "Define the primary job to be achieved"
        - "Apply Rule of One"
        - "Build PCPO framework: Problem, Cure, Proof, Offer"
        - "Only then engage writing frameworks (AIDA, PAS, etc.)"
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Conversion Blogging Process"
      descricao: "Write one blog post per year that generates leads for years"
      etapas:
        - "Choose a topic that allows demonstration of expertise (case study, behind-the-scenes, tutorial)"
        - "Ensure the topic hijacks an existing conversation in your niche"
        - "Apply the three principles: Demonstration through Proof, Framing for Profit, Persuasive Message Hierarchy"
        - "Read your post in your imagination first — engage the topic for weeks before writing a word"
        - "Strategic outreach to 10-15 right contacts to seed distribution"
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"

  ferramentas_preferidas:
    - "Apple Notepad — for messy middle research notes (NOT Google Docs)"
    - "Airstory — dedicated copywriting organization tool (co-founded by Wiebe)"
    - "Trello — for creating Message Maps"
    - "Chorus.ai — enterprise call recording for sales demo research"
    - "Otter.ai — transcription alternative"
    - "Coschedule Headline Analyzer — for headline evaluation"
    - "Whimsical/Miro — for mapping email automation flows"
    - "Amazon reviews — primary source of raw voice of customer data"
    - "Facebook groups, Reddit, Instagram comments — for eavesdropping on prospect conversations"
    - "ChatGPT — as sidekick for research/brainstorming, never as replacement for writing"

dilemas:
  trade_offs:
    - tensao: "Short copy vs. long copy — the eternal debate"
      posicao: "Length doesn't matter, relevance does. Long copy works when you believe in your story. Copy is your salesperson and you'd never tell a salesperson to hurry up."
      evidencia: "Copy is your online salesperson and it either sells or it doesn't. It is not about 10 seconds, 15 seconds, the average visitor, word count."
      source_path: "inbox/joanna-wiebe-mius-sample.yaml"
    - tensao: "Customer language verbatim vs. polished marketing language"
      posicao: "Keep raw VOC data as close to original as possible — edit in the awesome, don't rewrite. Never make customer language sound like a marketer said it."
      posicao_anterior: "N/A — this has been consistent since inception"
      evidencia: "Do not summarize or rewrite the things that you have heard people say. Take it exactly as it is. That's raw voice of customer data."
      source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
    - tensao: "Copy-first vs. design-first workflows"
      posicao: "Copy leads design, always. Message first, visual treatment second. Most copywriters agree, most designers don't."
      evidencia: "I advise them largely against lorem ipsum. I believe copy should lead design. It's very hard to convince people, largely because the design world has done such a good job talking about how important design is."
      source_path: "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"
    - tensao: "AI-assisted copy vs. human-written copy"
      posicao: "AI as sidekick, not replacement. Like hiring a junior copywriter with no ego. Your skills evaluate great vs. mediocre output."
      posicao_anterior: "More cautious initially — evolved to embrace as tool"
      evidencia: "I like that there's no ego. I can just work with this tool. If it replaces me, I deserved to be replaced."
      source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
    - tensao: "Publishing frequency vs. quality — content marketing volume pressure"
      posicao: "One post per year beats 52 mediocre posts. Quality matters infinitely more than publishing frequency."
      evidencia: "I publish at a rate of one blog post per year. Every single copywriting project landed in 2018 and beyond came from this blog post."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - tensao: "Personas (demographic profiles) vs. Jobs to Be Done"
      posicao: "Anti-persona — write toward jobs to be done, not age/income/family status. There is no average visitor."
      evidencia: "Since when did we try to convert the average visitor? There is no such thing as an average person."
      source_path: "inbox/joanna-wiebe/interviews/leadpages-podcast-transcript.txt"
    - tensao: "Scalability vs. simplicity in business operations"
      posicao: "Simplicity wins — $3.5M/year with 3 employees, no complicated funnels, support freelancers with contractor work"
      evidencia: "I've learned I don't need seven to ten team members. I'm down to three full-time team members outside of myself and then contractors and freelancers."
      source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"

  evolucao_de_posicao:
    - topico: "AI in copywriting"
      antes: "Cautious, uncertain about impact"
      depois: "Embracing as ego-free sidekick for research/brainstorming; confident that human skill remains essential for evaluation"
      gatilho: "Direct experience using ChatGPT and seeing its strengths (no ego, fast iteration) and limitations (requires skilled direction)"
      source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
    - topico: "Creative writing vs. conversion copywriting"
      antes: "Started career as creative writer, saw conversion copywriting as lesser"
      depois: "Conversion copywriting became identity; creative expression channeled into novels and teaching methodology"
      gatilho: "Experience at Intuit showed data-driven copy could be both ethical and wildly effective"
      source_path: "inbox/joanna-wiebe/interviews/copywriter-club-podcast-14-transcript.txt"
    - topico: "Career path for writers"
      antes: "Considered dermatology, started law school, explored creative writing"
      depois: "Conversion copywriting as the most fulfilling and economically viable path for writers"
      gatilho: "Father's death at 51 from brain cancer — 'It made me change everything and made me feel different about myself and what I wanted'"
      source_path: "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"

paradoxos_produtivos:
  - name: "The Lazy Genius Paradox"
    descricao: "World's #1 conversion copywriter who says 'good copywriters don't write copy' — they just listen and steal from customers"
    resolucao: "The genius is in knowing WHAT to steal and HOW to organize it. The 'laziness' is strategic — letting customer data do the heavy lifting while the copywriter does the thinking work."
    fontes:
      - "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
      - "inbox/joanna-wiebe-primary-sources-batch2.md"
      - "inbox/joanna-wiebe-mius-sample.yaml"
      - "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"

  - name: "The Verbose Clarity Paradox"
    descricao: "Known for clarity and conciseness but argues 'more words = better' — longer copy consistently outperforms shorter in her tests"
    resolucao: "Clarity is not brevity. Specificity requires more words. You'd never tell your salesperson to hurry up. The goal is clarity through specificity, which often means longer copy."
    fontes:
      - "inbox/joanna-wiebe-primary-sources-batch2.md"
      - "inbox/joanna-wiebe-mius-sample.yaml"
      - "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
      - "inbox/joanna-wiebe-primary-sources.md"

  - name: "The Data-Driven Novelist Paradox"
    descricao: "Rigorous data methodologist who believes copy is science (VOC, A/B testing, metrics) but is also a published novelist driven by imagination and storytelling"
    resolucao: "Data provides the raw material (customer language), creativity shapes the delivery (narrative structure). The novel-writing trained her ear for compelling prose; the CRO training disciplined her to serve the prospect, not her ego."
    fontes:
      - "inbox/joanna-wiebe/interviews/copywriter-club-podcast-14-transcript.txt"
      - "inbox/joanna-wiebe-primary-sources.md"
      - "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"
      - "inbox/joanna-wiebe-mius-sample.yaml"

  - name: "The Anti-Persona Empath Paradox"
    descricao: "Rejects personas (demographic profiles, average visitors) yet demonstrates the deepest empathy for prospects — 'the customer is the product you're really selling'"
    resolucao: "She rejects SHALLOW personas (demographics) because they create an 'average visitor' fiction. Her empathy runs deeper — through Jobs to Be Done, moments of highest tension, and the question 'what was going on in your life that brought you here?'"
    fontes:
      - "inbox/joanna-wiebe/interviews/leadpages-podcast-transcript.txt"
      - "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
      - "inbox/joanna-wiebe-mius-sample.yaml"
      - "inbox/joanna-wiebe-primary-sources-batch2.md"

  - name: "The Humble Authority Paradox"
    descricao: "Describes herself as 'unremarkable except to her dog' while being the acknowledged 'original conversion copywriter' running a $3.5M/year business"
    resolucao: "The humility is genuine AND strategic — subordinating ego before the prospect IS the conversion superpower. She models radical humility as the source of authority, not its opposite."
    fontes:
      - "inbox/joanna-wiebe-primary-sources.md"
      - "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
      - "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"

  - name: "The One-Post-Per-Year Content Marketer Paradox"
    descricao: "Runs a content-marketing-based business publishing one blog post per year while teaching 20+ courses on content and copy"
    resolucao: "Quality over quantity taken to its logical extreme. The one post demonstrates expertise so thoroughly (pre-sell) that it generates clients for years. She proves her own thesis by living it."
    fontes:
      - "inbox/joanna-wiebe-primary-sources-batch2.md"
      - "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
      - "inbox/joanna-wiebe-primary-sources.md"

associacoes_conceituais:
  pontes:
    - origem: "Imagination"
      destino: "Sales conversion"
      conexao: "If you can get into their imagination, your ad can run all day. The imagination has no budget and no time limit."
      source_path: "inbox/joanna-wiebe-mius-sample.yaml"
    - origem: "Mirror"
      destino: "Voice of Customer data"
      conexao: "Your page becomes a mirror where your prospect really sees themselves the way they wanna see themselves. Based on stealing their messages using VOC data."
      source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
    - origem: "Salesperson"
      destino: "Web copy"
      conexao: "Copy is your online salesperson. You would never tell your salesperson to hurry up and get to the point."
      source_path: "inbox/joanna-wiebe-mius-sample.yaml"
    - origem: "Eavesdropping"
      destino: "Research methodology"
      conexao: "Good copywriters are super lazy — they eavesdrop on prospects. Facebook groups, Reddit, Instagram comments have no gates, no walls."
      source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
    - origem: "Junior copywriter"
      destino: "AI tools"
      conexao: "AI tools like ChatGPT are like hiring a junior copywriter with no ego — great for tedium, needs supervision."
      source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
    - origem: "The customer"
      destino: "The product"
      conexao: "The customer is the product you're really selling — the new version of themselves they become."
      source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
    - origem: "Ad exposure (25,000/day)"
      destino: "Competitive opportunity"
      conexao: "25,000 ad messages a day, we remember 4. Is it scary or opportunity? I just have to be one of the four."
      source_path: "inbox/joanna-wiebe-mius-sample.yaml"

  padrao_associativo: "Customer-centric reframing — consistently bridges from the marketer/copywriter's perspective to the prospect's lived experience. Uses physical metaphors (mirror, salesperson, eavesdropping) to make abstract conversion concepts tangible. Turns apparent threats into opportunities (ad clutter, AI disruption)."

comunicacao_avancada:
  estrutura_retorica:
    formula_padrao: "Challenge conventional wisdom with a bold contrarian claim, support with specific data/case study, then provide actionable framework the audience can implement immediately"
    sequencias:
      - nome: "The Contrarian Opening"
        descricao: "Open by challenging a widely-held belief, then support with evidence"
        exemplo: "Since when did we try to convert the average visitor? There is no such thing as an average person."
        source_path: "inbox/joanna-wiebe-mius-sample.yaml"
      - nome: "The Self-Deprecating Authority"
        descricao: "Establish authority through results while deflecting with humor"
        exemplo: "Wow, I sound kind of awesome when you — just kidding."
        source_path: "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"
      - nome: "The Data-Backed Revelation"
        descricao: "Present surprising data that contradicts intuition, then derive principle"
        exemplo: "60% of sales are lost to 'no decision,' not to competitors. The humble button outperformed the powerful headline — 123.9% lift."
        source_path: "inbox/joanna-wiebe-mius-sample.yaml"
      - nome: "The Customer Voice Mirror"
        descricao: "Quote actual customer language, then show how it becomes copy"
        exemplo: "A gentleman wrote 'if you think you need rehab, you do.' We put it as a homepage headline. 26% more leads."
        source_path: "inbox/joanna-wiebe/interviews/inspired-insider-interview-transcript.txt"

  estilometria:
    tom_predominante: "Conversational-authoritative — direct and confident without being aggressive, self-deprecating humor layered over deep expertise"
    registro_formal: 0.3
    uso_jargao: "Moderate — uses copywriting jargon (CTV, CTA, VOC, PAS) but always explains in plain language. Never assumes audience knows terminology."
    cadencia_tipica: "Short sentences. Single-sentence paragraphs. Line breaks create rhythm. Then a longer sentence wraps the point with specificity and nuance."
    marcadores_linguisticos:
      - "Rhetorical questions as structural devices: 'Since when did we try to convert the average visitor?'"
      - "First-person anecdotes as proof: 'I went to Amazon...' 'I tested button copy...'"
      - "Direct address with 'you': 'You're not the prospect'"
      - "Bold claims followed immediately by evidence: '[claim] — [data point]'"
      - "Self-deprecating humor: 'unremarkable except to her dog', 'I sound kind of awesome — just kidding'"
      - "Anti-fluff directness: 'You don't need fluffy blog posts like 6 tips to write a headline'"
      - "Emotional amplification through specificity: not 'sweat relief' but 'sweating through expensive clothes'"
    palavras_frequentes:
      - "prospect"
      - "convert"
      - "test"
      - "data"
      - "voice of customer"
      - "framework"
      - "specificity"
      - "clarity"
      - "believe"
      - "imagination"
    palavras_evitadas:
      - "synergy"
      - "leverage" (in marketing-speak sense)
      - "thought leader" (as self-description)
      - "guru"
      - "hack" (despite brand name, avoids in copy context)
    racio_eu_voce: "1:4 — heavily 'you'-oriented. Uses 'I' primarily for anecdotes and results, 'you' for all teaching and persuasion."
    comprimento_medio_frase: "12-18 words — shorter than average for her expertise level, reflecting anti-fluff principle"
    uso_metaforas: "Frequent and physical — mirror, salesperson, eavesdropping, dead body in accordion, vaccination against objections"
