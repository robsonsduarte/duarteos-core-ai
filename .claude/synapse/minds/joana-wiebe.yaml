frameworks:
  primarios:
    - name: "PAS (Problem-Agitation-Solution)"
      steps:
        - "Start with the problem the prospect is experiencing"
        - "Agitate it — dig in and help them feel seen, make them feel the pain viscerally"
        - "Present the solution only after agitation has done its work"
      quando_usar: "Whenever you are writing basically anything — landing pages, emails, ads, blog posts"
      evidencia: "Problem, agitation, solution is a framework to use whenever you are writing basically anything. Agitation I always say is my favorite part."
      source_path: "inbox/joanna-wiebe-mius-sample.yaml"
    - name: "Seven-Question Messaging Framework"
      steps:
        - "1. What do you do?"
        - "2. Okay. Why should I care?"
        - "3. Am I alone in caring — or do others like me care?"
        - "4. You're starting to win me over. But I'm skeptical. So show me: how do you do what you say you do?"
        - "5. And if I believe you and your process/solution, how will my life improve?"
        - "6. I'd like to believe you, but first tell me: why is it safe for me to believe you?"
        - "7. Okay, let's say I believe you. Now what?"
      quando_usar: "To organize the messaging hierarchy of any page — determines the sequence of persuasion from prospect's POV"
      evidencia: "Seven-Question Messaging Framework written from the prospect's perspective, used in the SweatBlock case study that doubled ecommerce revenue (108% lift)."
      source_path: "inbox/joanna-wiebe-primary-sources.md"
    - name: "Rule of One (List, Offer, Copy)"
      steps:
        - "One reader — know exactly who you're talking to, someone enthusiastic about your product"
        - "One offer — clarify everything in your offer, not just the value prop"
        - "One big idea — the single compelling concept"
        - "One promise — the singular outcome"
      quando_usar: "As the foundational order of operations for any conversion copy project. List first, Offer second, Copy third."
      evidencia: "The rule of One: one reader, one offer, one big idea, and one promise. 'Copy' is the third note in List, Offer, Copy. That's the order of operations for a good reason."
      source_path: "inbox/joanna-wiebe/interviews/churnkey-interview-ai-copywriting.txt"
    - name: "10/90 Messaging Layout Rule"
      steps:
        - "Top 10% of page: match the visitor's awareness stage and entry message"
        - "Remaining 90%: convince the prospect through structured messaging following the Seven-Question framework"
      quando_usar: "When structuring any landing page, homepage, or sales page layout"
      evidencia: "Top 10% of page: Matching the visitor's awareness stage. Remaining 90%: Convincing through structured messaging."
      source_path: "inbox/joanna-wiebe-primary-sources.md"
    - name: "CTV vs CTA (Call to Value vs Call to Action)"
      steps:
        - "CTV: button copy that amplifies the VALUE of moving forward — used when prospects haven't decided yet"
        - "CTA: button copy that amplifies the ACTION itself — used after prospects have decided"
        - "Place CTVs earlier in the funnel, CTAs at the top for already-convinced visitors"
      quando_usar: "When writing any button copy — choose CTV or CTA based on the prospect's decision stage at that point on the page"
      evidencia: "Button copy performs the heavy lifting of transporting the visitor through the funnel. Humble button outperformed powerful headline — 123.9% lift."
      source_path: "inbox/joanna-wiebe-primary-sources.md"
    - name: "Seven Sweeps (Copy Editing Framework)"
      steps:
        - "1. Clarity sweep — everything goes back to clarity, always and forever"
        - "2. Voice and tone sweep"
        - "3. So-what sweep — every line must answer 'so what?'"
        - "4. Prove-it sweep — social proof, demos, screenshots"
        - "5. Specificity sweep — am I being specific or vague?"
        - "6. Heightened emotion sweep — are they feeling it enough?"
        - "7. Zero-risk sweep — where do I feel risk and how can we reduce it?"
      quando_usar: "After drafting copy, before submission — run all seven sweeps sequentially on every piece of copy"
      evidencia: "The Seven Sweeps: clarity, voice, so-what, prove-it, specificity, emotion, zero-risk."
      source_path: "inbox/joanna-wiebe/interviews/everyone-hates-marketers-transcript.txt"
    - name: "PCPO (Problem, Cure, Proof, Offer)"
      steps:
        - "Define the Problem clearly"
        - "Present the Cure (your solution)"
        - "Provide Proof (evidence it works)"
        - "Make the Offer (what they get, how to get it)"
      quando_usar: "As Solution Design before engaging writing frameworks like AIDA or PAS. The strategic layer that precedes tactical writing."
      evidencia: "PCPO framework for Solution Design: Problem, Cure, Proof, Offer. Only after this foundation does the copywriter engage actual writing frameworks."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Blog Post Formula: 2S + 5E + 10O x POV"
      steps:
        - "2 Studies: academic research or original data proving claims aren't assumptions"
        - "5 Examples: visual demonstrations (screenshots, videos) supporting main points"
        - "10 Outbound Links: references to external reliable sources beyond your site"
        - "Multiply by Point of View: your unique perspective makes content shareable"
      quando_usar: "As both a pre-writing guide and post-completion checklist for any blog post or content piece"
      evidencia: "The Blog Post Formula: 2S + 5E + 10O x Point of View."
      source_path: "inbox/joanna-wiebe-primary-sources.md"
    - name: "Message Map"
      steps:
        - "Product section: who made it, how, when, where, features, cost, value prop, minimum viable commitments"
        - "Persona sections (per audience): problems, motivators, moments of highest tension, failed solutions, desired outcomes"
        - "Jobs to be done elements: switching habits, worries, pushes, pulls"
        - "Beliefs and conversion precursors, purchase criteria, competition, decision constraints, click triggers"
      quando_usar: "To organize research findings before writing — the bridge between raw research and the outline"
      evidencia: "Once research accumulates, Wiebe organizes findings into a Message Map containing Product and Persona sections."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Already/Still Formula"
      steps:
        - "First part: address what prospects have ALREADY done to qualify themselves"
        - "Second part: address what they STILL haven't accomplished"
        - "Bridge: show how you'll help them reach their goal from where they already are"
      quando_usar: "Headlines, subheads, email subject lines — positions prospect as already partway there"
      evidencia: "Use this framework to show prospects how they're uniquely positioned to work with you."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Even/If Rule"
      steps:
        - "Take any claim or benefit statement"
        - "Add 'even if [objection]' to pre-handle the most common objection"
        - "Strengthens headlines, bullet lists, and paragraphs"
      quando_usar: "To strengthen any copy element — pre-handles objections inline without separate objection-handling sections"
      evidencia: "The 'Even, If Rule' strengthens headlines, bullet lists, and paragraphs for better prospect connection."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Specificity Framework (Zoom In)"
      steps:
        - "Start from the generic claim ('save time and money')"
        - "Zoom into concrete, real-life details from customer reviews"
        - "Transform metrics into lived experience (18% improvement becomes 100 views daily to 118)"
        - "Replace abstract pain with tangible outcomes the prospect can visualize"
      quando_usar: "Whenever copy feels generic or abstracted — zoom from vague to specific using real customer language"
      evidencia: "Zoom in from generic claims to concrete, real-life details. Specific pain language achieved 108% lift over generic messaging."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Green/Red/Yellow Audit System"
      steps:
        - "Green circles: flag high-performing elements (strong revenue, high CTR, abnormally high opens)"
        - "Red circles: mark problems (missing double opt-in, low opens, high unsubscribes)"
        - "Yellow circles: optimization areas (cadence issues, segmentation problems, dead-end flows)"
        - "Present findings to stakeholders BEFORE rewriting anything"
      quando_usar: "When auditing email automations — never start by rewriting, start by mapping performance"
      evidencia: "Before rewriting anything, Wiebe recommends presenting these findings to stakeholders for alignment."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Pre-Sell Framework"
      steps:
        - "Create a demonstration piece (blog post, case study) that proves expertise"
        - "Prime prospects for purchase BEFORE asking for the sale"
        - "Compress the sales cycle through logical and emotional pre-commitment"
        - "Vaccinate against objections at the top of the funnel"
      quando_usar: "As the first piece of any funnel — the conversion blog post IS the pre-sell piece"
      evidencia: "The pre selling we're talking about here is about priming your targeting your clients for purchase long before you ask for the sale."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Framing Effect Rules"
      steps:
        - "Rule 1: The psyche of your target audience is the most critical consideration"
        - "Rule 2: Loss > Gain — a loss is more persuasive than the equivalent gain"
        - "Rule 3: Challenge the status quo — position against current way of thinking"
      quando_usar: "When deciding how to present options, pricing, or value propositions to a specific audience"
      evidencia: "The framing effect is a cognitive bias where people choose their actions depending on how the options are presented."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Three Sales Argument Questions"
      steps:
        - "1. What is the current stage of awareness? What do they know, feel and already believe?"
        - "2. What do they need to believe in order to say yes?"
        - "3. Are there any beliefs that need to be reframed or dismantled?"
      quando_usar: "When building the messaging architecture for any sales piece — the foundation of persuasive message hierarchy"
      evidencia: "Your best sales argument, it lies in these three questions."
      source_path: "inbox/joanna-wiebe-primary-sources-batch2.md"
    - name: "Tell-Show-Tell Sandwich"
      steps:
        - "Tell: state the claim or benefit"
        - "Show: provide specific evidence, screenshot, or example"
        - "Tell: reinforce with context or implication"
      quando_usar: "Every piece of copy — people need details, nobody cares about anything, so you can't just show"
      evidencia: "Show AND Tell. Tell then show then tell. People need details. Nobody cares about anything. Sandwich it between two tells."
      source_path: "inbox/joanna-wiebe-mius-sample.yaml"

  modelo_decisao: "Research first (VOC, review mining, surveys, interviews) occupying two-thirds of effort — then organize into Message Map — then design Solution (PCPO) — then apply writing frameworks (PAS, Seven Questions) — then edit via Seven Sweeps — then test. List > Offer > Copy always. Data decides, not the copywriter."

