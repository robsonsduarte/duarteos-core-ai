      fonte: "MIU-DK-F02-010, MIU-DK-F08-007"
    - trigger: "Organizacao tem variabilidade inexplicada em julgamentos"
      acao: "Noise audit — medir dispersao entre juizes no mesmo caso"
      fonte: "MIU-DK-F03-006, MIU-DK-F09-008"
