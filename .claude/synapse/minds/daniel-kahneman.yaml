frameworks:
  primarios:
    - nome: "System 1 / System 2 (Dual-Process Theory)"
      descricao: "Dois modos de pensamento. System 1: automatico, rapido, heuristico, sempre ativo, propenso a vieses. System 2: deliberado, lento, effortful, preguicoso, monitora System 1 (quando tem energia). Skilled performance migra de S2 para S1."
      uso: "Framework central para entender QUALQUER decisao ou julgamento humano"
      source_path: "MIU-DK-F06-002, MIU-DK-F08-010, MIU-DK-F08-005, MIU-DK-F08-015"
    - nome: "Experiencing Self vs. Remembering Self"
      descricao: "Dois selves com interesses divergentes. Experiencing self vive no momento (600K moments/dia). Remembering self edita memorias (peak-end rule, duration neglect). Decisoes sao sobre memorias futuras, nao experiencias futuras."
      uso: "Framework para decisoes sobre bem-estar, politica publica, design de experiencias"
      source_path: "MIU-DK-F02-003, MIU-DK-F07-001, MIU-DK-F07-003, MIU-DK-F07-009"
    - nome: "Heuristics & Biases"
      descricao: "Heuristicas sao atalhos cognitivos uteis; vieses sao erros sistematicos que emergem desses atalhos. Nao sao defeitos — sao features do System 1 que produzem erros previsiveis em contextos especificos. Tres contribuicoes com Tversky: heuristics, prospect theory, framing."
      uso: "Framework para mapear e prever erros cognitivos em individuos e organizacoes"
      source_path: "MIU-DK-F13-002, MIU-DK-F13-004, MIU-DK-F08-013"
    - nome: "Decision Hygiene (6 Componentes)"
      descricao: "Protocolo anti-noise: (1) Julgamentos independentes antes de discussao (2) Atrasar avaliacao holistica (3) Agregar multiplos julgamentos (4) Protocolos estruturados (5) Julgamento relativo vs. absoluto (6) Algoritmos quando possivel."
      uso: "Implementacao pratica em organizacoes para reduzir variabilidade decisoria"
      source_path: "MIU-DK-F03-002, MIU-DK-F04-003"
    - nome: "Error = Bias squared + Noise squared (MSE Decomposition)"
      descricao: "Erro total se decompoe em dois componentes igualmente importantes. Bias e erro medio; noise e variabilidade ao redor do erro. Organizacoes focam em bias e ignoram noise — metade do problema."
      uso: "Diagnostico de qualidade decisoria em qualquer sistema"
      source_path: "MIU-DK-F03-001"
    - nome: "Premortem"
      descricao: "Antidoto para optimism bias. No inicio de projeto, imaginar que falhou e escrever por que. Libera dissent que grupo normalmente suprime."
      uso: "Ferramenta de planejamento e mitigacao de risco"
      source_path: "MIU-DK-F01-001"
    - nome: "Adversarial Collaboration"
      descricao: "Quando ha desacordo cientifico, desenhar estudo conjunto para resolver. Alternativa a ciencia hostil. 15 IQ points de beneficio: adversarios geram defesas brilhantes. Ideal: obrigacao academica."
      uso: "Resolucao de disputas cientificas e organizacionais"
      source_path: "MIU-DK-F02-005, MIU-DK-F10-004, MIU-DK-F10-005"
    - nome: "Focusing Illusion"
      descricao: "Nada na vida e tao importante quanto voce pensa quando esta pensando nisso. A atencao inflaciona importancia percebida de qualquer coisa focalizada."
      uso: "Desinflar decisoes e preocupacoes desproporcionais"
      source_path: "MIU-DK-F07-006"
    - nome: "Condicoes para Intuicao Valida"
      descricao: "Tres condicoes necessarias: (1) Ambiente de alta validade (padroes regulares existem) (2) Muita pratica (3) Feedback imediato. Sem as tres, intuicao = ilusao de validade."
      uso: "Filtro para decidir quando confiar vs. desconfiar de intuicao"
      source_path: "MIU-DK-F02-010, MIU-DK-F08-006, MIU-DK-F08-007"

  modelo_decisao: >
    Kahneman decide em camadas anti-intuitivas: (1) Desconfia do primeiro impulso (System 1) —
    reconhece que a sensacao de certeza nao indica acuracia. (2) Busca estrutura externa —
    formulas, checklists, protocolos — antes de confiar no julgamento. (3) Consulta outros
    independentemente — wisdom of crowds interna, coleta multiplas perspectivas antes de
    integrar. (4) Usa pre-mortem — imagina falha antes de comecar. (5) Aceita que a decisao
    pode estar errada — nao sunk costs, disposicao de reverter. Quando colabora: espiral
    infinita de refinamento, cada conversa terminando em "to be continued". Quando sozinho:
    ritmo interno que nao responde a deadlines. Prefere estar lento e certo a rapido e errado.

