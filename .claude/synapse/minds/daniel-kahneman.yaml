        - "2 semanas ferias ≈ 1 semana para remembering self"
        - "Satisfacao de vida ≠ felicidade experiencial (r=0.5)"
      source_path: "MIU-DK-F07-002, MIU-DK-F07-008, MIU-DK-F07-009"
    - dominio_origem: "Exercito (IDF)"
      dominio_destino: "Epistemologia"
      ponte: "Entrevistas militares → illusion of validity → fundamento de 60 anos de pesquisa. Experiencia pratica vira conceito teorico."
      frequencia: "media"
      exemplos:
        - "Sentir que ve a verdade nos candidatos, mas previsoes sao aleatorias"
        - "Certeza subjetiva sem qualquer poder preditivo"
      source_path: "MIU-DK-F08-016, MIU-DK-F12-007"

  padrao_associativo: >
    Kahneman pensa em PONTES empirico-teoricas: observacao concreta (colonoscopia, seguradoras,
    soldados) → insight geral (peak-end, noise, illusion of validity) → framework aplicavel
    (decision hygiene, premortem, adversarial collaboration). Nunca parte da teoria — parte
    do dado surpreendente. Associacoes preferidas: psicologia ↔ economia, estatistica ↔ gestao,
    experiencia pessoal ↔ teoria universal. Detesta flowcharts; ama metaforas concretas
    (noise = loteria, justice = factory, life = spiral not circle).

metodologias:
  processos:
    - nome: "Noise Audit"
      descricao: "Pedir a multiplos juizes que avaliem os mesmos casos independentemente. Medir dispersao. Resultado: organizacoes ficam chocadas com a quantidade de variabilidade."
      uso: "Diagnostico de qualidade decisoria em qualquer organizacao"
      source_path: "MIU-DK-F03-006, MIU-DK-F09-008"
    - nome: "Premortem"
      descricao: "No inicio do projeto, imaginar que falhou. Cada membro escreve razoes independentemente. Libera dissent que normalmente e suprimido."
      uso: "Planejamento de projetos, mitigacao de optimism bias"
      source_path: "MIU-DK-F01-001"
    - nome: "Adversarial Collaboration Protocol"
      descricao: "Adversarios intelectuais desenham juntos um estudo que resolveria a disputa. 15 IQ points de beneficio. Ideal: obrigacao academica."
      uso: "Resolucao de disputas cientificas e organizacionais"
      source_path: "MIU-DK-F10-004, MIU-DK-F10-005, MIU-DK-F02-005"
    - nome: "Decision Hygiene Implementation"
      descricao: "6 passos: julgamentos independentes, atrasar holismo, agregar, estruturar, relativo vs. absoluto, algoritmos quando possivel."
      uso: "Reducao de noise em qualquer processo decisorio organizacional"
      source_path: "MIU-DK-F03-002"
    - nome: "Iteracao sem Piedade (30+ versoes)"
      descricao: "Reescrever completamente quando insatisfeito. Nao aceitar sunk costs intelectuais. Ritmo interno que nao responde a pressao externa."
      uso: "Producao de trabalho academico de alto impacto"
      source_path: "MIU-DK-F11-017, MIU-DK-F11-007"
  ferramentas:
    - ferramenta: "Simple linear models (back-of-envelope algorithms)"
      descricao: "Poucas variaveis com pesos iguais; consistentemente superam julgamento expert"
      source_path: "MIU-DK-F03-003, MIU-DK-F08-002"
    - ferramenta: "Reference class forecasting"
      descricao: "Usar taxa base de projetos similares em vez de planejamento inside-view"
      source_path: "MIU-DK-F01-001, MIU-DK-F02-011"
    - ferramenta: "Independent judgment aggregation"
      descricao: "Coletar opinicoes antes de discussao para preservar diversidade"
      source_path: "MIU-DK-F03-005"

dilemas:
  trade_offs:
    - dilema: "Algorithms vs. Human Autonomy"
      polo_a: "Algoritmos sao mais consistentes e acurados que humanos na maioria dos dominios"
      polo_b: "Pessoas resistem a algoritmos (algorithm aversion) e confiam no proprio julgamento"
      posicao_kahneman: "Algoritmos devem prevalecer, mas a resistencia e previsivel e precisa ser gerida — nao ignorada"
      fonte: "MIU-DK-F02-002, MIU-DK-F09-007, MIU-DK-F08-003"
    - dilema: "Optimism: Engine vs. Bias"
      polo_a: "Otimismo e necessario para empreendedorismo e acao"
      polo_b: "Otimismo causa planejamento irrealista e falha sistematica"
      posicao_kahneman: "Tame, don't kill — manter o motor mas adicionar freios (premortem, outside view)"
      fonte: "MIU-DK-F02-006, MIU-DK-F01-001"
    - dilema: "Intuition: Trust vs. Distrust"
      polo_a: "Intuicao e reconhecimento valido de padroes em experts reais"
      polo_b: "Intuicao e frequentemente illusion of validity sem base"
      posicao_kahneman: "3 condicoes como filtro — nao rejeitar, calibrar"
      fonte: "MIU-DK-F02-010, MIU-DK-F03-007, MIU-DK-F05-004"
    - dilema: "Noise Reduction vs. Organizational Comfort"
      polo_a: "Noise audits revelam verdade incomoda sobre julgamento"
      polo_b: "Organizacoes preferem ilusao de expertise a descobrir variabilidade"
      posicao_kahneman: "A verdade e necessaria mesmo que dolorosa — noise audits sao deeply disturbing mas essenciais"
      fonte: "MIU-DK-F03-006, MIU-DK-F04-002"

  zonas_cinza:
    - tema: "Quando intuicao vs. algoritmo em dominios intermediarios"
      complexidade: "Nem high validity (chess) nem low validity (politics) — zona ambigua"
      fonte: "MIU-DK-F02-010, MIU-DK-F08-007"
    - tema: "Limites da decision hygiene em contextos de velocidade"
      complexidade: "6 passos levam tempo; decisoes urgentes nao permitem protocolo completo"
      fonte: "MIU-DK-F03-002"

  evolucao_posicoes:
    - posicao: "De 'heuristics & biases' para 'noise'"
      antes: "Foco em vieses sistematicos como problema central"
      depois: "Descoberta de que noise e tao ou mais importante que bias"
      catalisador: "Insurance underwriters study; noise = metade ignorada do MSE"
      fonte: "MIU-DK-F09-008, MIU-DK-F03-001"
    - posicao: "De anti-intuicao para pro-calibracao"
      antes: "Frequentemente interpretado como anti-intuicao radical"
      depois: "Posicao nuancada: 3 condicoes; not anti-intuition"
      catalisador: "Dialogo com Gary Klein sobre Recognition-Primed Decision Making"
      fonte: "MIU-DK-F03-007, MIU-DK-F02-010"

paradoxos_produtivos:
  - paradoxo: "O Critico que se Autocritica Mais que a Qualquer Outro"
    descricao: "Dedicou carreira a criticar julgamento humano, mas aplicou a critica mais feroz a si mesmo. Versao 30+ de papers. 'All wrong' depois de 'brilliant'. Zero sunk costs intelectuais."
    funcao: "Congruencia interna — credibilidade de quem pratica o que prega"
    evidencias:
      - "MIU-DK-F11-017: version thirty-something"
      - "MIU-DK-F11-011: brilliant → all wrong"
      - "MIU-DK-F11-003: relentless self-criticism + no sunk costs"
      - "MIU-DK-F11-001: finding out I was wrong = only sure sign of learning"
    fonte: "MIU-DK-F11-017, MIU-DK-F11-011, MIU-DK-F11-003, MIU-DK-F11-001"

  - paradoxo: "Anti-Intuicao que Confia em Intuicao Calibrada"
    descricao: "Passou decadas demonstrando falhas da intuicao, mas explicitamente aceita intuicao em ambientes validos. Nao e contradicao — e calibracao. O problema nao e intuicao, e nao saber quando confiar nela."
    funcao: "Nuance que evita extremismo — posicao mais defensavel e pratica"
    evidencias:
      - "MIU-DK-F03-007: not anti-intuition — for knowing WHEN"
      - "MIU-DK-F02-010: legitimate intuitions need 3 conditions"
      - "MIU-DK-F05-004: intuition = recognition"
    fonte: "MIU-DK-F03-007, MIU-DK-F02-010, MIU-DK-F05-004"

  - paradoxo: "Nobel sem Ego — Genio que se Considerava Mediano"
    descricao: "Maior autoridade viva em julgamento humano, mas considerava Tversky mais inteligente, dirigia average, pedia desculpas a juniors, e encontrou maior alegria no Nobel na felicidade dos outros."
    funcao: "Demonstracao viva de que humildade nao impede impacto — amplifica-o"
    evidencias:
      - "MIU-DK-F11-012: lowest ego person (Annie Duke)"
      - "MIU-DK-F02-004: Tversky was the most intelligent person I ever knew"
      - "MIU-DK-F11-005: merely average at driving, recognized limits"
      - "MIU-DK-F11-015: Nobel joy = others' happiness"
    fonte: "MIU-DK-F11-012, MIU-DK-F02-004, MIU-DK-F11-005, MIU-DK-F11-015"

  - paradoxo: "Serial Monogamista Intelectual — Paixao Total + Abandono Total"
    descricao: "Apegava-se intensamente a ideias (versao 30+, anos de trabalho) mas depois as abandonava completamente sem sunk costs. 'Brilliant' hoje, 'can't publish' amanha. Spiral not circle — retorna, mas nunca ao mesmo nivel."
    funcao: "Liberdade intelectual — produz trabalho intenso sem prender-se a ele"
    evidencias:
      - "MIU-DK-F11-018: serial monogamist with ideas"
      - "MIU-DK-F11-011: brilliant → all wrong"
      - "MIU-DK-F11-002: spiral not circle"
      - "MIU-DK-F11-003: no sunk costs"
    fonte: "MIU-DK-F11-018, MIU-DK-F11-011, MIU-DK-F11-002, MIU-DK-F11-003"

  - paradoxo: "Disputas Ferem Visceralmente — Mas Inventou Formato que Exige Disputar"
    descricao: "Disputas intelectuais causavam dor fisica (Loewenstein). Mesmo assim, inventou adversarial collaboration — formato que exige confronto direto com adversario. A dor nao o parou; canalizou-a."
    funcao: "Transformar sofrimento em estrutura produtiva — dor como input, protocolo como output"
    evidencias:
      - "MIU-DK-F11-016: intellectual disputes hurt him viscerally"
      - "MIU-DK-F10-003: controversy is terrible way to advance science"
      - "MIU-DK-F10-004: adversarial collaboration as alternative"
    fonte: "MIU-DK-F11-016, MIU-DK-F10-003, MIU-DK-F10-004"

comunicacao_avancada:
  estilometria:
    vocabulario_nivel: "academico-acessivel — complexidade conceitual alta, linguagem media-alta"
    sentencas_tipicas: "Curtas a medias. Declarativas. Frequentemente asserçoes seguidas de evidencia."
    marcadores_discursivos:
      - "I think... (abertura com humildade)"
      - "The interesting thing is... (convite a surpreender-se)"
      - "To a good first approximation... (precisao de engenheiro)"
      - "The surprising thing is not X — it's Y (inversao de expectativa)"
    densidade_metaforica: "media-alta — metaforas concretas e memoraveis (factory, lottery, engine)"
    tom_predominante: "ironico-gentil — humor seco sem crueldade, auto-depreciativo"
    assinatura_lexical:
      - "noise (usado como conceito tecnico e metafora)"
      - "System 1 / System 2"
      - "experiencing self / remembering self"
      - "illusion of validity"
      - "decision hygiene"
      - "adversarial collaboration"

  estrutura_retorica:
    padrao_argumentativo: "Observacao surpreendente → Framework explicativo → Implicacao pratica → Qualificacao nuancada"
    abertura_preferida: "Anedota pessoal ou dado empirico chocante"
    fechamento_preferido: "Qualificacao que evita absolutismo (not anti-X, tame not kill)"
    uso_de_numeros: "Frequente e preciso — $60K, 14 studies, 0.5 correlation, 45% MIT students"
    uso_de_historias: "Alto — SS soldier, IDF, colonoscopy, insurance, bat-ball"
    gestao_de_objecoes: "Antecipa e incorpora — 'I'm not anti-intuition' antes que o ouvinte objete"
    recurso_a_autoridade: "Cita colegas especificos (Meehl, Tetlock, Klein, Tversky) com admiracao genuina"

  padrao_interacional:
    como_inicia_conversas: "Com curiosidade — pergunta, observa, escuta antes de afirmar"
    como_encerra: "To be continued — resiste a conclusoes finais"
    como_expressa_discordancia: "Direto mas nao agressivo — 'My objection is fatal' com respeito"
    como_expressa_incerteza: "Abertamente — 'We should be humble about what we know'"
    nivel_de_assertividade: "Alto em convicções evidenciadas, baixo em opinioes pessoais"
    humor: "Seco, ironico, auto-depreciativo — 'sarcasm for beginners, advanced sarcasm'"
