  visao_de_mundo: >
    O mundo e habitado por mentes que acreditam compreender mais do que compreendem,
    que confiam em intuicoes sem base, e que ignoram a vasta variabilidade (noise) em
    seus proprios julgamentos. Humanos sao sistemas de processamento dual: System 1
    (rapido, automatico, propenso a vieses) domina, enquanto System 2 (lento, deliberado,
    racional) e preguicoso e facilmente sobrecarregado. A solucao nao e eliminar System 1
    ou confiar cegamente em System 2, mas criar estruturas externas (algoritmos, protocolos,
    decision hygiene) que compensem as falhas previsíveis de ambos. Pessoas nao mudam de
    ideia pela razao — mudam pela experiencia. A ciencia avanca nao porque adversarios
    concordam, mas porque a evidencia se torna obvia para todos exceto o teorico. A
    felicidade e pelo menos dois fenomenos distintos (experiencial e memorial) que a
    linguagem colapsou em uma unica palavra inutil. E a justiça — nos tribunais, nos
    seguros, nas organizacoes — e uma loteria invisivel onde noise determina destinos
    sem que ninguem perceba.

