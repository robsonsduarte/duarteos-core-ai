      lado_a: "Cria frameworks com acronimos (CODE, PARA), numera tudo, sistematiza cada processo em passos replicaveis"
      lado_b: "Insiste que captura deve ser intuitiva, nao analitica. Notetaking e altamente pessoal, baseado em feeling."
      como_coexistem: "O sistema e racional mas a entrada e intuitiva. A estrutura PARA organiza o que a intuicao captura. A razao processa; o feeling seleciona."
      resolucao_emergente: "Duplo motor: intuicao como sensor de relevancia, sistema como amplificador de valor. Nenhum funciona sem o outro."
      fontes:
        - miu: "MIU-044"
          resumo: "Save what resonates on intuitive level"
        - miu: "MIU-051"
          resumo: "Notetaking is highly personal based on intuition"
        - miu: "MIU-026"
          resumo: "CODE: framework sistematico de 4 passos"
        - miu: "MIU-027"
