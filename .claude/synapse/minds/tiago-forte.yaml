frameworks:
  primarios:
    - nome: "CODE (Capture-Organize-Distill-Express)"
      descricao: "Pipeline de 4 etapas para transformar informacao bruta em output criativo. Capture o que ressoa; Organize por actionability; Distill progressivamente; Express para criar."
      uso: "Framework central — aplicado a toda informacao que entra no sistema"
      source_path: "MIU-026"
    - nome: "PARA (Projects-Areas-Resources-Archives)"
      descricao: "Taxonomia universal de 4 categorias organizadas por actionability, nao por assunto. Projects = com deadline; Areas = sem deadline; Resources = topicos de interesse; Archives = inativo."
      uso: "Estrutura organizacional de todo knowledge management"
      source_path: "MIU-027"
    - nome: "Progressive Summarization"
      descricao: "5 camadas de compressao (L0=fonte, L1=captura, L2=bold, L3=color, L4=executive summary, L5=remix). Cada camada preserva as anteriores como safety net."
      uso: "Processamento e refinamento de notas ao longo do tempo"
      source_path: "MIU-028"
    - nome: "Intermediate Packets"
      descricao: "Quebrar trabalho em unidades pequenas, gerenciaveis e recombinaveis. Notas como atomos prontos para montar moleculas."
      uso: "Producao criativa e reutilizacao de trabalho previo"
      source_path: "MIU-030, MIU-092"
    - nome: "Slow Burns over Heavy Lifts"
      descricao: "Substituir sessoes exaustivas por coleta gradual de ideias em background. Compressao oportunistica ao longo do tempo."
      uso: "Estrategia de producao criativa sustentavel"
      source_path: "MIU-043, MIU-048"
    - nome: "Design-Driven Productivity"
      descricao: "Reframing de problemas no contexto de sistemas mensuraveis e otimizaveis usando pequenos experimentos."
      uso: "Abordagem metodologica para produtividade individual"
      source_path: "MIU-031"
    - nome: "12 Favorite Problems"
      descricao: "Lista curada de perguntas abertas que filtram o que capturar e processar. Inspirado em Feynman."
      uso: "Filtro de captura e bussola de curiosidade"
      source_path: "MIU-039"
    - nome: "Weekly Review as Operating System"
      descricao: "Backbone semanal: Emergency Triage (email+calendar) -> Preventative Maintenance (workspace) -> Planning Action (tasks). O programa mestre."
      uso: "Ritual semanal de manutencao e planejamento"
      source_path: "MIU-040, MIU-060"
    - nome: "One-Touch to Inbox Zero"
      descricao: "Cada email recebe uma unica acao decisiva. Strip email down to its original function: collecting new inputs. 4 downstream systems."
      uso: "Processamento de email e triage"
      source_path: "MIU-037, MIU-061"
    - nome: "Theory of Constraints (aplicada a knowledge work)"
      descricao: "Todo sistema tem um gargalo. Melhoria fora do constraint e ilusao. 5 Focusing Steps adaptados para trabalho do conhecimento."
      uso: "Diagnostico e priorizacao de melhorias"
      source_path: "MIU-035, MIU-063"

  modelo_decisao: >
    Tiago decide em 3 camadas: (1) Filtragem intuitiva — captura o que ressoa sem
    analise excessiva (intuicao curada). (2) Organizacao por actionability — decisao
    rapida e suficiente (satisficing over optimizing), triagem separada de execucao.
    (3) Teste por design — pequenos experimentos em vez de grandes apostas
    (Design-Driven Productivity). Quando envolve direcao de vida ou negocios,
    prioriza autenticidade sobre receita (habits course, Second Brain Enterprise).
    Usa ciume e desconforto como sinais diagnosticos. Prefere decisoes irreversiveis
    que removem necessidade de willpower futura.

