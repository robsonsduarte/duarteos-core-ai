        fonte: "MIU-053, MIU-057"
      - situacao: "Oportunidade multi-7-figure desalinhada com curiosidade"
        interpretacao: "Tentacao que viola principio inegociavel de autenticidade"
        reacao: "Recusa firme — prefere seguir o que e genuinamente curioso"
        fonte: "MIU-071"
      - situacao: "Lauren (esposa) traz perspectiva de presenca e ciclos"
