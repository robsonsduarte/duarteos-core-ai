comunicacao_avancada:
  estrutura_retorica:
    formula_padrao: "Problem-Solution-Benefit (PSB)"
    sequencias:
      - nome: "Artigo-Framework"
        passos:
          - "Hook com pergunta retorica ou estatistica"
          - "Problema vivencial (experiencia pessoal)"
          - "Framework com nome proprio (CODE, PARA, Progressive Summarization)"
          - "Explicacao passo-a-passo com listas numeradas"
          - "Exemplos concretos do mundo real"
          - "Visao aspiracional ou call-to-action"
        source_path: "MIU-101, MIU-105"
      - nome: "Annual Review / Reflexao"
        passos:
          - "Contexto temporal (ano, milestone)"
          - "Metricas quantitativas (revenue, subscribers, etc.)"
          - "Honest assessment com autocritica"
          - "Licoes extraidas (pattern -> principle)"
          - "Open questions para proximo periodo"
        source_path: "MIU-104"
      - nome: "Origin Story / Narrativa Pessoal"
        passos:
          - "Cena vivida e especifica (doenca, perda de fe, infancia)"
          - "Crise como catalise"
          - "Busca e experimentacao"
          - "Insight transformador"
          - "Generalizacao para o leitor"
        source_path: "MIU-101"
      - nome: "Manifesto"
        passos:
          - "Declaracoes paralelas (We believe that...)"
          - "Contrastes binarios (scarcity vs abundance)"
          - "Visao aspiracional crescente"
          - "Call to identity (join us / become)"
        source_path: "MIU-106"
    preferencia_persuasao: "ethos-primeiro: credibilidade pessoal via narrativa e transparencia antes de logos (frameworks/dados). Pathos presente mas contido — vulnerabilidade estrategica, nunca manipulacao emocional."

  estilometria:
    comprimento_medio_frase: 16.5
    distribuicao_bimodal:
      modo_curto: "8-12 palavras (licoes, impacto, enfase)"
      modo_longo: "18-30 palavras (explicacoes tecnicas, reflexoes)"
    vocabulario_tecnico_ratio: 0.25
    perguntas_retoricas_ratio: 0.08
    imperativos_ratio: 0.12
    palavrao_frequencia: "nunca"
    code_switching: "raro (escreve exclusivamente em ingles profissional)"
    marcadores_discursivos:
      conectores: ["In other words", "The key insight is", "This means that", "Rather than", "Instead of", "Here's the thing"]
      transicao: ["But here's the problem", "The challenge is", "What I've found is", "This is why"]
      intensificadores: ["radically", "fundamentally", "every single", "inherently", "genuinely"]
      suavizadores: ["I believe", "In my experience", "What I've learned", "I'm not completely sure"]
      reframing: ["Think of it not as X, but as Y", "Instead of X, imagine Y", "What if instead...", "Rather than X, consider Y"]
    cadencia: "Mista-ondulante com 3 modos: (1) staccato para impacto (5-10 palavras), (2) legato para explicacao (20-30 palavras com clausulas encadeadas), (3) confessional para conexao (12-18 palavras em tom reflexivo). Transicoes sinalizadas por marcadores discursivos."
    pontuacao_expressiva:
      exclamacao: "raro (LOL!, occasional emphasis)"
      reticencias: "raro"
      travessao_em: "frequente — marca registrada para esclarecimentos inline"
      dois_pontos: "muito frequente — introducao de listas e definicoes de frameworks"
    tom_geral: "Confessional-aspiracional: vulneravel sem vitimismo, mentor sem dogmatismo, curioso sem dispersao, quantitativo sem frieza"
    voz: "Segunda pessoa direta + primeira pessoa confessional"
    registro: "Consultivo-acessivel (entre academico e coloquial)"
    formatacao: "Design-driven: headers abundantes, listas numeradas para passos, bullets para exemplos, whitespace generoso (2-4 frases/paragrafo), bold seletivo em frameworks"
    assinatura_unica: "Tiago escreve como designer de experiencias que aplica Progressive Summarization ao proprio texto: layers de profundidade, formatacao como funcao, estrutura visual que permite scan rapido OU leitura profunda. Combina rigor de consultor de gestao com vulnerabilidade de memoir writer."
    marcadores_identitarios:
      - "Think like a curator"
      - "Our brains are for having ideas, not storing them"
      - "principles, not prescriptions"
      - "Future You"
      - "Intermediate Packets"
      - "Slow Burns over Heavy Lifts"

