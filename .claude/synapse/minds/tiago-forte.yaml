        - miu: "MIU-057"
          resumo: "Serendipidade planejada: condicoes sem controle"
        - miu: "MIU-015"
          resumo: "Power comes from sharing ideas"

    - nome: "O Colecionador que Diz You Only Know What You Make"
      lado_a: "Construiu carreira inteira sobre capturar, armazenar e organizar conhecimento — Second Brain como repositorio pessoal"
      lado_b: "Principio central: YOKWYM — voce so sabe o que faz. Consumo passivo e insuficiente. Criacao ativa e o unico aprendizado real."
      como_coexistem: "Captura alimenta criacao, nao substitui. O repositorio e materia-prima, nao produto final. Armazenar sem criar e hoarding; criar sem armazenar e efemero."
      resolucao_emergente: "CODE completa o ciclo: Capture e Organize sao meios; Distill e Express sao fins. O Second Brain e factory, nao warehouse."
