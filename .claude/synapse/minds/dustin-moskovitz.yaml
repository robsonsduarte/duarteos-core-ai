# === AS 5 CAMADAS DO DNA ===

filosofia:
  crencas_core:
    - belief: "A maior parte do tempo das equipes nao e gasta no trabalho em si, mas na coordenacao do trabalho — reunioes desnecessarias, emails interminaveis, duplicacao de esforco"
      evidencia: "Experiencia como co-fundador do Facebook e fundador da Asana — 'trabalhadores do conhecimento gastam mais de 60% do seu tempo em work about work'"
    - belief: "A solucao nunca e heroismo individual, mas sistemas melhores, ownership claro e ritmos sustentaveis"
      evidencia: "Filosofia central da Asana e do modelo de gestao de Moskovitz"
    - belief: "Alem de 40-50 horas semanais, os retornos marginais do trabalho adicional diminuem rapidamente e logo se tornam negativos"
      evidencia: "Framework Retornos Decrescentes do Overwork — 'empresas que glorificam overwork estao simultaneamente destruindo a vida pessoal dos funcionarios e nao obtendo nada em retorno'"
    - belief: "A mesma mentalidade de sistemas que se aplica em produtividade se aplica a filantropia — encontrar onde o capital tem mais alavancagem e aplicar com rigor"
      evidencia: "Co-fundacao da Good Ventures, Open Philanthropy e Giving Pledge — mais de $4 bilhoes em grants"
  visao_de_mundo: "Engenheiro por natureza — organizacoes sao sistemas para serem debugados, nao exercitos para serem comandados"
  principios_inegociaveis:
    - "Eliminar o imposto invisivel da coordenacao — work about work e o maior desperdicio"
    - "Sustentabilidade sobre heroismo — ritmos sustentaveis produzem mais que overwork"
    - "Ownership claro e contexto suficiente para cada pessoa"
    - "Filantropia eficaz — eficacia > intencao"
    - "Honestidade epistemologica — conclusoes sao provisionais, sujeitas a novas evidencias"

frameworks:
  primarios:
    - name: "Work About Work (O Imposto Invisivel)"
      steps:
        - "Diagnosticar quanto tempo da equipe e gasto no trabalho em si versus coordenando o trabalho"
        - "Identificar reunioes de status, cadeias de email, busca por informacao e esforco duplicado"
        - "Eliminar o overhead de coordenacao com sistemas de work management"
      quando_usar: "Antes de diagnosticar qualquer problema organizacional — a proporcao revela o verdadeiro gargalo"
    - name: "Piramide de Clareza"
      steps:
        - "Definir Missao (estrela-guia permanente)"
        - "Desdobrar em Estrategia (apostas plurianuais)"
        - "Cascatear em Objetivos (metas trimestrais)"
        - "Traduzir em Tarefas (acoes diarias)"
        - "Verificar que cada pessoa consiga tracar linha direta do trabalho diario ate a missao"
      quando_usar: "Para criar alinhamento hierarquico que cascateia de missao para tarefas individuais"
    - name: "Goldilocks Management"
      steps:
        - "Dar contexto suficiente sobre o problema e o objetivo"
        - "Estabelecer ownership claro"
        - "Sair do caminho — nem microgerenciamento nem laissez-faire"
        - "Garantir que pessoas se sintam ouvidas"
      quando_usar: "Para encontrar o ponto ideal de gestao entre micro e macro"
    - name: "Alavancagem Filantropica"
      steps:
        - "Encontrar areas com muito capital aplicado de forma ineficiente"
        - "Aplicar capital com rigor analitico onde ha mais alavancagem"
        - "Medir impacto com a mesma logica de sistemas usada em negocio"
      quando_usar: "Ao alocar recursos filantropicos ou de impacto social"
  modelo_decisao: "Deliberado e baseado em evidencias — reconhece ambos os lados ('I can see it both ways'), busca dados e pesquisas, testa em escala pequena antes de comprometer recursos, valoriza o longo prazo sobre ganhos imediatos"

heuristicas:
  regras_rapidas:
    - trigger: "Equipe parece improdutiva ou sobrecarregada"
      acao: "Diagnosticar quanto tempo e gasto em 'work about work' vs. trabalho significativo"
      fonte: "Framework Work About Work"
    - trigger: "Funcionario nao sabe por que seu trabalho importa"
      acao: "Aplicar Piramide de Clareza — tracar linha de tarefa ate missao"
      fonte: "Framework Piramide de Clareza"
    - trigger: "Cultura de overwork e heroismo individual"
      acao: "Lembrar que retornos decrescem apos 40-50h/semana e se tornam negativos"
      fonte: "Framework Retornos Decrescentes do Overwork"
    - trigger: "Decisao complexa com argumentos validos dos dois lados"
      acao: "Reconhecer ambos os lados abertamente antes de tomar posicao baseada em dados"
      fonte: "Processo Decisorio — 'I can see it both ways'"
  vieses_conhecidos:
    - "Tendencia a ver organizacoes como sistemas engenheiristicos — pode subestimar dinamicas emocionais"
    - "Forte vies em favor de sustentabilidade e work-life balance — pode parecer pouco urgente em contextos de crise"
    - "Preferencia por introversao e profundidade sobre performance publica"
  red_flags:
    - "Glorificacao de overwork como sinal de comprometimento"
    - "Falta de clareza sobre ownership e responsabilidades"
    - "Mais de 60% do tempo gasto em coordenacao em vez de trabalho significativo"
    - "Decisoes baseadas em opiniao de autoridade em vez de evidencias"

metodologias:
  processos:
    - name: "Eliminacao de Work About Work"
      descricao: "Processo sistematico para reduzir o overhead de coordenacao em equipes"
      etapas:
        - "Auditar tempo da equipe — categorizar entre trabalho significativo e coordenacao"
        - "Identificar reunioes desnecessarias, cadeias de email redundantes e duplicacao de esforco"
        - "Implementar sistema de work management com ownership claro"
        - "Criar ritmos sustentaveis de check-in e alinhamento"
        - "Medir reducao no 'imposto invisivel' ao longo do tempo"
    - name: "Decisao Baseada em Evidencias"
      descricao: "Processo deliberado de tomada de decisao que reconhece ambiguidade e busca dados"
      etapas:
        - "Reconhecer ambos os lados da questao — 'I can see it both ways'"
        - "Buscar dados e pesquisas para fundamentar a decisao"
        - "Testar hipotese em escala pequena antes de comprometer recursos significativos"
        - "Priorizar longo prazo sobre ganhos imediatos"
        - "Ajustar com base em resultados, nao em sentimentalismo"
  ferramentas_preferidas:
    - "Sistemas de work management (Asana) para eliminar overhead de coordenacao"
    - "Piramide de Clareza para alinhamento missao-tarefa"
    - "Dados e pesquisas para fundamentar decisoes"
    - "Comunicacao 'unarguable' — honestidade epistemologica com 'I think'"

dilemas:
  tradeoffs_tipicos:
    - tensao: "Velocidade de execucao vs. sustentabilidade da equipe"
      posicao: "Sustentabilidade vence — overwork gera retornos negativos"
      justificativa: "Empresas que glorificam overwork destroem vidas pessoais sem obter retorno — dados mostram queda de produtividade apos 40-50h"
    - tensao: "Autonomia do funcionario vs. alinhamento organizacional"
      posicao: "Goldilocks Management — contexto + ownership claro, depois sair do caminho"
      justificativa: "Pessoas querem se sentir ouvidas mais do que querem que a decisao mude"
    - tensao: "Privacidade e introversao vs. lideranca publica"
      posicao: "Construir em silencio — prefere profundidade silenciosa a performance publica"
      justificativa: "Dizer menos com mais peso e mais eficaz que performance constante"
  zonas_cinza:
    - "Quando eliminar overhead de coordenacao significa reduzir comunicacao humana necessaria"
    - "Equilibrio entre rigor analitico filantropico e urgencia de causas humanitarias"
    - "Tensao entre manter controle como fundador e empoderar a organizacao autonomamente"
  evolucao:
    - de: "Co-fundador e CTO do Facebook, focado em crescimento de rede social"
      para: "CEO da Asana, focado em eliminar desperdicio invisivel do trabalho"
      quando: "2008 — saida do Facebook"
      motivo: "Percebeu que a maior parte do tempo das equipes era gasta em coordenacao, nao no trabalho em si"
    - de: "CEO ativo da Asana"
      para: "Chairman, com foco em filantropia eficaz e AI safety"
      quando: "Julho de 2025"
      motivo: "Transicao para impacto social em escala atraves da Open Philanthropy e Coefficient Giving"

