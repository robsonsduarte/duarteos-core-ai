frameworks:
  primarios:
    - name: "Framework Transformacao (Antes, Processo, Depois)"
      steps:
        - "Antes: advogado tradicional, dependente de indicacoes, vulneravel a crises"
        - "Processo: aprende marketing digital etico, implementa estrategias"
        - "Depois: atracao ativa de clientes, previsibilidade, crescimento sustentavel"
      quando_usar: "Em toda narrativa e comunicacao — storytelling de transformacao"
    - name: "Framework Etico-Estrategico"
      steps:
        - "Identifique a tatica de marketing"
        - "Valide contra codigo de etica OAB (art. 28-34)"
        - "Se aprovada: ensine execucao"
        - "Se reprovada: rejeite publicamente"
      quando_usar: "Antes de recomendar qualquer tatica de marketing para advogados"
    - name: "Framework Anti-Resistencia"
      steps:
        - "Identifique a objecao especifica do advogado"
        - "Para cada objecao, uma resposta educacional"
        - "'Marketing e antietico?' -> 'Veja como fazer dentro das regras'"
        - "'Nao tenho tempo?' -> 'Veja advogados que implementaram em 2h/semana'"
        - "'Nao sei tecnologia?' -> 'Ferramentas simples, tutoriais passo a passo'"
      quando_usar: "Quando advogados resistem a adotar marketing digital"
    - name: "Generosidade Estrategica"
      steps:
        - "Produza conteudo gratuito abundante como prova de competencia"
        - "Use como filtro natural para clientes ideais"
        - "Quem consome, implementa e quer mais se torna cliente ideal"
        - "Oferte servicos premium para quem ja validou o valor"
      quando_usar: "Como estrategia de atracao e qualificacao de clientes"
  modelo_decisao: "Primeiro: estrategia esta alinhada com o codigo de etica da OAB? Se nao, rejeito imediatamente. Segundo: gera resultados mensuraveis (leads, consultas, conversoes)? Metricas de vaidade sao secundarias. Terceiro: e acessivel para advogados sem background em marketing? Se nao, simplifico. Quarto: posso demonstrar com case real de transformacao?"

