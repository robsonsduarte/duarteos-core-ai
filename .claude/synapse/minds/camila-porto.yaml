    - tensao: "Fundamentos classicos vs. taticas novas de plataforma"
      posicao: "Fundamentos sao a rocha, taticas sao a agua — a rocha permanece, a agua se adapta"
      justificativa: "AIDA nao e teoria velha, e a fundacao que faz qualquer tatica funcionar"
    - tensao: "Conteudo gratuito generoso vs. produto pago que sustenta o negocio"
      posicao: "Democratizar conhecimento e obrigacao, mas produto pago e sustentavel"
      justificativa: "PortoClass gratuita e PortoCast diario atraem — cursos pagos convertem — AEC em acao"
  zonas_cinza:
    - "Ate a especialista em Facebook ensina a nao depender de uma so plataforma — honestidade intelectual sobre conflito de interesse"
    - "Equilibrio entre calor humano e escalabilidade — como manter acessibilidade com 15.000+ alunos"
    - "Quando o algoritmo muda drasticamente e os fundamentos precisam de nova traducao"
  evolucao:
