      para: "Pioneira em educacao de Facebook Marketing no Brasil desde 2010"
      quando: "2010"
      motivo: "Percebeu que quase ninguem no Brasil tratava marketing em redes sociais como disciplina de negocios"
    - de: "Foco exclusivo em Facebook Marketing"
