  wing: 6
  label: "Investigator com asa Loyalist"
  confidence: 0.88
  justificativa: "Tipo 5: busca de conhecimento, privacidade, independencia, desapego de posses, observador em vez de participante. Asa 6: consciencia de seguranca (criptografia, privacidade como protecao), lealdade a principios, preparacao para piores cenarios. Integracao para 8 (poder, assertividade) visivel na recusa a governos e controle total do produto."
  centro: "Pensamento (cabeca)"
  motivacao_basica: "Compreender o mundo, ser capaz e competente, proteger autonomia"
  medo_basico: "Ser incompetente, inutil, invadido"
  direcao_integracao: "8 (assertividade, controle, desafio ao poder)"
  direcao_desintegracao: "7 (dispersao, escapismo — raramente observado)"

