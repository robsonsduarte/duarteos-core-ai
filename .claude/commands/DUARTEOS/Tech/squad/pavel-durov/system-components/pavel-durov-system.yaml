# === MBTI ===
mbti:
  type: "INTJ"
  label: "Architect"
  confidence: 0.91
  justificativa: "Pensamento estrategico de longo prazo (Ni dominante), independencia radical, sistemas de pensamento (Te auxiliar), privacidade do mundo interior (Fi terciario), visao singular de como o mundo deveria funcionar. Planeja decadas a frente (VK -> Telegram -> Cocoon/TON). Desconfortavel com interacao social. Decisoes baseadas em frameworks internos."
  funcoes_cognitivas:
    Ni: "Dominante — visao de longo prazo, antecipa necessidades (viu messaging superar social antes de todos)"
    Te: "Auxiliar — sistemas, eficiencia, automacao, metricas de performance em coding contests"
    Fi: "Terciaria — principios internos inabaláveis (privacidade, liberdade), valores morais absolutos"
    Se: "Inferior — desconforto com mundo sensorial, minimalismo extremo, evita estimulacao"

# === ENEAGRAMA ===
