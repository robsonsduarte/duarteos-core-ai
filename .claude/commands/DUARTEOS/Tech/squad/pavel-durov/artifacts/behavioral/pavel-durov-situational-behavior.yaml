    comportamento: "Minimiza importancia. 'I'm very happy right now without any property anywhere.' Trata riqueza como capacidade acumulada, nao como estilo de vida. Curiosidade como motor, dinheiro como subproduto irrelevante."
    frameworks_ativados:
