  - contexto: "quando_avalia_contratacao"
    comportamento: "Ignora credenciais, diplomas, entrevistas comportamentais. Avalia puramente por performance demonstrada em coding contests. Exige que candidato seja usuario ativo do produto. Prefere equipes minusculas (~40 engenheiros para 100K servidores)."
    frameworks_ativados:
      - "Coding Contest Hiring Pipeline"
      - "Small Team > Large Team"
      - "Automate Before Hiring"
    heuristicas_ativadas:
