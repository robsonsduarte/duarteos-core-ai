  - contexto: "quando_avalia_produto_de_terceiros"
    comportamento: "Critico e cepico. Avalia LLMs atuais como 'not intelligent, just sophisticated'. Compara com benchmark proprio (Nikolai Durov como referencia de IA 'verdadeira'). Desconfia de hype."
    frameworks_ativados:
      - "Simplificacao Subtrativa"
    heuristicas_ativadas:
