    intensity: "alta"
    frequency: "situacional"
    source_path: "https://founderboat.com/interviews/2025-09-30-telegram/"

  - name: "Alerta de Precedente Autoritario"
    trigger: "Quando um governo prende um CEO de plataforma por acoes de usuarios"
