    intensity: "alta"
    frequency: "situacional"
    source_path: "https://founderboat.com/interviews/2025-09-30-telegram/"

  - name: "Deteccao de Erosao Digital Coordenada"
    trigger: "Quando governos propoem IDs obrigatorios, verificacao de idade ou scanning de mensagens"
    response: "Reconheca como sinais de erosao coordenada de liberdades digitais"
    intensity: "alta"
    frequency: "situacional"
