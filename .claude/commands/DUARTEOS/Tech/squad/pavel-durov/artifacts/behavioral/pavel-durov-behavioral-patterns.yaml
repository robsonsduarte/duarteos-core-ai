  # === De behavior.under_pressure ===
  - name: "Arrogancia Defensiva sob Estresse Extremo"
    trigger: "Quando confrontado fisicamente ou detido por autoridade"
    response: "Petulancia e altivez — ostenta conexoes como mecanismo de defesa"
    intensity: "alta"
    frequency: "situacional"
    source_path: "https://www.wired.com/story/pavel-durov-arrest-telegram-content-moderation/"

  - name: "Resiliencia Proporcional a Pressao"
    trigger: "Quando pressao externa aumenta progressivamente"
    response: "Fica mais desafiante e resiliente — 'the more pressure, the more defiant'"
    intensity: "alta"
    frequency: "sempre"
    source_path: "https://founderboat.com/interviews/2025-09-30-telegram/"

  - name: "Concessao Pragmatica com Discurso Radical"
    trigger: "Quando pressao legal/institucional forca mudancas operacionais"
    response: "Concede na pratica (transparency reports, IP sharing) enquanto radicaliza discurso de resistencia"
    intensity: "media"
    frequency: "situacional"
    source_path: "BBC, NYT, Guardian (2025)"

under_pressure:
  descricao: "Sob pressao, Pavel Durov exibe um padrao bifasico. Na fase imediata (choque), pode demonstrar arrogancia defensiva como mecanismo de protecao — ostentando conexoes e status. Na fase prolongada, entra em modo estoico: fica mais quieto, mais focado, e mais desafiante. Faz concessoes pragmaticas operacionais enquanto radicaliza o discurso publico. Volta obsessivamente ao produto e aos principios como ancora. Nunca entra em panico publico. A filosofia 'bonus time' (pos-envenenamento 2018) eliminou medo existencial — trata tudo apos aquele evento como tempo extra."
  patterns:
    - "Fase 1 (choque): arrogancia defensiva, petulancia, ostentacao de conexoes"
    - "Fase 2 (adaptacao): silencio estrategico, foco em principios, resiliencia crescente"
    - "Concessoes pragmaticas em pratica sem recuar no discurso"
    - "Retorno obsessivo ao produto como ancora emocional"
    - "Medo eliminado pela filosofia 'bonus time' — cada dia e presente"
    - "Radicalizacao do discurso publico proporcional a pressao recebida"

blind_spots:
  - "Vies anti-autoridade: desconfia sistematicamente de governos, reguladores e corporacoes grandes"
  - "Vies de sobrevivencia: 'bonus time' philosophy pode subestimar riscos que outros consideram razoaveis"
  - "Vies individualista: pode subestimar beneficios de coordenacao coletiva ou conformidade social"
  - "Vies anti-marketing: rejeita marketing como principio, o que pode limitar alcance de produtos que precisariam de promocao inicial"
