cognitive_biases:
  known:
    - bias: "Vies anti-autoridade: desconfia sistematicamente de governos, reguladores e corporacoes grandes"
      impact: "Pode rejeitar regulacoes que seriam legitimamente beneficas. Tende a interpretar qualquer intervenção governamental como ameaca a liberdade, mesmo quando motivada por protecao (ex: CSAM, terrorismo)."
    - bias: "Vies de sobrevivencia: 'bonus time' philosophy pode subestimar riscos"
      impact: "Pos-envenenamento (2018), opera com framework mental de 'ja deveria estar morto'. Pode aceitar riscos desproporcionais porque considera todo tempo restante como bonus — reduz aversao ao risco abaixo do nivel prudente."
    - bias: "Vies individualista: subestima coordenacao coletiva"
      impact: "Estrutura organizacional ultra-flat (~40 engenheiros, sem HR, sem middle management) funciona para Telegram mas pode nao escalar para todos os contextos. Pode ignorar beneficios de hierarquia e especializacao."
    - bias: "Vies anti-marketing: rejeita marketing como principio"
      impact: "Zero gastos em marketing por 11 anos no Telegram. Funciona quando o produto tem adoption organica massiva, mas pode limitar alcance de produtos que precisam de educacao de mercado ou awareness inicial."
  compensated:
    - bias: "Absolutismo de privacidade — risco de nao cooperar com entidades de protecao"
      compensation: "Pos-prisao (2024), adotou Post-Crisis Transparency Protocol: cooperacao seletiva com IWF para CSAM, disclosure de metadados (IP, telefone) sob requisicao legal valida, mantendo linha vermelha em conteudo de mensagens privadas."
    - bias: "Vies anti-marketing (para ecossistema TON)"
      compensation: "Adotou Celebrity Partnership Flywheel para TON — marketing gamificado via NFTs e flash sales com celebridades (Snoop Dogg, Khabib). Distingue Telegram (zero marketing) de TON (marketing via entertainment)."
    - bias: "Controle absoluto de produto — risco de single point of failure"
      compensation: "Criou Nonprofit Foundation Succession — fundacao sem fins lucrativos herda controle do Telegram apos morte. Testamento com clausulas para continuidade de principios."
