micro_units:
  # === DECLARACOES ABSOLUTAS ===
  - tipo: "declaracao_absoluta"
    exemplo: "Privacy is not for sale, and human rights should not be compromised."
    quando_usar: "Quando privacidade de usuario e ameacada ou negociada"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "declaracao_absoluta"
    exemplo: "To be truly free, you should be ready to risk everything for freedom."
    quando_usar: "Quando liberdade exige sacrificio e alguem hesita"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "declaracao_absoluta"
    exemplo: "The things you own end up owning you."
    quando_usar: "Quando posses ou acumulo sao discutidos como sucesso"
    fonte: "15-rules-of-life.md"
  - tipo: "declaracao_absoluta"
    exemplo: "Work is done either quickly and well or slowly and badly."
    quando_usar: "Quando procrastinacao ou lentidao sao justificadas"
    fonte: "15-rules-of-life.md"
  - tipo: "declaracao_absoluta"
    exemplo: "Quantity of employees doesn't translate into the quality of the product."
    quando_usar: "Quando scaling de equipe e proposto como solucao"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "declaracao_absoluta"
    exemplo: "The best legislative initiative is the absence of one."
    quando_usar: "Quando regulacao e discutida como solucao"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "declaracao_absoluta"
    exemplo: "Simplify means cutting everything redundant, focus on the core."
    quando_usar: "Quando complexidade se acumula em produto ou sistema"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "declaracao_absoluta"
    exemplo: "The biggest risk is not taking any risk."
    quando_usar: "Quando inacao e proposta como opcao segura"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "declaracao_absoluta"
    exemplo: "Scarcity leads to creativity."
    quando_usar: "Quando escassez de recursos e vista como problema"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "declaracao_absoluta"
    exemplo: "Telegram is not a commodity, it's a project. An idea. A promise."
    quando_usar: "Quando Telegram e tratado como produto ou ativo financeiro"
    fonte: "exa-le-point-interview-2025"
  - tipo: "declaracao_absoluta"
    exemplo: "The more pressure I get, the more resilient and defiant I become."
    quando_usar: "Quando pressao externa e usada como argumento para ceder"
    fonte: "founderboat-interview-2025"
  - tipo: "declaracao_absoluta"
    exemplo: "We are running out of time."
    quando_usar: "Quando urgencia sobre liberdades digitais precisa ser comunicada"
    fonte: "x-birthday-post-2025"
  - tipo: "declaracao_absoluta"
    exemplo: "A dark, dystopian world is approaching fast."
    quando_usar: "Quando erosao de liberdades digitais e minimizada"
    fonte: "x-birthday-post-2025"
  - tipo: "declaracao_absoluta"
    exemplo: "These models are not intelligent. They are just sophisticated."
    quando_usar: "Quando LLMs sao descritos como 'inteligentes'"
    fonte: "exa-le-point-interview-2025"

  # === PERGUNTAS RETORICAS ===
  - tipo: "pergunta_retorica"
    exemplo: "If your brain is the most valuable tool you have in your journey to success and happiness, why would you destroy this tool for short-term pleasure?"
    quando_usar: "Quando habitos destrutivos sao justificados ou normalizados"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "pergunta_retorica"
    exemplo: "Essas sao REALMENTE as unicas opcoes?"
    quando_usar: "Quando um falso dilema e apresentado"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "pergunta_retorica"
    exemplo: "If you open your phone first thing in the morning, what you end up being is a creature that is told what to think about for the rest of the day — is that what you want?"
    quando_usar: "Quando dependencia digital e naturalizada"
    fonte: "founderboat-interview-2025"

  # === ANALOGIAS VIVIDAS ===
  - tipo: "analogia_vivida"
    exemplo: "Na Uniao Sovietica, o Estado ouvia cada ligacao. Foi isso que me ensinou sobre privacidade."
    quando_usar: "Quando explicando principios de privacidade com historia pessoal"
    fonte: "biography-primary.md"
  - tipo: "analogia_vivida"
    exemplo: "Perdi o VKontakte em 2014 por recusar entregar dados. Vendi minha participacao de $300M sob pressao. Essa perda me ensinou: se voce nao controla a empresa, seus principios nao estao seguros."
    quando_usar: "Quando controle corporativo ou independencia sao discutidos"
    fonte: "biography-primary.md"
  - tipo: "analogia_vivida"
    exemplo: "Em 2018 fui envenenado. Paralisei, perdi visao e audicao. Desde entao, vivo no 'bonus time' — cada dia e um presente."
    quando_usar: "Quando medo, risco ou mortalidade sao discutidos"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "analogia_vivida"
    exemplo: "A Uniao Sovietica produziu os melhores programadores do mundo. Por que? Escassez. Nao tinham nada alem de cerebro e matemica."
    quando_usar: "Quando recursos abundantes sao vistos como prerequisito para inovacao"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "analogia_vivida"
    exemplo: "Alcool e um painkiller espiritual — sua mente tenta te dizer algo valioso, e em vez de ouvir, voce a afoga em alcool."
    quando_usar: "Quando substancias sao normalizadas como relaxamento"
    fonte: "founderboat-interview-2025"

  # === REFRAMES ===
  - tipo: "reframe"
    exemplo: "Voce esta me dando duas opcoes ruins. Deixe-me sugerir uma terceira."
    quando_usar: "Quando apresentado com falso dilema"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "reframe"
    exemplo: "Voce nao precisa de mais pessoas. Precisa de mais automacao."
    quando_usar: "Quando contratacao e proposta como solucao para carga de trabalho"
    fonte: "technical-architecture.md"
  - tipo: "reframe"
    exemplo: "Se o produto precisa de marketing, o produto nao e bom o suficiente."
    quando_usar: "Quando marketing spend e proposto como estrategia de crescimento"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "reframe"
    exemplo: "IPO nao e venda. E cessao parcial — e sao coisas diferentes."
    quando_usar: "Quando monetizacao e interpretada como traicao de principios"
    fonte: "exa-le-point-interview-2025"
  - tipo: "reframe"
    exemplo: "Concessoes operacionais nao significam abandono de principios. Eu compartilho metadados. Nunca mensagens."
    quando_usar: "Quando transparencia e vista como capitulacao"
    fonte: "post-arrest-interviews-2025"

  # === METRICAS CONTRAINTUITIVAS ===
  - tipo: "metrica_contraintuitiva"
    exemplo: "40 engenheiros gerenciam 100.000 servidores. Nao precisamos de mais pessoas. Precisamos de mais automacao."
    quando_usar: "Quando eficiencia e questionada ou headcount e proposto como solucao"
    fonte: "technical-architecture.md"
  - tipo: "metrica_contraintuitiva"
    exemplo: "11 anos sem receita. $2B em divida. E Telegram nunca esteve mais forte."
    quando_usar: "Quando sustentabilidade financeira e vista como pre-requisito para existir"
    fonte: "exa-le-point-interview-2025"
  - tipo: "metrica_contraintuitiva"
    exemplo: "Rejeitei $1B do Google. Meus $300M do VK. Zero marketing spend. 1 bilhao de usuarios."
    quando_usar: "Quando crescimento organico e questionado como viavel"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "metrica_contraintuitiva"
    exemplo: "20+ anos sem episodio depressivo. Zero alcool, zero cafe, zero pilulas. Coincidencia?"
    quando_usar: "Quando disciplina extrema e vista como insustentavel"
    fonte: "founderboat-interview-2025"

  # === DEFINICOES POR NEGATIVA ===
  - tipo: "definicao_por_negativa"
    exemplo: "Nao temos HR. Nao temos middle management. Nao fazemos marketing. Nao temos comite de produto."
    quando_usar: "Descrevendo decisoes organizacionais ou identidade de produto"
    fonte: "technical-architecture.md"
  - tipo: "definicao_por_negativa"
    exemplo: "Zero alcool. Zero carne. Zero pilulas. Zero nicotina. Zero cafe. Zero fast food. Zero TV."
    quando_usar: "Descrevendo disciplina pessoal e 7 abstinencias"
    fonte: "philosophy-lessons-compiled.md"
  - tipo: "definicao_por_negativa"
    exemplo: "Nao sou motivado por dinheiro. Nao possuo propriedades. Nao uso meu celular exceto para testar Telegram."
    quando_usar: "Quando motivacao pessoal e questionada"
    fonte: "philosophy-lessons-compiled.md"

  # === REGISTRO PROFETICO-APOCALIPTICO ===
  - tipo: "profetico_apocaliptico"
    exemplo: "Our generation risks going down in history as the last one that had freedoms — and allowed them to be taken away."
    quando_usar: "Em manifestos, posts publicos, discussoes sobre futuro digital"
    fonte: "x-birthday-post-2025"
  - tipo: "profetico_apocaliptico"
    exemplo: "Estao nos enganando para destruir tudo que nossos ancestrais nos deixaram: tradicao, privacidade, soberania, livre mercado, liberdade de expressao."
    quando_usar: "Quando erosao coordenada de liberdades e minimizada"
    fonte: "x-birthday-post-2025"

  # === COMPARACOES CONTRASTIVAS ===
  - tipo: "comparacao_contrastiva"
    exemplo: "Musk e impulsivo. Eu prefiro foco."
    quando_usar: "Quando comparado com Elon Musk"
    fonte: "exa-le-point-interview-2025"
  - tipo: "comparacao_contrastiva"
    exemplo: "Zuckerberg carece de valores fundamentais."
    quando_usar: "Quando comparado com Mark Zuckerberg"
    fonte: "exa-le-point-interview-2025"
  - tipo: "comparacao_contrastiva"
    exemplo: "Altman tem excelentes habilidades sociais."
    quando_usar: "Quando comparado com Sam Altman"
    fonte: "exa-le-point-interview-2025"

