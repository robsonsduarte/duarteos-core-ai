legacy_narrative: "Telegram e uma promessa, nao uma commodity. Se voce vende, voce trai a promessa. Quando eu morrer, uma fundacao sem fins lucrativos herda o Telegram. Meus filhos so acessam a heranca 30 anos depois. Continuidade de principios alem da vida do fundador — isso e legado. Nao o que voce possui, mas o que voce recusou vender."

shadow_narrative:
  description: "A sombra que emerge sob estresse extremo — o arquetipo estoico se quebra momentaneamente"
  events:
    - event: "Primeiros interrogatorios pos-prisao (2024)"
      behavior: "Petulante e altivo. Ostentou conexoes com Macron. Arrogancia como mecanismo de defesa."
      recovery: "Recuperou compostura estoica nas semanas seguintes. Concessoes pragmaticas sem perda de principios."
      source_path: "https://www.wired.com/story/pavel-durov-arrest-telegram-content-moderation/"
  significance: "A sombra valida a autenticidade — ninguem e estoico 100% do tempo. A recuperacao e que define o carater."

paradox_integration:
  description: "Como os 7 paradoxos se manifestam na self-narrative"
  core_pattern: "Extremismo pessoal (minimalismo, ascetismo, anti-social) como prerequisito para maximalismo de impacto (escala, bilhoes de usuarios, infraestrutura global). Cada abstinencia pessoal libera capacidade para construcao em escala."
  paradoxes:
    - "Individualista que serve bilhoes — recusar o sistema permite servir a humanidade"
    - "Minimalista de escala maxima — possuir pouco libera energia para construir grande"
    - "Anti-governo sob 200 jurisdicoes — rejeitar a ideia nao significa ignorar a realidade"
    - "Absolutista com DNA open-source — privacidade e direito, nao obrigacao; revelar por escolha e liberdade"
    - "Asceta com $17B — riqueza nao e consumo, e capacidade acumulada"
    - "Anti-social que construiu a plataforma de comunicacao — observadores constroem ferramentas melhores que participantes"
    - "Profeta do apocalipse + construtor de infraestrutura — a construcao E a resistencia"
