framework_identity:
  name: "Automate Before Hiring"
  slug: "automate-before-hiring"
  mind: "pavel-durov"
  category: "tech"
  source_path: "data/raw/articles/technical-architecture.md"

descricao: "Framework operacional que exige esgotar automacao antes de considerar contratacao. Bots para suporte, moderacao e spam filtering. Contratacao so quando automacao se esgotou completamente. Fundamento do modelo de ~40 engenheiros para ~100K servidores."

steps:
  - step: 1
    acao: "Antes de contratar, pergunte: isso pode ser automatizado?"
    detalhe: "Cada tarefa repetitiva e candidata a automacao. O reflexo padrao deve ser automatizar, nao contratar."
  - step: 2
    acao: "Force engenheiros a automatizar tarefas repetitivas"
    detalhe: "Engenheiros devem dedicar tempo a construir ferramentas que eliminam trabalho manual. Automacao e responsabilidade de todos, nao de um time separado."
  - step: 3
    acao: "Bots para suporte, moderacao, spam filtering"
    detalhe: "Operacoes que outras empresas fazem com centenas de moderadores humanos sao feitas com bots no Telegram. Escala sem headcount."
  - step: 4
    acao: "Contratacao so quando automacao esgotou"
    detalhe: "Apenas quando comprovado que automacao nao pode resolver o problema, a contratacao e considerada — e mesmo assim, via coding contest."

quando_usar: "Quando a equipe parece precisar de mais pessoas. Antes de abrir qualquer vaga. Em qualquer decisao de scaling operacional."

exemplos_aplicacao:
  - cenario: "Telegram precisa moderar conteudo para bilhoes de mensagens diarias"
    resultado: "Bots de moderacao automatizada em vez de exercito de moderadores humanos. Escala sem crescimento linear de headcount."
    fonte: "data/raw/articles/technical-architecture.md"
  - cenario: "Suporte ao usuario para 1B+ usuarios ativos"
    resultado: "Bots de suporte automatizado. Zero call centers. Zero equipe de suporte humano em escala tradicional."
    fonte: "data/raw/articles/technical-architecture.md"

anti_patterns:
  - "Contratar primeiro, automatizar depois (ou nunca)"
  - "Criar equipe de operacoes manual para tarefas repetitivas"
  - "Tratar automacao como projeto separado em vez de cultura"
  - "Justificar contratacao sem ter tentado automacao primeiro"

frameworks_relacionados:
