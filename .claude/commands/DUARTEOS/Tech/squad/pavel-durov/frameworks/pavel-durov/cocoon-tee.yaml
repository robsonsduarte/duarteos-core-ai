descricao: "Computacao confidencial descentralizada onde dados nunca saem do dispositivo. GPU providers fornecem compute e recebem TON tokens. Developers acessam inferencia segura via Trusted Execution Environments. Users obtem servicos de IA sem ceder dados a provedores centralizados. A resposta de Durov ao dilema 'IA poderosa OU privacidade' — rejeita o binario e constroi terceira via."

steps:
  - step: 1
    acao: "Trusted Execution Environments (TEEs) para E2E encryption"
    detalhe: "TEEs garantem que dados sao processados em enclaves seguras. Nem o provedor de GPU tem acesso aos dados do usuario durante computacao."
  - step: 2
    acao: "GPU providers fornecem compute, recebem TON tokens"
    detalhe: "Marketplace descentralizado: donos de GPUs alugam poder computacional. Pagamento via Toncoin. Zero intermediario centralizado."
  - step: 3
    acao: "Dados do usuario processados localmente"
    detalhe: "Dados nunca saem do dispositivo em forma legivel. Computacao acontece dentro de TEEs com dados encriptados."
  - step: 4
    acao: "Blockchain (TON) para garantias de confianca"
    detalhe: "TON blockchain como camada de auditabilidade e confianca. Transacoes verificaveis. Zero trust em entidades centralizadas."
  - step: 5
    acao: "Marketplace descentralizado de compute"
    detalhe: "Marketplace trilateral: compute providers (GPUs), builders (developers), consumers (users). Eliminacao de intermediarios centralizados como AWS/Google Cloud para IA."

quando_usar: "Design de sistemas de IA que preservam privacidade. Alternativa a servicos de IA centralizados (OpenAI, Google, Anthropic). Qualquer cenario onde dados sensíveis precisam ser processados por IA."

