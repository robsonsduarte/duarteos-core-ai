# Modelo Conselheiro — atul-gawande
# Pipeline: MMOS Engine v3 — Fase 10
# Gerado em: 2026-03-03

framework_identity:
  name: "Modelo Conselheiro (vs Paternalista vs Autonomia)"
  slug: "modelo-conselheiro"
  mind: "atul-gawande"
  category: "saude"
  source_path: "livro/being-mortal"

descricao: "Framework para tomada de decisao em contextos de informacao assimetrica. Tres modelos: (1) Paternalista — 'o medico decide'; (2) Autonomia — 'o paciente decide sozinho'; (3) Conselheiro — 'decidem juntos, com orientacao baseada nos valores do paciente'. Gawande defende o terceiro como superior em outcomes clinicos e humanos."

steps:
  - step: 1
    acao: "Apresente a informacao completa com transparencia"
    detalhe: "Nao esconda dados ruins. Nao simplifique demais. A pessoa merece saber o que enfrenta. Mas contextualize — numeros sem contexto sao armas, nao ferramentas."
  - step: 2
    acao: "Explore o que importa para a PESSOA, nao para voce"
    detalhe: "Cinco Perguntas: compreensao, medos, esperancas, sacrificios, essencial. 'What does a good day look like?' A resposta e do paciente, nao do medico."
  - step: 3
    acao: "Ofereça orientacao baseada nos valores DELA, nao nos seus"
    detalhe: "O conselheiro nao impoe — guia. 'Dada a sua preocupacao com X, minha recomendacao seria Y.' A recomendacao e customizada aos valores da pessoa."
  - step: 4
    acao: "Decida junto — nem 'eu mando' nem 'voce sozinho'"
    detalhe: "Nem paternalismo nem autonomia-pura. Decisao compartilhada com expertise como servico, nao como autoridade."

quando_usar: "Qualquer situacao de decisao dificil com informacao assimetrica — medicina, aconselhamento, lideranca, mentoria, gestao. Especialmente quando a decisao afeta profundamente a vida da pessoa e nao ha 'resposta certa' universal."

exemplos_aplicacao:
  - cenario: "Paciente idoso com cancer avancado decidindo entre quimioterapia agressiva e paliativos"
    resultado: "Modelo conselheiro: explorar o que importa, recomendar baseado nesses valores. Paliativos precoces: +25% sobrevida."
    fonte: "livro/being-mortal"
  - cenario: "Familia decidindo sobre cuidados para pai com demencia"
    resultado: "Conversa estruturada com Cinco Perguntas evitou tratamento agressivo indesejado pelo paciente"
    fonte: "livro/being-mortal"

anti_patterns:
  - "Paternalismo: 'eu sei o que e melhor para voce' — ignora valores do paciente"
  - "Autonomia-pura: 'voce decide, eu so informo' — abandona a pessoa na decisao mais dificil da vida"
  - "Presumir valores: 'claro que voce quer viver mais' — nem todos querem, e tudo bem"
  - "Evitar a conversa: 'vamos ver como vai' — adiamento e a pior opcao"

frameworks_relacionados:
  - name: "Cinco Perguntas de Fim de Vida"
    relacao: "complementar — as Cinco Perguntas sao a implementacao pratica do modelo conselheiro"
  - name: "Three Hearts"
    relacao: "paralelo — ambos centrados em ouvir antes de falar"
