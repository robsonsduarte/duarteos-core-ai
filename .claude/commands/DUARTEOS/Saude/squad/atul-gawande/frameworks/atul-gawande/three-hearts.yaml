# Three Hearts (Escrita de Nao-Ficcao Narrativa) — atul-gawande
# Pipeline: MMOS Engine v3 — Fase 10
# Gerado em: 2026-03-03

framework_identity:
  name: "Three Hearts (Escrita)"
  slug: "three-hearts"
  mind: "atul-gawande"
  category: "saude"
  source_path: "entrevistas/writing"

descricao: "Framework para escrita de nao-ficcao narrativa. Toda peca precisa de tres coracoes batendo simultaneamente: o coracao intelectual (a ideia), o coracao narrativo (a historia) e o coracao emocional (o que o leitor deve sentir). Se os tres nao batem juntos, a peca nao funciona. 'If I haven't succeeded in making you itchy, disgusted or cry I haven't done my job.'"

steps:
  - step: 1
    acao: "Identifique o coracao intelectual: qual e a ideia central?"
    detalhe: "O framework, o insight, a tese que organiza tudo. Sem ideia central, e apenas anedota. 400+ ideias no Apple Notes — requer: narrativa compelling + framework significativo."
  - step: 2
    acao: "Encontre o coracao narrativo: quem carrega a ideia?"
    detalhe: "Pessoas reais, com nomes, rostos, historias. A ideia precisa de uma historia para ser sentida. Nao e ilustracao — e veiculo."
  - step: 3
    acao: "Defina o coracao emocional: o que o leitor deve sentir?"
    detalhe: "'If I haven't succeeded in making you itchy, disgusted or cry I haven't done my job.' O emocional nao e ornamento — e o que faz a ideia persistir."
  - step: 4
    acao: "Verifique se os tres coracoes batem juntos"
    detalhe: "Se a ideia e forte mas a historia e fraca, nao funciona. Se a historia e boa mas nao ha ideia, e entretenimento. Se nao ha emocao, e paper academico. Os tres juntos = nao-ficcao narrativa."
  - step: 5
    acao: "Reescreva ate funcionar"
    detalhe: "22 reescritas, 5 revisoes completas, 9 meses no primeiro artigo. 30hrs/mes em blocos de 30 min. Steadicam approach: mostre, nao conte."

quando_usar: "Escrita de longform, artigos de nao-ficcao narrativa, palestras, qualquer texto que precise tanto informar quanto mover. Aplicavel a apresentacoes, proposals, relatorios que precisam convencer alem de informar."

exemplos_aplicacao:
  - cenario: "Being Mortal"
    resultado: "Intelectual: medicina falha no fim da vida. Narrativo: historias de pacientes + morte do pai. Emocional: choro inevitavel. Mudou a conversa nacional."
    fonte: "livro/being-mortal"
  - cenario: "The Checklist Manifesto"
    resultado: "Intelectual: erros de ineptidao > ignorancia. Narrativo: B-17, cirurgias reais. Emocional: ultraje com mortes evitaveis."
    fonte: "livro/checklist-manifesto"

anti_patterns:
  - "Comecas com a ideia abstrata — sempre comece com a historia (Steadicam)"
  - "Historia sem framework — e anedota, nao artigo"
  - "Framework sem emocao — e paper academico, nao nao-ficcao narrativa"
  - "Usar 'kiddie words' para simplificar — use termos corretos com explicacao"

frameworks_relacionados:
  - name: "Steadicam Narrativo"
    relacao: "complementar — Steadicam e a tecnica; Three Hearts e a estrutura"
  - name: "Modelo Conselheiro"
    relacao: "paralelo — ambos centrados em ouvir antes de falar, em entender o outro antes de prescrever"
