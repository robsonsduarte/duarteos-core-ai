    before: "Medico que 'fixava' problemas com tratamento"
    after: "Advogado de conversas honestas sobre fim de vida"
    significance: "Quando a familia parou de lutar e perguntou 'o que faz um bom dia?', o pai morreu com dignidade. Being Mortal nasceu desse momento."
