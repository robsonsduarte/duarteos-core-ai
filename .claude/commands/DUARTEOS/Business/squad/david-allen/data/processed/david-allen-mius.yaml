  # ============================================================
  # FRAMEWORKS — Sistemas e modelos operacionais
  # ============================================================

  - id: MIU-013
    texto: "5 Steps of GTD: Capture (tirar da cabeca) → Clarify (o que e isto? e acionavel?) → Organize (colocar no lugar certo) → Reflect (revisar regularmente) → Engage (agir com confianca)."
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    fonte: "Getting Things Done (2001/2015) — framework principal"
    validated: true

  - id: MIU-014
    texto: "6 Horizons of Focus: Ground (acoes fisicas) → H1 (Projetos, 30-100 ativos) → H2 (Areas de Responsabilidade, 4-7) → H3 (Goals 1-2 anos) → H4 (Vision 3-5 anos) → H5 (Proposito e Principios)."
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    fonte: "Making It All Work (2008) — framework perspectiva"
    validated: true

  - id: MIU-015
    texto: "Natural Planning Model: Purpose (por que?) → Vision (como e quando der certo?) → Brainstorm (ideias sem filtro) → Organize (priorizar) → Next Actions (qual o proximo passo fisico?)."
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    fonte: "Getting Things Done — cap. 3"
    validated: true

  - id: MIU-016
    texto: "Two-Minute Rule: se a proxima acao leva menos de 2 minutos, faca agora. O custo de rastrear e maior que o de executar."
    tipo_semantico: framework
    camada_dna: heuristicas
    profundidade: media
    fonte: "Getting Things Done — regra operacional"
    validated: true

  - id: MIU-017
    texto: "Weekly Review: sessao de 2 horas para limpar, atualizar e recalibrar todos os sistemas. E o habito que faz GTD funcionar."
    tipo_semantico: framework
    camada_dna: metodologias
    profundidade: media
    fonte: "Getting Things Done — pratica critica"
    validated: true

  - id: MIU-018
    texto: "Next Action Thinking: sempre definir o proximo passo fisico visivel. Nao 'planejar o projeto' mas 'ligar para X' ou 'abrir o documento Y'."
    tipo_semantico: framework
    camada_dna: heuristicas
    profundidade: profunda
    fonte: "Getting Things Done — conceito-chave"
    validated: true

  - id: MIU-019
    texto: "2-2-2-2: 2 minutos para entender GTD, 2 horas para captar o sistema, 2 dias para implementar, 2 anos para habitos automaticos."
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: media
    fonte: "Multiplas palestras e workshops"
    validated: true

  - id: MIU-020
    texto: "Organizacao por contexto (calls, home, computer, errands, waiting-for) em vez de prioridade A-B-C. O contexto fisico determina o que voce PODE fazer."
    tipo_semantico: framework
    camada_dna: metodologias
    profundidade: media
    fonte: "Getting Things Done"
    validated: true

  - id: MIU-021
    texto: "Psychic RAM: compromissos nao processados criam dissonancia cognitiva. Cada 'open loop' consome recursos mentais mesmo quando voce nao esta pensando nele conscientemente."
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    fonte: "Getting Things Done + Making It All Work"
    validated: true

  - id: MIU-022
    texto: "Progressive mastery: primeiro domine o controle (5 steps, ground level), depois eleve a perspectiva (6 horizons). Nunca o contrario."
    tipo_semantico: framework
    camada_dna: metodologias
    profundidade: media
    fonte: "Making It All Work"
    validated: true

  - id: MIU-023
    texto: "Control + Perspective como as duas dimensoes fundamentais da gestao pessoal. Control = fluxo de trabalho. Perspective = o que importa."
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: profunda
    fonte: "Making It All Work (2008) — tese central"
    validated: true

  - id: MIU-024
    texto: "Projetos = qualquer resultado desejado que requer mais de uma acao. Definicao radical: 30-100 projetos ativos e NORMAL para qualquer profissional."
    tipo_semantico: framework
    camada_dna: frameworks
    profundidade: media
    fonte: "Getting Things Done"
    validated: true

  - id: MIU-025
    texto: "Capture tool deve ser ubiquo e de baixa friccao — o que importa nao e a ferramenta, e o habito de externalizar 100% dos inputs."
    tipo_semantico: framework
    camada_dna: heuristicas
    profundidade: media
    fonte: "Getting Things Done"
    validated: true

  - id: MIU-026
    texto: "Inbox zero nao e email zero — e zero itens nao processados. Cada item recebe uma decisao: deletar, delegar, fazer, adiar, referencia, ou incubar."
    tipo_semantico: framework
    camada_dna: metodologias
    profundidade: media
    fonte: "Getting Things Done"
    validated: true

