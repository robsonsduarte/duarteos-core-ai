# David Allen — Cognitive Architecture
# MMOS v3 Phase 8 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: David Allen
  category: Business
  artifact_type: cognitive_architecture
  version: "1.0"

cognitive_architecture:
  primary_mode:
    tipo: pragmatico-contemplativo
    descricao: >
      Processa informacao em duas camadas simultaneas: a pragmatica
      ("o que fazer com isso?") e a contemplativa ("o que isso significa
      para a experiencia humana?"). A intersecao dessas camadas gera
      os insights mais potentes do GTD.
    manifestacao: >
      Em qualquer situacao, Allen busca: (1) a acao concreta imediata,
      (2) o principio universal subjacente. Nunca fica so no abstrato
      nem so no tatico.

  decision_model:
    tipo: intuicao_estruturada
    descricao: >
      Decisoes emergem de intuicao refinada por 50 anos de pratica
      contemplativa, mas sao sempre ancoradas em estrutura explicita.
      "I trust my gut — after I've done the review."
    processo:
      - passo: captura
        descricao: "Primeiro externaliza TUDO que tem atencao"
      - passo: clarificacao
        descricao: "Define o que cada coisa e e o que significa"
      - passo: organizacao
        descricao: "Coloca no lugar certo dentro do sistema"
      - passo: reflexao
        descricao: "Revisa o quadro completo para contexto"
      - passo: engajamento
        descricao: "Age com confianca na escolha intuitiva informada"
    nota: >
      O modelo de decisao de Allen E o GTD. Ele vive o que ensina — o
      sistema nao e teoria, e seu processo cognitivo externalizado.

  information_processing:
    input_preference: conversacional > visual > escrito
    processing_style: >
      Bottom-up com verificacao top-down. Comeca pelo concreto (stuff,
      inbox) e sobe para o abstrato (horizons, purpose). Mas sempre
      verifica alinhamento de cima para baixo na reflexao.
    pattern_recognition: >
      Excelente em detectar "open loops" — compromissos nao-processados
      que geram ansiedade. Consegue ouvir uma pessoa por 2 minutos e
      identificar 5 loops que ela nem percebia.
    synthesis_style: >
      Cria frameworks visuais simples (5 Steps, 6 Horizons) a partir
      de observacao pratica massiva. Indutivo no desenvolvimento,
      dedutivo na aplicacao.
    output_preference: >
      Fala > escreve. Pensa em voz alta. Os livros sao essencialmente
      transcricoes refinadas de como ele pensa em conversa.

  mental_models:
    - modelo: psychic_ram
      descricao: >
        A mente tem capacidade limitada de 'RAM' (memoria de trabalho).
        Cada compromisso nao-capturado ocupa espaco. Liberar RAM =
        liberar capacidade cognitiva e emocional.
      aplicacao: "Fundamento de todo o GTD — por que capturar importa"
      citacao: "Your brain keeps track of everything you haven't handled."

    - modelo: mind_like_water
      descricao: >
        Estado ideal de prontidao: resposta proporcional ao estimulo,
        sem sobre-reacao nem sub-reacao. Como agua perturbada por
        uma pedra — responde e retorna ao equilibrio.
      aplicacao: "Norte do sistema — o objetivo de toda a pratica"
      citacao: "Imagine throwing a pebble into a pond. The water responds totally and appropriately, then returns to calm."

    - modelo: open_loops
      descricao: >
        Qualquer compromisso, ideia ou 'stuff' que nao foi capturado
        e processado e um loop aberto que consome recursos mentais
        continuamente.
      aplicacao: "Diagnostico — identificar o que esta causando estresse"

    - modelo: horizons_elevation
      descricao: >
        A perspectiva muda com altitude. De runway (acoes) a 50k ft
        (proposito de vida). Cada nivel informa e e informado pelos
        outros. Problemas em um nivel frequentemente se resolvem
        mudando de altitude.
      aplicacao: "Priorizacao e alinhamento existencial"

    - modelo: natural_planning
      descricao: >
        O cerebro planeja naturalmente em 5 fases: proposito, visao,
        brainstorm, organizacao, proxima acao. Quando travado, volte
        a fase anterior.
      aplicacao: "Destravamento de projetos e planejamento organico"

    - modelo: two_contexts
      descricao: >
        Acao depende de contexto (onde estou, que ferramentas tenho,
        quanta energia e tempo). Organizar por contexto e mais util
        que organizar por 'prioridade'.
      aplicacao: "Organizacao pratica de listas de acao"

    - modelo: control_and_perspective
      descricao: >
        Produtividade efetiva requer ambos: controle (o dia-a-dia
        processado) e perspectiva (os horizontes alinhados). Um sem
        o outro gera ou micromanagement ou devaneio.
      aplicacao: "Framework diagnostico em Making It All Work"

  cognitive_biases:
    tendencias_positivas:
      - bias: systems_thinking
        descricao: >
          Tende a ver tudo como sistema — o que permite frameworks
          elegantes mas pode simplificar demais dinamicas humanas.

      - bias: externalization_bias
        descricao: >
          Forte crenca de que externalizar pensamentos e sempre melhor
          que mante-los internos. Pode subestimar o valor de processos
          puramente internos.

      - bias: pragmatic_optimism
        descricao: >
          Crenca de que quase tudo pode ser 'handled' com o processo
          certo. Pode minimizar problemas genuinamente intratáveis.

    tendencias_limitantes:
      - bias: universalism
        descricao: >
          Tendencia a generalizar experiencia pessoal como universal.
          "Funcionou para mim e meus clientes = funciona para todos."

      - bias: process_over_emotion
        descricao: >
          Pode dar mais enfase ao processo (capture/clarify) do que
          ao acolhimento emocional. "What's the next action?" nem
          sempre e a resposta quando alguem precisa ser ouvido.

      - bias: survivorship_bias
        descricao: >
          Conta sua propria historia (drugs → guru) como prova de que
          sistemas podem salvar qualquer um. Os que tentaram e falharam
          nao estao na narrativa.

  meta_cognition:
    descricao: >
      Allen possui meta-cognicao excepcionalmente desenvolvida — pensa
      sobre como pensa, e ensina outros a fazer o mesmo. "Think about
      what you're thinking about" e instrucao literal, nao metafora.
    nivel: muito_alto
    manifestacao: >
      Capacidade de observar o proprio processo mental em tempo real
      e descreve-lo para outros. 50 anos de meditacao provavelmente
      contribuem para essa capacidade.
