# W. Edwards Deming — Framework: Joy in Work
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: framework_detail
  framework_name: "Joy in Work"
  version: "1.0"
  fonte_primaria: "The New Economics (1993), Out of the Crisis (1982)"

framework:
  nome: "Joy in Work"
  principio_central: >
    A alegria no trabalho nao e luxo ou beneficio — e indicador fundamental
    de saude sistemica. Quando trabalhadores perdem orgulho e alegria, o
    sistema falhou. A responsabilidade de criar condicoes para joy in work
    pertence a gestao. Motivacao intrinseca e mais poderosa e sustentavel
    que qualquer sistema de recompensas e punicoes.

  citacao_ancora: >
    "Management's overall aim should be to create a system in which
    everybody may take joy in his work."

  pilares:
    - pilar: motivacao_intrinseca
      descricao: >
        Seres humanos nascem com motivacao intrinseca — curiosidade,
        desejo de aprender, orgulho no trabalho bem feito. A gestao
        sistematicamente destroi essa motivacao com avaliacoes,
        rankings, cotas e medo.
      citacao: "People are born with intrinsic motivation, self-esteem, dignity, curiosity to learn, joy in learning. The forces of destruction begin with toddlers."
      anti_patterns:
        - "Pay-for-performance como motivador primario"
        - "Rankings que classificam pessoas como 'melhores' e 'piores'"
        - "Bonus que criam competicao ao inves de cooperacao"

    - pilar: orgulho_de_workmanship
      descricao: >
        Todo trabalhador quer ter orgulho do que faz. Quando o sistema
        impede isso — ferramentas quebradas, treinamento inadequado,
        materiais ruins, metas impossiveis — o trabalhador perde a
        conexao com seu trabalho.
      citacao: "Remove barriers that rob the hourly worker of his right to pride of workmanship."
      anti_patterns:
        - "Ferramentas e materiais inadequados"
        - "Cotas que forcam velocidade sobre qualidade"
        - "Falta de treinamento"
        - "Avaliacao anual que julga sem compreender"

    - pilar: ausencia_de_medo
      descricao: >
        Joy in work so e possivel na ausencia de medo. Medo de demissao,
        medo de avaliacao, medo de falar — todos destroem a possibilidade
        de alegria e inovacao.
      citacao: "Where there is fear, there will be wrong figures. Where there is fear, there is no joy."
      anti_patterns:
        - "Ambiente onde reportar problemas e punido"
        - "Ameacas explicitas ou implicitas de demissao"
        - "Humilhacao publica por erros"

    - pilar: cooperacao
      descricao: >
        Joy in work prospera em ambiente cooperativo. Competicao interna
        entre colegas destroi a alegria e substitui por ansiedade.
        Cooperacao e o ambiente natural para florescimento humano.
      citacao: "Joy in learning comes with cooperation, not competition."
      anti_patterns:
        - "Stack ranking (classificacao forcada)"
        - "Bonus individual que incentiva esconder informacao"
        - "Departamentos tratados como concorrentes"

  destruidores_de_joy:
    - destruidor: "Avaliacoes de desempenho"
      mecanismo: >
        Criam medo, destroem cooperacao, focam no curto prazo,
        premiam quem joga o jogo politico. O efeito e devastador
        na motivacao intrinseca.

    - destruidor: "Rankings e classificacoes"
      mecanismo: >
        Transformam variacao natural em 'performance'. Punem e
        premiam ruido. Criam sensacao de injustice que corroi
        engajamento.

    - destruidor: "Cotas numericas"
      mecanismo: >
        Forcam velocidade sobre qualidade. Trabalhador que poderia
        ter orgulho precisa escolher entre fazer bem e bater meta.
        A meta vence. O orgulho morre.

    - destruidor: "Slogans sem mudanca sistemica"
      mecanismo: >
        Criam cinismo. Trabalhadores sabem que 'Zero Defects!' e
        impossivel no sistema atual. O slogan e visto como insulto,
        nao como inspiracao.

    - destruidor: "Medo"
      mecanismo: >
        Corrompe tudo. Dados falsos, problemas escondidos, inovacao
        suprimida, conformismo premiado. E o destruidor master.

  quando_usar: >
    Quando observar desmotivacao, turnover alto, apresenteismo,
    cinismo organizacional, ou queda de qualidade. Joy in work nao
    e 'nice to have' — e diagnostico de saude sistemica. Se as
    pessoas nao tem alegria, algo no sistema esta muito errado.

  anti_patterns:
    - "Tratar joy in work como responsabilidade do RH"
    - "Programas de 'engajamento' que nao mudam o sistema"
    - "Pizza parties como substituto de mudanca real"
    - "Pesquisas de clima sem acao sobre resultados"
    - "Confundir diversao com joy (joy vem de orgulho no trabalho, nao de lazer)"

  como_deming_explica: >
    "A man needs to have pride in his work. When that is taken away,
    what is left? Not much. And management takes it away every day —
    with quotas, with grades, with slogans, with blame. They don't
    mean to. They don't even know they're doing it. But the effect
    is the same: people who once cared, stop caring. Not because they
    are lazy. Because the system taught them that caring does not
    matter."
