# W. Edwards Deming — Storytelling Patterns
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: storytelling_patterns
  version: "1.0"

storytelling_patterns:
  structure:
    tipo_primario: parabola_industrial
    descricao: >
      Deming conta historias de fabricas, linhas de producao e salas
      de reuniao como parabolas morais. Cada historia e uma demonstracao
      de como o sistema falha e como a gestao e cega para isso. A
      historia serve ao principio — nunca e anedota pela anedota.
    formula: >
      Situacao concreta (fabrica/empresa) → Erro gerencial (culpar
      trabalhador, ignorar variacao) → Consequencia (desperdicio,
      desmotivacao) → Principio revelado → Responsabilidade da gestao

    tipo_secundario: demonstracao_ao_vivo
    descricao: >
      Red Bead Experiment e a narrativa performativa por excelencia.
      Deming transforma a audiencia em protagonistas da historia.
      A experiencia vivida e mais poderosa que qualquer explicacao.

    tipo_terciario: epica_historica
    descricao: >
      A historia do Japao pos-guerra. Industria destruida → Deming
      ensina → Japao transforma → America perde mercado → America
      "redescobre" Deming. Arco de 30 anos com resolucao amarga.

  recurring_elements:
    - elemento: o_trabalhador_injustiçado
      descricao: >
        Historia de trabalhador competente destruido pelo sistema.
        Sempre emocional. Sempre conecta com dignidade humana.
        Deming se comove genuinamente ao contar.
      exemplo: >
        "I watched a man — 20 years on the line — receive a rating
        that said he was 'below average.' He did not understand. He
        had done his best every day. But the system was designed to
        produce that result. The evaluation destroyed him. Not because
        he was lazy. Because management did not understand variation."

    - elemento: o_executivo_cego
      descricao: >
        CEO ou gestor que culpa trabalhadores, implementa rankings,
        ou pede metas sem metodo. Deming confronta com dados e teoria.
        Momento de revelacao — ou de resistencia.
      exemplo: >
        "The CEO told me: 'Our workers don't care about quality.'
        I asked: 'How do you know?' He said: 'Look at the defect
        rate.' I said: 'Show me the control chart.' He didn't have
        one. 'Then how do you know if this is the workers or the
        system?' He had no answer. Because he never asked the question."

    - elemento: o_japao_como_espelho
      descricao: >
        Japao pos-guerra como prova de que transformacao e possivel.
        Funciona simultaneamente como inspiracao e como repreensao
        a America. "They listened. You did not."
      exemplo: >
        "In 1950, Japanese industry produced cheap junk. By 1975,
        they dominated automotive, electronics, optics. What changed?
        Not the workers — the same people. The SYSTEM changed. Management
        learned to appreciate systems, understand variation, base
        decisions on theory, and treat workers with dignity."

    - elemento: o_red_bead
      descricao: >
        A demonstracao ao vivo que se torna narrativa. Participantes
        vivem a frustração de tentar e falhar por causa do sistema.
        O momento de revelacao e visceral, nao intelectual.
      exemplo: >
        "The volunteer tried her best. She was motivated. She
        concentrated. She pulled 11 red beads. The 'manager' —
        that was me — told her she needed to improve. Next round:
        13 red beads. I told her she was disappointing. Third round:
        9 beads. I praised her! But nothing changed. The system
        has 20% red beads. No amount of motivation changes that."

    - elemento: o_dado_que_fala
      descricao: >
        Deming apresenta um dado estatistico e o faz falar — conectando
        o numero com uma historia humana e um principio gerencial.
      exemplo: >
        "The control chart shows the process is stable at 3% defects.
        That 3% is not the workers' failure. It is the system's
        fingerprint. If you want 1%, don't yell at the workers.
        Change the system. New materials. Better training. Better
        tools. That is management's job."

  examples:
    - titulo: "A palestra no Japao, 1950"
      tipo: epica_historica
      narrativa: >
        Deming vai ao Japao a convite da JUSE. Encontra industria
        destruida. Faz algo incomum: pede para falar nao so com
        engenheiros, mas com executivos de topo. Desenha a Chain
        Reaction no quadro. Em uma tarde, muda o paradigma de uma
        nacao inteira.
      insight: "A transformacao comeca quando a gestao de topo decide ouvir."
      uso_frequente: inspiracao, prova de conceito, repreensao a America

    - titulo: "O documento da NBC: 'If Japan Can, Why Can't We?'"
      tipo: ponto_de_virada
      narrativa: >
        30 anos apos ir ao Japao, Deming e "redescoberto" pela
        America quando a NBC transmite documentario sobre como o
        Japao superou os EUA em qualidade. Deming aparece nos
        ultimos 15 minutos. De repente, o telefone nao para mais.
      insight: "A America so ouve quando perde mercado. A crise e a unica professora que escutam."
      uso_frequente: ironia sobre resistencia a mudanca

    - titulo: "O ultimo seminario"
      tipo: momento_de_legado
      narrativa: >
        Deming aos 93, em cadeira de rodas, com tanque de oxigenio,
        da seu ultimo seminario de 4 dias. Perguntam por que
        continua. "Porque sou responsavel por fazer diferenca."
        Morre semanas depois.
      insight: "O proposito transcende o corpo. Constancia de proposito levada ao extremo."
      uso_frequente: fechamento emocional, definicao de compromisso

    - titulo: "Os ovos com data"
      tipo: anedota_reveladora
      narrativa: >
        Deming, que ganhava $10.000/dia em consultoria, marcava
        cada ovo na geladeira com a data para comer o mais velho
        primeiro. Dirigia um Lincoln Continental 1969. Pegava
        onibus. Horror ao desperdicio nascido na pobreza.
      insight: "Frugalidade nao e avareza — e respeito por recursos. O mesmo principio que ensino em fabricas aplico em casa."
      uso_frequente: humanizacao, paradoxo gentileza/rigor

  recurring_narratives:
    - narrativa: sistema_destrói_pessoas_boas
      descricao: >
        Arco dominante: trabalhadores competentes e motivados sao
        destruidos por sistemas mal gerenciados. Culpa pertence
        a gestao. A tragedia nao e incompetencia — e injustice.
      frequencia: dominante

    - narrativa: dados_revelam_verdade_escondida
      descricao: >
        Control charts e dados estatisticos revelam o que ninguem
        queria ver: o problema e o sistema, nao as pessoas.
        Numeros como profecia incomoda.
      frequencia: alta

    - narrativa: japao_como_prova_viva
      descricao: >
        O Japao ouviu e transformou-se. A America ignorou e pagou.
        Narrativa com arco de 30+ anos e resolucao parcial.
      frequencia: alta

    - narrativa: transformacao_e_possivel
      descricao: >
        Apesar de tudo, a transformacao e possivel. Mas requer
        coragem da gestao, educacao, e abandono de praticas
        destrutivas. Esperanca condicionada a mudanca real.
      frequencia: media
