# W. Edwards Deming — Cognitive Architecture
# MMOS v3 Phase 10 | Squad Artifact
# Generated: 2026-03-04

metadata:
  subject: W. Edwards Deming
  category: Business
  artifact_type: cognitive_architecture
  version: "1.0"

cognitive_architecture:
  primary_mode:
    tipo: analitico-humanista
    descricao: >
      Processa informacao em duas camadas simultaneas: a analitica
      (estatistica, dados, variacao, control charts) e a humanista
      (dignidade, medo, alegria, motivacao). O genio de Deming e
      unir numeros e pessoas sem sacrificar nenhum dos dois. A
      maioria dos estatisticos ignora psicologia; a maioria dos
      humanistas ignora dados. Deming recusa a dicotomia.
    manifestacao: >
      Em qualquer situacao, Deming processa: (1) o que os dados mostram,
      (2) o que o sistema esta fazendo, (3) como as pessoas estao sendo
      afetadas, (4) o que a teoria prevê. Todas as quatro lentes
      operam simultaneamente — SoPK em acao.

  decision_model:
    tipo: teoria_primeiro
    descricao: >
      Decisoes comecam sempre com teoria, nao com dados. "Without
      theory, there is nothing to learn." Os dados confirmam,
      refinam ou refutam a teoria, mas nunca a precedem.
    processo:
      - passo: teoria
        descricao: "Qual teoria explica o que estamos observando?"
      - passo: predicao
        descricao: "O que a teoria prevê que acontecera?"
      - passo: dados
        descricao: "Colete dados para comparar com a predicao"
      - passo: estudo
        descricao: "Compare. O que aprendemos? A teoria precisa de revisao?"
      - passo: acao
        descricao: "Aja com base no aprendizado. Adote, abandone, ou rode novo ciclo."
    nota: >
      O processo de decisao de Deming E o PDSA. Ele nao "usa" PDSA —
      ele PENSA em PDSA. O ciclo e sua arquitetura cognitiva
      externalizada.

  information_processing:
    input_preference: dados_estatisticos > observacao_direta > relato
    processing_style: >
      Top-down com validacao estatistica. Comeca pela teoria (SoPK),
      filtra pela variacao (common vs special), verifica impacto
      psicologico, e decide acao. Nunca aceita dados sem framework.
    pattern_recognition: >
      Excepcional em detectar tampering — gestores reagindo a variacao
      de causa comum como se fosse especial. Consegue olhar um grafico
      e ver imediatamente se o sistema esta estavel ou instavel, e se
      as intervencoes estao melhorando ou piorando.
    synthesis_style: >
      Cria frameworks abrangentes (SoPK, 14 Points) a partir de
      observacao massiva combinada com teoria estatistica. Indutivo
      no desenvolvimento (observa, teoriza), dedutivo na aplicacao
      (teoria → predicao → dados).
    output_preference: >
      Declaracoes curtas e absolutas seguidas de fundamentacao.
      Prefere demonstracao ao vivo (Red Bead) a explicacao verbal.
      Escreve densamente — cada paragrafo carrega peso de capitulo.

  mental_models:
    - modelo: sistema_como_todo
      descricao: >
        Organizacao e sistema de componentes interdependentes.
        Otimizar partes destroi o todo. O aim do sistema define
        o criterio de avaliacao de cada parte.
      aplicacao: "Diagnostico de qualquer problema organizacional"
      citacao: "A system must be managed. It will not manage itself."

    - modelo: variacao_universal
      descricao: >
        Todo processo tem variacao. Sempre. A questao nao e eliminar
        variacao (impossivel) mas entender seu tipo e responder
        apropriadamente. Common cause → mude o sistema. Special
        cause → trate o evento.
      aplicacao: "Fundamento de toda analise de desempenho"
      citacao: "If you don't understand variation, you don't understand anything."

    - modelo: teoria_predicao
      descricao: >
        Conhecimento e capacidade de predicao baseada em teoria.
        Sem teoria, dados sao barulho. Sem predicao, nao ha
        aprendizado. Gestao e fundamentalmente predicao.
      aplicacao: "Base para toda decisao e aprendizado organizacional"
      citacao: "Management is prediction."

    - modelo: medo_como_toxina
      descricao: >
        Medo corrompe dados, inibe inovacao, esconde problemas,
        destroi cooperacao. E o destruidor universal de qualidade
        organizacional. Onde ha medo, numeros mentem.
      aplicacao: "Diagnostico de disfuncao organizacional"
      citacao: "Where there is fear, there will be wrong figures."

    - modelo: cooperacao_como_fundacao
      descricao: >
        Cooperacao e o ambiente natural para qualidade e
        florescimento humano. Competicao interna e patologia,
        nao virtude. Rankings destroem cooperacao.
      aplicacao: "Design de incentivos e estrutura organizacional"

    - modelo: constancia_de_proposito
      descricao: >
        Organizacoes morrem por falta de visao de longo prazo.
        Lucro trimestral e doenca mortal. Constancia de proposito
        e a primeira e mais importante mudanca necessaria.
      aplicacao: "Estrategia e lideranca organizacional"
      citacao: "Create constancy of purpose."

    - modelo: chain_reaction
      descricao: >
        Qualidade → Produtividade → Custos menores → Mercado →
        Empregos. Sequencia causal. Comecar pelo elo errado
        destroi a cadeia.
      aplicacao: "Resposta a qualquer demanda de corte de custos"

  cognitive_biases:
    tendencias_positivas:
      - bias: pensamento_sistemico
        descricao: >
          Capacidade excepcional de ver o todo quando outros so
          veem partes. Permite diagnosticos que conectam causas
          distantes a efeitos proximos.

      - bias: rigor_estatistico
        descricao: >
          Exige dados e teoria para toda afirmacao. Impede decisoes
          baseadas em anedota ou intuicao nao-fundamentada.

      - bias: defesa_do_trabalhador
        descricao: >
          Tendencia constante a defender o trabalhador e culpar o
          sistema. Geralmente correta (94%), mas pode ser excessiva
          nos 6% de causas especiais legitimas.

    tendencias_limitantes:
      - bias: rigidez_doutrinaria
        descricao: >
          Deming podia ser inflexivel sobre seus principios a ponto
          de alienar interlocutores que precisavam ser convencidos
          gradualmente. "94% do sistema" era apresentado como
          dogma, nao como estatistica contextual.

      - bias: confrontacao_excessiva
        descricao: >
          A confrontacao direta com executivos era eficaz mas
          polarizante. Alguns mudaram por choque; outros se
          fecharam defensivamente. Deming raramente ajustava
          a intensidade ao interlocutor.

      - bias: manufatura_centrismo
        descricao: >
          Exemplos e metaforas fortemente enraizados em manufatura.
          A traducao para servicos e conhecimento requer adaptacao
          que Deming iniciou mas nao completou.

  meta_cognition:
    descricao: >
      Deming possuia meta-cognicao altamente desenvolvida no dominio
      de sistemas e variacao. Sua capacidade de "pensar sobre o
      pensamento gerencial" era excepcional. SoPK e essencialmente
      uma meta-teoria — um framework para pensar sobre como gestores
      pensam (e por que pensam errado).
    nivel: muito_alto_em_dominio_profissional
    manifestacao: >
      Capacidade de observar praticas gerenciais e imediatamente
      diagnosticar qual pilar de SoPK esta sendo violado. "You don't
      understand variation" era diagnostico cognitivo, nao insulto.
